<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048游戏 - 无限挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-image: url('https://picsum.photos/seed/game2048/1920/1080.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px 0;
            overflow-y: auto;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
            margin: 20px auto;
            max-height: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .user-section {
            margin-bottom: 20px;
        }

        .user-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .user-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .user-input input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .user-input button {
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .user-input button:hover {
            background: #45a049;
        }

        .game-area {
            display: none;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            position: relative;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            aspect-ratio: 1;
        }

        .tile {
            background: #cdc1b4;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #776e65;
            transition: all 0.15s ease-in-out;
            position: relative;
        }

        .tile-new {
            animation: appear 0.2s ease-in-out;
        }

        .tile-merged {
            animation: merge 0.2s ease-in-out;
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes merge {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #45a049;
        }

        .btn-secondary {
            background: #2196F3;
        }

        .btn-secondary:hover {
            background: #1976D2;
        }

        .btn-warning {
            background: #ff9800;
        }

        .btn-warning:hover {
            background: #f57c00;
        }

        .leaderboard {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }

        .leaderboard h3 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin-bottom: 5px;
            background: white;
            border-radius: 5px;
            border-left: 4px solid #4CAF50;
        }

        .leaderboard-rank {
            font-weight: bold;
            color: #4CAF50;
            margin-right: 10px;
        }

        .leaderboard-name {
            flex: 1;
            color: #333;
        }

        .leaderboard-score {
            font-weight: bold;
            color: #333;
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message.show {
            opacity: 1;
        }

        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
        }

        .game-over-content h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .game-over-content p {
            color: #666;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .game-over-content .max-number {
            font-size: 3rem;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 20px;
        }

        .game-over-buttons {
            display: flex;
            gap: 10px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .version-info {
            font-size: 0.8rem;
            color: #999;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px 0;
            }
            
            .container {
                padding: 20px;
                margin: 10px auto;
                width: 95%;
            }
            
            .tile {
                font-size: 1.5rem;
            }
            
            .tile-128, .tile-256, .tile-512 {
                font-size: 1.3rem;
            }
            
            .tile-1024, .tile-2048, .tile-4096 {
                font-size: 1.1rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }

<body>
    <div class="container">
        <div class="header">
            <h1>🎮 2048游戏 🎮</h1>
        </div>
        
        <div class="user-section">
            <div class="user-input">
                <input type="text" id="userId" placeholder="请输入你的论坛ID (必须)" value="">
                <button onclick="setUserId()">设置ID</button>
            </div>
            <div id="gameArea" class="game-area">
                <div class="game-stats">
                    <div class="stat-item">
                        <div class="stat-label">分数</div>
                        <div class="stat-value" id="score">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">最大数字</div>
                        <div class="stat-value" id="maxNumber">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">步数</div>
                        <div class="stat-value" id="moves">0</div>
                    </div>
                </div>
                
                <div class="game-board">
                    <div class="grid-container" id="gridContainer">
                        <!-- 游戏格子将通过JavaScript生成 -->
                    </div>
                </div>
                
                <div class="controls">
                    <button class="btn" onclick="newGame()">新游戏</button>
                    <button class="btn btn-warning" onclick="endGameNow()">直接结束游戏</button>
                    <button class="btn btn-secondary" onclick="showLeaderboard(); return false;">排行榜</button>
                </div>
                
                <div class="leaderboard" id="leaderboard">
                    <h3>🏆 排行榜 TOP 10 🏆</h3>
                    <ul class="leaderboard-list" id="leaderboardList">
                        <!-- 排行榜内容将通过JavaScript生成 -->
                    </ul>
                    <button class="btn btn-secondary" onclick="hideLeaderboard(); return false;">关闭排行榜</button>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>基于HTML5的2048游戏 | <a href="https://github.com/PICK-BOT/sstm-raffle" target="_blank">GitHub</a></p>
            <p class="version-info">版本: v1.3.1 (直接结束版) | 更新: 2024-03-16</p>
        </div>
    </div>

    <div class="message" id="message"></div>
    
    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-content">
            <h2>游戏结束！</h2>
            <p>你无法再移动了</p>
            <div class="max-number" id="finalMaxNumber">0</div>
            <div class="game-over-buttons">
                <button class="btn" onclick="newGame()">新游戏</button>
                <button class="btn btn-secondary" onclick="showLeaderboardFromGameOver(); return false;">查看排行榜</button>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            recordUrl: getRecordUrl(),
            gridSize: 4,
            winNumbers: [2048, 4096, 8192, 16384, 32768, 65536, 131072]
        };

        // 游戏状态
        let gameState = {
            userId: localStorage.getItem('userId') || '',
            grid: [],
            score: 0,
            maxNumber: 0,
            moves: 0,
            isGameOver: false,
            recordEnabled: true
        };

        // 获取记录URL
        function getRecordUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('record') || '';
        }

        // 设置用户ID
        function setUserId() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) {
                showMessage('请输入你的论坛ID');
                return;
            }
            
            if (userId.length < 2) {
                showMessage('ID长度至少2个字符');
                return;
            }
            
            gameState.userId = userId;
            localStorage.setItem('userId', userId);
            
            // 显示游戏区域
            document.getElementById('gameArea').style.display = 'block';
            
            showMessage('ID已设置: ' + userId + '，可以开始游戏了！');
            
            // 初始化游戏
            initGame();
        }

        // 初始化游戏
        function initGame() {
            gameState.grid = Array(CONFIG.gridSize).fill().map(() => Array(CONFIG.gridSize).fill(0));
            gameState.score = 0;
            gameState.maxNumber = 0;
            gameState.moves = 0;
            gameState.isGameOver = false;
            
            // 添加两个初始数字
            addNewTile();
            addNewTile();
            
            updateDisplay();
            hideGameOverModal();
        }

        // 添加新数字块
        function addNewTile() {
            const emptyCells = [];
            for (let i = 0; i < CONFIG.gridSize; i++) {
                for (let j = 0; j < CONFIG.gridSize; j++) {
                    if (gameState.grid[i][j] === 0) {
                        emptyCells.push({row: i, col: j});
                    }
                }
            }
            
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                gameState.grid[randomCell.row][randomCell.col] = Math.random() < 0.9 ? 2 : 4;
                
                // 添加动画类
                setTimeout(() => {
                    const tile = document.querySelector(`[data-row="${randomCell.row}"][data-col="${randomCell.col}"]`);
                    if (tile) {
                        tile.classList.add('tile-new');
                    }
                }, 10);
            }
        }

        // 更新显示
        function updateDisplay() {
            const gridContainer = document.getElementById('gridContainer');
            gridContainer.innerHTML = '';
            
            let maxNum = 0;
            for (let i = 0; i < CONFIG.gridSize; i++) {
                for (let j = 0; j < CONFIG.gridSize; j++) {
                    const value = gameState.grid[i][j];
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.setAttribute('data-row', i);
                    tile.setAttribute('data-col', j);
                    
                    if (value > 0) {
                        tile.textContent = value;
                        tile.classList.add(`tile-${value}`);
                        maxNum = Math.max(maxNum, value);
                    }
                    
                    gridContainer.appendChild(tile);
                }
            }
            
            gameState.maxNumber = maxNum;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('maxNumber').textContent = gameState.maxNumber;
            document.getElementById('moves').textContent = gameState.moves;
        }

        // 移动逻辑
        function move(direction) {
            if (gameState.isGameOver) return;
            
            let moved = false;
            const newGrid = gameState.grid.map(row => [...row]);
            
            if (direction === 'left') {
                for (let i = 0; i < CONFIG.gridSize; i++) {
                    const row = newGrid[i].filter(val => val !== 0);
                    const merged = mergeRow(row);
                    const newRow = merged.concat(Array(CONFIG.gridSize - merged.length).fill(0));
                    if (JSON.stringify(newRow) !== JSON.stringify(gameState.grid[i])) {
                        moved = true;
                    }
                    newGrid[i] = newRow;
                }
            } else if (direction === 'right') {
                for (let i = 0; i < CONFIG.gridSize; i++) {
                    const row = newGrid[i].filter(val => val !== 0);
                    const merged = mergeRow(row.reverse()).reverse();
                    const newRow = Array(CONFIG.gridSize - merged.length).fill(0).concat(merged);
                    if (JSON.stringify(newRow) !== JSON.stringify(gameState.grid[i])) {
                        moved = true;
                    }
                    newGrid[i] = newRow;
                }
            } else if (direction === 'up') {
                for (let j = 0; j < CONFIG.gridSize; j++) {
                    const column = [];
                    for (let i = 0; i < CONFIG.gridSize; i++) {
                        if (newGrid[i][j] !== 0) {
                            column.push(newGrid[i][j]);
                        }
                    }
                    const merged = mergeRow(column);
                    const newColumn = merged.concat(Array(CONFIG.gridSize - merged.length).fill(0));
                    for (let i = 0; i < CONFIG.gridSize; i++) {
                        if (newGrid[i][j] !== newColumn[i]) {
                            moved = true;
                        }
                        newGrid[i][j] = newColumn[i];
                    }
                }
            } else if (direction === 'down') {
                for (let j = 0; j < CONFIG.gridSize; j++) {
                    const column = [];
                    for (let i = 0; i < CONFIG.gridSize; i++) {
                        if (newGrid[i][j] !== 0) {
                            column.push(newGrid[i][j]);
                        }
                    }
                    const merged = mergeRow(column.reverse()).reverse();
                    const newColumn = Array(CONFIG.gridSize - merged.length).fill(0).concat(merged);
                    for (let i = 0; i < CONFIG.gridSize; i++) {
                        if (newGrid[i][j] !== newColumn[i]) {
                            moved = true;
                        }
                        newGrid[i][j] = newColumn[i];
                    }
                }
            }
            
            if (moved) {
                gameState.grid = newGrid;
                gameState.moves++;
                addNewTile();
                updateDisplay();
                
                // 检查游戏是否结束
                if (isGameOver()) {
                    gameState.isGameOver = true;
                    setTimeout(() => {
                        showGameOverModal();
                        recordGame();
                    }, 300);
                }
            }
        }

        // 合并行
        function mergeRow(row) {
            const merged = [];
            let i = 0;
            while (i < row.length) {
                if (i < row.length - 1 && row[i] === row[i + 1]) {
                    merged.push(row[i] * 2);
                    gameState.score += row[i] * 2;
                    i += 2;
                } else {
                    merged.push(row[i]);
                    i++;
                }
            }
            return merged;
        }

        // 检查游戏是否结束
        function isGameOver() {
            // 检查是否有空格
            for (let i = 0; i < CONFIG.gridSize; i++) {
                for (let j = 0; j < CONFIG.gridSize; j++) {
                    if (gameState.grid[i][j] === 0) {
                        return false;
                    }
                }
            }
            
            // 检查是否可以合并
            for (let i = 0; i < CONFIG.gridSize; i++) {
                for (let j = 0; j < CONFIG.gridSize; j++) {
                    const current = gameState.grid[i][j];
                    if ((i < CONFIG.gridSize - 1 && current === gameState.grid[i + 1][j]) ||
                        (j < CONFIG.gridSize - 1 && current === gameState.grid[i][j + 1])) {
                        return false;
                    }
                }
            }
            
            return true;
        }

        // 显示游戏结束弹窗
        function showGameOverModal() {
            document.getElementById('finalMaxNumber').textContent = gameState.maxNumber;
            document.getElementById('gameOverModal').style.display = 'flex';
        }

        // 隐藏游戏结束弹窗
        function hideGameOverModal() {
            document.getElementById('gameOverModal').style.display = 'none';
        }

        // 直接结束游戏
        function endGameNow() {
            if (!gameState.userId) {
                showMessage('请先设置用户ID！');
                return;
            }
            
            if (confirm('确定要直接结束游戏吗？当前成绩将被记录到排行榜。')) {
                gameState.isGameOver = true;
                showGameOverModal();
                recordGame();
                showMessage('游戏已结束，成绩已记录！');
            }
        }

        // 新游戏
        function newGame() {
            initGame();
            showMessage('新游戏开始！');
        }

        // 记录游戏
        function recordGame() {
            if (!CONFIG.recordUrl) {
                console.log('未配置云端记录URL');
                return;
            }
            
            try {
                console.log('=== 开始记录游戏 ===');
                console.log('记录URL:', CONFIG.recordUrl);
                console.log('游戏数据:', {
                    id: gameState.userId,
                    maxNumber: gameState.maxNumber,
                    score: gameState.score,
                    moves: gameState.moves
                });
                
                const payload = {
                    userId: gameState.userId,
                    id: gameState.userId,
                    maxNumber: gameState.maxNumber,
                    score: gameState.score,
                    moves: gameState.moves
                };
                
                console.log('发送数据:', JSON.stringify(payload));
                
                // 创建JSONP请求
                const callbackName = 'jsonp_callback_' + Date.now();
                const script = document.createElement('script');
                
                // 设置回调函数
                window[callbackName] = function(response) {
                    console.log('✅ 游戏记录成功');
                    console.log('✅ 服务器响应:', response);
                    showMessage('游戏成绩已记录！');
                    
                    // 清理
                    delete window[callbackName];
                    document.head.removeChild(script);
                };
                
                // 构建JSONP URL
                const jsonpUrl = CONFIG.recordUrl + 
                    '?callback=' + callbackName + 
                    '&data=' + encodeURIComponent(JSON.stringify(payload));
                
                script.src = jsonpUrl;
                script.onerror = function() {
                    console.error('❌ JSONP请求失败');
                    showMessage('记录失败，请检查网络');
                    delete window[callbackName];
                    document.head.removeChild(script);
                };
                
                // 发送请求
                document.head.appendChild(script);
                
            } catch (error) {
                console.error('❌ 游戏记录错误:', error);
                showMessage('记录失败，请检查网络');
            }
        }

        // 显示排行榜
        function showLeaderboard() {
            console.log('显示排行榜被调用');
            const leaderboard = document.getElementById('leaderboard');
            
            // 确保排行榜可见
            leaderboard.style.display = 'block';
            
            if (CONFIG.recordUrl) {
                console.log('开始加载排行榜数据');
                loadLeaderboard();
            } else {
                console.log('未配置记录URL，显示默认消息');
                document.getElementById('leaderboardList').innerHTML = '<li class="leaderboard-item">未配置排行榜</li>';
            }
            
            // 阻止事件冒泡（如果有event对象）
            if (window.event) {
                window.event.stopPropagation();
            }
        }

        // 从游戏结束弹窗显示排行榜
        function showLeaderboardFromGameOver() {
            console.log('从游戏结束弹窗显示排行榜');
            
            // 隐藏游戏结束弹窗
            hideGameOverModal();
            
            // 开始新游戏
            newGame();
            
            // 延迟显示排行榜，让新游戏先初始化
            setTimeout(() => {
                showLeaderboard();
            }, 100);
            
            // 阻止事件冒泡
            if (window.event) {
                window.event.stopPropagation();
            }
        }

        // 隐藏排行榜
        function hideLeaderboard() {
            console.log('隐藏排行榜被调用');
            document.getElementById('leaderboard').style.display = 'none';
            
            // 阻止事件冒泡，防止触发其他事件
            if (window.event) {
                window.event.stopPropagation();
            }
        }

        // 加载排行榜
        function loadLeaderboard() {
            console.log('开始加载排行榜...');
            const callbackName = 'leaderboard_callback_' + Date.now();
            const script = document.createElement('script');
            
            window[callbackName] = function(response) {
                console.log('排行榜数据:', response);
                if (response && response.data) {
                    displayLeaderboard(response.data);
                } else {
                    document.getElementById('leaderboardList').innerHTML = '<li class="leaderboard-item">暂无记录</li>';
                }
                delete window[callbackName];
                document.head.removeChild(script);
            };
            
            const jsonpUrl = CONFIG.recordUrl + 
                '?callback=' + callbackName + 
                '&action=leaderboard&t=' + Date.now();
            
            console.log('排行榜URL:', jsonpUrl);
            
            script.src = jsonpUrl;
            script.onerror = function() {
                console.error('加载排行榜失败');
                document.getElementById('leaderboardList').innerHTML = '<li class="leaderboard-item">加载排行榜失败</li>';
                delete window[callbackName];
                document.head.removeChild(script);
            };
            
            document.head.appendChild(script);
        }

        // 显示排行榜
        function displayLeaderboard(data) {
            const leaderboardList = document.getElementById('leaderboardList');
            
            if (data.length === 0) {
                leaderboardList.innerHTML = '<li class="leaderboard-item">暂无记录</li>';
                return;
            }
            
            // 按最大数字排序
            data.sort((a, b) => b.maxNumber - a.maxNumber);
            
            // 只显示前10名
            const top10 = data.slice(0, 10);
            
            leaderboardList.innerHTML = top10.map((record, index) => `
                <li class="leaderboard-item">
                    <span class="leaderboard-rank">#${index + 1}</span>
                    <span class="leaderboard-name">${record.id}</span>
                    <span class="leaderboard-score">${record.maxNumber}</span>
                </li>
            `).join('');
        }

        // 显示消息
        function showMessage(text) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.classList.add('show');
            
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 3000);
        }

        // 键盘事件监听
        document.addEventListener('keydown', (e) => {
            if (gameState.userId === '') return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move('right');
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    move('down');
                    break;
            }
        });

        // 触摸事件监听
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (gameState.userId === '') return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > 50) {
                    move('right');
                } else if (deltaX < -50) {
                    move('left');
                }
            } else {
                if (deltaY > 50) {
                    move('down');
                } else if (deltaY < -50) {
                    move('up');
                }
            }
        });

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 恢复用户ID但不自动显示游戏
            const savedUserId = localStorage.getItem('userId');
            if (savedUserId) {
                document.getElementById('userId').value = savedUserId;
                gameState.userId = savedUserId;
                // 不自动显示游戏区域，要求用户点击设置ID
            }
        });
        
        // 版本信息
        console.log('2048游戏 - 版本: v1.3.0');
        console.log('更新内容: 修复页面滚动问题，确保所有功能按钮可见');
    </script>
</body>
</html>
