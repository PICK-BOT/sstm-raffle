<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻牌游戏 - SSTM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .user-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .user-input {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .user-input input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .user-input button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .user-input button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .record-status {
            margin-top: 10px;
            font-size: 0.85rem;
            padding: 6px 10px;
            border-radius: 6px;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .record-status.no-url {
            background: #fff3e0;
            color: #e65100;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #555;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
        }
        .card {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #f8f9fa, #ffffff);
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            writing-mode: horizontal-tb;
            text-orientation: mixed;
            direction: ltr;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .card.flipped {
            background: var(--card-color);
            color: white;
            border-color: var(--card-color);
            writing-mode: horizontal-tb;
            text-orientation: mixed;
            direction: ltr;
        }
        .card.matched {
            background: var(--card-color);
            color: white;
            border-color: var(--card-color);
            opacity: 0.7;
            cursor: not-allowed;
            writing-mode: horizontal-tb;
            text-orientation: mixed;
            direction: ltr;
        }
        .card.empty {
            background: transparent !important;
            border: 3px solid transparent !important;
            cursor: default !important;
            opacity: 0.3;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .btn {
            padding: 12px 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        .result.show {
            opacity: 1;
            transform: translateY(0);
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            .card {
                font-size: 0.9rem;
            }
            .user-input {
                flex-direction: column;
            }
            .user-input input {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 翻牌游戏 🎴</h1>
        </div>

        <div class="user-section">
            <div class="user-input">
                <input type="text" id="userId" placeholder="请输入你的论坛ID (必须)" value="">
                <button onclick="setUserId()">设置ID</button>
            </div>
            <div id="recordStatusBar" class="record-status no-url" style="display:none;"></div>
            <div id="gameArea" style="display: none;">
                <div class="stats">
                    <span>剩余配对: <strong id="remaining">8</strong></span>
                    <span>已配对: <strong id="flipped">0</strong></span>
                </div>

                <div class="game-board" id="gameBoard">
                    <!-- 卡片将通过 JavaScript 生成 -->
                </div>

                <div class="controls">
                    <!-- 重新开始按钮在游戏结束后出现 -->
                </div>
            </div>
        </div>

        <div class="result" id="result"></div>

        <div class="footer">
            <p>基于HTML5的翻牌游戏 | <a href="https://github.com/PICK-BOT/sstm-raffle" target="_blank">GitHub</a></p>
            <p class="version-info">版本: v1.3.0 (自动持久化记录) | 更新: 2026-03-18</p>
        </div>
    </div>

    <script>
        // 获取记录URL（优先级：URL参数 > localStorage）
        // 部署时可通过 ?record=GAS_URL 传入，之后自动持久化
        function getRecordUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const paramUrl = urlParams.get('record');
            if (paramUrl) {
                localStorage.setItem('card_gas_url', paramUrl); // 持久化
                return paramUrl;
            }
            return localStorage.getItem('card_gas_url') || '';
        }

        // 配置
        const CONFIG = {
            cards: [
                {name: "节操+10", weight: 20, color: "#FF6B6B"},
                {name: "羽毛+5",  weight: 20, color: "#4ECDC4"},
                {name: "节操+20", weight: 15, color: "#FFD93D"},
                {name: "羽毛+10", weight: 15, color: "#6BCB77"},
                {name: "谢谢参与", weight: 30, color: "#8898AA"},
            ],
            recordUrl: getRecordUrl(),
            localRecords: []
        };

        // 游戏状态
        let gameState = {
            cards: [],
            flippedCards: [],
            matchedPairs: 0,
            totalPairs: 8,
            userId: localStorage.getItem('userId') || '',
            isProcessing: false
        };

        // 初始化游戏
        function initGame() {
            gameState.cards = [];
            gameState.flippedCards = [];
            gameState.matchedPairs = 0;

            const selectedCards = [];
            for (let i = 0; i < 8; i++) {
                selectedCards.push({...selectCardByWeight(CONFIG.cards)});
            }

            selectedCards.forEach(card => {
                gameState.cards.push({...card, id: Math.random().toString(36).substr(2, 9), matched: false, flipped: false});
                gameState.cards.push({...card, id: Math.random().toString(36).substr(2, 9), matched: false, flipped: false});
            });

            gameState.cards.sort(() => Math.random() - 0.5);

            renderBoard();
            updateStats();
        }

        function selectCardByWeight(cards) {
            const totalWeight = cards.reduce((sum, card) => sum + card.weight, 0);
            let random = Math.random() * totalWeight;
            for (const card of cards) {
                random -= card.weight;
                if (random <= 0) return {...card};
            }
            return {...cards[0]};
        }

        function renderBoard() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';

            gameState.cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.style.setProperty('--card-color', card.color);

                if (card.matched) {
                    cardElement.classList.add('empty');
                    cardElement.textContent = '';
                    cardElement.style.cursor = 'default';
                    cardElement.style.border = '3px solid transparent';
                } else if (card.flipped) {
                    cardElement.classList.add('flipped');
                    cardElement.textContent = card.name;
                } else {
                    cardElement.textContent = '?';
                }

                if (!card.matched) {
                    cardElement.onclick = () => flipCard(index);
                }

                board.appendChild(cardElement);
            });
        }

        function flipCard(index) {
            const card = gameState.cards[index];
            if (gameState.isProcessing || card.matched || card.flipped) return;

            gameState.isProcessing = true;
            card.flipped = true;
            gameState.flippedCards.push(index);
            renderBoard();

            if (gameState.flippedCards.length === 2) {
                const [firstIndex, secondIndex] = gameState.flippedCards;
                const firstCard = gameState.cards[firstIndex];
                const secondCard = gameState.cards[secondIndex];

                if (firstCard.name === secondCard.name) {
                    setTimeout(() => {
                        firstCard.matched = true;
                        secondCard.matched = true;
                        firstCard.flipped = false;
                        secondCard.flipped = false;
                        gameState.matchedPairs++;
                        gameState.flippedCards = [];

                        showResult(firstCard);
                        recordFlip(firstCard);

                        renderBoard();
                        updateStats();

                        if (gameState.matchedPairs === gameState.totalPairs) {
                            const controlsDiv = document.querySelector('.controls');
                            controlsDiv.innerHTML = '<button class="btn" onclick="location.reload()">重新开始</button>';
                            setTimeout(() => showMessage('🎉 恭喜！你找到了所有配对！🎉'), 500);
                        }

                        gameState.isProcessing = false;
                    }, 1000);
                } else {
                    setTimeout(() => {
                        firstCard.flipped = false;
                        secondCard.flipped = false;
                        gameState.flippedCards = [];
                        renderBoard();
                        gameState.isProcessing = false;
                    }, 1000);
                }
            } else {
                setTimeout(() => { gameState.isProcessing = false; }, 100);
            }
        }

        function showResult(card) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `🎉 恭喜获得: ${card.name} 🎉`;
            resultDiv.classList.add('show');
            setTimeout(() => resultDiv.classList.remove('show'), 3000);
        }

        function updateStats() {
            document.getElementById('remaining').textContent = gameState.totalPairs - gameState.matchedPairs;
            document.getElementById('flipped').textContent = gameState.matchedPairs;
        }

        function setUserId() {
            const userId = document.getElementById('userId').value.trim();
            if (!userId) { showMessage('请输入你的论坛ID'); return; }
            if (userId.length < 2) { showMessage('ID长度至少2个字符'); return; }

            gameState.userId = userId;
            localStorage.setItem('userId', userId);

            document.getElementById('gameArea').style.display = 'block';
            showRecordStatus();
            showMessage('ID已设置: ' + userId + '，可以开始游戏了！');
            initGame();
        }

        // 显示记录状态
        function showRecordStatus() {
            const bar = document.getElementById('recordStatusBar');
            bar.style.display = 'block';
            if (CONFIG.recordUrl) {
                bar.className = 'record-status';
                bar.textContent = '📊 云端记录已连接，每次配对成功将自动记录';
            } else {
                bar.className = 'record-status no-url';
                bar.textContent = '⚠️ 未配置记录URL。请用 ?record=GAS地址 打开页面以启用云端记录';
            }
        }

        // 记录翻牌
        function recordFlip(card) {
            if (!CONFIG.recordUrl) {
                console.log('未配置GAS URL，跳过记录');
                return;
            }
            recordToCloud({
                id: gameState.userId || 'anonymous',
                card: card.name
            });
        }

        // 云端记录（JSONP，避免CORS）
        function recordToCloud(payload) {
            if (!CONFIG.recordUrl) return;

            const callbackName = 'jsonp_cb_' + Date.now();
            const script = document.createElement('script');

            window[callbackName] = function(response) {
                console.log('✅ 记录成功:', response);
                delete window[callbackName];
                if (document.head.contains(script)) document.head.removeChild(script);
            };

            script.src = CONFIG.recordUrl
                + '?callback=' + callbackName
                + '&data=' + encodeURIComponent(JSON.stringify(payload));

            script.onerror = function() {
                console.error('❌ JSONP记录失败');
                delete window[callbackName];
                if (document.head.contains(script)) document.head.removeChild(script);
            };

            document.head.appendChild(script);
        }

        function showMessage(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = message;
            resultDiv.classList.add('show');
            setTimeout(() => resultDiv.classList.remove('show'), 2000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedUserId = localStorage.getItem('userId');
            if (savedUserId) {
                document.getElementById('userId').value = savedUserId;
                gameState.userId = savedUserId;
            }
        });
    </script>
</body>
</html>
