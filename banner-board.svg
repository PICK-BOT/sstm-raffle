 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
    <defs>
      <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0f0c29"/>
        <stop offset="50%" stop-color="#1a0533"/>
        <stop offset="100%" stop-color="#0d1b2a"/>
      </linearGradient>
      <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#56ab2f"/>
        <stop offset="100%" stop-color="#a8ff78"/>
      </linearGradient>
      <filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode
  in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="480" height="100" rx="16" fill="url(#bg2)"/>
    <rect x="2" y="2" width="476" height="96" rx="14" fill="none" stroke="url(#gold2)" stroke-width="1.5"
  opacity="0.5"/>
    <!-- 骰子图标 -->
    <rect x="34" y="18" width="64" height="64" rx="10" fill="rgba(255,255,255,0.08)" stroke="url(#gold2)"
  stroke-width="2"/>
    <circle cx="52" cy="36" r="5" fill="url(#gold2)"/>
    <circle cx="66" cy="50" r="5" fill="url(#gold2)"/>
    <circle cx="80" cy="64" r="5" fill="url(#gold2)"/>
    <circle cx="52" cy="64" r="5" fill="url(#gold2)"/>
    <circle cx="80" cy="36" r="5" fill="url(#gold2)"/>
    <!-- 脉冲 -->
    <rect x="34" y="18" width="64" height="64" rx="10" fill="none" stroke="#a8ff78" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x" values="30;34;30" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="14;18;14" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="width" values="72;64;72" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="height" values="72;64;72" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <!-- 文字 -->
    <text x="288" y="42" text-anchor="middle" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="22"
  font-weight="bold" fill="url(#gold2)" filter="url(#glow2)">点击游玩大富翁</text>
    <text x="288" y="68" text-anchor="middle" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="13"
  fill="rgba(255,255,255,0.65)">输入论坛 ID → 掷骰子走格子 → 赢取奖励</text>
    <text x="448" y="58" text-anchor="middle" font-family="Arial" font-size="32" font-weight="bold" fill="url(#gold2)"
  opacity="0.9">›</text>
  </svg>
