 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0f0c29"/>
        <stop offset="50%" stop-color="#302b63"/>
        <stop offset="100%" stop-color="#24243e"/>
      </linearGradient>
      <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#f7971e"/>
        <stop offset="100%" stop-color="#ffd200"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode
  in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="480" height="100" rx="16" fill="url(#bg)"/>
    <rect x="2" y="2" width="476" height="96" rx="14" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <!-- 转盘图标 -->
    <circle cx="66" cy="50" r="32" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="66" cy="50" r="8" fill="url(#gold)"/>
    <line x1="66" y1="18" x2="66" y2="82" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="34" y1="50" x2="98" y2="50" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="43" y1="27" x2="89" y2="73" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="89" y1="27" x2="43" y2="73" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <polygon points="66,8 60,22 72,22" fill="#FF4444" filter="url(#glow)"/>
    <!-- 脉冲动画 -->
    <circle cx="66" cy="50" r="32" fill="none" stroke="#ffd200" stroke-width="1" opacity="0">
      <animate attributeName="r" values="32;46;32" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- 文字 -->
    <text x="288" y="42" text-anchor="middle" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="22"
  font-weight="bold" fill="url(#gold)" filter="url(#glow)">点击参与抽奖</text>
    <text x="288" y="68" text-anchor="middle" font-family="'Microsoft YaHei',Arial,sans-serif" font-size="13"
  fill="rgba(255,255,255,0.65)">输入论坛 ID → 转动转盘 → 赢取奖励</text>
    <!-- 箭头 -->
    <text x="448" y="58" text-anchor="middle" font-family="Arial" font-size="32" font-weight="bold" fill="url(#gold)"
  opacity="0.9">›</text>
  </svg>
