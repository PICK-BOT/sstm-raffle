<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>大富翁走格子 v2 - SSTM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;
  font-family:'Microsoft YaHei',Arial,sans-serif;color:#fff;user-select:none}

/* ===== SCREENS ===== */
.screen{display:none}
.screen.active{display:flex}

/* ===== SCREEN 1: ID ===== */
#screen-id{position:fixed;inset:0;z-index:600;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e)}

/* ===== SCREEN 2: DICE CALC ===== */
#screen-dice{position:fixed;inset:0;z-index:600;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e)}

/* ===== SCREEN 3: MAIN ===== */
#screen-main{min-height:100vh;flex-direction:column;align-items:center;padding:10px 6px}

/* ===== CARDS ===== */
.glass-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:32px 40px;max-width:420px;width:92%;text-align:center}
.glass-card h2{font-size:1.3rem;color:#FFD93D;margin-bottom:6px}
.glass-card p{font-size:.85rem;opacity:.7;margin-bottom:18px}

/* ===== INPUTS ===== */
.inp{width:100%;padding:11px 14px;font-size:1rem;background:rgba(255,255,255,.1);
  border:2px solid rgba(255,255,255,.25);border-radius:10px;color:#fff;
  outline:none;text-align:center;margin-bottom:12px}
.inp:focus{border-color:#FFD93D}
.input-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.input-row label{min-width:80px;font-size:.88rem;color:rgba(255,255,255,.8);text-align:left}
.input-row .inp{margin:0;max-width:90px;flex-shrink:0}
.input-row .exlbl{font-size:.72rem;opacity:.55;flex:1}

/* ===== BUTTONS ===== */
.btn-gold{padding:11px 38px;font-size:1rem;background:linear-gradient(135deg,#f7971e,#ffd200);
  color:#1a1a1a;border:none;border-radius:50px;cursor:pointer;font-weight:800;
  transition:transform .15s}
.btn-gold:hover{transform:scale(1.04)}
.btn-gold:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-sub{padding:8px 22px;font-size:.88rem;background:rgba(255,255,255,.12);
  color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:50px;
  cursor:pointer;font-weight:700;transition:background .15s}
.btn-sub:hover{background:rgba(255,255,255,.22)}
.err-msg{color:#FF6B6B;font-size:.83rem;margin-top:6px}
#balance-result{margin-top:12px;padding:12px;background:rgba(255,215,0,.08);
  border:1px solid rgba(255,215,0,.3);border-radius:12px;text-align:center}
#balance-result .bal-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}

/* ===== DICE PREVIEW ===== */
.dice-preview{background:rgba(255,255,255,.04);border-radius:12px;
  padding:12px;margin:12px 0;min-height:52px;text-align:center}
.dbadge{display:inline-flex;align-items:center;gap:3px;
  background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);
  border-radius:16px;padding:4px 11px;margin:3px;font-size:.88rem;color:#FFD93D}

/* ===== PLAYER BAR ===== */
#player-bar{display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;padding:7px 14px;margin-bottom:8px;
  max-width:430px;width:100%}
#p-avatar{width:32px;height:44px;flex-shrink:0;
  background-image:url('images/char.png');
  background-size:600% 400%;background-position:0% 0%;image-rendering:pixelated}
#p-name{font-weight:700;color:#FFD93D;font-size:.88rem}
#p-pos{font-size:.72rem;color:rgba(255,255,255,.55)}
#freeze-badge{margin-left:auto;background:rgba(13,71,161,.6);
  border:1px solid #1565c0;border-radius:8px;padding:3px 9px;
  font-size:.72rem;color:#90CAF9;display:none}

/* ===== BOARD ===== */
#board-wrap{position:relative;display:inline-block}
#board{display:grid;grid-template-columns:repeat(10,40px);
  grid-template-rows:repeat(10,40px);gap:1px;
  background:rgba(0,0,0,.4);border-radius:6px;padding:2px}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:3px;font-size:5.5px;text-align:center;line-height:1.25;overflow:hidden}
.c-空格{background:#37474f;color:#aaa}
.c-奖励{background:#1b5e20;color:#fff}
.c-惩罚{background:#6a1b9a;color:#fff}
.c-冻结{background:#0d47a1;color:#fff}
.c-跳转{background:#311b92;color:#fff}
.c-机会{background:#bf360c;color:#fff}
.c-命运{background:#880e4f;color:#fff}
.cell-hl{box-shadow:0 0 0 2px #FFD93D;z-index:2}

/* ===== CENTER PANEL ===== */
#center{grid-row:2/10;grid-column:2/10;background:rgba(15,12,41,.92);
  border-radius:4px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;padding:6px}
#center-char{width:86px;height:86px;
  background-image:url('https://s.sstmlt.com/img/2026/04/04/system_reward7218bf3acdba76b3.png');
  background-size:contain;background-position:center;background-repeat:no-repeat;
  transition:background-image .18s ease, transform .18s ease}
#center-msg{font-size:8px;text-align:center;color:rgba(255,255,255,.85);
  max-width:280px;line-height:1.4}
#center-inv{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;margin-top:3px}
.inv-chip{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);
  border-radius:6px;padding:2px 5px;font-size:7px;color:#FFD93D}
.inv-chip.empty{opacity:.28}

/* ===== CHARACTER ON BOARD ===== */
#char-sprite{position:absolute;width:34px;height:46px;pointer-events:none;z-index:10;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.9));
  transition:left .28s ease-in-out,top .28s ease-in-out;
  left:2px;top:-4px}
#char-sprite img{width:100%;height:100%;object-fit:contain;display:block}

/* ===== CONTROLS ===== */
#controls{display:flex;flex-wrap:wrap;align-items:center;
  justify-content:center;gap:7px;margin-top:9px;max-width:430px;width:100%}
.dbtn{padding:5px 11px;background:rgba(255,215,0,.08);
  border:2px solid rgba(255,215,0,.35);border-radius:18px;
  color:#FFD93D;cursor:pointer;font-size:.8rem;font-weight:700;transition:all .15s}
.dbtn:hover:not(:disabled){background:rgba(255,215,0,.22);border-color:#FFD93D}
.dbtn.sel{background:rgba(255,215,0,.32);border-color:#FFD93D;
  box-shadow:0 0 8px rgba(255,215,0,.35)}
.dbtn:disabled{opacity:.3;cursor:not-allowed}
#roll-btn{padding:9px 26px;font-size:.95rem;
  background:linear-gradient(135deg,#f7971e,#ffd200);
  color:#1a1a1a;border:none;border-radius:50px;cursor:pointer;font-weight:800;
  transition:transform .15s}
#roll-btn:hover:not(:disabled){transform:scale(1.05)}
#roll-btn:disabled{opacity:.48;cursor:not-allowed;transform:none}
#status-bar{font-size:.75rem;color:rgba(255,255,255,.6);
  text-align:center;margin-top:5px;min-height:18px;max-width:430px}

/* ===== OVERLAY ===== */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.ov-card{background:linear-gradient(135deg,#1d2671,#c33764);
  border-radius:20px;padding:24px 32px;text-align:center;
  max-width:92vw;width:360px}
.ov-card.chance{background:linear-gradient(135deg,#bf360c,#e65100)}
.ov-card.fate{background:linear-gradient(135deg,#6a1b9a,#880e4f)}
.ov-card.freeze{background:linear-gradient(135deg,#0d47a1,#1565c0)}
.ov-card.reward{background:linear-gradient(135deg,#1b5e20,#2e7d32)}
.ov-icon{font-size:2.2rem;margin-bottom:6px}
.ov-type{font-size:.72rem;opacity:.75;letter-spacing:.1em;margin-bottom:3px}
.ov-dice{font-size:.8rem;color:#FFD93D;margin-bottom:8px}
.ov-art{width:120px;height:120px;margin:0 auto 8px;background-repeat:no-repeat;
  background-position:center;background-size:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.35));display:none}
.ov-name{font-size:1.3rem;font-weight:800;margin:4px 0}
.ov-desc{font-size:.85rem;opacity:.9;margin-bottom:14px;line-height:1.55;white-space:pre-wrap}
.ov-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.ov-btn{padding:7px 20px;background:rgba(255,255,255,.18);
  border:2px solid rgba(255,255,255,.45);border-radius:18px;
  color:#fff;cursor:pointer;font-size:.85rem;font-weight:700;transition:background .15s}
.ov-btn:hover{background:rgba(255,255,255,.32)}
.ov-btn.gold{background:rgba(255,215,0,.28);border-color:#FFD93D;color:#FFD93D}
.freeze-opts{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:10px 0}
.fbtn{padding:5px 13px;background:rgba(144,202,249,.15);
  border:1px solid rgba(144,202,249,.4);border-radius:14px;
  color:#90CAF9;cursor:pointer;font-size:.78rem;transition:background .15s}
.fbtn:hover{background:rgba(144,202,249,.28)}
.fbtn:disabled{opacity:.3;cursor:not-allowed}
.ov-btn:disabled{opacity:.35;cursor:not-allowed}

/* ===== BACKPACK ===== */
#bag-btn{position:fixed;bottom:18px;right:18px;z-index:300;
  width:46px;height:46px;background:linear-gradient(135deg,#f7971e,#ffd200);
  color:#1a1a1a;border:none;border-radius:50%;cursor:pointer;font-size:1.25rem;
  box-shadow:0 4px 14px rgba(247,151,30,.45);display:flex;align-items:center;justify-content:center}
#bag-badge{position:absolute;top:-4px;right:-4px;background:#e53935;color:#fff;
  border-radius:50%;width:18px;height:18px;font-size:10px;
  display:flex;align-items:center;justify-content:center;font-weight:700}
#reward-btn{position:fixed;bottom:74px;right:18px;z-index:300;
  padding:10px 14px;background:linear-gradient(135deg,#ffe082,#ffb300);color:#4e342e;
  border:none;border-radius:999px;cursor:pointer;font-size:.82rem;font-weight:700;
  box-shadow:0 6px 18px rgba(255,179,0,.35)}
#bag-panel{position:fixed;bottom:74px;right:18px;z-index:400;
  background:rgba(20,20,35,.97);border:1px solid rgba(255,255,255,.15);
  border-radius:16px;padding:16px;min-width:230px;max-width:290px;display:none;
  box-shadow:0 8px 28px rgba(0,0,0,.6);font-family:'Microsoft YaHei',Arial,sans-serif}
#bag-panel h4{color:#FFD93D;margin-bottom:10px;font-size:.95rem}
.bag-item{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;background:rgba(255,255,255,.07);border-radius:8px;margin-bottom:6px}
.bag-item-name{font-size:.84rem;color:#fff}
.bag-item-desc{display:block;font-size:.72rem;color:rgba(255,255,255,.58);margin-top:2px}
.bag-item-use{padding:4px 12px;background:rgba(144,202,249,.18);
  border:1px solid rgba(144,202,249,.5);border-radius:10px;
  color:#90CAF9;cursor:pointer;font-size:.78rem}
.bag-item-use:hover{background:rgba(144,202,249,.35)}
.bag-item-use:disabled{opacity:.3;cursor:not-allowed}
#bag-empty{color:rgba(255,255,255,.45);font-size:.82rem;text-align:center;padding:8px 0}
#reward-panel{position:fixed;bottom:118px;right:18px;z-index:400;
  background:rgba(20,20,35,.97);border:1px solid rgba(255,224,130,.25);
  border-radius:16px;padding:16px;min-width:250px;max-width:320px;max-height:60vh;overflow:auto;display:none;
  box-shadow:0 8px 28px rgba(0,0,0,.6);font-family:'Microsoft YaHei',Arial,sans-serif}
#reward-panel h4{color:#FFD93D;margin-bottom:10px;font-size:.95rem}
.reward-stat{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.08);font-size:.82rem;color:#fff}
.reward-log-title{color:rgba(255,255,255,.55);font-size:.74rem;margin:12px 0 6px}
.reward-log-item{padding:7px 0;border-top:1px solid rgba(255,255,255,.06);font-size:.76rem;color:rgba(255,255,255,.88)}
.reward-log-item small{display:block;margin-top:3px;color:rgba(255,255,255,.48)}

/* ===== FORUM FETCH ===== */
.fff-modal{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
.fff-box{background:#1a1a2e;border:1px solid #555;border-radius:12px;padding:24px;width:90%;max-width:380px;text-align:center}
.fff-box h3{color:#FFD93D;margin:0 0 16px;font-size:1.1rem}
.fff-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.fff-row label{min-width:72px;font-size:.85rem;color:rgba(255,255,255,.8);text-align:left;flex-shrink:0}
.fff-inp{flex:1;padding:8px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);border-radius:6px;color:#fff;font-size:.9rem;outline:none}
.fff-inp:focus{border-color:#FFD93D}
.fff-btn{padding:9px 20px;background:linear-gradient(135deg,#f7971e,#ffd200);color:#1a1a1a;border:none;border-radius:50px;cursor:pointer;font-weight:800;font-size:.9rem}
.fff-btn-sub{padding:7px 18px;background:rgba(255,255,255,.1);color:#ccc;border:1px solid rgba(255,255,255,.3);border-radius:50px;cursor:pointer;font-size:.85rem}
.fff-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#FFD93D;border-radius:50%;animation:fffSpin .8s linear infinite}
@keyframes fffSpin{to{transform:rotate(360deg)}}

/* ── OFFLINE MODE ── */
#bg-offline-warning{display:none;position:fixed;bottom:14px;right:14px;background:rgba(180,40,40,0.92);border:1px solid #e55;color:#fdd;padding:8px 14px;border-radius:8px;font-size:0.8rem;cursor:pointer;z-index:110;transition:all .2s;line-height:1.4;text-align:center}
#bg-offline-warning:hover{background:rgba(200,60,60,0.95);box-shadow:0 0 10px rgba(220,60,60,.4)}
#bg-id-history-row{margin-top:12px;text-align:center;display:none}
#bg-id-history-row .bg-ih-label{font-size:0.72rem;color:rgba(255,255,255,.55);margin-bottom:6px}
.bg-ih-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.bg-ih-chip{padding:5px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;background:rgba(255,217,61,0.12);border:1px solid rgba(255,217,61,0.45);color:#ffe082;font-family:inherit}
.bg-ih-chip:hover{background:rgba(255,217,61,0.28);color:#fff}
</style>
</head>
<body>

<!-- ===== SCREEN 1: ID ===== -->
<div id="screen-id" class="screen active">
  <div class="glass-card">
    <h2>🎲 大富翁走格子</h2>
    <p>输入论坛 ID 开始游戏</p>
    <input id="inp-id" class="inp" type="text" placeholder="论坛 ID" maxlength="50"
      onkeydown="if(event.key==='Enter')s1Confirm()">
    <button class="btn-gold" id="btn-s1confirm" onclick="s1Confirm()">确认 →</button>
    <div id="bg-id-history-row">
      <div class="bg-ih-label">最近使用的 ID</div>
      <div class="bg-ih-chips" id="bg-id-history-chips"></div>
    </div>
    <div id="id-err" class="err-msg"></div>
    <div id="balance-result" style="display:none">
      <div id="balance-info"></div>
      <div class="bal-btns">
        <button class="btn-gold" onclick="useBalance()">继续上次游戏</button>
        <button class="btn-sub"  onclick="goAddDice()">追加骰子</button>
        <button class="btn-sub"  onclick="goFresh()">重新开始</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== SCREEN 2: DICE CALC ===== -->
<div id="screen-dice" class="screen">
  <div class="glass-card">
    <h2>🎲 计算骰子</h2>
    <p>根据你的论坛活动兑换骰子</p>
    <div class="input-row">
      <label>💬 回复数</label>
      <input id="inp-replies" class="inp" type="number" min="0" value="0" oninput="calcDice()">
      <span class="exlbl" id="exlbl-replies"></span>
    </div>
    <div class="input-row">
      <label>🔗 被引用数</label>
      <input id="inp-citations" class="inp" type="number" min="0" value="0" oninput="calcDice()">
      <span class="exlbl" id="exlbl-citations"></span>
    </div>
    <div class="dice-preview" id="dice-preview">
      <span style="opacity:.45;font-size:.82rem">输入数量后自动计算</span>
    </div>
    <button class="btn-sub" style="margin-bottom:10px;width:100%" onclick="fffOpenModal(false)">📡 论坛自动读取</button>
    <button class="btn-gold" id="start-btn" onclick="s2Start()" disabled>开始游戏 →</button>
    <button class="btn-sub" style="margin-top:10px;width:100%;font-size:.82rem" onclick="downloadBGData_()">📥 下载游玩数据</button>
  </div>
</div>

<!-- ===== SCREEN 3: MAIN ===== -->
<div id="screen-main" class="screen">
  <h1 style="font-size:1.15rem;margin-bottom:7px">🎲 大富翁走格子</h1>

  <div id="player-bar">
    <div id="p-avatar"></div>
    <div>
      <div id="p-name">—</div>
      <div id="p-pos">格 0 · 起点</div>
    </div>
    <div id="freeze-badge">❄ 冻结 <span id="freeze-n">0</span> 回</div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
    <div id="char-sprite"><img src="https://s.sstmlt.com/img/2026/03/19/1-108359ab38de728aad.png" alt=""></div>
  </div>

  <div id="controls">
    <button class="dbtn sel" id="btn-d4"  onclick="selDice(4)">d4  <span id="n4">×0</span></button>
    <button class="dbtn"     id="btn-d6"  onclick="selDice(6)">d6  <span id="n6">×0</span></button>
    <button class="dbtn"     id="btn-d8"  onclick="selDice(8)">d8  <span id="n8">×0</span></button>
    <button class="dbtn"     id="btn-d10" onclick="selDice(10)">d10 <span id="n10">×0</span></button>
    <button class="dbtn"     id="btn-d12" onclick="selDice(12)">d12 <span id="n12">×0</span></button>
    <div id="roll-count-row" style="display:flex;align-items:center;gap:6px;margin-top:4px;width:100%;justify-content:center">
      <label style="font-size:.8rem;color:rgba(255,255,255,.7)">投掷数量：</label>
      <input id="roll-count" type="number" min="1" max="1" value="1"
        style="width:52px;padding:3px 5px;border-radius:6px;border:1px solid rgba(255,255,255,.3);
               background:rgba(0,0,0,.4);color:#fff;font-size:.85rem;text-align:center"
        oninput="clampRollCount()" onkeydown="if(event.key==='Enter')doRoll()">
      <span id="roll-count-hint" style="font-size:.75rem;color:rgba(255,255,255,.5)">（最多 1 个）</span>
    </div>
    <button id="roll-btn" onclick="doRoll()">🎲 投骰</button>
    <button class="dbtn" onclick="fffOpenModal(true)" style="font-size:.72rem;padding:4px 10px">📡 更新</button>
    <button class="dbtn" onclick="downloadBGData_()" style="font-size:.72rem;padding:4px 10px">📥 存档</button>
  </div>
  <div id="status-bar"></div>
</div>

<!-- ===== BACKPACK ===== -->
  <button id="bag-btn" onclick="toggleBag()" title="背包">
  🎒<span id="bag-badge" style="display:none">0</span>
</button>
<button id="reward-btn" onclick="toggleRewardPanel()">🎁 奖励累计</button>
<div id="bag-panel">
  <h4>🎒 背包</h4>
  <div id="bag-list"></div>
</div>
<div id="reward-panel">
  <h4>🎁 奖励累计</h4>
  <div id="reward-summary"></div>
  <div class="reward-log-title">最近获得</div>
  <div id="reward-log-list"></div>
</div>

<!-- ===== OVERLAY ===== -->
<div id="overlay">
  <div class="ov-card" id="ov-card">
    <div class="ov-icon" id="ov-icon">🎲</div>
    <div class="ov-type" id="ov-type"></div>
    <div class="ov-dice" id="ov-dice"></div>
    <div class="ov-art" id="ov-art"></div>
    <div class="ov-name" id="ov-name"></div>
    <div class="ov-desc" id="ov-desc"></div>
    <div class="ov-btns" id="ov-btns"></div>
  </div>
</div>

<script>
// ================================================================
// CONFIG — 游戏配置器可编辑
// ================================================================
var CONFIG = {
  exchanges: [
    {label:'每5回复',  source:'replies',   amount:5, dice_type:4, dice_count:1, sign:'+'},
    {label:'每1被引用', source:'citations', amount:1, dice_type:4, dice_count:1, sign:'+'}
  ],
  unfreeze_dice_type: 4,
  unfreeze_per_turn: 1

/** 论坛抓取写入 GAS：用 GET + Image Beacon（与同页 saveBalance 一致）。对 script.google.com 发 JSON POST 常被 CORS 预检拦下，doPost 实际收不到。 */
function logForumFetchToGAS_(opts){
  try{
    var o=opts||{};
    if(!GAS_URL) return;
    var uid=String(o.forum_uid||G.userId||'').trim();
    var pairs={
      sheet:'论坛抓取记录_大富翁',
      type:'fetch_log',
      id:uid,
      forum_uid:uid,
      mode:String(o.mode||''),
      reply_count:String(Number(o.reply_count||0)),
      citation_count:String(Number(o.citation_count||0)),
      timestamp:String(o.timestamp||new Date().toISOString()),
      startDate:String(o.startDate||''),
      endDate:String(o.endDate||''),
      game:'大富翁'
    };
    var qs=Object.keys(pairs).map(function(k){
      return encodeURIComponent(k)+'='+encodeURIComponent(pairs[k]);
    }).join('&');
    (new Image()).src=GAS_URL+'?'+qs;
  }catch(e){ console.warn('GAS forum fetch log failed', e); }
}

function fetchMonopolyRanges_(uid, cb){
  if(!GAS_URL || !uid){ cb([]); return; }
  var fn='_fetchRangeCb'+Date.now();
  var timer=setTimeout(function(){ delete window[fn]; cb([]); }, 6000);
  window[fn]=function(data){
    clearTimeout(timer); delete window[fn];
    var s=document.getElementById('_fetchRangeScript');
    if(s) s.parentNode.removeChild(s);
    cb((data && data.ok && Array.isArray(data.rows)) ? data.rows : []);
  };
  var s=document.createElement('script');
  s.id='_fetchRangeScript';

function hasOverlap_(startA,endA,startB,endB){
  var a1 = startA ? new Date(startA).getTime() : 0;
  var a2 = endA ? new Date(endA+'T23:59:59').getTime() : Date.now();
  var b1 = startB ? new Date(startB).getTime() : 0;
  var b2 = endB ? new Date(endB+'T23:59:59').getTime() : Date.now();
  return a1 <= b2 && b1 <= a2;
}

function addBackpackItems_(type, count){
  count = Math.max(0, parseInt(count,10)||0);
  if(!count) return 0;
  var meta=ITEM_META[type]||{name:type,desc:''};
  for(var i=0;i<count;i++) G.backpack.push({type:type,name:meta.name,desc:meta.desc});
  if(type==='amulet') G.rewards.amulet += count;
  if(type==='unfreeze') G.rewards.unfreeze += count;
  updateBackpackBtn();
  renderBagPanel();
  renderRewardPanel();
  syncBackpack();
  saveGameState_();
  return count;
}
function grantReward_(kind, amount, label, note, extra){
  amount = parseInt(amount,10) || 0;
  if(!amount) return;
  if(kind.indexOf('d')===0){
    G.dice[parseInt(kind.slice(1),10)] = (G.dice[parseInt(kind.slice(1),10)]||0) + amount;
  }
  G.rewards[kind] = (G.rewards[kind]||0) + amount;
  var entry={
    time:new Date().toLocaleString('zh-TW'),
    kind:kind,
    amount:amount,
    label:label || ((rewardKeys_()[kind]||kind)+' +'+amount),
    note:note||'',
    totalValue:G.rewards[kind]||0,
    extra:extra||{}
  };
  G.rewardLog.push(entry);
  if(G.rewardLog.length>200) G.rewardLog=G.rewardLog.slice(-200);
  updateDynamicBoard_();
  buildBoard(); hlCell(G.pos); charMove(G.pos,true);
  updateBar(); updateDiceUI(); renderRewardPanel();
  saveGameState_();
  logMonopolyRewardToGAS_(entry);
}

function grantMilestoneRewards_(){
  while(G.laps >= 5 && G.rewards.permanentBadge < 1){
    grantReward_('permanentBadge', 1, '完成 5 圈：永久本期勋章', '圈数奖励', {laps:G.laps});
  }
  [10,15,20,25,30,35,40,45,50].forEach(function(th){
    var need = G.laps >= th;
    var owned = G.rewardLog.filter(function(x){ return x.extra && x.extra.milestone===th; }).length;
    if(need && owned<1){
      grantReward_('legacyChance', 1, '完成 '+th+' 圈：往期返乡勋章兑换机会 +1', '圈数奖励', {laps:G.laps, milestone:th});
    }
  });
}
function registerLapProgress_(path){
  if(!Array.isArray(path) || !path.length) return;
  var lapsAdded = path.filter(function(p){ return p===0; }).length;
  if(!lapsAdded) return;
  var before = G.laps;
  G.laps += lapsAdded;
  var reshuffled = false;
  for(var th=5; th<=G.laps; th+=5){
    if(before < th){
      shuffleBaseBoard_();
      reshuffled = true;
    }
  }
  if(before < 5 && G.laps >= 5 && !G.lapModeNotified){
    G.lapModeNotified = true;
    alert('你已完成 5 圈，从第 6 圈开始，额外生成的惩罚 / 机会 / 命运效果会翻倍；棋盘惩罚格仍照格子上原本数字执行，并会出现 d8 / d10 / d12 奖励格。');
  }
  grantMilestoneRewards_();
  updateDynamicBoard_();
  if(reshuffled){
    buildBoard();
    hlCell(G.pos);
    charMove(G.pos,true);
    alert('累计圈数达到 5 的倍数，棋盘格子已经重新打乱。');
  }
  saveGameState_();
}

  clearGameState_(uid||G.userId);
  G.pos=0; G.frozen=0; G.doubleNext=false; G.shield=false; G.pending=false; G.nextRollCb=null;
  G.backpack=[]; G.laps=0; G.lapModeNotified=false; G.manualLogged=false; G.pendingInputSource='manual_direct';
  G.autoUse={ amulet:false, unfreeze:false, unfreezeDice:false };
  G.playLog=[]; G.forumLog=[]; G.rewardLog=[]; G.rewards=makeDefaultRewards_();
}
function applyLoadedState_(state){
  if(!state) return;
  G.pos = parseInt(state.pos,10)||0;
  G.frozen = parseInt(state.frozen,10)||0;
  G.doubleNext = !!state.doubleNext;
  G.backpack = Array.isArray(state.backpack) ? state.backpack : [];
  G.laps = parseInt(state.laps,10)||0;
  G.lapModeNotified = !!state.lapModeNotified;
  G.autoUse = Object.assign({ amulet:false, unfreeze:false, unfreezeDice:false }, state.autoUse || {});
  G.playLog = Array.isArray(state.playLog) ? state.playLog : [];
  G.forumLog = Array.isArray(state.forumLog) ? state.forumLog : [];
  G.rewardLog = Array.isArray(state.rewardLog) ? state.rewardLog : [];
  G.rewards = Object.assign(makeDefaultRewards_(), state.rewards || {});
  normalizeGameState_();
}
function itemCount_(type){ return G.backpack.filter(function(i){ return i.type===type; }).length; }
function effectMultiplier_(){ return G.laps >= 5 ? 2 : 1; }
function boardPenaltyMultiplier_(){ return 1; }
function currentBoardCell_(id){ return BOARD[id] || BASE_BOARD[id]; }
function shuffleBaseBoard_(){
  var fixed = JSON.parse(JSON.stringify(BASE_BOARD[0]));
  var arr = BASE_BOARD.slice(1).map(function(c){ return JSON.parse(JSON.stringify(c)); });
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp;
  }
  arr.forEach(function(cell, idx){ cell.id = idx + 1; });
  BASE_BOARD = [fixed].concat(arr);
}
function updateDynamicBoard_(){
  BOARD = JSON.parse(JSON.stringify(BASE_BOARD));
  BOARD[24] = {id:24, name:'平安符', type:'道具', desc:'获得 1 个平安符；第 6 圈起改为 2 个'};

    BOARD[20] = {id:20, name:'d10+1', type:'骰子奖励', desc:'获得 1 颗 d10'};
    BOARD[27] = {id:27, name:'d12+1', type:'骰子奖励', desc:'获得 1 颗 d12'};
  }
  BOARD.forEach(function(cell, idx){
    if(/节操\+/.test(cell.name) && G.rewards.seiso > 5000){
      BOARD[idx] = {id:cell.id, name:'命 运', type:'命运', desc:'节操累计超过 5000，节操格改为命运格'};
    } else if(/羽毛\+/.test(cell.name) && G.rewards.feather > 2000){
      BOARD[idx] = {id:cell.id, name:'机 会', type:'机会', desc:'羽毛累计超过 2000，羽毛格改为机会格'};
    }
  });
}

function fetchMonopolyCloudProfile(id, cb){
  if(!GAS_URL || !id){ cb(null); return; }
  var fn='_profileCb'+Date.now();

  window[fn]=function(data){
    clearTimeout(timer); delete window[fn];
    var s=document.getElementById('_profileScript');
    if(s) s.parentNode.removeChild(s);

function calcDice(){
  var r=parseInt(document.getElementById('inp-replies').value)||0;
  var c=parseInt(document.getElementById('inp-citations').value)||0;
  var res={4:0,6:0,8:0,10:0,12:0};
  CONFIG.exchanges.forEach(ex=>{
    var amt=(ex.source==='replies'?r:c);
    if(amt<=0||ex.amount<=0)return;
    var n=Math.floor(amt/ex.amount)*ex.dice_count;
    if(ex.sign==='+'){ res[ex.dice_type]=(res[ex.dice_type]||0)+n; }
    else { res[ex.dice_type]=Math.max(0,(res[ex.dice_type]||0)-n); }
  });
  var total=Object.values(res).reduce((a,b)=>a+b,0);
  var prev=document.getElementById('dice-preview');
  if(total===0){
    prev.innerHTML='<span style="opacity:.45;font-size:.82rem">未获得骰子，请调整数量</span>';
    document.getElementById('start-btn').disabled=true;
  } else {
    prev.innerHTML=[4,6,8,10,12].filter(t=>res[t]>0)
      .map(t=>'<span class="dbadge">🎲 d'+t+' × '+res[t]+'</span>').join('');
    document.getElementById('start-btn').disabled=false;
  }
  window._pendingDice=res;
}

function s2Start(){
  var r=window._pendingDice||{};
  var isMerge=window._mergeBalance&&window._balanceDice;
  // 若是「追加骰子」模式，把余额并入
  if(isMerge){
    [4,6,8,10,12].forEach(t=>{ r[t]=(r[t]||0)+(window._balanceDice[t]||0); });
  }
  window._mergeBalance=false;
  window._balanceDice=null;
  G.dice={4:r[4]||0,6:r[6]||0,8:r[8]||0,10:r[10]||0,12:r[12]||0};
  G.sel=[4,6,8,10,12].find(t=>G.dice[t]>0)||4;

    applyLoadedState_(loadGameState_(G.userId));
    applyCloudProfile_(window._cloudProfile);

    resetGameState_(G.userId);

  buildBoard(); updateDiceUI(); updateBar(); updateBackpackBtn(); renderBagPanel(); renderRewardPanel();
  charMove(G.pos,true); hlCell(G.pos);
  setSp('p-avatar','idle'); setSp('center-char','idle');

}

// ================================================================
// ROLL
// ================================================================
function doRoll(){
  if(G.pending) return;
  if(G.frozen>0){ showFreezeOv(); return; }
  if(![4,6,8,10,12].some(t=>G.dice[t]>0)){ setMsg('骰子已全部用完！'); return; }
  if(G.dice[G.sel]<=0){ G.sel=[4,6,8,10,12].find(t=>G.dice[t]>0)||4; updateDiceUI(); }

  // 取出投掷数量
  var rcInput=document.getElementById('roll-count');
  var rollN=Math.max(1,Math.min(parseInt(rcInput?rcInput.value:1)||1, G.dice[G.sel]));

  G.pending=true; updateDiceUI();

  function playRoll(idx, total){
    if(idx>=total){
      G.pending=false; updateDiceUI();
      return;
    }
    if(![4,6,8,10,12].some(function(t){ return G.dice[t]>0; })){
      G.pending=false; updateDiceUI();
      setMsg('剩余骰子不足，批量投骰提前结束。');
      return;
    }
    if(G.dice[G.sel]<=0){ G.sel=[4,6,8,10,12].find(function(t){ return G.dice[t]>0; })||4; }
    var sides=G.sel;
    G.dice[sides]--;
    var raw=Math.floor(Math.random()*sides)+1;
    var result=G.doubleNext?raw*2:raw;
    if(G.doubleNext) G.doubleNext=false;
    var r={sides:sides, raw:raw, result:result};
    updateDiceUI();
    setSp('char-sprite','spin'); setSp('p-avatar','spin'); setSp('center-char','spin');
    setMsg(G.userId+' 投出 d'+r.sides+' → '+r.raw+(r.result!==r.raw?' (×2='+r.result+')':'')
      +(total>1?' ['+(idx+1)+'/'+total+']':''));
    document.getElementById('center-msg').textContent='🎲 '+r.result+' 点！';

    var from=G.pos;
    var path=[];
    for(var s=1;s<=r.result;s++) path.push((from+s)%BOARD.length);

    setTimeout(()=>{
      animWalk(path,()=>{
        G.pos=path[path.length-1];
        registerLapProgress_(path);
        hlCell(G.pos); updateBar(); updateDiceUI();
        sendRec(r.sides,r.raw,r.result,from,G.pos,BOARD[G.pos]);
        // 若还有后续投掷，endTurn 会自动触发下一次
        G.nextRollCb=(idx+1<total)?function(){ playRoll(idx+1,total); }:null;
        applyCell(BOARD[G.pos],r.sides,r.raw,r.result);
      });
    },300);
  }
  playRoll(0, rollN);
}
window.doRoll=doRoll;

function parseCellReward_(cell){
  if(cell.type==='道具') return {kind:'amulet', amount:effectMultiplier_(), label:'获得平安符 ×'+effectMultiplier_(), item:true};
  if(cell.type==='骰子奖励'){
    var m=(cell.name||'').match(/d(\d+)\+(\d+)/i);
    if(m) return {kind:'d'+m[1], amount:parseInt(m[2],10)||1, label:'获得 d'+m[1]+' ×'+(parseInt(m[2],10)||1)};
  }
  var name=String(cell.name||'');
  var num=parseInt((name.match(/\+(\d+)/)||[])[1],10)||0;
  if(name.indexOf('节操+')>-1) return {kind:'seiso', amount:num, label:'获得节操 +'+num};
  if(name.indexOf('羽毛+')>-1) return {kind:'feather', amount:num, label:'获得羽毛 +'+num};
  if(name.indexOf('字母勋章')>-1) return {kind:'letter30', amount:1, label:'获得 30 天字母勋章 ×1'};
  return null;
}
function consumeItemDirect_(type){
  var idx=G.backpack.findIndex(function(i){ return i.type===type; });
  if(idx===-1) return false;
  G.backpack.splice(idx,1);
  updateBackpackBtn();
  renderBagPanel();
  syncBackpack();
  saveGameState_();
  return true;
}
function autoUseUnfreezeItems_(){
  var used=0;
  while(G.frozen>0 && itemCount_('unfreeze')>0){
    if(!consumeItemDirect_('unfreeze')) break;
    G.frozen=Math.max(0, G.frozen-1);
    used++;
  }
  if(used){
    updateBar();
    updateDiceUI();
    if(G.frozen===0){ setSp('char-sprite','idle'); setSp('p-avatar','idle'); setSp('center-char','idle'); }
    saveGameState_();
  }
  return used;
}
function countDiceNeededToUnfreeze_(){
  return Math.max(0, parseInt(G.frozen,10)||0) * CONFIG.unfreeze_per_turn;
}
function consumeDiceForUnfreeze_(type, turns){
  var needTurns=Math.max(1, parseInt(turns,10)||1);
  var need=needTurns * CONFIG.unfreeze_per_turn;
  if((G.dice[type]||0) < need) return 0;
  G.dice[type]-=need;
  G.frozen=Math.max(0, G.frozen-needTurns);
  updateBar();
  updateDiceUI();
  if(G.frozen===0){ setSp('char-sprite','idle'); setSp('p-avatar','idle'); setSp('center-char','idle'); }
  saveGameState_();
  return needTurns;
}
function autoUseUnfreezeDice_(){
  var needTurns=Math.max(0, parseInt(G.frozen,10)||0);
  if(!needTurns) return 0;
  var order=[G.sel,4,6,8,10,12].filter(function(v,i,a){ return a.indexOf(v)===i; });
  for(var i=0;i<order.length;i++){
    var t=order[i];
    if((G.dice[t]||0) >= needTurns*CONFIG.unfreeze_per_turn){
      return consumeDiceForUnfreeze_(t, needTurns);
    }
  }
  return 0;
}
function applyCell(cell,dice,raw,result){
  var diceStr='d'+dice+' 投出 '+raw+(result!==raw?' (×2='+result+')':'')
    +'  格'+((G.pos-result+BOARD.length)%BOARD.length)+'→格'+G.pos;
  var autoRun = isAutoBatchMode_();
  var canAmulet = itemCount_('amulet')>0 && (cell.type==='惩罚'||cell.type==='冻结');
  if(canAmulet && autoRun && G.autoUse.amulet && consumeItemDirect_('amulet')){
    setMsg('已自动使用平安符，抵消「'+cell.name+'」效果');
    endTurn();
    return;
  }

  if(cell.type==='奖励'){
    var reward=parseCellReward_(cell);
    if(reward) grantReward_(reward.kind, reward.amount, reward.label, '奖励格', {cell:cell.id});
    setSp('char-sprite','happy'); setSp('p-avatar','happy'); setSp('center-char','cheer');
    regA('ok',()=>{ closeOv(); endTurn(); });
    showOv({cls:'reward',icon:'🎉',type:'奖励格',dice:diceStr,
      name:cell.name,desc:cell.desc,btns:[{lbl:'太好了！',k:'ok',gold:true}]});
    maybeAutoRun_('ok', autoRun);

  } else if(cell.type==='道具' || cell.type==='骰子奖励'){
    var reward2=parseCellReward_(cell);
    if(reward2){
      if(reward2.item) addBackpackItems_('amulet', reward2.amount);
      else grantReward_(reward2.kind, reward2.amount, reward2.label, '特殊格奖励', {cell:cell.id});
    }
    setSp('char-sprite','happy'); setSp('p-avatar','happy'); setSp('center-char','cheer');
    regA('ok',()=>{ closeOv(); endTurn(); });
    showOv({cls:'reward',icon:cell.type==='道具'?'🧿':'🎲',type:'特殊奖励格',dice:diceStr,
      name:cell.name,desc:cell.desc+(reward2&&reward2.item?'\n\n已存入背包。':''),btns:[{lbl:'收下',k:'ok',gold:true}]});
    maybeAutoRun_('ok', autoRun && !reward2.item);

  } else if(cell.type==='惩罚'){
    setSp('char-sprite','worried'); setSp('p-avatar','worried'); setSp('center-char','worried');
    var steps=(cell.steps||0)*boardPenaltyMultiplier_();
    regA('ok',()=>{ closeOv(); moveSteps(steps); });
    regA('amulet',()=>{ closeOv(); if(consumeItemDirect_('amulet')){ setMsg('使用平安符，已抵消本次惩罚'); endTurn(); } });
    showOv({cls:'',icon:'💫',type:'惩罚格',dice:diceStr,
      name:cell.name,desc:cell.desc+'\n\n将会'+( steps<0?'退后':'前进')+Math.abs(steps)+'格',
      btns:canAmulet?[{lbl:'使用平安符',k:'amulet',gold:true},{lbl:'接受惩罚',k:'ok'}]:[{lbl:'接受惩罚',k:'ok'}]});
    if(canAmulet) appendAutoUseOption_('amulet','之后遇到平安符可用的情况时自动使用');
    maybeAutoRun_('ok', autoRun && !canAmulet);

  } else if(cell.type==='冻结'){
    setSp('char-sprite','frozen'); setSp('p-avatar','frozen'); setSp('center-char','frozen');
    G.frozen=(cell.freeze||1)*boardPenaltyMultiplier_();
    updateBar();
    if(autoRun && G.autoUse.unfreeze && itemCount_('unfreeze')>0){
      var usedNow=autoUseUnfreezeItems_();
      if(G.frozen===0){
        setMsg('已自动使用解冻道具 ×'+usedNow);
        endTurn();
        return;
      }
    }
    if(autoRun && G.autoUse.unfreezeDice){
      var usedDiceTurns=autoUseUnfreezeDice_();
      if(usedDiceTurns>0 && G.frozen===0){
        setMsg('已自动消耗骰子解冻 '+usedDiceTurns+' 回');
        endTurn();
        return;
      }
    }
    regA('amulet',()=>{ closeOv(); if(consumeItemDirect_('amulet')){ G.frozen=0; updateBar(); setMsg('使用平安符，已抵消冻结'); endTurn(); } });
    regA('ok',()=>{ closeOv(); endTurn(); });
    showOv({cls:'freeze',icon:'❄️',type:'冻结格',dice:diceStr,
      name:cell.name,
      desc:cell.desc+'\n\n下次行动时可消耗骰子解冻，或跳过回合。',
      btns:canAmulet?[{lbl:'使用平安符',k:'amulet',gold:true},{lbl:'知道了',k:'ok'}]:[{lbl:'知道了',k:'ok'}]});
    if(canAmulet) appendAutoUseOption_('amulet','之后遇到平安符可用的情况时自动使用');
    maybeAutoRun_('ok', autoRun && !canAmulet);

  } else if(cell.type==='跳转'){
    setSp('char-sprite','jump'); setSp('p-avatar','jump'); setSp('center-char','jump');
    var dest=cell.jump_to;
    regA('ok',()=>{ closeOv(); jumpTo(dest); });
    showOv({cls:'',icon:'🌀',type:'跳转格',dice:diceStr,
      name:cell.name,desc:cell.desc,btns:[{lbl:'传送！',k:'ok',gold:true}]});
    maybeAutoRun_('ok', autoRun);

  } else if(cell.type==='机会'){
    setSp('char-sprite','shy'); setSp('p-avatar','shy'); setSp('center-char','think');
    var card=CHANCE_CARDS[Math.floor(Math.random()*CHANCE_CARDS.length)];
    showChanceCard(card,diceStr,autoRun);

  } else if(cell.type==='命运'){
    setSp('char-sprite','think'); setSp('p-avatar','think'); setSp('center-char','think');
    var fc=FATE_CARDS[Math.floor(Math.random()*FATE_CARDS.length)];
    showFateCard(fc,diceStr,autoRun);

  } else {
    setSp('char-sprite','calm'); setSp('p-avatar','calm');
    regA('ok',()=>{ closeOv(); endTurn(); });
    showOv({cls:'',icon:'💨',type:'空格',dice:diceStr,
      name:cell.name,desc:cell.desc,btns:[{lbl:'继续',k:'ok'}]});
    maybeAutoRun_('ok', autoRun);
  }
}

function moveSteps(steps){
  if(!steps){ endTurn(); return; }
  var n=Math.abs(steps), dir=steps>0?1:-1;
  var path=[], cur=G.pos;
  for(var i=0;i<n;i++){ cur=(cur+dir+BOARD.length)%BOARD.length; path.push(cur); }
  animWalk(path,()=>{ G.pos=cur; if(dir>0) registerLapProgress_(path); hlCell(G.pos); updateBar(); endTurn(); });
}

function registerTeleportLapProgress_(from, dest){
  var lapsAdded=0;
  if(dest===0){
    if(from>=28) lapsAdded=1;
  }else if(from>dest){
    lapsAdded=1;
  }
  if(!lapsAdded) return 0;
  var before=G.laps;
  G.laps += lapsAdded;
  var reshuffled = false;
  for(var th=5; th<=G.laps; th+=5){
    if(before < th){
      shuffleBaseBoard_();
      reshuffled = true;
    }
  }
  if(before < 5 && G.laps >= 5 && !G.lapModeNotified){
    G.lapModeNotified = true;
    alert('你已完成 5 圈，从第 6 圈开始，额外生成的惩罚 / 机会 / 命运效果会翻倍；棋盘惩罚格仍照格子上原本数字执行，并会出现 d8 / d10 / d12 奖励格。');
  }
  grantMilestoneRewards_();
  if(reshuffled){
    buildBoard();
    hlCell(G.pos);
    charMove(G.pos,true);
    alert('累计圈数达到 5 的倍数，棋盘格子已经重新打乱。');
  }
  saveGameState_();
  return lapsAdded;
}
function jumpTo(dest){
  var from=G.pos;
  var lapsAdded=registerTeleportLapProgress_(from, dest);
  charMove(dest,false);
  setTimeout(()=>{ G.pos=dest; hlCell(dest); updateBar();
    setSp('char-sprite','land'); endTurn();
    if(dest===0){
      document.getElementById('center-msg').textContent=lapsAdded?'被传送回起点（圈数 +1）':'被传送回起点（不计圈）';
      setMsg(lapsAdded?'这次传送已计入 1 圈。':'已跳回起点，这次传送不计入圈数。');
    }else{
      document.getElementById('center-msg').textContent='传送到格 '+dest+(lapsAdded?'（路过起点，圈数 +1）':'');
      if(lapsAdded) setMsg('传送途中路过起点，累计圈数 +1。');
    }
  },350);
}

function nextRewardCell(){
  for(var k=1;k<BOARD.length;k++){
    var idx=(G.pos+k)%BOARD.length;
    if(['奖励','道具','骰子奖励'].indexOf(BOARD[idx].type)>-1) return idx;
  }
  return G.pos;
}

function endTurn(){
  if(typeof G.nextRollCb==='function'){
    if(G.frozen>0){
      if(G.autoUse.unfreeze && itemCount_('unfreeze')>0){
        autoUseUnfreezeItems_();
      }
      if(G.frozen>0 && G.autoUse.unfreezeDice){
        autoUseUnfreezeDice_();
      }
      if(G.frozen>0){
        G.pending=false;
        G.nextRollCb=null;
        updateDiceUI();
        setMsg('批量投骰已暂停：角色处于冻结状态，未使用的骰子仍保留。');
        return;
      }
    }
    var cb=G.nextRollCb;
    G.nextRollCb=null;
    cb(); // 继续下一次投掷
    return;
  }
  G.pending=false; updateDiceUI();
  setSp('char-sprite','idle');
}

function formatCardDesc_(card){
  var mult=effectMultiplier_();
  if(mult<=1) return card.desc;
  if(card.type==='advance' || card.type==='retreat') return card.desc.replace(/\d+/, String((parseInt(card.value,10)||0)*mult));
  if(card.type==='reward') return '记录节操+'+((parseInt(String(card.value).match(/\d+/),10)||0)*mult)+'（下次领取）';
  if(card.type==='unfreeze') return card.desc.replace('立即', '获得 '+mult+' 个');
  if(card.type==='nothing') return '获得 '+mult+' 个平安符';
  if(card.type==='reward_dice') return '随机获得 d'+card.value.t+' ×'+(card.value.c*mult);
  if(card.type==='freeze') return '冻结 '+(card.value*mult)+' 回合（可消耗骰子提前解冻）';
  if(card.type==='task_reply') return '需在主题完成'+(card.value*mult)+'次有效回复后方可继续游戏';
  if(card.type==='task_citation') return '需被他人引用'+(card.value*mult)+'次后方可继续游戏';
  if(card.type==='retreat_rnd') return '随机退后 1～'+(card.value*mult)+' 格';
  return card.desc;
}
function showChanceCard(card,diceStr,autoRun){
  var k='chance';
  var mult=effectMultiplier_();
  regA(k,()=>{ closeOv(); applyChance(card); });
  var lbl=card.type==='advance'?'前进 '+(card.value*mult)+' 格'
    :card.type==='retreat'?'退后 '+(card.value*mult)+' 格'
    :card.type==='goto'?'跳到格 '+card.value
    :card.type==='random'?'随机传送！'
    :card.type==='extra_roll'?'直接获得 d4 ×'+mult
    :card.type==='unfreeze'?'存入背包'
    :card.type==='next_reward'?'前进到奖励格'
    :'确认';
  showOv({cls:'chance',icon:'🃏',type:'🃏 机会卡',dice:diceStr,
    name:card.name,desc:formatCardDesc_(card),btns:[{lbl:lbl,k:k,gold:true}]});
  maybeAutoRun_(k, autoRun);
}

function applyChance(card){
  var t=card.type, v=card.value, mult=effectMultiplier_();
  if(t==='advance'){
    var p=[]; for(var i=1;i<=v*mult;i++) p.push((G.pos+i)%BOARD.length);
    animWalk(p,()=>{ G.pos=p[p.length-1]; registerLapProgress_(p); hlCell(G.pos); updateBar(); endTurn(); });
  } else if(t==='retreat'){
    var p2=[]; for(var j=1;j<=v*mult;j++) p2.push((G.pos-j+BOARD.length)%BOARD.length);
    animWalk(p2,()=>{ G.pos=p2[p2.length-1]; hlCell(G.pos); updateBar(); endTurn(); });
  } else if(t==='goto'){ jumpTo(v);
  } else if(t==='random'){ jumpTo(Math.floor(Math.random()*BOARD.length));
  } else if(t==='extra_roll'){ grantReward_('d4', mult, '机会卡：获得 d4 ×'+mult, '机会卡'); endTurn(); setMsg('获得额外 d4 ×'+mult+'！');
  } else if(t==='reward'){ grantReward_('seiso', (parseInt(String(v).match(/\d+/),10)||0)*mult, '机会卡：节操奖励', '机会卡'); endTurn(); setMsg('获得额外节操奖励！');
  } else if(t==='unfreeze'){ addBackpackItems_('unfreeze', mult); endTurn(); setMsg('获得解冻道具，已存入背包！');
  } else if(t==='next_reward'){ jumpTo(nextRewardCell());
  } else if(t==='nothing'){ addBackpackItems_('amulet', mult); endTurn(); setMsg('获得平安符，已存入背包！');
  } else { endTurn(); }
}

// FATE CARD
// ================================================================
function totalDiceCount_(){
  return [4,6,8,10,12].reduce(function(sum,t){ return sum + (G.dice[t]||0); }, 0);
}
function consumeAnyDice_(count){
  var need=count;
  [4,6,8,10,12].forEach(function(t){
    if(need<=0) return;
    var take=Math.min(G.dice[t]||0, need);
    G.dice[t]-=take;
    need-=take;
  });
  updateDiceUI();
  saveBalance();
  return need===0;
}
function showFateCard(card,diceStr,autoRun){
  var isTask=(card.type==='task_reply'||card.type==='task_citation');
  var mult=effectMultiplier_();
  if(isTask){
    _taskUnlockAt=Date.now()+10000;
    regA('done',()=>{
      if(Date.now()<_taskUnlockAt){ setMsg('任务完成了吗？请确认后再按'); return; }
      closeOv(); grantRandomTaskReward_(); endTurn(); setMsg('任务完成！继续游戏');
    });
    regA('cancel_task',()=>{
      if(totalDiceCount_()<2){ setMsg('骰子不足 2 颗，无法取消考验'); return; }
      consumeAnyDice_(2);
      closeOv(); endTurn(); setMsg('已扣除 2 颗骰子，取消这次命运考验');
    });
    showOv({cls:'fate',icon:'🎴',type:'🎴 命运卡',dice:diceStr,
      name:card.name,desc:formatCardDesc_(card),
      btns:[{lbl:'✅ 通过考验',k:'done',gold:true},{lbl:'扣除 2 颗骰子取消',k:'cancel_task'}]});
    // 禁用「完成」按钮 10 秒
    var doneBtn=document.querySelector('#ov-btns .ov-btn.gold');
    if(doneBtn){ doneBtn.disabled=true; setTimeout(()=>{ doneBtn.disabled=false; },10000); }
  } else {
    regA('fate',()=>{ closeOv(); applyFate(card); });
    showOv({cls:'fate',icon:'🎴',type:'🎴 命运卡',dice:diceStr,
      name:card.name,desc:formatCardDesc_(card),btns:[{lbl:'接受命运',k:'fate',gold:true}]});
    maybeAutoRun_('fate', autoRun);
  }
}

function applyFate(card){
  var t=card.type, v=card.value, mult=effectMultiplier_();
  if(t==='freeze'){ G.frozen=v*mult; updateBar(); setSp('char-sprite','frozen'); endTurn(); setMsg('冻结 '+(v*mult)+' 回合');
  } else if(t==='next_reward'){ jumpTo(nextRewardCell());
  } else if(t==='goto_double'){ G.doubleNext=true; jumpTo(0);
  } else if(t==='double_next'){ G.doubleNext=true; endTurn(); setMsg('下次投骰点数翻倍！');
  } else if(t==='extra_chance'){
    var cc=CHANCE_CARDS[Math.floor(Math.random()*CHANCE_CARDS.length)];
    showChanceCard(cc,'',isAutoBatchMode_());
  } else if(t==='reward_dice'){
    var diceType = G.laps >= 5 ? [6,8,10,12][Math.floor(Math.random()*4)] : v.t;
    grantReward_('d'+diceType, (v.c||1)*mult, '命运卡：获得 d'+diceType+' ×'+((v.c||1)*mult), '命运卡');
    endTurn(); setMsg('获得 d'+diceType+' ×'+((v.c||1)*mult)+'！');
  } else if(t==='retreat_rnd'){
    var steps=Math.floor(Math.random()*(v*mult))+1;
    var p=[]; for(var m=1;m<=steps;m++) p.push((G.pos-m+BOARD.length)%BOARD.length);
    animWalk(p,()=>{ G.pos=p[p.length-1]; hlCell(G.pos); updateBar(); endTurn(); });
  } else if(t==='goto'){ jumpTo(v);
  } else { endTurn(); }
}

function sendRec(dice,raw,result,from,fin,cell){
  var n=new Date();
  var ds=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
  var ts=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  G.playLog.push({
    time:ds+' '+ts,
    dice:'d'+dice,
    raw:raw,
    result:result,
    from:from,
    to:fin,
    cellName:cell.name,
    cellType:cell.type,
    cellDesc:cell.desc
  });
  if(G.playLog.length>300) G.playLog=G.playLog.slice(-300);
  saveGameState_();
  if(!GAS_URL) return;
  new Image().src=GAS_URL+'?sheet=大富翁'
    +'&date='+encodeURIComponent(ds)+'&time='+encodeURIComponent(ts)
    +'&user_id='+encodeURIComponent(G.userId)
    +'&dice=d'+dice+'+'+raw+(result!==raw?'x2='+result:'')
    +'&from_pos='+from+'&final_pos='+fin
    +'&cell_name='+encodeURIComponent(cell.name)
    +'&cell_type='+encodeURIComponent(cell.type)
    +'&cell_desc='+encodeURIComponent(cell.desc);
  saveBalance(); // 每次投骰后同步剩余骰子到 GAS
}

  if(!_fffResult)return;

  });

    logBoardActivityToGAS_(uid, d, c.replies, c.citations);
  });
  if(_fffIsUpdate){
    const res={4:0,6:0,8:0,10:0,12:0};
    CONFIG.exchanges.forEach(ex=>{
      const amt=ex.source==='replies'?netR:netC;
      if(amt<=0||ex.amount<=0)return;
      const n=Math.floor(amt/ex.amount)*ex.dice_count;
      if(ex.sign==='+')res[ex.dice_type]=(res[ex.dice_type]||0)+n;
      else res[ex.dice_type]=Math.max(0,(res[ex.dice_type]||0)-n);
    });
    [4,6,8,10,12].forEach(t=>{G.dice[t]=(G.dice[t]||0)+(res[t]||0);});
    updateDiceUI();
    G.pendingInputSource=(source==='manual'?'manual_modal':'fetch');

    calcDice();

}

async function fffProxyGet(url){
  const sk='fff_'+url,hit=sessionStorage.getItem(sk);
  if(hit)return hit;
  const resp=await fetch(FFF_PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(30000)});

async function fffGetUsername(uid){
  const html=await fffProxyGet('https://sstm.moe/?app=core&module=members&controller=profile&id='+uid);
  const doc=new DOMParser().parseFromString(html,'text/html');
  for(const a of doc.querySelectorAll('a[href]')){
    const href=a.getAttribute('href')||'';
    const m=href.match(/\/profile\/(\d+-[^\/\?#"]+)/);
    if(m&&m[1].startsWith(uid+'-'))return m[1];
  }
  throw new Error('无法获取用户名，请确认 UID 是否正确');
}
async function fffCheckQuote(cid,tid,uid,cache){
  if(cache.has(cid))return cache.get(cid);
  const url='https://sstm.moe/?app=core&module=system&controller=content&do=find&content_class=forums_Topic&content_id='+tid+'&content_commentid='+cid;
  try{
    const html=await fffProxyGet(url);
    if(!/forum\/32[-\/]/.test(html)){cache.set(cid,false);return false;}
    const doc=new DOMParser().parseFromString(html,'text/html');
    const el=doc.querySelector('article#elComment_'+cid);
    if(!el){cache.set(cid,false);return false;}
    const qs=el.querySelectorAll('.ipsQuote[data-ipsquote-userid="'+uid+'"]');
    const res=Array.from(qs).some(q=>!q.parentElement.closest('.ipsQuote'));
    cache.set(cid,res);return res;
  }catch(e){cache.set(cid,false);return false;}
}
async function fffScrape(uid,slug,startDate,endDate){
  const RE=/forum\/32[-\/]/;
  let replies=0;const citedIds=new Set();
  const byDay={};
  function addDay(dateStr,type){if(!byDay[dateStr])byDay[dateStr]={replies:0,citations:0};byDay[dateStr][type]++;}
  const sTs=startDate?new Date(startDate).getTime():0;
  const eTs=endDate?new Date(endDate+'T23:59:59Z').getTime():Date.now();
  let page=1,done=false;
  const cache=fffLoadCC(uid),pi=fffLoadPI(slug);
  const ips=Object.keys(pi).map(Number).sort((a,b)=>a-b);
  for(const pp of ips){if(new Date(pi[pp]).getTime()>eTs)page=pp;else break;}
  while(!done){
    fffSetStatus('正在读取第 '+page+' 页（回复:'+replies+' 被引用:'+citedIds.size+'）...');
    const url=page===1
      ?'https://sstm.moe/profile/'+slug+'/content/?type=forums_topic_post&change_section=1'
      :'https://sstm.moe/profile/'+slug+'/content/page/'+page+'/?type=forums_topic_post';
    const html=await fffProxyGet(url);
    const doc=new DOMParser().parseFromString(html,'text/html');
    const items=doc.querySelectorAll('ol.cProfileContent > li');
    if(!items.length)break;
    const ft=doc.querySelector('ol.cProfileContent > li time[datetime]');
    if(ft){pi[page]=ft.getAttribute('datetime');fffSavePI(slug,pi);}
    let foundInRange=false;const toCheck=[];
    for(const item of items){
      const te=item.querySelector('time[datetime]');if(!te)continue;
      const ts=new Date(te.getAttribute('datetime')).getTime();
      if(ts>eTs)continue;
      if(ts<sTs){done=true;break;}
      foundInRange=true;
      const fa=item.querySelector('p.ipsType_light a[href]');
      if(!fa||!RE.test(fa.getAttribute('href')||''))continue;
      const dateStr=new Date(ts).toISOString().slice(0,10);
      replies++;
      addDay(dateStr,'replies');
      const bq=item.querySelector('.ipsQuote');if(!bq)continue;
      const c2=bq.getAttribute('data-ipsquote-contentcommentid');
      const t2=bq.getAttribute('data-ipsquote-contentid');
      if(c2&&t2)toCheck.push({cid:c2,tid:t2,dateStr});
    }
    if(toCheck.length){
      const BATCH=5;
      for(let i=0;i<toCheck.length;i+=BATCH){
        const batch=toCheck.slice(i,i+BATCH);
        fffSetStatus('第'+page+'页验证引用 '+(i+1)+'–'+Math.min(i+BATCH,toCheck.length)+'/'+toCheck.length+'（被引用:'+citedIds.size+'）...');
        const results=await Promise.all(batch.map(x=>fffCheckQuote(x.cid,x.tid,uid,cache)));
        batch.forEach((x,j)=>{if(results[j]){citedIds.add(x.cid);addDay(x.dateStr,'citations');}});
        if(i+BATCH<toCheck.length)await new Promise(r=>setTimeout(r,150));
      }
    }
    if(done)break;
    const next=doc.querySelector('li.ipsPagination_next:not(.ipsPagination_inactive) a,[rel="next"]');
    if(!next)break;
    page++;
    await new Promise(r=>setTimeout(r,foundInRange?400:100));
  }
  fffSaveCC(uid,cache);
  return{replies,citations:citedIds.size,byDay};
}

async function fffDoFetch(){
  const uid=parseInt((document.getElementById('fff-uid').value||'').trim());
  if(!uid||isNaN(uid)){alert('请输入有效的论坛 UID（数字）');return;}
  saveBoardForumUid_(uid);
  fffCloseModal();fffOpenLoading();fffSetStatus('正在检查日期是否重复...');
  const startDate=document.getElementById('fff-date-start').value;
  const endDate=document.getElementById('fff-date-end').value;
  const dateKey=(startDate||'')+'_'+(endDate||'');
  const overlaps=await new Promise(resolve=>fetchMonopolyRanges_(uid, resolve));
  var hit=overlaps.filter(function(row){ return hasOverlap_(startDate,endDate,row.startDate,row.endDate); });
  if(hit.length){
    blockOverlapFetch_(hit);
    return;
  }
  try{
    fffSetStatus('正在获取用户资料...');
    const slug=await fffGetUsername(uid);
    fffSetStatus('开始统计回复...');
    const raw=await fffScrape(uid,slug,startDate,endDate);
    fffCloseLoading();
    const prev=fffGetImp(uid);
    const isSame=!!(prev&&prev.key===dateKey);
    const netR=isSame?Math.max(0,raw.replies-prev.r):raw.replies;
    const netC=isSame?Math.max(0,raw.citations-prev.c):raw.citations;
    _fffResult={uid,dateKey,rawR:raw.replies,rawC:raw.citations,netR,netC,isSame,startDate,endDate,byDay:raw.byDay||{},source:'fetch'};
    applyFffResult_();
    alert(isSame
      ?'已自动导入同区间净增：'+netR+' 回复 / '+netC+' 被引用'
      :'已自动导入：'+netR+' 回复 / '+netC+' 被引用');
  }catch(err){
    fffCloseLoading();fffOpenModal(_fffIsUpdate);
    alert('读取失败：'+err.message);
  }

function downloadBGData_() {
  var now = new Date().toLocaleString('zh-TW');
  var rows = [];
  function pushSection(title, headers, dataRows){
    rows.push([title]);
    if(headers && headers.length) rows.push(headers);
    (dataRows||[]).forEach(function(r){ rows.push(r); });

  }
  pushSection('基本资料', ['项目','数值'], [

    ['当前位置', G.pos||0],

    ['d4', G.dice[4]||0],
    ['d6', G.dice[6]||0],
    ['d8', G.dice[8]||0],
    ['d10', G.dice[10]||0],
    ['d12', G.dice[12]||0]
  ]);
  pushSection('奖励累计', ['奖励','数量'], [
    ['节操', G.rewards.seiso||0],
    ['羽毛', G.rewards.feather||0],
    ['30天字母勋章', G.rewards.letter30||0],
    ['永久本期勋章', G.rewards.permanentBadge||0],
    ['往期返乡勋章兑换机会', G.rewards.legacyChance||0],
    ['平安符累计取得', G.rewards.amulet||0],
    ['解冻道具累计取得', G.rewards.unfreeze||0]
  ]);
  pushSection('背包', ['道具','数量','说明'], [
    ['平安符', itemCount_('amulet'), ITEM_META.amulet.desc],
    ['解冻道具', itemCount_('unfreeze'), ITEM_META.unfreeze.desc]
  ]);
  pushSection('奖励记录', ['时间','奖励名称','类型','数量','累计值','备注'], (G.rewardLog||[]).map(function(it){
    return [it.time||'', it.label||'', it.kind||'', it.amount||0, it.totalValue||0, it.note||''];
  }));
  pushSection('论坛抓取记录', ['时间','模式','来源','开始日期','结束日期','回复数','被引用数'], (G.forumLog||[]).map(function(it){
    return [it.time||'', it.mode||'', it.source||'', it.startDate||'', it.endDate||'', it.replies||0, it.citations||0];
  }));
  pushSection('游玩记录', ['时间','骰子','原始点数','实际点数','出发格','到达格','格名','格子类型','说明'], (G.playLog||[]).map(function(it){
    return [it.time||'', it.dice||'', it.raw||0, it.result||0, it.from||0, it.to||0, it.cellName||'', it.cellType||'', it.cellDesc||''];
  }));
  var csv = rows.map(function(r){
    return r.map(function(c){ return '"'+String(c==null?'':c).replace(/"/g,'""')+'"'; }).join(',');
  }).join('\r\n');
  var blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'board-game-'+(G.userId||'player')+'.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
}

window.addEventListener('DOMContentLoaded', function(){
  renderBoardIdHistory_();
  ['inp-replies','inp-citations'].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.addEventListener('input', function(){ G.pendingInputSource='manual_direct'; });
  });
  updateBackpackBtn();
  renderRewardPanel();
});

</script>
