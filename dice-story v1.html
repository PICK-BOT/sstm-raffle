<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的名字 — 命运的骰子</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0d1117;
  --navy2: #161b27;
  --navy3: #1e2535;
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --crimson: #9b2335;
  --crimson-light: #d63a50;
  --white: #f0ece4;
  --white-dim: #b8b4ac;
  --purple: #6b4fa0;
  --purple-light: #9d7fd4;
}

html {
  width: 100%; height: 100%;
}
body {
  width: 100%; min-height: 100%;
  background: var(--navy);
  color: var(--white);
  font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
  overflow-y: auto;
  overflow-x: hidden;
}

/* ===== STAR FIELD ===== */
#starfield {
  position: fixed; inset: 0; z-index: 0;
  background: var(--navy);
  overflow: hidden;
  pointer-events: none;
}
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  animation: twinkle var(--dur, 3s) ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: var(--min-op, 0.2); transform: scale(1); }
  50% { opacity: var(--max-op, 0.9); transform: scale(1.3); }
}

/* ===== APP CONTAINER ===== */
#app {
  position: relative; z-index: 1;
  width: 100%; min-height: 100%;
  display: flex; align-items: center; justify-content: center;
}

/* ===== SCREENS ===== */
.screen {
  display: none;
  width: 100%; max-width: 580px;
  min-height: 100vh;
  padding: 40px 28px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.6s ease forwards;
}
.screen.active { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== UI ELEMENTS ===== */
h1 { font-size: 2rem; font-weight: 900; color: var(--gold-light); text-align: center; margin-bottom: 8px; text-shadow: 0 2px 16px rgba(201,168,76,0.4); }
h2 { font-size: 1.3rem; font-weight: 700; color: var(--gold); margin-bottom: 20px; text-align: center; }
.subtitle { font-size: 0.95rem; color: var(--white-dim); text-align: center; margin-bottom: 30px; letter-spacing: 0.1em; }

.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%;
  backdrop-filter: blur(4px);
  margin-bottom: 18px;
}

label { display: block; font-size: 0.85rem; color: var(--white-dim); margin-bottom: 6px; letter-spacing: 0.05em; }

input[type="text"], input[type="number"] {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 8px;
  color: var(--white);
  font-family: inherit;
  font-size: 1.05rem;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}
input[type="text"]:focus, input[type="number"]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
}

.field-row { display: flex; gap: 14px; align-items: flex-start; width: 100%; }
.field-row .field { flex: 1; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 13px 32px;
  border: none; border-radius: 10px;
  font-family: inherit; font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.05em;
}
.btn-primary {
  background: linear-gradient(135deg, var(--gold) 0%, #8a6a20 100%);
  color: #1a1200;
  width: 100%;
  margin-top: 6px;
  box-shadow: 0 4px 20px rgba(201,168,76,0.25);
}
.btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); box-shadow: 0 6px 28px rgba(201,168,76,0.38); }
.btn-primary:active { transform: translateY(0); }

.btn-crimson {
  background: linear-gradient(135deg, var(--crimson-light), var(--crimson));
  color: #fff;
  width: 100%;
  margin-top: 6px;
  box-shadow: 0 4px 20px rgba(155,35,53,0.28);
}
.btn-crimson:hover { filter: brightness(1.1); transform: translateY(-1px); }

.btn-ghost {
  background: transparent;
  border: 1px solid rgba(201,168,76,0.35);
  color: var(--gold);
  padding: 8px 20px;
  font-size: 0.9rem;
}
.btn-ghost:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

/* ===== LIVE CALC ===== */
.calc-box {
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 16px;
  width: 100%;
}
.calc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.9rem; }
.calc-row:last-child { margin-bottom: 0; }
.calc-label { color: var(--white-dim); }
.calc-value { color: var(--gold-light); font-weight: 700; font-size: 1rem; }
.calc-note { font-size: 0.78rem; color: var(--white-dim); margin-top: 8px; line-height: 1.5; }

/* ===== SCREEN 3 — DICE ASSIGN ===== */
.dice-info { font-size: 1rem; color: var(--white); margin-bottom: 18px; text-align: center; }
.dice-info span { color: var(--gold-light); font-size: 1.2rem; font-weight: 700; }

.mix-die-row {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(155,35,53,0.25);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 10px;
  width: 100%;
}
.mix-die-label { font-size: 0.9rem; color: var(--white-dim); }
.mix-die-btns { display: flex; gap: 8px; }
.die-toggle {
  padding: 6px 14px;
  border-radius: 7px;
  border: 1.5px solid transparent;
  font-family: inherit; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
  background: rgba(255,255,255,0.06);
  color: var(--white-dim);
}
.die-toggle.pos.selected { background: rgba(201,168,76,0.18); border-color: var(--gold); color: var(--gold-light); }
.die-toggle.neg.selected { background: rgba(155,35,53,0.2); border-color: var(--crimson-light); color: #ff8899; }
.die-toggle:hover { filter: brightness(1.2); }

.summary-box {
  background: rgba(201,168,76,0.05);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 18px;
  width: 100%;
  font-size: 0.92rem;
  line-height: 1.8;
}
.summary-box .s-label { color: var(--white-dim); }
.summary-box .s-val { color: var(--gold-light); font-weight: 700; }

/* ===== SCREEN 4 — BOOK COVER ===== */
#screen4 {
  padding: 0;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, #0a0515 0%, #12082a 35%, #1a0a20 60%, #0d0a1a 100%);
  min-height: 100vh;
}

.cover-sky {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    #040210 0%, #0c0530 20%,
    #1a0835 45%, #2d1045 60%,
    #1a0828 80%, #080316 100%);
}

/* Comet streak */
.comet {
  position: absolute;
  top: 18%; left: 15%;
  width: 280px; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,220,150,0.9), rgba(255,255,255,1) 80%, rgba(200,180,255,0.4));
  transform: rotate(-28deg);
  box-shadow: 0 0 8px 2px rgba(255,220,150,0.5);
  border-radius: 2px;
}
.comet::after {
  content: '';
  position: absolute; right: -6px; top: -5px;
  width: 12px; height: 12px;
  background: radial-gradient(circle, #fff 20%, rgba(255,230,180,0.7) 60%, transparent 100%);
  border-radius: 50%;
}

/* Mountain silhouette */
.mountain {
  position: absolute;
  bottom: 140px; left: 0; right: 0;
}
.mountain svg { width: 100%; height: 220px; display: block; }

/* Characters */
.characters {
  position: absolute;
  bottom: 140px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 50px;
  align-items: flex-end;
}
.char-silhouette { width: 55px; height: 130px; position: relative; }
.char-female { /* three-leaf style */
  background: linear-gradient(180deg, #2d1a4a 0%, #1a0d30 100%);
  clip-path: polygon(35% 0%, 65% 0%, 75% 25%, 70% 35%, 80% 100%, 20% 100%, 30% 35%, 25% 25%);
  filter: drop-shadow(0 0 8px rgba(150,100,255,0.3));
}
.char-male { /* taki style */
  background: linear-gradient(180deg, #1a2a3a 0%, #0d1a24 100%);
  clip-path: polygon(38% 0%, 62% 0%, 72% 22%, 68% 32%, 78% 100%, 22% 100%, 32% 32%, 28% 22%);
  filter: drop-shadow(0 0 8px rgba(100,150,255,0.3));
}

/* Ground */
.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 140px;
  background: linear-gradient(180deg, #0a0518 0%, #050210 100%);
  border-top: 1px solid rgba(120,80,200,0.15);
}

/* Cover text */
.cover-content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  min-height: 100vh;
  padding: 70px 30px 40px;
  text-align: center;
}
.cover-title {
  font-size: 3.5rem; font-weight: 900;
  color: transparent;
  background: linear-gradient(180deg, #fff 0%, var(--gold-light) 50%, var(--gold) 100%);
  -webkit-background-clip: text; background-clip: text;
  text-shadow: none;
  letter-spacing: 0.18em;
  line-height: 1.1;
  filter: drop-shadow(0 2px 20px rgba(201,168,76,0.5));
}
.cover-subtitle {
  font-size: 1.05rem; color: rgba(200,190,230,0.8);
  letter-spacing: 0.3em; margin-top: 10px; margin-bottom: 0;
}
.cover-divider {
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 20px auto;
}
.cover-btn-wrap { margin-top: auto; padding-bottom: 20px; width: 100%; max-width: 300px; }
.btn-cover {
  background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
  border: 1.5px solid var(--gold);
  color: var(--gold-light);
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  width: 100%;
  padding: 16px 40px;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.3s;
  box-shadow: 0 0 20px rgba(201,168,76,0.1);
}
.btn-cover:hover {
  background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.15));
  box-shadow: 0 0 30px rgba(201,168,76,0.25);
  transform: translateY(-2px);
}

/* Stars on cover */
.cover-stars { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

/* ===== SCREEN 5 — ROLLING ===== */
.roll-header { font-size: 1rem; color: var(--white-dim); margin-bottom: 4px; }
.roll-big { font-size: 2rem; font-weight: 900; color: var(--gold-light); margin-bottom: 24px; }

.slider-wrap { width: 100%; margin-bottom: 20px; }
.slider-wrap input[type="range"] {
  width: 100%;
  accent-color: var(--gold);
  margin: 8px 0;
}
.slider-label { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--white-dim); }

.dice-animation-area {
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center;
  min-height: 80px;
  margin-bottom: 18px;
  width: 100%;
}

.die {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--navy3), var(--navy2));
  border: 2px solid var(--gold);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; font-weight: 900; color: var(--gold-light);
  position: relative;
  box-shadow: 0 2px 12px rgba(201,168,76,0.15);
}
.die.rolling {
  animation: dieRoll 0.5s ease-in-out;
  border-color: var(--gold-light);
}
.die.neg-die {
  border-color: var(--crimson-light);
  color: #ff8899;
  box-shadow: 0 2px 12px rgba(155,35,53,0.2);
}
@keyframes dieRoll {
  0%   { transform: rotateY(0deg) scale(1); }
  25%  { transform: rotateY(90deg) scale(1.1); }
  50%  { transform: rotateY(180deg) scale(0.9); }
  75%  { transform: rotateY(270deg) scale(1.1); }
  100% { transform: rotateY(360deg) scale(1); }
}

.result-display {
  background: rgba(201,168,76,0.07);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 12px;
  padding: 18px 20px;
  text-align: center;
  width: 100%;
  margin-bottom: 16px;
}
.result-raw { font-size: 0.88rem; color: var(--white-dim); margin-bottom: 4px; }
.result-num { font-size: 2.5rem; font-weight: 900; color: var(--gold-light); }
.result-adj { font-size: 0.88rem; color: #ff8899; margin-top: 4px; }
.result-final { font-size: 1.1rem; color: var(--gold); font-weight: 700; margin-top: 6px; }

.neg-section {
  background: rgba(155,35,53,0.08);
  border: 1px solid rgba(155,35,53,0.25);
  border-radius: 10px;
  padding: 14px 18px;
  width: 100%;
  margin-bottom: 14px;
}
.neg-section label { color: #ff8899; margin-bottom: 8px; }
.neg-section input[type="number"] { margin-bottom: 0; }

/* ===== SCREEN 6 — BOOK OPEN ===== */
#screen6 {
  padding: 0;
  align-items: stretch;
  min-height: 100vh;
  overflow: hidden;
}

.book-container {
  display: flex;
  width: 100%;
  max-width: 580px;
  min-height: 100vh;
  perspective: 1200px;
}

.book-wrapper {
  display: flex;
  width: 100%;
  transform-style: preserve-3d;
  position: relative;
}

/* Left page (character illustration) */
.book-left {
  flex: 0 0 42%;
  background: linear-gradient(160deg, #12082a 0%, #1a0a35 50%, #0d0518 100%);
  border-right: 2px solid rgba(201,168,76,0.2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 30px 16px;
  position: relative;
  overflow: hidden;
  animation: bookOpenLeft 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  transform-origin: right center;
}
@keyframes bookOpenLeft {
  from { transform: rotateY(-80deg); opacity: 0; }
  to   { transform: rotateY(0deg); opacity: 1; }
}

.char-art { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; }
.char-name { font-size: 0.85rem; color: var(--white-dim); text-align: center; letter-spacing: 0.2em; margin-top: 14px; }

/* Right page (story) */
.book-right {
  flex: 1;
  background: linear-gradient(160deg, #13100a 0%, #1c1710 50%, #0f0c08 100%);
  padding: 30px 22px;
  display: flex; flex-direction: column;
  overflow-y: auto;
  animation: bookOpenRight 0.8s 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
  transform-origin: left center;
}
@keyframes bookOpenRight {
  from { transform: rotateY(50deg); opacity: 0; }
  to   { transform: rotateY(0deg); opacity: 1; }
}

.story-num { font-size: 0.75rem; color: var(--white-dim); letter-spacing: 0.2em; margin-bottom: 6px; }
.story-title-display {
  font-size: 1.05rem; font-weight: 700;
  color: var(--gold-light);
  line-height: 1.4;
  margin-bottom: 14px;
  border-bottom: 1px solid rgba(201,168,76,0.18);
  padding-bottom: 10px;
}
.story-body {
  font-size: 0.82rem;
  line-height: 1.9;
  color: rgba(240,236,228,0.85);
  margin-bottom: 18px;
  flex: 1;
}

.choices-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.choice-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(201,168,76,0.18);
  border-radius: 7px;
  color: var(--white-dim);
  font-family: inherit; font-size: 0.8rem;
  padding: 9px 12px;
  text-align: left; cursor: pointer;
  transition: all 0.2s;
  line-height: 1.5;
  position: relative;
}
.choice-btn::before { content: '□ '; color: var(--gold); }
.choice-btn:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); color: var(--white); }
.choice-btn.chosen {
  background: rgba(201,168,76,0.12); border-color: var(--gold);
  color: var(--gold-light); font-weight: 600;
}
.choice-btn.chosen::before { content: '✓ '; color: var(--gold-light); }

.chosen-msg {
  font-size: 0.85rem; color: var(--gold-light); text-align: center;
  margin-bottom: 12px; line-height: 1.7;
  background: rgba(201,168,76,0.07);
  border-left: 3px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  display: none;
}
.chosen-msg.show { display: block; }

.btn-restart {
  background: transparent;
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
  font-family: inherit; font-size: 0.82rem;
  padding: 9px 18px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  align-self: center;
}
.btn-restart:hover { background: rgba(201,168,76,0.1); }

/* ===== CHARACTER SVG ILLUSTRATIONS ===== */
/* Mitsuha (stories 0-9): purple traditional */
.char-mitsuha { position: relative; width: 90px; height: 160px; }
/* Taki (stories 10-19): dark urban */
.char-taki { position: relative; width: 80px; height: 155px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 400px) {
  .cover-title { font-size: 2.6rem; }
  .book-left { flex: 0 0 35%; padding: 20px 10px; }
  .book-right { padding: 22px 14px; }
  .story-title-display { font-size: 0.95rem; }
  .story-body { font-size: 0.78rem; }
  .choice-btn { font-size: 0.75rem; }
}

/* Screen 3 — scrollable layout */
#screen3 {
  justify-content: flex-start;
  padding-top: 32px;
  min-height: 100vh;
}

/* ===== BATCH BUTTONS ===== */
.batch-row {
  display: flex; gap: 10px; margin-bottom: 14px; width: 100%;
}
.btn-batch {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1.5px solid;
  font-family: inherit; font-size: 0.85rem; font-weight: 700;
  cursor: pointer; transition: all 0.18s;
  letter-spacing: 0.05em;
}
.btn-batch-pos {
  background: rgba(201,168,76,0.1); border-color: var(--gold);
  color: var(--gold-light);
}
.btn-batch-pos:hover { background: rgba(201,168,76,0.22); }
.btn-batch-neg {
  background: rgba(155,35,53,0.1); border-color: var(--crimson-light);
  color: #ff8899;
}
.btn-batch-neg:hover { background: rgba(155,35,53,0.22); }

/* ===== REWARD OVERLAY ===== */
.reward-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(5,2,16,0.88);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.35s ease;
}
.reward-box {
  background: linear-gradient(145deg, #12082a 0%, #1e1040 100%);
  border: 1.5px solid var(--gold);
  border-radius: 22px;
  padding: 44px 38px 36px;
  text-align: center;
  max-width: 340px; width: 90%;
  box-shadow: 0 0 60px rgba(201,168,76,0.25), 0 0 120px rgba(100,60,200,0.1);
  animation: rewardPop 0.55s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}
@keyframes rewardPop {
  from { transform: scale(0.65); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.reward-spark { font-size: 2.2rem; margin-bottom: 6px; animation: sparkSpin 1s ease-out; }
@keyframes sparkSpin { from { transform: rotate(-180deg) scale(0); } to { transform: rotate(0deg) scale(1); } }
.reward-icon { font-size: 4rem; margin-bottom: 14px; }
.reward-name {
  font-size: 1.65rem; font-weight: 900; color: var(--gold-light);
  margin-bottom: 10px;
  text-shadow: 0 0 24px rgba(201,168,76,0.6);
  letter-spacing: 0.08em;
}
.reward-desc { font-size: 0.9rem; color: var(--white-dim); margin-bottom: 14px; line-height: 1.7; }
.reward-remain {
  font-size: 0.82rem; color: var(--gold); margin-bottom: 22px;
  padding: 6px 14px; border-radius: 20px;
  background: rgba(201,168,76,0.08); display: inline-block;
}

/* ===== MISC ===== */
.mt8 { margin-top: 8px; }
.mb0 { margin-bottom: 0; }
.text-center { text-align: center; }
.gold { color: var(--gold-light); }
.dim { color: var(--white-dim); }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Starfield -->
<div id="starfield"></div>

<div id="app">

  <!-- ===================== SCREEN 1: ID输入 ===================== -->
  <div id="screen1" class="screen active">
    <h1>你的名字</h1>
    <p class="subtitle">命运的骰子 · 故事之旅</p>
    <div class="card" style="margin-top:10px;">
      <label for="inputId">请输入你的论坛 ID</label>

      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    cs.appendChild(s);
  }
})();

// ===== NAVIGATION =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  // re-trigger animation
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = '';
}

// ===== SCREEN 1 → 2 =====
function goScreen2() {
  const id = document.getElementById('inputId').value.trim();
  if (!id) { alert('请输入你的论坛 ID'); return; }
  state.id = id;
  document.getElementById('welcomeMsg').textContent = '欢迎，' + id;
  updateCalc();
  showScreen('screen2');
}

// ===== LIVE CALC =====
function updateCalc() {
  const r = parseInt(document.getElementById('inputReplies').value) || 0;
  const c = parseInt(document.getElementById('inputCitations').value) || 0;
  const pos = Math.floor(r / 5);
  const mix = c;
  document.getElementById('calcPosDice').textContent = pos + ' 个';
  document.getElementById('calcNegDice').textContent = mix + ' 个';
}

// ===== SCREEN 2 → 3 =====
function goScreen3() {
  const replies = parseInt(document.getElementById('inputReplies').value) || 0;
  const citations = parseInt(document.getElementById('inputCitations').value) || 0;
  const pos_dice = Math.floor(replies / 5);
  const neg_dice = citations;

  if (pos_dice < 1) { alert('你至少需要 5 个回复（1个骰子）才能出发！'); return; }

  state.replies = replies;
  state.citations = citations;
  state.pos_dice = pos_dice;
  state.neg_dice = neg_dice;
  state.mixAssignments = new Array(neg_dice).fill(null);

  // Build screen 3
  document.getElementById('s3PosDice').textContent = pos_dice;
  document.getElementById('s3SumPos').textContent = pos_dice + ' 个';

  const mixSec = document.getElementById('mixDiceSection');
  const mixRows = document.getElementById('mixDiceRows');
  mixRows.innerHTML = '';

  if (neg_dice > 0) {
    mixSec.classList.remove('hidden');
    document.getElementById('s3NegCount').textContent = neg_dice;
    for (let i = 0; i < neg_dice; i++) {
      const row = document.createElement('div');
      row.className = 'mix-die-row';
      row.innerHTML = `
        <span class="mix-die-label">混合骰子 #${i+1}</span>
        <div class="mix-die-btns">
          <button class="die-toggle pos" id="tp${i}" onclick="assignDie(${i},'pos')">+4 进攻</button>
          <button class="die-toggle neg" id="tn${i}" onclick="assignDie(${i},'neg')">−4 防御</button>
        </div>
      `;
      mixRows.appendChild(row);
    }
  } else {
    mixSec.classList.add('hidden');
  }

  updateS3Summary();
  showScreen('screen3');

  // If no mix dice, allow proceed immediately
  if (neg_dice === 0) {
    document.getElementById('btnGoS4').disabled = false;
    document.getElementById('btnGoS4').style.opacity = '1';
  }
}

function assignDie(idx, type) {
  state.mixAssignments[idx] = type;
  // Update button states
  const tp = document.getElementById('tp' + idx);
  const tn = document.getElementById('tn' + idx);
  tp.classList.toggle('selected', type === 'pos');
  tn.classList.toggle('selected', type === 'neg');
  updateS3Summary();
}

function updateS3Summary() {
  const plus = state.mixAssignments.filter(x => x === 'pos').length;
  const minus = state.mixAssignments.filter(x => x === 'neg').length;
  document.getElementById('s3SumPlus').textContent = plus + ' 个';
  document.getElementById('s3SumMinus').textContent = minus + ' 个';

  const allAssigned = state.neg_dice === 0 || state.mixAssignments.every(x => x !== null);
  const btn = document.getElementById('btnGoS4');
  btn.disabled = !allAssigned;
  btn.style.opacity = allAssigned ? '1' : '0.5';

  state.plus_dice = plus;
  state.minus_dice = minus;
}

function batchAssign(type) {
  for (let i = 0; i < state.neg_dice; i++) {
    assignDie(i, type);
  }
}

// ===== SCREEN 3 → 4 =====
function goScreen4() {
  showScreen('screen4');
}

// ===== SCREEN 4 → 5 =====
function goScreen5() {
  document.getElementById('s5TotalDice').textContent = state.pos_dice;
  const slider = document.getElementById('s5Slider');
  slider.max = state.pos_dice;
  slider.value = Math.min(1, state.pos_dice);
  document.getElementById('s5SliderMax').textContent = state.pos_dice;
  document.getElementById('s5SliderVal').textContent = slider.value;

  // Reset
  document.getElementById('s5DiceArea').innerHTML = '';
  document.getElementById('s5ResultBox').classList.add('hidden');
  document.getElementById('s5NegSection').classList.add('hidden');
  document.getElementById('s5NextBtn').classList.add('hidden');
  document.getElementById('s5RollBtn').disabled = false;

  if (state.minus_dice > 0) {
    document.getElementById('s5NegAvail').textContent = state.minus_dice;
  }

  showScreen('screen5');
}

function s5UpdateSlider() {
  const val = document.getElementById('s5Slider').value;
  document.getElementById('s5SliderVal').textContent = val;
}

function s5UpdateNeg() {
  const used = parseInt(document.getElementById('s5NegUse').value) || 0;
  const clamped = Math.max(0, Math.min(state.minus_dice, used));
  document.getElementById('s5NegUse').value = clamped;
  state.neg_used = clamped;
  const adj = state.raw_result - clamped * 4;
  document.getElementById('s5ResultAdj').textContent = `减去 ${clamped} × 4 = −${clamped*4}`;
  document.getElementById('s5ResultAdj').style.display = clamped > 0 ? 'block' : 'none';
  document.getElementById('s5ResultFinal').textContent = `最终结果：${adj}`;
  document.getElementById('s5ResultFinal').style.display = 'block';
  state.final_result = adj;
}

// ===== ROLL DICE =====
async function rollDice() {
  const rolled = parseInt(document.getElementById('s5Slider').value);
  state.rolled = rolled;
  document.getElementById('s5RollBtn').disabled = true;

  const area = document.getElementById('s5DiceArea');
  area.innerHTML = '';

  // Create die elements
  const dieEls = [];
  for (let i = 0; i < rolled; i++) {
    const d = document.createElement('div');
    d.className = 'die rolling';
    d.textContent = '?';
    area.appendChild(d);
    dieEls.push(d);
  }

  // Animate: spin showing random numbers for 600ms then settle
  const spinDuration = 600; // ms per die staggered
  const results = [];

  for (let i = 0; i < rolled; i++) {
    await new Promise(resolve => {
      const d = dieEls[i];
      const result = Math.floor(Math.random() * 4) + 1;
      results.push(result);
      let elapsed = 0;
      const interval = setInterval(() => {
        d.textContent = Math.floor(Math.random() * 4) + 1;
        elapsed += 80;
        if (elapsed >= spinDuration) {
          clearInterval(interval);
          d.textContent = result;
          d.classList.remove('rolling');
          resolve();
        }
      }, 80);
    });
    // Brief pause between dice
    await new Promise(r => setTimeout(r, 100));
  }

  state.diceResults = results;
  state.raw_result = results.reduce((a, b) => a + b, 0);
  state.neg_used = 0;
  state.final_result = state.raw_result;

  // Show result
  const rb = document.getElementById('s5ResultBox');
  rb.classList.remove('hidden');
  document.getElementById('s5ResultRaw').textContent =
    results.join(' + ') + (results.length > 1 ? ` = ${state.raw_result}` : '');
  document.getElementById('s5ResultNum').textContent = state.raw_result;
  document.getElementById('s5ResultAdj').style.display = 'none';
  document.getElementById('s5ResultFinal').style.display = 'none';

  // Show neg section if applicable
  if (state.minus_dice > 0) {
    document.getElementById('s5NegSection').classList.remove('hidden');
    document.getElementById('s5NegUse').value = 0;
    document.getElementById('s5NegAvail').textContent = state.minus_dice;
  }

  document.getElementById('s5NextBtn').classList.remove('hidden');
}

// ===== SCREEN 5 → 6 =====
function goScreen6() {
  // Read neg used
  const negUsedEl = document.getElementById('s5NegUse');
  if (state.minus_dice > 0 && negUsedEl) {
    state.neg_used = parseInt(negUsedEl.value) || 0;
    state.final_result = state.raw_result - state.neg_used * 4;
  }

  // Compute story index
  const diceRolled = state.rolled;
  const finalResult = state.final_result;
  let idx = Math.floor(((finalResult - diceRolled) / (diceRolled * 3)) * 20);
  idx = Math.max(0, Math.min(19, idx));
  state.story_index = idx;

  const story = STORIES[idx];

  // Determine character (0-9 Mitsuha, 10-19 Taki)
  const isMitsuha = idx < 10;

  // Left page character
  const charArt = document.getElementById('charArtContainer');
  charArt.innerHTML = isMitsuha ? getMitsuhaArt() : getTakiArt();
  document.getElementById('charName').textContent = isMitsuha ? '宫水三叶' : '立花泷';

  // Book left background tint
  const bookLeft = document.getElementById('bookLeft');
  if (isMitsuha) {
    bookLeft.style.background = 'linear-gradient(160deg, #120826 0%, #1e0d3a 50%, #0d0518 100%)';
  } else {
    bookLeft.style.background = 'linear-gradient(160deg, #080e1c 0%, #0d1a2e 50%, #060a14 100%)';
  }

  // Right page story
  document.getElementById('storyNum').textContent = `故事 #${idx + 1}`;
  document.getElementById('storyTitleDisplay').textContent = story.title;
  document.getElementById('storyBodyDisplay').textContent = story.body;

  // Choices (max 4)
  const choicesList = document.getElementById('choicesList');
  choicesList.innerHTML = '';
  const choices = story.choices.slice(0, 4);
  choices.forEach((c, ci) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => selectChoice(ci, c, btn);
    choicesList.appendChild(btn);
  });

  document.getElementById('chosenMsg').classList.remove('show');
  state.chosen = null;

  showScreen('screen6');

  // Post to GAS
  postToGAS(story.title);
}

function selectChoice(idx, text, btn) {
  if (state.chosen !== null) return;
  state.chosen = text;
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('chosen'));
  btn.classList.add('chosen');

  // 显示对应选项的结果描述
  const story = STORIES[state.story_index];
  const desc = (story.choice_descs && story.choice_descs[idx]) || '✓ 你的选择已记录';
  const chosenMsg = document.getElementById('chosenMsg');
  chosenMsg.textContent = '📖 ' + desc;
  chosenMsg.classList.add('show');

  postToGAS(story.title, text, desc);
  // 延迟 1500ms 让玩家读完描述后弹出奖励
  setTimeout(showReward, 1500);
}

function showReward() {
  const r = REWARDS[Math.floor(Math.random() * REWARDS.length)];
  const remaining = state.pos_dice - state.rolled;
  document.getElementById('rewardIcon').textContent = r.icon;
  document.getElementById('rewardName').textContent = r.name;
  document.getElementById('rewardDesc').textContent = r.desc;
  document.getElementById('rewardRemain').textContent =
    remaining > 0
      ? `还剩 ${remaining} 个骰子，可继续投掷！`
      : '骰子已全部使用，本轮游戏结束。';
  // re-trigger spark animation
  const spark = document.getElementById('rewardSpark');
  spark.style.animation = 'none';
  spark.offsetHeight;
  spark.style.animation = '';
  document.getElementById('rewardOverlay').classList.remove('hidden');
}

function claimReward() {
  document.getElementById('rewardOverlay').classList.add('hidden');
  // 扣除本次已使用的骰子
  state.pos_dice -= state.rolled;
  state.rolled = 0;
  state.diceResults = [];
  state.raw_result = 0;
  state.neg_used = 0;
  state.final_result = 0;
  state.chosen = null;

  if (state.pos_dice < 1) {
    // 骰子用完，重新开始
    alert('所有骰子已用完，感谢参与！');
    restart();
    return;
  }
  // 返回投骰画面
  goScreen5();
}

// ===== POST TO GAS =====
function postToGAS(storyTitle, choice, choiceDesc) {
  if (!GAS_URL) return;
  const payload = {
    id: state.id,
    replies: state.replies,
    citations: state.citations,
    pos_dice: state.pos_dice,
    neg_dice: state.neg_dice,
    rolled: state.rolled,
    raw_result: state.raw_result,
    neg_used: state.neg_used,
    final_result: state.final_result,
    story_num: state.story_index + 1,
    story_title: storyTitle,
    choice: choice || '',
    choice_desc: choiceDesc || ''
  };
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(() => {});
}

// ===== RESTART =====
function restart() {
  // Reset state
  state = {
    id: '', replies: 0, citations: 0,
    pos_dice: 0, neg_dice: 0,
    mixAssignments: [], plus_dice: 0, minus_dice: 0,
    rolled: 0, diceResults: [], raw_result: 0,
    neg_used: 0, final_result: 0, story_index: 0, chosen: null
  };
  document.getElementById('inputId').value = '';
  document.getElementById('inputReplies').value = '';
  document.getElementById('inputCitations').value = '';
  showScreen('screen1');
}
