  await apiJsonp("add_record",{user_id:G.uid,date:t.date,time:t.time,reward:String(s.reward),result:result||"",floor:String(s.floor),_ts:String(Date.now())});
}

async function startNew(){
  if(G.busy) return;
  if(!G.uid) return;
  if(!gasUrl()) return setNotice("未提供 record=GAS_URL，无法开始。");
  const ok=!G.state || confirm("开始新冒险将覆盖当前云端续档，是否继续？");
  if(!ok) return;
  setBusy(true,"正在创建游戏…");
  try{
    G.state=newState(G.uid);
    await saveStateCloud("start_new");
    show("menuCard",false); show("recordCard",false); show("gameCard",true);
    sys("你踏入地下城。黑暗里，也许藏着等待被帮助的故事。",SYS_AVATARS[1]);
    purgeStage1LonglineMonsterTalks_(G.state);
    ensureQuestFollowupEvents_(G.state);
    renderMap(); renderHUD();
  }catch(e){
    setNotice("云端写入失败：无法开始新冒险。");
  }finally{ setBusy(false); }
}

async function resumeRun(){
  if(G.busy) return;
  if(!G.uid) return;
  if(!gasUrl()) return setNotice("未提供 record=GAS_URL，无法继续。");
  // 如果进入过云端确认且 state 已在内存中，无需再等一次拉取
  if(G.state){
    setBusy(true,"正在读取中…");
    await new Promise(r=>setTimeout(r,400));
    setBusy(false);
    show("menuCard",false); show("recordCard",false); show("gameCard",true);
    setNotice("云端进度已就绪，可继续冒险。");
    sys("已就绪：继续你的地下城旅程。",SYS_AVATARS[0]);
    renderMap(); renderHUD();
    return;
  }
  setBusy(true,"正在读取中…");
  try{
    const res=await apiJsonp("load_state",{user_id:G.uid});
    if(!res.data || !res.data.state){
      setNotice("云端暂无进度，已转为开始新冒险。");
      setBusy(false);
      return startNew();
    }
    G.state=normalizeState(res.data.state);
    show("menuCard",false); show("recordCard",false); show("gameCard",true);
    sys("已从云端恢复进度。愿你在黑暗里仍看见温柔。",SYS_AVATARS[0]);
    renderMap(); renderHUD();
  }catch(e){
    setNotice("云端抓取失败：继续冒险失败，请稍后重试。");
  }finally{ setBusy(false); }
}

function touchTileEvent(){
  const s=G.state,m=s.map,k=key(s.player.x,s.player.y),ev=m.events[k];
  if(ev && !ev.done){
    if(ev.type==="chest"){
      stripStaleChestQuestKey_(s,ev);
      maybeAutoBindChestQuestKey_(s,ev);
    }else if(ev.type==="rescue"){
      stripStaleRescueQuestKey_(s,ev);
    }
    s.pending=ev; s.lastEventKey=k;
  }
}

async function move(dx,dy){
  const s=G.state;
  if(!s||G.busy||G.actionBusy) return;
  // 容错：有时事件已结算但 pending 未及时清空（例如史莱姆报恩类结算），避免卡住无法移动
  if(s.pending){
    try{
      const lastKey= s.lastEventKey || key(s.player.x,s.player.y);
      const ev= (s.map && s.map.events && lastKey) ? s.map.events[lastKey] : null;
      // 仅当“pending 对应到同一类事件格”且该格已 done 时，才允许自动清空
      // 否则会误把“由 talk_monster 进入战斗 pending（monster）”清掉，从而闪掉战斗环节
      const sameType = !!(ev && ev.type===s.pending.type);
      if(s.pending.done || (sameType && !!ev.done)){
        s.pending=null;
        s.lastEventKey="";
        renderHUD();
      }
    }catch(e){}
  }
  if(s.pending) return sys("当前事件未处理，先完成事件再移动。",SYS_AVATARS[2]);
  if(G.moveSaving){
    sysTransient("系统正在保存云端，请稍候…",SYS_AVATARS[2],1400);
    return;
  }

  const nx=s.player.x+dx, ny=s.player.y+dy, m=s.map;
  if(nx<0||ny<0||nx>=m.w||ny>=m.h) return;

  if(m.tiles[ny][nx]===1){
    // 玩家已“试图前进”时，才标记这格为已知墙壁，避免反复撞墙。
    if(m.learnedWalls) m.learnedWalls[key(nx,ny)]=1;
    if(m.revealed) m.revealed[key(nx,ny)]=1;
    renderMap(); renderHUD();
    sysTransient("前方是墙壁，无法继续移动。",SYS_AVATARS[2],1400);
    return;
  }

  s.player.x=nx; s.player.y=ny; m.revealed[key(nx,ny)]=1; touchTileEvent();
  // 玩家移动后清掉事件描述，避免奖励/台词残留
  try{
    const el=document.getElementById("sysMsg");
    if(el) el.textContent="";
  }catch(e){}
  if(maybeAutoMonsterCharmBypass_(s)){
    if(!G.offlineMode){
      if(G.moveSaveTimer){ try{ clearTimeout(G.moveSaveTimer); }catch(e){} }
      G.moveSaveTimer=setTimeout(()=>{
        if(G.offlineMode||G.busy||G.actionBusy||!G.state) return;
        const nowTs=Date.now();
        if(nowTs - G.lastMoveSaveAt < 900) return;
        G.lastMoveSaveAt=nowTs;
        if(G.moveSaving) return;
        G.moveSaving=true;
        saveStateCloud("move_auto", false)
          .catch(()=>sysTransient("云端保存失败：本次移动可能未被确认。",SYS_AVATARS[2],1800))
          .finally(()=>{G.moveSaving=false;});
      }, 1200);
    }
    return;
  }
  renderMap(); renderHUD();

  // 走到楼梯格：询问是否下楼
  if(nx===m.stairs.x && ny===m.stairs.y && !s.pending){
    const ok=confirm("你已经踩到了下楼的楼梯。是否下楼？");
    if(ok){
      if(G.moveSaveTimer){ try{ clearTimeout(G.moveSaveTimer); }catch(e){} }
      G.moveSaveTimer=null;
      goDown();
    }
    return;
  }

  // 同一楼层移动不频繁云存档：做“延迟合并”
  if(!G.offlineMode){
    if(G.moveSaveTimer){ try{ clearTimeout(G.moveSaveTimer); }catch(e){} }
    G.moveSaveTimer=setTimeout(()=>{
      if(G.offlineMode||G.busy||G.actionBusy||!G.state) return;
      const nowTs=Date.now();
      if(nowTs - G.lastMoveSaveAt < 900) return; // 额外节流
      G.lastMoveSaveAt=nowTs;
      if(G.moveSaving) return;
      G.moveSaving=true;
      saveStateCloud("move_auto", false)
        .catch(()=>sysTransient("云端保存失败：本次移动可能未被确认。",SYS_AVATARS[2],1800))
        .finally(()=>{G.moveSaving=false;});
    }, 1200);
  }
}

async function resolveEvent(){
  const s=G.state,p=s&&s.pending;
  if(!p||G.busy) return;
  if(G.actionBusy) return;
  if(G.moveSaving){
    sysTransient("系统正在保存云端，请稍后再处理事件。",SYS_AVATARS[2],1600);
    return;
  }

  G.actionBusy=true;
  try{
    if(p.type==="chest"){
      stripStaleChestQuestKey_(s,p);
      maybeAutoBindChestQuestKey_(s,p);
    }else if(p.type==="rescue"){
      stripStaleRescueQuestKey_(s,p);
    }
    // 救助可拒绝：拒绝后不消耗点数，并提高“战斗怪物”遭遇，且不再刷同类型救助链
    if(p.type==="rescue" && G.rescuePick==="refuse"){
      G.rescuePick=null;
      if(!s.story.floorContext) s.story.floorContext={rescueEncountered:0,rescueRefused:0,talkHelpAccepted:0,talkHelpDeclined:0};
      s.story.floorContext.rescueEncountered=(Number(s.story.floorContext.rescueEncountered||0)+1);
      if(s.story && s.story.floorContext) s.story.floorContext.rescueRefused=(Number(s.story.floorContext.rescueRefused||0)+1);
      // 清空输入，避免玩家误把点数加进待用
      const addREl=document.getElementById("addR"); if(addREl) addREl.value="0";
      const addQEl=document.getElementById("addQ"); if(addQEl) addQEl.value="0";

      // 取消当前楼层中该 questKey 的未完成救助格（确保“下次不再遭遇同样救助”）
      if(s.map && s.map.events){
        const qk=p.questKey||"";
        for(const k in s.map.events){
          const ev=s.map.events[k];
          if(ev && !ev.done && ev.type==="rescue" && (ev.questKey||"")===qk){
            delete s.map.events[k];
          }
        }
      }

      // 如果这是长线所需救助，则断开该支线，避免后续再出现同类型救助
      if(p.questKey==="letter" && s.story && s.story.quest && s.story.quest.letter){
        const q=s.story.quest.letter;
        q.stage=0; q.done=false; q.combatBlocked=true;
        q.hasLetter=false; q.delivered=false;
      }
      if(p.questKey && /^human_t\d+$/.test(String(p.questKey||""))){
        cancelHumanLongQuest_(s,p.questKey);
      }

      // 提高战斗倾向：减少救助、增加“必须战斗”的怪物遭遇
      s.eventBias.conflict=(s.eventBias.conflict||0)+2;
      s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
      // 下一层起暂不再生成救助类事件
      if(s.story){
        s.story.rescueSkipUntilFloor=Math.max(Number(s.story.rescueSkipUntilFloor||0), Number(s.floor||1)+1);
      }

      p.done=true; s.pending=null;
      sys("你选择放弃救助。下一次更可能遭遇需要战斗的怪物。",SYS_AVATARS[2]);
      renderMap(); renderHUD();
      popStoryNote(s);

      if(!G.offlineMode){
        try{ await saveStateCloud("rescue_refused", false); }catch(e){}
      }
      return;
    }

    // 宝箱可选择不开：不消耗点数、不标记 done，关闭面板后下次再来还能继续选
    if(p.type==="chest" && G.chestPick==="skip"){
      G.chestPick=null;
      G.rescuePick=null;
      s.pending=null;
      const txt="你暂时放过了宝箱。下次经过时仍可选择开启。";
      sysTransient(txt,SYS_AVATARS[0],1600);
      renderMap(); renderHUD();
      return;
    }

    // 怪物可逃跑：成功则直接结束这格（不结算奖励）；失败则玩家生命 -1
    if(p.type==="monster" && G.monsterPick==="escape"){
      G.monsterPick=null;
      if(p.boss){
        sysTransient("这是 BOSS，无法逃跑！",SYS_AVATARS[2],1600);
        renderMap(); renderHUD();
        return;
      }
      const charmOk=!!(s.story&&s.story.monsterCharmOwned);
      const success=charmOk?true:(Math.random()<0.45); // 护符：非BOSS 逃跑必成
      if(success){
        p.done=true; p.resolvedKind="escape"; s.pending=null;
        sysTransient("你成功逃离了这场遭遇。",SYS_AVATARS[1],1600);
        renderMap(); renderHUD();
        if(!G.offlineMode){
          try{ await saveStateCloud("escape_success", false); }catch(e){}
        }
      }else{
        s.hp=Number(s.hp||0)-1;
        sysTransient("你没能逃开，失去 1 点生命。",SYS_AVATARS[2],1600);
        renderMap(); renderHUD();
        if(s.hp<=0){ await onDeath(); return; }
        // 逃跑失败：事件仍需继续处理（本分支已 return，不依赖 shouldSave）
      }
      popStoryNote(s);
      // 离线模式不写云端；已结束的逃跑成功仍会写入（上面已写）
      return;
    }

    const addR=Math.max(0,parseInt(document.getElementById("addR").value||"0",10));
    const addQ=Math.max(0,parseInt(document.getElementById("addQ").value||"0",10));
    // 钥匙打开宝箱：不消耗点数，也不把玩家输入计入待用
    const usingChestKey=(p.type==="chest" && G.chestPick==="key");
    if(!usingChestKey){
      s.stockReply=(s.stockReply||0)+addR;
      s.stockQuote=(s.stockQuote||0)+addQ;
    }
    document.getElementById("addR").value="0";
    document.getElementById("addQ").value="0";

    const pts=s.stockReply+s.stockQuote*5;
    let shouldSave=true;

    if(p.type==="chest"){
      // 钥匙打开宝箱：绕过点数消耗与扣除逻辑
      if(G.chestPick==="key"){
        const keys=Number(s.story&&s.story.rescueKeyCount||0);
        if(keys<=0){
          G.chestPick=null;
          s.pending=null;
          renderHUD();
          return sys("你没有钥匙，无法直接打开宝箱。已离开事件格，可移动后再来。",SYS_AVATARS[2]);
        }
        G.chestPick=null;
        p.done=true; s.pending=null;
        s.reward+=(p.reward||1);
        s.story.chestOpen=(s.story.chestOpen||0)+1;
        s.story.rescueKeyCount=keys-1;
        tryAdvanceQuests(s,{type:"chest_done",eventQuest:p.questKey||""});
        const loot=grantDungeonLootInstances_(s,1);
        let keyNarr="";
        if(p.questKey && LONGLINE_MONSTER_MAP[p.questKey]) keyNarr=" "+(LONGLINE_MONSTER_MAP[p.questKey].storyMidChest||"");
        else if(p.questKey && HUMAN_LONGLINE_MAP[p.questKey]) keyNarr=" "+(HUMAN_LONGLINE_MAP[p.questKey].storyMidChest||"");
        sys(
          "宝箱开启（钥匙）！积分 +" + (p.reward||1) +
          "，战利品：随机获得 " + lootKindLabelDungeon_(loot.primaryKind) + "。" +
          (keyNarr?keyNarr:"") +
          "扣除待用：回复 0；被引用 0。",
          SYS_AVATARS[1]
        );
        renderMap(); renderHUD();
        const chestTaleK=buildChestLineQuestStory_(p.questKey);
        if(chestTaleK){
          await showChapterCard("支线宝箱 · "+achievementTitle_(p.questKey), chestTaleK);
        }
      }else{
      if(pts<p.need) {
        G.chestPick=null;
        s.pending=null;
        sys("点数不足，宝箱未开。已先离开事件格；凑够待用后可再踩上来开启，或下次选「不开宝箱」离开。",SYS_AVATARS[1]);
        renderMap(); renderHUD();
        return;
      }
      const before=consumePts(s,p.need);
      const usedR=before.usedR||0;
      const usedQ=before.usedQ||0;
      p.done=true; s.pending=null;
      s.reward+=(p.reward||1);
      s.story.chestOpen=(s.story.chestOpen||0)+1;
      tryAdvanceQuests(s,{type:"chest_done",eventQuest:p.questKey||""});
      const loot=grantDungeonLootInstances_(s,1);
      let questNarr="";
      if(p.questKey==="herb"){
        questNarr="你找到灰狼所需的药草，并把它带在身上。";
      }else if(p.questKey==="lamp"){
        questNarr="你真的找到了灯，并顺手把它点亮了。";
      }else if(p.questKey && LONGLINE_MONSTER_MAP[p.questKey]){
        const d=LONGLINE_MONSTER_MAP[p.questKey];
        questNarr=d.storyMidChest||"";
      }else if(p.questKey && HUMAN_LONGLINE_MAP[p.questKey]){
        const d=HUMAN_LONGLINE_MAP[p.questKey];
        questNarr=d.storyMidChest||"";
      }
      sys(
        "宝箱开启！积分 +" + (p.reward||1) +
        "，战利品：随机获得 " + lootKindLabelDungeon_(loot.primaryKind) + "。" +
        (questNarr?(" " + questNarr):"") +
        "扣除待用：回复 " + usedR + "；被引用 " + usedQ + "。",
        SYS_AVATARS[1]
      );
      renderMap(); renderHUD();
      const chestTaleP=buildChestLineQuestStory_(p.questKey);
      if(chestTaleP){
        await showChapterCard("支线宝箱 · "+achievementTitle_(p.questKey), chestTaleP);
      }
      }
    }else if(p.type==="rescue"){
      if(pts<p.need) {
        G.rescuePick=null;
        s.pending=null;
        sys(
          "救助点数不足（需要 "+p.need+"）。已先离开该事件格，你可移动探索；请先在「新增回复/被引用」输入数字加入「待用」后再来踩格，或点「不救助」放弃该次际遇。",
          SYS_AVATARS[1]
        );
        renderMap(); renderHUD();
        return;
      }
      if(!s.story.floorContext) s.story.floorContext={rescueEncountered:0,rescueRefused:0,talkHelpAccepted:0,talkHelpDeclined:0};
      s.story.floorContext.rescueEncountered=(Number(s.story.floorContext.rescueEncountered||0)+1);
      const before=consumePts(s,p.need);
      const usedR=before.usedR||0;
      const usedQ=before.usedQ||0;
      p.done=true; s.pending=null;
      s.reward+=p.reward; s.hp=Math.min(s.maxHp,s.hp+1);
      s.story.kindness=(s.story.kindness||0)+1;
      s.story.rescueDone=(s.story.rescueDone||0)+1;
      tryAdvanceQuests(s,{type:"rescue_done",eventQuest:p.questKey||""});
      if(p.questKey) purgeUnfinishedRescuesByQuestKey_(s,p.questKey);
      // 特别感谢：不限定同类型/同个人/是否连续，只看“累计完成救助次数”
      // 每累计到第 10/20/30... 次救助，会得到一把钥匙，并显示特别感谢剧情/系统提醒
      const totalRescueKeyCountKey="all";
      if(!s.story.rescueHelpCounts) s.story.rescueHelpCounts={};
      s.story.rescueHelpCounts[totalRescueKeyCountKey]=Number(s.story.rescueHelpCounts[totalRescueKeyCountKey]||0)+1;
      const afterRescueCnt=Number(s.story.rescueHelpCounts[totalRescueKeyCountKey]||0);
      const prevCnt=afterRescueCnt-1;
      // 按里程碑 10/20/30… 次发放钥匙，不依赖存盘的 rescueKeyNextAt（避免错位导致“特别感谢却不加钥匙”）
      const keysAdded=Math.floor(afterRescueCnt/10)-Math.floor(prevCnt/10);
      if(keysAdded>0){
        s.story.rescueKeyCount=Number(s.story.rescueKeyCount||0)+keysAdded;
      }
      s.story.rescueKeyNextAt=nextKeyThresholdAfterCount(afterRescueCnt);
      if(keysAdded>0){
        p.gratitude=true;
        showAcquireNotify_("获得道具",[
          "钥匙 +"+keysAdded,
          "背包累计：钥匙 ×"+s.story.rescueKeyCount
        ]);
      }
      const nLoot=Math.min(3, Math.max(1, Math.floor((p.reward||0)/25)+1));
      grantDungeonLootInstances_(s,nLoot);
      let questNarr="";
      if(p.questKey==="letter"){
        questNarr="你把信交给了收信人。那道心结终于松动。";
      }
      const keyNarr=keysAdded>0?" 并获得钥匙：可直接打开宝箱（详见背包）。":"";
      sys(
        "你成功救助了对方，收获了真诚感谢。积分 +"+p.reward+"，生命 +1。战利品已自动计入面板。" +
        (questNarr?(" " + questNarr):"") +
        keyNarr +
        "扣除待用：回复 " + usedR + "；被引用 " + usedQ + "。",
        SYS_AVATARS[1]
      );
      renderMap(); renderHUD();
    }else if(p.type==="monster"){
      const availablePts=pts;
      const needPts=p.hp;
      if(needPts<=0) { s.pending=null; }
      if(availablePts<=0){
        const remain=needPts;
        const needQ=Math.ceil(remain/5);
        renderHUD();
        return sys("你目前没有可消耗的回复/被引用。要打赢至少需要：回复 "+remain+" 或被引用 "+needQ+"。",SYS_AVATARS[2]);
      }
      const usePts=Math.min(availablePts, needPts);
      const before=consumePts(s,usePts);
      const usedR=before.usedR||0;
      const usedQ=before.usedQ||0;
      p.hp-=usePts;
      if(p.hp>0){
        s.pending=p;
        const remain=p.hp;
        const needQ=Math.ceil(remain/5);
        sys(
          "你消耗共造成 "+usePts+" 点伤害（扣除待用：回复 "+usedR+"；被引用 "+usedQ+"）。" +
          "怪物HP还剩 "+remain+"。要打赢至少需要：回复 "+remain+" 或被引用 "+needQ+"。",
          SYS_AVATARS[2]
        );
        renderMap(); renderHUD();
        shouldSave=false; // 战斗未结束：减少云端写入频率
      }else{
        p.done=true; s.pending=null;
        // 实际“对战胜利”+1，用于下一层 BOSS 概率加成
        if(s.story && s.story.floorContext){
          s.story.floorContext.monsterBattleCount=Number(s.story.floorContext.monsterBattleCount||0)+1;
        }
        s.reward+=p.reward;
        const nLoot=Math.min(4, Math.max(1, Math.floor((p.reward||0)/60)+1));
        grantDungeonLootInstances_(s,nLoot);
        sys(
          "怪物被击退，积分 +"+p.reward+"。（本次扣除待用：回复 "+usedR+"；被引用 "+usedQ+"）战利品已自动计入面板。",
          SYS_AVATARS[1]
        );
        renderMap(); renderHUD();
      }
    }else if(p.type==="talk_monster"){
      let v;
      if(G.talkPick!==null && G.talkPick!==undefined) v=Number(G.talkPick);
      else v=parseInt(document.getElementById("talkSel").value||"-1",10);
      G.talkPick=null;
      if(v<0 || !p.outcomes || !p.outcomes[v]) return sys("请先选择一个沟通选项。",SYS_AVATARS[2]);
      const oc=p.outcomes[v]||"combat";
      // 对话型事件通常不需要频繁写云端，避免玩家点完后“事件还在处理”的体感卡住
      if(oc==="peace" || oc==="conflict") shouldSave=false;

      if(!s.story.floorContext) s.story.floorContext={rescueEncountered:0,rescueRefused:0,talkHelpAccepted:0,talkHelpDeclined:0};
      if(oc==="peace") s.story.floorContext.talkHelpAccepted=(Number(s.story.floorContext.talkHelpAccepted||0)+1);
      else s.story.floorContext.talkHelpDeclined=(Number(s.story.floorContext.talkHelpDeclined||0)+1);

      if(oc==="peace"){
        p.done=true; p.resolvedKind="peace"; s.pending=null; s.reward+=p.reward;
        s.eventBias.peace=(s.eventBias.peace||0)+1;
        s.eventBias.conflict=Math.max(0,(s.eventBias.conflict||0)-1);
        s.story.kindness=(s.story.kindness||0)+1;
        s.story.peaceTalks=(s.story.peaceTalks||0)+1;
        const questBefore={
          herb:!!(s.story.quest&&s.story.quest.herb&&s.story.quest.herb.done),
          lamp:!!(s.story.quest&&s.story.quest.lamp&&s.story.quest.lamp.done),
          letter:!!(s.story.quest&&s.story.quest.letter&&s.story.quest.letter.done)
        };
        const rewardBefore=s.reward;
        tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"peace"});
        const rewardDelta=s.reward-rewardBefore;
        let repayBonus=0;
        // 史莱姆无长线支线：你和平帮忙累计到阈值后，下次遇到会触发报恩奖励
        if(p.monsterId==="slime" && s.story){
          const story=s.story;
          const hadPending=!!story.slimeRepayPending;
          if(hadPending){
            repayBonus=Math.max(10, Math.floor(p.reward*0.6));
            story.slimeRepayPending=false;
            story.slimeRepayNextAt=Number(story.slimeRepayNextAt||10)+10;
            s.reward+=repayBonus;
          }
          story.slimeHelpCount=Number(story.slimeHelpCount||0)+1;
          const nextAt=Number(story.slimeRepayNextAt||10);
          if(!story.slimeRepayPending && story.slimeHelpCount>=nextAt) story.slimeRepayPending=true;
        }
        let questNarr="";
        if(rewardDelta>0){
          if(!questBefore.herb && s.story.quest && s.story.quest.herb && s.story.quest.herb.done){
            questNarr="支线【药草与幼崽】完成：你用药草治愈了幼崽，灰狼终于安心。";
          }else if(!questBefore.lamp && s.story.quest && s.story.quest.lamp && s.story.quest.lamp.done){
            questNarr="支线【夜灯守望】完成：你点亮的灯驱散了黑暗，石像鬼把夜里交给了光。";
          }else if(!questBefore.letter && s.story.quest && s.story.quest.letter && s.story.quest.letter.done){
            questNarr="支线【未寄出的信】完成：你让信抵达该去的地方，魔像的心结被解开。";
          }
        }
        grantDungeonLootInstances_(s,1);
        if(repayBonus>0) grantDungeonLootInstances_(s,2);
        sys(
          "你理解了它的难处，和平解决。积分 +"+p.reward+"。" +
          (questNarr?(" "+questNarr+" 积分 +" + rewardDelta + "。"):"") +
          (repayBonus>0?(" 史莱姆的报恩奖励积分 +" + repayBonus + "。"):"") +
          "战利品已自动计入面板。下一层更可能出现可沟通/救助事件。",
          SYS_AVATARS[1]
        );
        renderMap(); renderHUD();
      }else if(oc==="conflict"){
        p.done=true; p.resolvedKind="conflict"; s.pending=null;
        const rw=Math.max(4,Math.floor(p.reward*0.45));
        s.reward+=rw;
        s.eventBias.conflict=(s.eventBias.conflict||0)+1;
        s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
        s.story.violence=(s.story.violence||0)+1;
        // 你击杀/破坏和平后：同类不再以“求救沟通”事件出现（提升后续强敌触发概率）
        if(s.story && p.monsterId){
          s.story.helpKilledMonsters=s.story.helpKilledMonsters||{};
          s.story.helpKilledMonsters[p.monsterId]=true;
        }
        // 立刻从当前楼层移除同怪物的未完成 talk_monster，避免你“打走一次后仍再次遇到同样史莱姆/星砂”
        try{
          if(s.map && s.map.events){
            for(const k in s.map.events){
              const ev=s.map.events[k];
              if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId===p.monsterId){
                delete s.map.events[k];
              }
            }
          }
        }catch(e){}
        tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"conflict"});
        grantDungeonLootInstances_(s,2);
        sys(
          "沟通有些生硬但仍化解冲突。积分 +"+rw+"。战利品已自动计入面板。下一层可能更容易出现战斗事件。",
          SYS_AVATARS[2]
        );
        renderMap(); renderHUD();
      }else{
        // 战斗：把这一格变成战斗状态
        p.done=true; p.resolvedKind="combat";
        s.pending={type:"monster",hp:p.hp,reward:Math.floor(p.reward*0.7),done:false};
        s.eventBias.conflict=(s.eventBias.conflict||0)+2;
        s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
        s.story.violence=(s.story.violence||0)+2;
        if(s.story && p.monsterId){
          s.story.helpKilledMonsters=s.story.helpKilledMonsters||{};
          s.story.helpKilledMonsters[p.monsterId]=true;
        }
        // 立刻从当前楼层移除同怪物的未完成 talk_monster（你已经选择开战/战斗，将其视为“打走”）
        try{
          if(s.map && s.map.events){
            for(const k in s.map.events){
              const ev=s.map.events[k];
              if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId===p.monsterId){
                delete s.map.events[k];
              }
            }
          }
        }catch(e){}
        tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"combat"});
        sys("沟通破裂，怪物情绪失控，进入战斗。接下来几层战斗风险上升。",SYS_AVATARS[2]);
        shouldSave=false; // 战斗未结束：减少云端写入
        renderMap(); renderHUD();
      }
    }

    if(s.hp<=0){ await onDeath(); return; }
    popStoryNote(s);

    // 离线游玩：不写入同层事件存档
    if(!G.offlineMode && shouldSave){
      try{
        await saveStateCloud("resolve_event", false);
      }catch(e){
        sys("云端写入失败，本次事件未确认。",SYS_AVATARS[2]);
      }
    }

    renderMap(); renderHUD();
  }catch(e){
    // 兜底：避免事件分支报错导致 UI/状态残留卡死
    console.error("resolveEvent error:", e);
    sys("事件处理出错，请稍后再试。",SYS_AVATARS[2]);
    renderMap(); renderHUD();
  }finally{
    G.actionBusy=false;
  }
}

function consumePts(s,need){
  let rem=Number(need||0);
  if(rem<=0) return {usedR:0, usedQ:0};
  s.stockQuote=Number(s.stockQuote||0);
  s.stockReply=Number(s.stockReply||0);

  let usedQ=0, usedR=0;

  // 先尽量用“被引用”凑够 5 点单位（每条被引用=5点）
  const useQ=Math.min(s.stockQuote, Math.floor(rem/5));
  if(useQ>0){
    s.stockQuote-=useQ;
    usedQ+=useQ;
    rem-=useQ*5;
  }

  // rem 现在为 0..4，剩下用“回复”逐点扣除；若回复不够，则多花 1 条被引用补足，
  // 并把多余的点数折回待用“回复”（避免扣光导致的误差）。
  if(rem>0){
    if(s.stockReply>=rem){
      s.stockReply-=rem;
      usedR+=rem;
      rem=0;
    }else{
      const missing=rem - s.stockReply; // 1..4
      // 全部消耗回复
      usedR += s.stockReply;
      s.stockReply=0;
      // 理论上：缺的点不会超过4，所以多花一条被引用（5点）即可覆盖
      if(s.stockQuote<=0) return {usedR, usedQ};
      s.stockQuote-=1;
      usedQ+=1;
      const over=5 - missing; // 1..4
      s.stockReply += over;
      rem=0;
    }
  }

  return {usedR, usedQ};
}

async function goDown(){
  const s=G.state;if(!s||G.busy)return;
  if(G.actionBusy){
    sysTransient("正在处理事件，请稍后再下楼。",SYS_AVATARS[2],1600);
    return;
  }
  try{ const el=document.getElementById("sysMsg"); if(el) el.textContent=""; }catch(e){}
  setBusy(true,"正在下楼请静候...");
  if(G.moveSaveTimer){ try{ clearTimeout(G.moveSaveTimer); }catch(e){} G.moveSaveTimer=null; }
  if(s.pending){ setBusy(false); return sys("本格事件尚未处理，无法下楼。",SYS_AVATARS[2]); }
  if(G.moveSaving){
    sysTransient("系统正在保存云端，请稍后再下楼。",SYS_AVATARS[2],1600);
    setBusy(false);
    return;
  }
  if(!(s.player.x===s.map.stairs.x && s.player.y===s.map.stairs.y)){ setBusy(false); return sys("你需要先走到楼梯位置。",SYS_AVATARS[2]); }
  G.actionBusy=true;
  try{
    // 根据“上一层是否全部救助/怪物帮忙都拒绝”来决定下一层是否出现 BOSS 并更换下楼提示文案
    let bossThisNext=false;
    let prevHadRescueForMonsterDiscount=false;
    try{
      const fc=s.story && s.story.floorContext ? s.story.floorContext : null;
      prevHadRescueForMonsterDiscount=!!(fc && Number(fc.rescueEncountered||0)>0);
      const rescueOk=fc && fc.rescueEncountered>0 && fc.rescueRefused===fc.rescueEncountered;
      const talkTotal=(fc ? Number(fc.talkHelpAccepted||0)+Number(fc.talkHelpDeclined||0) : 0);
      const talkOk=fc && talkTotal>0 && Number(fc.talkHelpAccepted||0)===0 && Number(fc.talkHelpDeclined||0)===talkTotal;
      bossThisNext=!!(rescueOk && talkOk);

      // 额外：按“对战胜利次数”提高下一层遭遇 BOSS 概率
      // 对战10次：有机会；对战20次：更容易；依此类推（概率不向玩家展示）
      const battleCnt = fc ? Number(fc.monsterBattleCount||0) : 0;
      if(!bossThisNext && battleCnt>=10){
        const k=Math.floor(battleCnt/10); // 1=10次,2=20次...
        const chance=Math.min(0.12*k, 0.85);
        if(Math.random()<chance) bossThisNext=true;
      }
      if(s.story){
        s.story.bossNextFloor=bossThisNext;
        s.story.bossNextDesc=bossThisNext;
      }
    }catch(e){}

    // 重置下一层的“本层统计”（从新楼层开始重新统计）
    if(s.story){
      s.story.floorContext={rescueEncountered:0,rescueRefused:0,talkHelpAccepted:0,talkHelpDeclined:0,monsterBattleCount:0};
    }

    s.floor+=1;
    let showFloor10MedalAcquire=false;
    if(s.story){
      s.story.prevFloorHadRescueMonsterDiscount=prevHadRescueForMonsterDiscount;
    }
    // 永久本期勋章 / 永久往期兑换机会触发（通关到指定楼层时弹出）
    if(s.story){
      if(s.floor===10 && !s.story.permCurMedalGiven){
        s.story.permCurMedalGiven=true;
        s.story.permCurMedal=Number(s.story.permCurMedal||0)+1;
        showFloor10MedalAcquire=true;
        pushStoryLog(s,"永久奖章已解锁：永久本期勋章（第10层）。积分不受影响。");
      }
      const floors=[20,40,60,80,100,120];
      if(floors.includes(s.floor)){
        const fk=String(s.floor);
        if(!s.story.permPastExchangeGivenFloors[fk]){
          s.story.permPastExchangeGivenFloors[fk]=true;
          s.story.permPastExchange=Number(s.story.permPastExchange||0)+1;
          sysTransient("抵达第 "+s.floor+" 层：永久往期勋章兑换机会 +1！",SYS_AVATARS[1],2600);
          pushStoryLog(s,"永久奖章已解锁：永久往期勋章兑换机会（第"+s.floor+"层）+1。");
        }
      }
    }
    // 章回推进：每 10 层触发一段温馨奇幻小章节
    if(s.floor%10===0){
      const chapter=CHAPTER_PACKS[s.floor]||CHAPTER_PACKS[50];
      if(chapter && !s.chapterSeen[String(s.floor)]){
        s.chapterSeen[String(s.floor)]=1;
        setNotice("章节解锁：第 "+s.floor+" 层 · "+chapter.title);
        let flavor="";
        const k=Number(s.story.kindness||0), v=Number(s.story.violence||0);
        if(k-v>=3) flavor=" 你一路选择倾听，许多原本敌对的身影开始愿意先开口。";
        else if(v-k>=3) flavor=" 你一路强硬前行，回廊中的戒备越来越重。";
        else flavor=" 你在温柔与锋利之间摇摆，故事也因此更复杂。";
        let chapterBonus=0;
        if(!s.chapterRewardSeen[String(s.floor)]){
          s.chapterRewardSeen[String(s.floor)]=1;
          chapterBonus=12+Math.floor(s.floor/10)*2;
          s.reward+=chapterBonus;
        }
        await showChapterCard(
          "第 "+s.floor+" 层 · "+chapter.title,
          chapter.text+flavor+(chapterBonus>0?(" 章节小结算：积分 +"+chapterBonus+"。"):"")
        );
        sys("章节推进完成："+chapter.title+"。",SYS_AVATARS[1]);
      }
    }
    if(showFloor10MedalAcquire && s.story){
      const tot=Number(s.story.permCurMedal||0);
      showAcquireNotify_("获得道具",[
        "永久本期勋章 ×1",
        "背包累计：永久本期勋章 ×"+tot,
        "第 10 层章节剧情后发放。"
      ]);
    }
    // 倾向逐层衰减，避免永久锁定某一类事件
    s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
    s.eventBias.conflict=Math.max(0,(s.eventBias.conflict||0)-1);
    s.story.floorsDescended=(s.story.floorsDescended||0)+1;
    tryAdvanceQuests(s,{type:"descend"});
    const hasNote=popStoryNote(s);
    const m=buildFloor(s.floor); s.map=m; s.player={x:m.start.x,y:m.start.y}; s.pending=null; s.lastEventKey="";
    purgeStage1LonglineMonsterTalks_(s);
    s.hp=Math.min(s.maxHp,s.hp+1);
    try{ await saveStateCloud("next_floor"); }catch(e){ return sys("云端写入失败，无法下楼确认。",SYS_AVATARS[2]); }
    if(!(s.floor%10===0 && s.chapterSeen[String(s.floor)])){
      if(!hasNote){
        if(bossThisNext){
          sys("环伺着敌意的目光，随时有强敌跳出来。你必须更谨慎了。",SYS_AVATARS[2]);
        }else{
          sys("你来到第 "+s.floor+" 层。墙壁之外，仍有等待被照亮的故事。",SYS_AVATARS[1]);
        }
      }
      if(bossThisNext && s.story) s.story.bossNextDesc=false;
    }
    // 夜灯守望进入 stage=2 后：在新楼层补齐“需要开箱”的格子
    ensureQuestFollowupEvents_(s);
    renderMap(); renderHUD();
  }finally{
    G.actionBusy=false;
    setBusy(false);
  }
}

async function settle(result){
  const s=G.state;if(!s||G.busy)return;
  setBusy(true,"正在结算，请静候…");
  try{
    await appendRecord(result||"结算");
    await apiJsonp("clear_state",{user_id:G.uid,_ts:String(Date.now())});
    G.state=null;
    show("gameCard",false); show("recordCard",false); show("menuCard",true);
    setNotice("结算完成：积分 "+(s.reward||0)+"。");
  }catch(e){
    setNotice("云端结算失败，请稍后重试。");
  }finally{ setBusy(false); }
}

async function onDeath(){
  const s=G.state;if(!s)return;
  const runReward=Number(s.reward||0);
  await appendRecord("阵亡重置 | 本次积分 "+runReward);
  await apiJsonp("clear_state",{user_id:G.uid,_ts:String(Date.now())});
  G.state=null;
  show("gameCard",false); show("recordCard",false); show("menuCard",true);
  setNotice("你已经死亡：本次积分已保留为结算记录，共获得 "+runReward+" 分；将从第1层楼开始，回到主画面。");
  try{ sys("死亡结算完成：积分 "+runReward+"。",SYS_AVATARS[2]); }catch(e){}
}

async function changeIdFromMenu(){
  const oldId=(G.uid||"").trim(); if(!oldId) return;
  let newId=prompt("请输入新的论坛ID：",oldId); if(newId===null) return;
  newId=(newId||"").trim(); if(!newId||newId===oldId) return;
  setBusy(true,"正在替换云端ID，请静候…");
  try{
    await apiJsonp("rename_uid",{old_id:oldId,new_id:newId,_ts:String(Date.now())});
    G.uid=newId; document.getElementById("uid").value=newId; document.getElementById("hello").textContent="玩家："+newId;
    setNotice("ID 已替换为 "+newId+"，云端记录已同步归并。");
    await cloudConfirmAndLoad();
  }catch(e){ setNotice("ID 替换失败，请稍后重试。"); }
  finally{ setBusy(false); }
}

async function changeIdMidGame(){
  if(!G.uid) return;
  const ok=confirm("中途更改ID会立即同步替换云端记录，并继续当前进度。是否继续？");
  if(!ok) return;
  await changeIdFromMenu();
  if(G.state){ try{ await saveStateCloud("change_id_midgame"); }catch(e){} renderHUD(); }
}

function openRecords(){ show("menuCard",false); show("gameCard",false); show("recordCard",true); loadRecords(1); }
async function loadRecords(page){
  if(!G.uid) return;
  G.page=Math.max(1,page||1);
  const log=document.getElementById("recordLog");
  log.textContent="读取中…";
  try{
    const res=await apiJsonp("list_records",{page:String(G.page),page_size:String(PAGE_SIZE)});
    const list=(res.data&&res.data.list)||[];
    if(!list.length){ log.textContent="暂无记录。"; document.getElementById("pageTxt").textContent="第 "+G.page+" 页"; return; }
    log.innerHTML=list.map((x,i)=>'<div class="rank"><div>#'+((G.page-1)*PAGE_SIZE+i+1)+'</div><div>'+escapeHtml(x.id||"")+'</div><div>'+(x.time||"")+'</div><div>'+(x.reward||0)+'</div></div>').join("");
    document.getElementById("pageTxt").textContent="第 "+G.page+" 页";
  }catch(e){ log.textContent="云端读取失败。"; }
}
function prevPage(){ if(G.page>1) loadRecords(G.page-1); }
function nextPage(){ loadRecords(G.page+1); }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }

function backMenu(){ show("gameCard",false); show("recordCard",false); show("menuCard",true); }

window.addEventListener("DOMContentLoaded",()=>{
  const d=new Date();
  const stamp=d.getFullYear().toString()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0")+String(d.getSeconds()).padStart(2,"0");
  document.getElementById("versionTxt").textContent="版本："+VER+"+"+stamp;
  document.getElementById("loadingAvatar").src=SYS_AVATARS[0];
  document.getElementById("sysAvatar").src=SYS_AVATARS[0];
  sys("欢迎来到地下城。这里有战斗，也有等待被温柔回应的心。",SYS_AVATARS[0]);
  if(!gasUrl()){
    document.getElementById("loginNotice").textContent="请以 ?record=你的GAS_URL 打开，否则无法云端游玩。";
  }

  // 键盘移动：方向键/WSAD
  window.addEventListener("keydown",(e)=>{
    if(e.defaultPrevented) return;
    const ae=document.activeElement;
    const tn=ae && ae.tagName ? String(ae.tagName).toLowerCase() : "";
    if(tn==="input" || tn==="textarea" || tn==="select" || tn==="button") return;
    const key=String(e.key||"");
    if(key==="ArrowUp" || key.toLowerCase()==="w") { e.preventDefault(); move(0,-1); }
    else if(key==="ArrowDown" || key.toLowerCase()==="s") { e.preventDefault(); move(0,1); }
    else if(key==="ArrowLeft" || key.toLowerCase()==="a") { e.preventDefault(); move(-1,0); }
    else if(key==="ArrowRight" || key.toLowerCase()==="d") { e.preventDefault(); move(1,0); }
  });
});
</script>
