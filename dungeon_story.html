<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>温馨地下城</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 15%,#261842 0,#0b0b1b 45%,#04040d 100%);color:#f3ecff;font-family:Segoe UI,Arial,sans-serif;padding:14px}
    .app{max-width:1100px;margin:0 auto;background:linear-gradient(180deg,#1a1233,#0e0c1f);border:1px solid #5b4594;border-radius:14px;padding:12px;box-shadow:0 10px 34px #0008}
    .title{font-size:32px;margin-bottom:8px;color:#f6dcff;text-shadow:0 0 14px #8a6bff88}
    .card{background:linear-gradient(180deg,#1b1f45,#141733);border:1px solid #5a63a3;border-radius:10px;padding:10px;margin-bottom:10px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
    .hidden{display:none!important}
    input,button,select{border:1px solid #6a70b4;background:#131836;color:#f0f2ff;border-radius:8px;padding:8px 10px;font-size:14px}
    button{cursor:pointer;transition:.18s transform,.18s filter}.primary{background:#5c47d6}.good{background:#2b9f74}.warn{background:#a26a1a}
    button:hover{transform:translateY(-1px);filter:brightness(1.08)}
    .hud{display:flex;flex-direction:column;gap:10px}
    .s{display:grid;grid-template-columns:95px 1fr;gap:6px;margin-bottom:7px}.k{color:#b8baf0}.v{color:#fbf8ff}
    .mapbox{background:linear-gradient(180deg,#0f1024,#090a1a);border:1px solid #4c4f86;border-radius:8px;padding:8px;overflow:auto;max-height:none;height:72vh;box-shadow:inset 0 0 28px #7f72ff1a}
    .map{border-collapse:collapse}.map td{width:30px;height:30px;text-align:center;vertical-align:middle;border:1px solid #23274f;font-size:12px}
    .fog{background:#070810;color:#070810}.wall{background:#1f1a2f;color:#1f1a2f}.floor{background:#1d2143}
    .wallHint{background:repeating-linear-gradient(45deg,#9a9a9a55 0,#9a9a9a55 3px,#1f1a2f 3px,#1f1a2f 7px),#1f1a2f;color:#cfcfcf}
    .water{background:#1a3f66;color:#b7e6ff}.stairs{background:#4d3c78;color:#ffe18f}.event{outline:1px dashed #9d8cff}
    .acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#101536c9;border:1px solid #4f57a5;border-radius:8px;padding:8px}
    .sysbox{margin-top:8px;background:#121634;border:1px solid #4f5ab0;border-radius:8px;padding:8px}
    .sysline{display:flex;gap:8px;align-items:flex-start}.sysicon{width:56px;height:56px;object-fit:contain}.sysc{font-size:13px;line-height:1.6}
    .log{max-height:230px;overflow:auto;border:1px dashed #626cb3;border-radius:8px;padding:8px;background:#0d1230;font-size:13px}
    .rank{display:grid;grid-template-columns:46px 1fr 130px 80px;gap:6px;padding:7px;border-bottom:1px solid #39427a}
    .version{text-align:center;color:#b7bee8;font-size:12px;margin-top:6px}
    .overlay{position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:9999}
    .overlay .box{min-width:300px;max-width:420px;background:#122844;border:1px solid #4e7fca;border-radius:12px;padding:14px;display:flex;gap:10px;align-items:center}
    .overlay .box img{width:64px;height:64px;object-fit:contain}.overlay .t{line-height:1.6}
    .chapter-box{min-width:320px;max-width:520px;background:linear-gradient(180deg,#261743,#12142e);border:1px solid #8f7aff;border-radius:14px;padding:16px;box-shadow:0 0 30px #8f7aff40}
    .chapter-title{font-size:20px;color:#ffe9b6;margin-bottom:8px}
    .chapter-text{line-height:1.7;color:#ece7ff;margin-bottom:12px}
    .hpOuter{height:12px;background:#120b1f;border-radius:8px;overflow:hidden;border:1px solid #4633a0}
    .hpInner{height:100%;background:linear-gradient(90deg,#2ed573,#ff6b6b);width:100%;border-radius:8px;transition:width .22s}
    .hpNum{font-size:12px;color:#e9e9ff;margin-top:6px;text-align:center}
  </style>
</head>
<body>
<div class="app">
  <div class="title">温馨地下城</div>

  <div id="loginCard" class="card">
    <div class="row">
      <input id="uid" maxlength="30" placeholder="请输入论坛ID（必填）">
      <button class="primary" onclick="enterGame()">进入地下城</button>
    </div>
    <div id="loginNotice" style="font-size:13px;color:#c9daf6"></div>
  </div>

  <div id="menuCard" class="card hidden">
    <div class="row"><strong id="hello"></strong></div>
    <div class="row"><span id="menuNotice" style="color:#ffd66e"></span></div>
    <div class="row">
      <button id="btnStart" class="primary" onclick="startNew()">开始新冒险</button>
      <button id="btnResume" class="good" onclick="resumeRun()">继续冒险</button>
      <button onclick="setOfflineMode(true)">离线游玩</button>
      <button onclick="manualSaveToCloud()">保存进度(云端)</button>
      <button onclick="openRecords()">查看记录</button>
      <button onclick="changeIdFromMenu()">更改ID（同步替换云端）</button>
    </div>
  </div>

  <div id="gameCard" class="card hidden">
    <div class="hud">
      <div>
        <div class="s"><div class="k">玩家</div><div id="pUid" class="v"></div></div>
        <div class="s"><div class="k">楼层</div><div id="pFloor" class="v"></div></div>
        <div class="s"><div class="k">生命</div><div class="v">
          <div class="hpOuter"><div id="pHpBar" class="hpInner"></div></div>
          <div id="pHpText" class="hpNum"></div>
        </div></div>
        <div class="s"><div class="k">积分(仅排行)</div><div id="pReward" class="v"></div></div>
        <div class="s"><div class="k">战利品</div><div id="pLoot" class="v"></div></div>
        <div class="s"><div class="k">待用回复</div><div id="pR" class="v"></div></div>
        <div class="s"><div class="k">待用被引用</div><div id="pQ" class="v"></div></div>
        <div class="s"><div class="k">叙事倾向</div><div id="pAlign" class="v">-</div></div>
        <div class="s"><div class="k">长线支线</div><div id="pQuest" class="v">-</div></div>
        <div class="row">
          <button class="warn" onclick="settle('撤退结算')">撤退结算</button>
          <button onclick="backMenu()">主菜单</button>
          <button onclick="changeIdMidGame()">更改ID</button>
          <button onclick="setOfflineMode(true)">离线游玩</button>
          <button onclick="manualSaveToCloud()">保存进度(云端)</button>
        </div>

        <div class="sysbox">
          <div class="sysline">
            <img id="sysAvatar" class="sysicon" alt="sys">
            <div id="sysMsg" class="sysc"></div>
          </div>
        </div>
        <div id="offlineWarn" style="font-size:13px;color:#ffd66e;margin-top:6px;min-height:18px"></div>
      </div>

      <div class="mapbox">
        <table id="mapTable" class="map"></table>
      </div>

      <!-- 所有交互控件移动到地图下方，避免遮挡系统提醒 -->
      <div id="belowInteract" style="display:flex;flex-direction:column;gap:10px">
        <div class="acts">
          <button onclick="move(0,-1)">上</button>
          <button onclick="move(-1,0)">左</button>
          <button onclick="move(1,0)">右</button>
          <button onclick="move(0,1)">下</button>
          <button class="primary" onclick="goDown()">下楼</button>
        </div>

        <div id="eventActs" class="acts hidden">
          <span id="eventTxt">事件</span>
          <span>新增回复</span><input id="addR" type="number" min="0" value="0">
          <span>新增被引用</span><input id="addQ" type="number" min="0" value="0">
          <button id="eventBtn" class="good" onclick="resolveEvent()">执行</button>
          <select id="talkSel" class="hidden"></select>
          <div id="talkBtns" class="hidden" style="width:100%;gap:8px;flex-wrap:wrap;display:flex;margin-top:6px"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="recordCard" class="card hidden">
    <div class="row"><strong>云端记录</strong></div>
    <div class="row">
      <button onclick="backMenu()">回主菜单</button>
      <button class="primary" onclick="loadRecords(1)">刷新</button>
    </div>
    <div id="recordLog" class="log"></div>
    <div class="row">
      <button onclick="prevPage()">上一页</button>
      <span id="pageTxt">第 1 页</span>
      <button onclick="nextPage()">下一页</button>
    </div>
  </div>

  <div id="loadingOverlay" class="overlay hidden" aria-hidden="true">
    <div class="box">
      <img id="loadingAvatar" alt="loading">
      <div id="loadingText" class="t">系统正在读取中，请静候…</div>
    </div>
  </div>
  <div id="chapterOverlay" class="overlay hidden" aria-hidden="true">
    <div class="chapter-box">
      <div id="chapterTitle" class="chapter-title">章节</div>
      <div id="chapterText" class="chapter-text">章节说明</div>
      <div class="row" style="justify-content:flex-end;margin-bottom:0">
        <button class="primary" onclick="closeChapterCard()">继续冒险</button>
      </div>
    </div>
  </div>

  <div class="version" id="versionTxt">版本：</div>
</div>

<script>
const VER="v1.3.1-dungeon-story";
const SYS_AVATARS=[
  "https://s.sstmlt.com/img/2026/03/19/1-108359ab38de728aad.png",
  "https://s.sstmlt.com/img/2026/03/19/1-11c14bafe31ee6ee1c.png",
  "https://s.sstmlt.com/img/2026/03/19/1-127cce7b27eb17c91c.png"
];
const PLAYER_AVATAR="https://s.sstmlt.com/img/2026/03/19/1-134fdb6a0ec9b50e46.png";
const PAGE_SIZE=20;
const FIXED_GAS_URL="https://script.google.com/macros/s/AKfycbxg1Z0dc4XhjTUz4ZGgbZ369TOTHcGpgLejHgL9WZsKcFsuZPiTNH5SSYe_0K_JYgYU/exec";
const CHAPTER_PACKS={
  10:{title:"余烬回廊",text:"你在灰烬与灯火之间听见低语：很多怪物并非嗜血，只是太久没被温柔对待。"},
  20:{title:"星砂港口",text:"星砂并不是海盐，而是“被安放的记忆”。每当你用温柔回应一个生命，迷失者就会被指引到这个渡口（港口），在这里把故事交还给自己。"},
  30:{title:"月井花庭",text:"会发光的藤蔓绕着断碑生长，碑文写着：救人者，也在被世界悄悄拯救。"},
  40:{title:"霜羽教堂",text:"寒气中传来祈祷，受伤的翼兽与旅人并肩取暖，谁也不再独自发抖。"},
  50:{title:"晨曦书库",text:"旧书翻开后掉下一封封未寄出的信，原来怪物也会把歉意写得很认真。"}
};
const CHAPTER_MONSTER_PACKS={
  10:[
    {id:"starsand_guardian",txt:"星砂守望者拦下你，它在确认你是否会伤害流浪者。你怎么回应？",opts:["放下武器并承诺护送弱者","要求它立刻让路","尝试突袭"],outcomes:["peace","conflict","combat"]},
    {id:"ember_deer",txt:"余烬鹿在废墟里守着熄灭的火种。你怎么回应？",opts:["帮它重燃火种","催促它快离开","夺走火种"],outcomes:["peace","conflict","combat"]}
  ],
  20:[
    {id:"harbor_siren",txt:"港湾海妖在哭泣，它害怕再次失去船员。你怎么回应？",opts:["倾听并帮它寻找失散名册","嫌它吵闹","拔剑威吓"],outcomes:["peace","conflict","combat"]},
    {id:"mist_colossus",txt:"迷雾巨像误把你认成旧敌。你怎么回应？",opts:["先说明来意并示弱","反讽它记性差","直接攻击"],outcomes:["peace","conflict","combat"]}
  ],
  30:[
    {id:"moonvine_keeper",txt:"月藤守卫担心花庭被毁。你怎么回应？",opts:["答应保护花庭并清理碎石","说这不关你事","砍断藤蔓开路"],outcomes:["peace","conflict","combat"]},
    {id:"well_spirit",txt:"井灵守着祈愿碎片，不敢交给任何人。你怎么回应？",opts:["帮它筛选真正的愿望","催它快点","强取碎片"],outcomes:["peace","conflict","combat"]}
  ],
  40:[
    {id:"frost_wing",txt:"霜翼兽怕体温再伤到同伴。你怎么回应？",opts:["带它去温泉回廊","嫌它麻烦","趁其虚弱下手"],outcomes:["peace","conflict","combat"]},
    {id:"prayer_knight",txt:"祈祷骑士只想守住最后的誓言。你怎么回应？",opts:["尊重誓言并提出合作","嘲笑它过时","强行突破"],outcomes:["peace","conflict","combat"]}
  ],
  50:[
    {id:"dawn_archivist",txt:"晨曦档案师请你帮忙归还遗失手稿。你怎么回应？",opts:["答应协助并追索线索","让它自己处理","焚毁手稿省麻烦"],outcomes:["peace","conflict","combat"]},
    {id:"echo_librarian",txt:"回声馆员担心真相再次被扭曲。你怎么回应？",opts:["共同整理证词","质疑它夸大其词","强行沉默它"],outcomes:["peace","conflict","combat"]}
  ]
};
const QUEST_DEFS={
  herb:{title:"药草与幼崽",steps:["取得灰狼信任","完成一次救助","打开一次宝箱取药","把药送到幼崽"],reward:22},
  lamp:{title:"夜灯守望",steps:["答应石像鬼点灯","继续下探 2 层","收集温暖火种（宝箱）","点亮回廊"],reward:26},
  letter:{title:"未寄出的信",steps:["帮助魔像读信","再完成 2 次和平沟通","完成一次救助转交信件","收到回信"],reward:30}
};
const G={
  uid:"",
  state:null,
  busy:false,
  page:1,
  recordBase:[],
  moveSaving:false,
  actionBusy:false,
  offlineMode:false,
  moveSaveTimer:null,
  lastMoveSaveAt:0,
  talkPick:null,
  rescuePick:null,
  monsterPick:null,
  chestPick:null
};

let _sysToken=0;
function sysTransient(msg, avatar, ms){
  const token=++_sysToken;
  const text=String(msg||"");
  sys(text,avatar);
  setTimeout(()=>{
    if(_sysToken===token){
      const el=document.getElementById("sysMsg");
      if(el && el.textContent===text) el.textContent="";
    }
  }, ms||1600);
}

function eventGlyph_(ev){
  if(!ev) return "";
  const kind=ev.resolvedKind||"";
  if(ev.type==="chest") return "◇";
  if(ev.type==="rescue") return "✚";
  if(ev.type==="monster") return (kind==="escape"?"↗":"⚔");
  if(ev.type==="talk_monster"){
    if(kind==="peace") return "☮";
    if(kind==="conflict") return "✦";
    if(kind==="combat") return "⚔";
    return "✉";
  }
  return "·";
}

const LOOT_WEIGHTS_DUNGEON={jiecao:30,yumao:30,bqMedal30:32,zmMedal30:8};
function pickLootKindDungeon_(){
  const ks=Object.keys(LOOT_WEIGHTS_DUNGEON);
  let total=0; ks.forEach(k=>{ total += Number(LOOT_WEIGHTS_DUNGEON[k]||0); });
  let r=Math.random()*total;
  for(let i=0;i<ks.length;i++){
    const k=ks[i];
    r -= Number(LOOT_WEIGHTS_DUNGEON[k]||0);
    if(r<=0) return k;
  }
  return ks[0]||"jiecao";
}
function lootKindLabelDungeon_(kind){
  if(kind==="jiecao") return "30节操";
  if(kind==="yumao") return "30羽毛";
  if(kind==="bqMedal30") return "30天本期勋章";
  if(kind==="zmMedal30") return "30天字母勋章";
  return kind;
}
function applyLootCapsDungeon_(lb){
  // 节操：jiecao 以“30节操份数”为单位；超出 5000节操则转换为 字母勋章30天
  // 羽毛：yumao 以“10羽毛份数”为单位；超出 2000羽毛则转换为 字母勋章30天
  let jc=Number(lb.jiecao||0);
  let ym=Number(lb.yumao||0);
  let bq=Number(lb.bqMedal30||0);
  let zm=Number(lb.zmMedal30||0);
  const maxJc=Math.floor(5000/30); // 166
  if(jc>maxJc){
    zm += (jc-maxJc);
    jc = maxJc;
  }
  const maxYm=Math.floor(2000/10); // 200
  if(ym>maxYm){
    zm += (ym-maxYm);
    ym = maxYm;
  }
  lb.jiecao=jc; lb.yumao=ym; lb.bqMedal30=bq; lb.zmMedal30=zm;
  return lb;
}
function grantDungeonLootInstances_(s, n){
  if(!s) return {diff:{}, primaryKind:""};
  const lb=s.lootBag|| (s.lootBag={jiecao:0,yumao:0,bqMedal30:0,zmMedal30:0});
  const before={jiecao:lb.jiecao, yumao:lb.yumao, bqMedal30:lb.bqMedal30, zmMedal30:lb.zmMedal30};
  let primaryKind="";
  for(let i=0;i<n;i++){
    const kind=pickLootKindDungeon_();
    if(!primaryKind) primaryKind=kind;
    if(kind==="jiecao") lb.jiecao += 1;
    else if(kind==="yumao") lb.yumao += 3; // 30羽毛 = 3 * (10羽毛)
    else if(kind==="bqMedal30") lb.bqMedal30 += 1;
    else if(kind==="zmMedal30") lb.zmMedal30 += 1;
  }
  applyLootCapsDungeon_(lb);
  const after={jiecao:lb.jiecao, yumao:lb.yumao, bqMedal30:lb.bqMedal30, zmMedal30:lb.zmMedal30};
  const diff={
    jiecao:after.jiecao-before.jiecao,
    yumao:after.yumao-before.yumao,
    bqMedal30:after.bqMedal30-before.bqMedal30,
    zmMedal30:after.zmMedal30-before.zmMedal30
  };
  return {diff, primaryKind};
}

function gasUrl(){
  const q=new URLSearchParams(location.search).get("record");
  return q || FIXED_GAS_URL;
}
function now(){ const d=new Date(); return {date:d.toLocaleDateString("zh-TW"),time:d.toLocaleTimeString("zh-TW",{hour12:false}),ts:d.getTime()}; }
function rInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function key(x,y){ return x+","+y; }
function sys(msg,avatar){ document.getElementById("sysAvatar").src=avatar||SYS_AVATARS[0]; document.getElementById("sysMsg").textContent=msg||""; }
function show(id,v){ document.getElementById(id).classList.toggle("hidden",!v); }
function setNotice(msg){ document.getElementById("menuNotice").textContent=msg||""; }

function setBusy(v,text){
  G.busy=!!v;
  document.getElementById("btnStart").disabled=!!v;
  document.getElementById("btnResume").disabled=!!v;
  show("loadingOverlay",!!v);
  document.getElementById("loadingOverlay").setAttribute("aria-hidden",v?"false":"true");
  if(text) document.getElementById("loadingText").textContent=text;
  document.getElementById("loadingAvatar").src=SYS_AVATARS[0];
}

function updateOfflineWarn(){
  const el=document.getElementById("offlineWarn");
  if(!el) return;
  if(G.offlineMode){
    el.textContent="离线游玩中：同层移动不自动云端存档。需要时请点“保存进度(云端)”写入进度。";
  }else{
    el.textContent="";
  }
}

function setOfflineMode(v){
  G.offlineMode=!!v;
  updateOfflineWarn();
  if(G.offlineMode){
    sysTransient("离线游玩已启用：同层移动不会频繁写云端。需要时请点击“保存进度(云端)”。",SYS_AVATARS[2],2000);
  }else{
    sysTransient("已恢复在线模式：同层移动会自动节流云端存档。",SYS_AVATARS[2],1600);
  }
}

async function manualSaveToCloud(){
  if(!G.state) return;
  if(G.busy) return;
  if(G.actionBusy) return;
  G.actionBusy=true;
  try{
    setBusy(true,"正在保存进度，请静候…");
    updateOfflineWarn();
    // 手动保存尽量快，不做二次 verify
    await saveStateCloud("manual_save", false);
    setNotice("云端保存完成。");
    sysTransient("云端保存完成。",SYS_AVATARS[1],1600);
  }catch(e){
    sysTransient("云端保存失败，请稍后重试。",SYS_AVATARS[2],2000);
  }finally{
    setBusy(false);
    G.actionBusy=false;
  }
}
let _chapterResolver=null;
function showChapterCard(title,text){
  return new Promise((resolve)=>{
    _chapterResolver=resolve;
    document.getElementById("chapterTitle").textContent=title||"章节";
    document.getElementById("chapterText").textContent=text||"";
    show("chapterOverlay",true);
    document.getElementById("chapterOverlay").setAttribute("aria-hidden","false");
  });
}
function closeChapterCard(){
  show("chapterOverlay",false);
  document.getElementById("chapterOverlay").setAttribute("aria-hidden","true");
  if(_chapterResolver){ const r=_chapterResolver; _chapterResolver=null; r(); }
}

function apiJsonp(action, params){
  return new Promise((resolve,reject)=>{
    const u=gasUrl(); if(!u) return reject(new Error("未提供 record=GAS_URL"));
    const cb="dg_cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    window[cb]=function(res){
      try{ delete window[cb]; s.remove(); }catch(e){}
      if(res && res.ok) resolve(res); else reject(new Error((res&&res.error)||"cloud_error"));
    };
    const p=new URLSearchParams(Object.assign({},params||{}, {action:action,callback:cb,_ts:String(Date.now())}));
    const s=document.createElement("script");
    s.src=u+(u.includes("?")?"&":"?")+p.toString();
    s.onerror=function(){ try{delete window[cb];s.remove();}catch(e){} reject(new Error("云端抓取失败")); };
    document.head.appendChild(s);
  });
}

async function apiPostJson_(payload){
  const u=gasUrl();
  if(!u) throw new Error("no_gas_url");
  // 使用 POST，避免 state_json 过长导致 GET/JSONP URL 失效
  // 先尝试 cors，再回退到 no-cors（我们后续会用 load_state 做确认）
  try{
    const res=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"cors"});
    if(res && res.ok) return true;
  }catch(e){}
  await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"no-cors"}).catch(()=>{});
  return true;
}

  setBusy(true,"系统正在读取中，请静候…");
  try{
    const res=await apiJsonp("load_state",{user_id:G.uid});
    if(res.data && res.data.state){
      G.state=normalizeState(res.data.state);
      setNotice("云端确认成功：检测到可继续的地下城进度。");
    }else{
      G.state=null;
      setNotice("云端确认成功：暂无进度，可开始新冒险。");
    }
  }catch(e){
    G.state=null;
    setNotice("云端抓取失败：无法进入游戏，请稍后重试。");
    sys("云端抓取失败，已阻止进入游戏。请检查 GAS 或网络。",SYS_AVATARS[2]);
  }finally{
    setBusy(false);
  }
}

    {id:"slime",txt:"史莱姆偷了面包，它说三天没吃东西。你怎么回应？",opts:["分它食物并约定规则","逼它当场道歉赔偿","立刻击杀"],outcomes:["peace","conflict","combat"]},
    {id:"golem",txt:"夜行魔像守着一封旧信，它不识字却不敢交给任何人。你怎么回应？",opts:["帮它读信并找收件人","说这事与你无关","将信夺走逼问"],outcomes:["peace","conflict","combat"]}
  ];
  const tier=chapterTierByFloor(floor);
  const chapter=CHAPTER_MONSTER_PACKS[tier]||[];
  let pool=base.concat(chapter);
  // 支线严格性：
  // - stage=1 时禁止出现该支线相关怪物（避免重复“还在找”的重复触发）
  // - stage=2 时只允许出现该支线相关怪物（保证第三次遇到能结算奖励）
  // - combatBlocked 时永久禁止出现该支线相关怪物（第一次打倒后不再出现该支线）
  if(G.state && G.state.story && G.state.story.quest){
    const q=G.state.story.quest||{};
    const forbid=new Set();
    const allow=new Set();

    if(q.herb){
      if(!!q.herb.done) forbid.add("wolf");
      if((q.herb.stage===1 && !q.herb.done) || q.herb.combatBlocked) forbid.add("wolf");
      if(q.herb.stage===2 && !q.herb.done && !q.herb.combatBlocked) allow.add("wolf");
    }
    if(q.lamp){
      if(!!q.lamp.done) forbid.add("gargoyle");
      if((q.lamp.stage===1 && !q.lamp.done) || q.lamp.combatBlocked) forbid.add("gargoyle");
      if(q.lamp.stage===2 && !q.lamp.done && !q.lamp.combatBlocked) allow.add("gargoyle");
    }
    if(q.letter){
      if(!!q.letter.done) forbid.add("golem");
      if((q.letter.stage===1 && !q.letter.done) || q.letter.combatBlocked) forbid.add("golem");
      if(q.letter.stage===2 && !q.letter.done && !q.letter.combatBlocked) allow.add("golem");
    }

    if(allow.size>0){
      const ids=[...allow];
      pool=pool.filter(x=>ids.includes(x.id));
    }else if(forbid.size>0){
      const ids=[...forbid];
      pool=pool.filter(x=>!ids.includes(x.id));
    }
  }
  if(!pool.length) pool=base.concat(chapter);
  return pool[rInt(0,pool.length-1)];
}

function monsterRewardByFloor(floor){
  const isLegend = (Number(floor)||0) % 10 === 0;
  if(isLegend){
    return 55 + floor*12 + rInt(0,20);
  }
  return 15 + floor*6;
}

function rescueRewardByFloor(floor){
  // 救助属于“温柔额外收益”：通常低于击杀怪物，但高于纯章节叙事
  const base=monsterRewardByFloor(floor);
  return Math.max(4, Math.floor(base*0.30) + rInt(0,10));
}

function chestRewardByFloor(){
  // 类似爬塔宝箱：固定为 1 积分点（主要用于排行榜）
  return 1;
}

function talkRewardByFloor(floor){
  // 沟通怪物：和平/紧张解决会给到一定奖励
  const base=monsterRewardByFloor(floor);
  return Math.max(6, Math.floor(base*0.55) + rInt(0,12));
}

function buildFloor(floor){
  const w=12,h=12,tiles=[],revealed={},events={};
  const baseMonsterReward=monsterRewardByFloor(floor);
  const baseRescueReward=rescueRewardByFloor(floor);
  const baseChestReward=chestRewardByFloor(floor);
  const baseTalkReward=talkRewardByFloor(floor);
  // 地形背景保持“同一套”5 层：用 5 层为一组的 tier 来决定是否出现港口水道视觉
  const tier=Math.floor((Number(floor)||1)/5)*5;
  for(let y=0;y<h;y++){
    tiles[y]=[];
    for(let x=0;x<w;x++){
      const border=(x===0||y===0||x===w-1||y===h-1);
      if(border){ tiles[y][x]=1; continue; }
      // 20-24 层：港口（渡口）地形会出现“可通行水道”（视觉上像港湾）
      if(tier===20 && Math.random()<0.08) tiles[y][x]=2;
      else tiles[y][x]=(Math.random()<0.22?1:0);
    }
  }
  const start={x:1,y:1};
  // 楼梯位置：不固定，随机选择一个可放置格位（非边框且非起点）
  let stairs={x:w-2,y:h-2};
  for(let tries=0;tries<50;tries++){
    const rx=rInt(2,w-3), ry=rInt(2,h-3);
    if(rx===start.x && ry===start.y) continue;
    stairs={x:rx,y:ry};
    break;
  }
  tiles[start.y][start.x]=0; tiles[stairs.y][stairs.x]=0;
  let cx=start.x,cy=start.y;
  while(cx!==stairs.x || cy!==stairs.y){
    if(cx<stairs.x) cx++; else if(cy<stairs.y) cy++;
    tiles[cy][cx]=0;
  }
  revealed[key(start.x,start.y)]=1;
  // 为 20 层追加水道/栈桥视觉：水可通行，但事件不会生成在水面
  if(tier===20){
    const waterCols=[4,7];
    const waterRows=[4,7];
    for(let i=0;i<waterCols.length;i++){
      const wx=waterCols[i];
      for(let y=1;y<h-1;y++){
        if(!xBlockedPath(wx,y,start,stairs)) tiles[y][wx]=2;
      }
    }
    for(let i=0;i<waterRows.length;i++){
      const wy=waterRows[i];
      for(let x=1;x<w-1;x++) tiles[wy][x]=2;
    }
  }
  const bias=(G.state&&G.state.eventBias)?G.state.eventBias:{peace:0,conflict:0};
  const peaceBoost=Math.min(0.08,0.02*Number(bias.peace||0));
  const conflictBoost=Math.min(0.12,0.02*Number(bias.conflict||0));

  // 支线步骤：根据当前进行中的支线，提升后续“需要的事件类型”遭遇率
  const q=(G.state&&G.state.story&&G.state.story.quest)?G.state.story.quest:null;
  const herbNeedChest=!!(q&&q.herb && q.herb.stage===1 && !q.herb.done && !q.herb.combatBlocked);
  const lampNeedChest=!!(q&&q.lamp && q.lamp.stage===1 && !q.lamp.done && !q.lamp.combatBlocked);
  const letterNeedRescue=!!(q&&q.letter && q.letter.stage===1 && !q.letter.done && !q.letter.combatBlocked);
  // 严谨支线：当某条支线走到“第三次和平结算(完成)”后，提高后续支线的触发率
  let preferredTalkMonsterId=null;
  if(q && q.herb && q.herb.done && (!q.lamp || !q.lamp.done) && !(q.lamp&&q.lamp.combatBlocked)){
    preferredTalkMonsterId="gargoyle";
  }else if(q && q.lamp && q.lamp.done && (!q.letter || !q.letter.done) && !(q.letter&&q.letter.combatBlocked)){
    preferredTalkMonsterId="golem";
  }

  const chestNeedCount=(herbNeedChest?1:0)+(lampNeedChest?1:0);
  const rescueNeedCount=(letterNeedRescue?1:0);

  let chestRate=0.10;
  let talkRate=Math.max(0.06, Math.min(0.20, 0.10 + peaceBoost - conflictBoost*0.4));
  let rescueRate=Math.max(0.08, Math.min(0.22, 0.12 + peaceBoost*0.8 - conflictBoost*0.5));
  let monsterRate=Math.max(0.12, Math.min(0.36, 0.18 + conflictBoost - peaceBoost*0.6));

  // 救助可拒绝：拒绝后下一层不再生成救助事件（让遭遇变成更偏“必须战斗”的怪物）
  try{
    const skipUntil=G.state && G.state.story ? Number(G.state.story.rescueSkipUntilFloor||0) : 0;
    if(skipUntil>=Number(floor||1)) rescueRate=0;
  }catch(e){}

  if(chestNeedCount>0) chestRate*=1+(0.18*chestNeedCount);
  if(rescueNeedCount>0) rescueRate*=1+(0.22*rescueNeedCount);

  chestRate=Math.min(0.22, chestRate);
  rescueRate=Math.min(0.34, rescueRate);

  // 由于 chest/rescue 提升，重新计算总分段
  // （整体的“monster 与 talk”仍保留之前的 bias）
  const tChest=chestRate, tMonster=tChest+monsterRate, tRescue=tMonster+rescueRate, tTalk=tRescue+talkRate;
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    if(tiles[y][x]===1 || tiles[y][x]===2) continue;
    if((x===start.x&&y===start.y)||(x===stairs.x&&y===stairs.y)) continue;
    const r=Math.random();
    if(r<tChest){
      let questKey="";
      if(herbNeedChest && lampNeedChest){
        questKey=(Math.random()<0.5)?"herb":"lamp";
      }else if(herbNeedChest) questKey="herb";
      else if(lampNeedChest) questKey="lamp";
      events[key(x,y)]={type:"chest",need:rInt(10,24),reward:baseChestReward,questKey:questKey,done:false};
    }else if(r<tMonster){
      events[key(x,y)]={type:"monster",hp:rInt(8,24)+floor,reward:baseMonsterReward,done:false};
    }else if(r<tRescue){
      let questKey="";
      if(letterNeedRescue) questKey="letter";
      events[key(x,y)]={type:"rescue",need:rInt(10,22),story:makeStoryRescueByQuest_(questKey),reward:baseRescueReward,questKey:questKey,done:false};
    }else if(r<tTalk){
      let s=makeStoryMonsterByFloor(floor);
      // 若前置支线已完成，则提高后续支线“接任务(和平)怪物对话”的出现率
      if(preferredTalkMonsterId && s && s.id!==preferredTalkMonsterId && Math.random()<0.45){
        for(let t=0;t<6;t++){
          const s2=makeStoryMonsterByFloor(floor);
          if(s2 && s2.id===preferredTalkMonsterId){ s=s2; break; }
        }
      }
      events[key(x,y)]={type:"talk_monster",monsterId:s.id,story:s.txt,opts:s.opts,outcomes:s.outcomes,reward:baseTalkReward,hp:rInt(10,22)+floor,done:false};
    }
  }
  // 兜底：如果本层完全没有“怪物/救助”事件，则用 BOSS 级怪物填补空档
  let monsterCnt=0, rescueCnt=0;
  for(const k in events){
    const ev=events[k];
    if(!ev || ev.done) continue;
    if(ev.type==="monster" || ev.type==="talk_monster") monsterCnt++;
    if(ev.type==="rescue") rescueCnt++;
  }
  if(monsterCnt===0 && rescueCnt===0){
    const bossHp=Math.floor(rInt(20,48)+floor);
    const maxTries=180;
    for(let i=0;i<maxTries;i++){
      const x=rInt(1,w-2), y=rInt(1,h-2);
      const kk=key(x,y);
      if(tiles[y][x]!==0) continue;
      if(kk===key(start.x,start.y) || kk===key(stairs.x,stairs.y)) continue;
      if(events[kk]) continue;
      events[kk]={type:"monster",hp:bossHp,reward:baseMonsterReward,boss:true,done:false};
      break;
    }
  }
  return {w:w,h:h,tiles:tiles,revealed:revealed,events:events,start:start,stairs:stairs,learnedWalls:{}};
}

function xBlockedPath(x,y,start,stairs){
  // 简单防止水道把“起点/楼梯”直接覆盖（实际起点/楼梯会在后面被强制设为 0）
  if((x===start.x&&y===start.y) || (x===stairs.x&&y===stairs.y)) return true;
  return false;
}

function normalizeState(st){
  if(!st) return null;
  if(!st.eventBias) st.eventBias={peace:0,conflict:0};
  if(typeof st.eventBias.peace!=="number") st.eventBias.peace=0;
  if(typeof st.eventBias.conflict!=="number") st.eventBias.conflict=0;
  if(!st.chapterSeen) st.chapterSeen={};
  if(!st.chapterRewardSeen) st.chapterRewardSeen={};
  if(typeof st.stockReply!=="number") st.stockReply=Number(st.stockReply||0);
  if(typeof st.stockQuote!=="number") st.stockQuote=Number(st.stockQuote||0);
  if(!st.lootBag){
    st.lootBag={jiecao:0,yumao:0,bqMedal30:0,zmMedal30:0};
  }else{
    // 兼容旧存档：pastMedal30（当时把 30 直接当数值加了）
    if(st.lootBag.pastMedal30!==undefined && st.lootBag.zmMedal30===undefined){
      const oldJ=Number(st.lootBag.jiecao||0);
      const oldY=Number(st.lootBag.yumao||0);
      const oldB=Number(st.lootBag.bqMedal30||0);
      const oldP=Number(st.lootBag.pastMedal30||0);
      st.lootBag={
        jiecao: Math.floor(oldJ/30), // 旧值是“30节操”，转换为份数
        yumao: Math.floor(oldY/10), // 旧值是“30羽毛”，转换为 10羽毛份数
        bqMedal30: Math.floor(oldB/30),
        zmMedal30: Math.floor(oldP/30)
      };
    }
    if(typeof st.lootBag.jiecao!=="number") st.lootBag.jiecao=Number(st.lootBag.jiecao||0);
    if(typeof st.lootBag.yumao!=="number") st.lootBag.yumao=Number(st.lootBag.yumao||0);
    if(typeof st.lootBag.bqMedal30!=="number") st.lootBag.bqMedal30=Number(st.lootBag.bqMedal30||0);
    if(typeof st.lootBag.zmMedal30!=="number") st.lootBag.zmMedal30=Number(st.lootBag.zmMedal30||0);
  }
  if(st.map && !st.map.learnedWalls) st.map.learnedWalls={};
  // 事件屏蔽：从云端恢复后，按当前支线状态清理已被禁用的 golem 对话事件。
  try{
    if(st && st.map && st.map.events && st.story && st.story.quest){
      const q=st.story.quest;
      const forbidGoL=!!(q.letter && !q.letter.done && ((q.letter.stage===1) || q.letter.combatBlocked));
      if(forbidGoL){
        for(const k in st.map.events){
          const ev=st.map.events[k];
          if(ev && ev.type==="talk_monster" && ev.monsterId==="golem") delete st.map.events[k];
        }
      }
    }
  }catch(e){}
  if(!st.story){
    st.story={
      kindness:0,violence:0,peaceTalks:0,rescueDone:0,chestOpen:0,floorsDescended:0,
      quest:{
        herb:{stage:0,done:false,combatBlocked:false,hasHerb:false},
        lamp:{stage:0,done:false,startFloor:0,combatBlocked:false,hasLamp:false,lit:false},
        letter:{stage:0,done:false,combatBlocked:false,hasLetter:false,delivered:false}
      },
      log:[]
    };
  }
  if(!st.story.quest) st.story.quest={};
  if(!st.story.quest.herb) st.story.quest.herb={stage:0,done:false,combatBlocked:false,hasHerb:false};
  if(st.story.quest.herb.combatBlocked===undefined) st.story.quest.herb.combatBlocked=false;
  if(st.story.quest.herb.hasHerb===undefined) st.story.quest.herb.hasHerb=false;
  if(!st.story.quest.lamp) st.story.quest.lamp={stage:0,done:false,startFloor:0,combatBlocked:false,hasLamp:false,lit:false};
  if(st.story.quest.lamp.combatBlocked===undefined) st.story.quest.lamp.combatBlocked=false;
  if(st.story.quest.lamp.hasLamp===undefined) st.story.quest.lamp.hasLamp=false;
  if(st.story.quest.lamp.lit===undefined) st.story.quest.lamp.lit=false;
  if(!st.story.quest.letter) st.story.quest.letter={stage:0,done:false,combatBlocked:false,hasLetter:false,delivered:false};
  if(st.story.quest.letter.combatBlocked===undefined) st.story.quest.letter.combatBlocked=false;
  if(st.story.quest.letter.hasLetter===undefined) st.story.quest.letter.hasLetter=false;
  if(st.story.quest.letter.delivered===undefined) st.story.quest.letter.delivered=false;
  // 兼容旧存档/异常：stage 已经到 2 时，补齐关键状态标记
  if(st.story.quest.herb && Number(st.story.quest.herb.stage||0)>=2) st.story.quest.herb.hasHerb=true;
  if(st.story.quest.lamp && Number(st.story.quest.lamp.stage||0)>=2) st.story.quest.lamp.lit=true;
  if(st.story.quest.letter && Number(st.story.quest.letter.stage||0)>=2) st.story.quest.letter.delivered=true;
  if(!st.story.endings) st.story.endings={herb:false,lamp:false,letter:false,all:false};
  if(st.story.rescueSkipUntilFloor===undefined) st.story.rescueSkipUntilFloor=0;
  if(typeof st.story.rescueSkipUntilFloor!=="number") st.story.rescueSkipUntilFloor=Number(st.story.rescueSkipUntilFloor||0);
  if(st.story.permCurMedal===undefined) st.story.permCurMedal=0;
  if(st.story.permCurMedalGiven===undefined) st.story.permCurMedalGiven=false;
  if(st.story.permPastExchange===undefined) st.story.permPastExchange=0;
  if(!st.story.permPastExchangeGivenFloors) st.story.permPastExchangeGivenFloors={};
  if(!st.story.pendingNotes) st.story.pendingNotes=[];
  if(!st.story.log) st.story.log=[];
  return st;
}
function pushStoryLog(s,msg){
  if(!s||!s.story) return;
  s.story.log.unshift(msg);
  s.story.log=s.story.log.slice(0,8);
}
function enqueueStoryNote(s,msg,avatar){
  if(!s||!s.story) return;
  s.story.pendingNotes.push({msg:msg,avatar:avatar||SYS_AVATARS[1]});
  s.story.pendingNotes=s.story.pendingNotes.slice(-6);
}
function popStoryNote(s){
  if(!s||!s.story||!s.story.pendingNotes||!s.story.pendingNotes.length) return false;
  const n=s.story.pendingNotes.shift();
  sys(n.msg,n.avatar||SYS_AVATARS[1]);
  return true;
}
function tryUnlockEndings(s){
  if(!s||!s.story||!s.story.quest) return;
  const q=s.story.quest,e=s.story.endings;
  if(q.herb.done && !e.herb){
    e.herb=true; s.reward+=18;
    pushStoryLog(s,"结局解锁【幼崽归巢】：灰狼一家在火堆旁等你回访。积分 +18");
    enqueueStoryNote(s,"【NPC 结局】幼崽归巢：你救下的小生命终于能在安全的巢穴里入睡。积分 +18。",SYS_AVATARS[1]);
  }
  if(q.lamp.done && !e.lamp){
    e.lamp=true; s.reward+=20;
    pushStoryLog(s,"结局解锁【回廊长明】：石像鬼第一次在夜里笑了。积分 +20");
    enqueueStoryNote(s,"【NPC 结局】回廊长明：你点亮的灯让迷路者不再害怕。积分 +20。",SYS_AVATARS[1]);
  }
  if(q.letter.done && !e.letter){
    e.letter=true; s.reward+=24;
    pushStoryLog(s,"结局解锁【回信抵达】：魔像把信抱在胸前久久不语。积分 +24");
    enqueueStoryNote(s,"【NPC 结局】回信抵达：迟到多年的原谅终于被读到。积分 +24。",SYS_AVATARS[1]);
  }
  if(e.herb && e.lamp && e.letter && !e.all){
    e.all=true; s.reward+=40; s.hp=Math.min(s.maxHp,s.hp+1);
    pushStoryLog(s,"终章解锁【共灯之夜】：所有被你帮助过的人都在同一盏灯下重逢。积分 +40，生命 +1");
    enqueueStoryNote(s,"【终章结局】共灯之夜：你不是征服了地下城，而是让它重新学会温柔。积分 +40，生命 +1。",SYS_AVATARS[1]);
  }
}
function tryAdvanceQuests(s,ctx){
  if(!s||!s.story) return;
  const q=s.story.quest;
  function cancelQuest_(questObj, opts){
    questObj.combatBlocked=true;
    questObj.stage=0;
    // 取消后清空关键状态，避免在 HUD 里仍显示“进行中”
    if(opts.chestQuestKey==="herb"){ questObj.hasHerb=false; }
    if(opts.chestQuestKey==="lamp"){ questObj.hasLamp=false; questObj.lit=false; }
    if(opts.rescueQuestKey==="letter"){ questObj.hasLetter=false; questObj.delivered=false; }
    // 清理当前楼层上已生成的该支线专属格子，避免“已打倒却还能继续碰到”
    if(!s.map || !s.map.events) return;
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(!ev) continue;
      if(opts.chestQuestKey && ev.type==="chest" && ev.questKey===opts.chestQuestKey) delete s.map.events[k];
      if(opts.rescueQuestKey && ev.type==="rescue" && ev.questKey===opts.rescueQuestKey) delete s.map.events[k];
      if(opts.talkMonsterId && ev.type==="talk_monster" && ev.monsterId===opts.talkMonsterId) delete s.map.events[k];
    }
  }
  // 药草与幼崽：第1次和平=接任务(1/3)；第2次开宝箱拿药草(2/3)；第3次和平治好=奖励(结束)
  if(q.herb && !q.herb.done && !q.herb.combatBlocked){
    if(q.herb.stage===0){
      if(ctx.type==="talk" && ctx.monsterId==="wolf"){
        if(ctx.outcome==="peace"){
          q.herb.stage=1;
          q.herb.hasHerb=false;
          pushStoryLog(s,"支线【药草与幼崽】开启：你愿意为灰狼找回药草。");
        }else{
          cancelQuest_(q.herb,{talkMonsterId:"wolf",chestQuestKey:"herb"});
        }
      }
    }else if(q.herb.stage===1){
      if(ctx.type==="chest_done" && ctx.eventQuest==="herb"){
        q.herb.stage=2;
        q.herb.hasHerb=true;
        pushStoryLog(s,"支线【药草与幼崽】推进：你找到了灰狼所需的药草，并把它带在身上。");
      }
    }else if(q.herb.stage===2){
      if(ctx.type==="talk" && ctx.monsterId==="wolf" && ctx.outcome==="peace" && q.herb.hasHerb){
        q.herb.done=true;
        s.reward+=QUEST_DEFS.herb.reward;
        pushStoryLog(s,"支线【药草与幼崽】完成：你用药草为幼崽疗愈，灰狼终于露出安心的眼神。积分 +"+QUEST_DEFS.herb.reward);
      }else if(ctx.type==="talk" && ctx.monsterId==="wolf" && ctx.outcome!=="peace"){
        cancelQuest_(q.herb,{talkMonsterId:"wolf",chestQuestKey:"herb"});
      }
    }
  }

  // 夜灯守望：第1次和平=接任务(1/3)；第2次开宝箱找到灯并点亮(2/3)；第3次和平=奖励(结束)
  if(q.lamp && !q.lamp.done && !q.lamp.combatBlocked){
    if(q.lamp.stage===0){
      if(ctx.type==="talk" && ctx.monsterId==="gargoyle"){
        if(ctx.outcome==="peace"){
          q.lamp.stage=1;
          q.lamp.hasLamp=false;
          q.lamp.lit=false;
          pushStoryLog(s,"支线【夜灯守望】开启：你答应帮助石像鬼点亮回廊。");
        }else{
          cancelQuest_(q.lamp,{talkMonsterId:"gargoyle",chestQuestKey:"lamp"});
        }
      }
    }else if(q.lamp.stage===1){
      if(ctx.type==="chest_done" && ctx.eventQuest==="lamp"){
        q.lamp.stage=2;
        q.lamp.hasLamp=true;
        q.lamp.lit=true;
        pushStoryLog(s,"支线【夜灯守望】推进：你真的找到了灯，并顺手把它点亮。");
      }
    }else if(q.lamp.stage===2){
      if(ctx.type==="talk" && ctx.monsterId==="gargoyle" && ctx.outcome==="peace" && q.lamp.lit){
        q.lamp.done=true;
        s.reward+=QUEST_DEFS.lamp.reward;
        s.eventBias.peace=(s.eventBias.peace||0)+1;
        pushStoryLog(s,"支线【夜灯守望】完成：回廊被温暖的光照亮。积分 +"+QUEST_DEFS.lamp.reward);
      }else if(ctx.type==="talk" && ctx.monsterId==="gargoyle" && ctx.outcome!=="peace"){
        cancelQuest_(q.lamp,{talkMonsterId:"gargoyle",chestQuestKey:"lamp"});
      }
    }
  }

  // 未寄出的信：第1次和平=接到信(1/3)；第2次救助交付(2/3)；第3次和平=奖励(结束)
  if(q.letter && !q.letter.done && !q.letter.combatBlocked){
    if(q.letter.stage===0){
      if(ctx.type==="talk" && ctx.monsterId==="golem"){
        if(ctx.outcome==="peace"){
          q.letter.stage=1;
          q.letter.hasLetter=true;
          pushStoryLog(s,"支线【未寄出的信】开启：你从魔像手里接过那封信。");
        }else{
          cancelQuest_(q.letter,{talkMonsterId:"golem",rescueQuestKey:"letter"});
        }
      }
    }else if(q.letter.stage===1){
      if(ctx.type==="rescue_done" && ctx.eventQuest==="letter"){
        q.letter.stage=2;
        q.letter.delivered=true;
        pushStoryLog(s,"支线【未寄出的信】推进：你把信交出去了。收信人的目光终于有了方向。");
      }
    }else if(q.letter.stage===2){
      if(ctx.type==="talk" && ctx.monsterId==="golem" && ctx.outcome==="peace" && q.letter.delivered){
        q.letter.done=true;
        s.reward+=QUEST_DEFS.letter.reward;
        pushStoryLog(s,"支线【未寄出的信】完成：魔像终于把信抱在胸前不再颤抖。积分 +"+QUEST_DEFS.letter.reward);
      }else if(ctx.type==="talk" && ctx.monsterId==="golem" && ctx.outcome!=="peace"){
        cancelQuest_(q.letter,{talkMonsterId:"golem",rescueQuestKey:"letter"});
      }
    }
  }
  tryUnlockEndings(s);
  // 如果当前支线已经进入“需要玩家继续应对”的阶段，则在当前楼层补齐对应格子
  if(ctx && ctx.type && ctx.type!=="descend") ensureQuestFollowupEvents_(s);
}
function storyAlignmentText(s){
  if(!s||!s.story) return "-";
  const k=Number(s.story.kindness||0), v=Number(s.story.violence||0);
  if(k-v>=3) return "抚慰之光（温和）";
  if(v-k>=3) return "裂锋之影（强硬）";
  return "暮色平衡（中立）";
}
function questSummaryText(s){
  if(!s||!s.story||!s.story.quest) return "-";
  const q=s.story.quest;
  const parts=[];
  for(const id of ["herb","lamp","letter"]){
    const st=q[id]||{stage:0,done:false};
    if(st.done) parts.push(QUEST_DEFS[id].title+"·已完成");
    else if(st.stage>0) parts.push(QUEST_DEFS[id].title+"·进行中("+st.stage+"/3)");
  }
  return parts.length?parts.join("；"):"暂无长线进行中";
}

function ensureQuestFollowupEvents_(s){
  if(!s||!s.map||!s.map.events||!s.story||!s.story.quest) return;
  const q=s.story.quest;

  // 使用当前楼层的基础掉落，保证数值一致
  const baseRescueReward=rescueRewardByFloor(s.floor);
  const baseChestReward=chestRewardByFloor();
  const baseTalkReward=talkRewardByFloor(s.floor);

  function ensureOne(type, questKey, storyForQuest){
    // 1) 已存在且未完成的专属事件
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type===type && ev.questKey===questKey) return;
    }
    // 2) 复用“未标记的通用事件”（questKey 为空），补齐链条但不影响其它支线（它本来就没有归属）
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type===type && (!ev.questKey || ev.questKey==="")){
        ev.questKey=questKey;
        if(type==="rescue") ev.story=storyForQuest||makeStoryRescueByQuest_(questKey);
        return;
      }
    }
    // 2) 如果地图里没有专属事件，则只在空格里补齐一个（不复用/覆盖其它事件，确保链条严谨）
    const maxTries=120;
    for(let i=0;i<maxTries;i++){
      const x=rInt(1,s.map.w-2);
      const y=rInt(1,s.map.h-2);
      const kk=key(x,y);
      if(s.map.tiles[y][x]!==0) continue; // 跳过墙壁/水道等
      if(kk===key(s.map.stairs.x,s.map.stairs.y)) continue;
      if(s.map.events[kk]) continue;
      if(type==="chest"){
        s.map.events[kk]={type:"chest",need:rInt(10,24),reward:baseChestReward,questKey:questKey,done:false};
      }else if(type==="rescue"){
        s.map.events[kk]={type:"rescue",need:rInt(10,22),story:storyForQuest||makeStoryRescueByQuest_(questKey),reward:baseRescueReward,questKey:questKey,done:false};
      }
      return;
    }
  }

  // 只对“需要下一步应对”的进行强制补齐
  if(q.letter && q.letter.stage===1 && !q.letter.done && !q.letter.combatBlocked){
    ensureOne("rescue","letter",makeStoryRescueByQuest_("letter"));
    // 严谨连贯：stage=1 阶段不再允许出现“旧信/魔像沟通”类怪物对话
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="golem") delete s.map.events[k];
    }
  }
  if(q.herb && q.herb.stage===1 && !q.herb.done && !q.herb.combatBlocked){
    ensureOne("chest","herb",null);
    // 严谨连贯：stage=1 阶段不再允许出现“继续找药草”的灰狼对话
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="wolf") delete s.map.events[k];
    }
  }
  if(q.lamp && q.lamp.stage===1 && !q.lamp.done && !q.lamp.combatBlocked){
    ensureOne("chest","lamp",null);
    // 严谨连贯：stage=1 阶段不再允许出现“继续点灯”的石像鬼对话
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="gargoyle") delete s.map.events[k];
    }
  }

  // stage=2：第三次遇到对应怪物并在“和平”结算奖励
  const desiredTalkIds=[];
  if(q.herb && q.herb.stage===2 && !q.herb.done && !q.herb.combatBlocked) desiredTalkIds.push("wolf");
  if(q.lamp && q.lamp.stage===2 && !q.lamp.done && !q.lamp.combatBlocked) desiredTalkIds.push("gargoyle");
  if(q.letter && q.letter.stage===2 && !q.letter.done && !q.letter.combatBlocked) desiredTalkIds.push("golem");

  if(desiredTalkIds.length>0){
    // 为了“严谨连贯”，在当前楼层只保留需要的那类怪物对话事件
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(!ev || ev.done || ev.type!=="talk_monster") continue;
      if(!desiredTalkIds.includes(ev.monsterId)) delete s.map.events[k];
    }

    function ensureTalkMonster(monsterId){
      // 已存在则不重复生成
      for(const k in s.map.events){
        const ev=s.map.events[k];
        if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId===monsterId) return;
      }
      const maxTries=140;
      for(let i=0;i<maxTries;i++){
        const x=rInt(1,s.map.w-2), y=rInt(1,s.map.h-2);
        const kk=key(x,y);
        if(s.map.tiles[y][x]!==0) continue;
        if(kk===key(s.map.stairs.x,s.map.stairs.y)) continue;
        if(s.map.events[kk]) continue;
        if(x===s.player.x && y===s.player.y) continue;

        let questKey="";
        if(monsterId==="wolf") questKey="herb";
        else if(monsterId==="gargoyle") questKey="lamp";
        else if(monsterId==="golem") questKey="letter";
        const st=makeStageTalkStoryByQuest_(monsterId,questKey);
        s.map.events[kk]={
          type:"talk_monster",
          monsterId:monsterId,
          story:st.txt,
          opts:st.opts,
          outcomes:st.outcomes,
          reward:baseTalkReward,
          hp:rInt(10,22)+s.floor,
          done:false
        };
        return;
      }
    }

    for(const id of desiredTalkIds){
      ensureTalkMonster(id);
    }
  }
}

function renderMap(){
  const s=G.state;if(!s) return;
  const m=s.map, tb=document.getElementById("mapTable");
  // 地图背景保持“每 5 层一换”，让第 6 层开始能明显看到主题变化
  try{
    const box=document.querySelector(".mapbox");
    if(box){
      const group=Math.floor((Number(s.floor||1)-1)/5);
      const themes=[
        "linear-gradient(180deg,#0f1024,#090a1a)",
        "linear-gradient(180deg,#241020,#0b0712)",
        "linear-gradient(180deg,#0b2a2a,#070d10)",
        "linear-gradient(180deg,#2a1f0b,#0a0704)"
      ];
      box.style.background=themes[group%themes.length];
    }
  }catch(e){}
  tb.innerHTML="";
  for(let y=0;y<m.h;y++){
    const tr=document.createElement("tr");
    for(let x=0;x<m.w;x++){
      const td=document.createElement("td");
      const rv=!!m.revealed[key(x,y)];
      const tile=m.tiles[y][x];
      const k=key(x,y);
      const isHintWall=rv && m.learnedWalls && m.learnedWalls[k] && tile===1;
      td.className=rv?(tile===1?(isHintWall?"wallHint":"wall"):(tile===2?"water":"floor")):"fog";
      if(rv && x===m.stairs.x && y===m.stairs.y){ td.className="stairs"; td.textContent="下"; }
      if(rv && s.player.x===x && s.player.y===y){ td.innerHTML='<img src="'+PLAYER_AVATAR+'" alt="p" style="width:22px;height:22px;object-fit:contain">'; }
      const ev=m.events[k];
      if(rv && ev && !ev.done && !(s.player.x===x&&s.player.y===y)) td.classList.add("event");
      // 事件已完成：在地图格子上展示轻量符号
      if(rv && ev && ev.done && !(s.player.x===x&&s.player.y===y)){
        // 若是战斗进行中/战后，用 resolvedKind 辅助显示
        td.textContent=eventGlyph_(ev);
        td.classList.remove("event");
      }
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
}

function renderHUD(){
  const s=G.state;if(!s)return;
  document.getElementById("pUid").textContent=G.uid;
  document.getElementById("pFloor").textContent=String(s.floor);
  const hpRatio=(Number(s.maxHp||0)>0)?(Number(s.hp||0)/Number(s.maxHp)):0;
  const bar=document.getElementById("pHpBar");
  if(bar) bar.style.width=Math.max(0,Math.min(100,Math.round(hpRatio*100)))+"%";
  const hpText=document.getElementById("pHpText");
  if(hpText) hpText.textContent=s.hp+" / "+s.maxHp;
  document.getElementById("pReward").textContent=String(s.reward);
  const lb=s.lootBag||{jiecao:0,yumao:0,bqMedal30:0,zmMedal30:0};
  const pLoot=document.getElementById("pLoot");
  const feather30=Math.floor((Number(lb.yumao)||0)/3);
  if(pLoot) pLoot.textContent=
    "30节操X"+(lb.jiecao||0)+
    " 30羽毛X"+feather30+
    " 本期勋章30天X"+(lb.bqMedal30||0)+
    " 字母勋章30天X"+(lb.zmMedal30||0)+
    " 永久本期勋章X"+(s.story&&s.story.permCurMedal||0)+
    " 永久往期兑换机会X"+(s.story&&s.story.permPastExchange||0);
  document.getElementById("pR").textContent=String(s.stockReply||0);
  document.getElementById("pQ").textContent=String(s.stockQuote||0);
  document.getElementById("pAlign").textContent=storyAlignmentText(s);
  document.getElementById("pQuest").textContent=questSummaryText(s);
  const p=s.pending;
  show("eventActs",!!p);
  document.getElementById("talkSel").classList.add("hidden");
  document.getElementById("eventBtn").classList.remove("hidden");
  const btnWrap=document.getElementById("talkBtns");
  if(btnWrap) btnWrap.classList.add("hidden");
  if(!p){
    if(!document.getElementById("sysMsg").textContent) sys("地下城安静下来。你可以继续探索。",SYS_AVATARS[0]);
    return;
  }
  if(p.type==="chest"){
    document.getElementById("eventTxt").textContent="宝箱上锁，需要点数 "+p.need+"（回复1点/被引用5点）。开锁后获得积分与战利品。";
    document.getElementById("eventBtn").textContent="尝试开锁";
    document.getElementById("eventBtn").classList.add("hidden");
    if(btnWrap){
      btnWrap.innerHTML="";
      btnWrap.classList.remove("hidden");
      const b1=document.createElement("button");
      b1.className="good";
      b1.textContent="打开宝箱";
      b1.onclick=()=>{ G.chestPick=null; resolveEvent(); };
      btnWrap.appendChild(b1);
      const b2=document.createElement("button");
      b2.className="warn";
      b2.textContent="不开宝箱(下次再开)";
      b2.onclick=()=>{ G.chestPick="skip"; resolveEvent(); };
      btnWrap.appendChild(b2);
    }
  }else if(p.type==="monster"){
    document.getElementById("eventTxt").textContent="遭遇怪物，HP "+p.hp+"，击败可得积分 "+p.reward+"。";
    document.getElementById("eventBtn").textContent="攻击";
    if(btnWrap){
      btnWrap.innerHTML="";
      btnWrap.classList.remove("hidden");
      const b=document.createElement("button");
      b.className="warn";
      b.textContent="逃跑";
      b.onclick=()=>{ G.monsterPick="escape"; resolveEvent(); };
      btnWrap.appendChild(b);
    }
  }else if(p.type==="rescue"){
    document.getElementById("eventTxt").textContent="拯救任务： "+p.story+"（需求点数 "+p.need+"）";
    document.getElementById("eventBtn").textContent="完成救助";
    document.getElementById("eventBtn").classList.add("hidden");
    // 救助可选择拒绝：拒绝不消耗点数，但提升战斗遭遇，并阻断该救助链
    document.getElementById("eventBtn").onclick=()=>{ G.rescuePick="do"; resolveEvent(); };
    const btnWrap2=document.getElementById("talkBtns");
    if(btnWrap2){
      btnWrap2.innerHTML="";
      btnWrap2.classList.remove("hidden");
      const b1=document.createElement("button");
      b1.className="good";
      b1.textContent="完成救助";
      b1.onclick=()=>{ G.rescuePick="do"; resolveEvent(); };
      btnWrap2.appendChild(b1);
      const b2=document.createElement("button");
      b2.className="warn";
      b2.textContent="不救助(下次改战斗)";
      b2.onclick=()=>{ G.rescuePick="refuse"; resolveEvent(); };
      btnWrap2.appendChild(b2);
    }
  }else if(p.type==="talk_monster"){
    document.getElementById("eventTxt").textContent=p.story;
    const sel=document.getElementById("talkSel");
    sel.classList.add("hidden");
    const btnWrap=document.getElementById("talkBtns");
    btnWrap.innerHTML="";
    btnWrap.classList.remove("hidden");
    // 对话选项：直接三个行动按钮，避免误点击
    for(let i=0;i<3;i++){
      let opt=p.opts[i]||("选项"+(i+1));
      // stage=2 时的“和平”按钮需要替换为更明确的“交付/治疗/点亮/递信”文本
      if(i===0 && s && s.story && s.story.quest){
        const q=s.story.quest;
        if(p.monsterId==="wolf" && q.herb && q.herb.stage===2 && !q.herb.done && q.herb.hasHerb){
          opt="给灰狼药草（治疗幼崽）";
        }
        if(p.monsterId==="gargoyle" && q.lamp && q.lamp.stage===2 && !q.lamp.done && q.lamp.lit){
          opt="真的把灯点亮了（继续回廊）";
        }
        if(p.monsterId==="golem" && q.letter && q.letter.stage===2 && !q.letter.done && q.letter.delivered){
          opt="把信送到收信人面前";
        }
      }
      const b=document.createElement("button");
      b.className=i===0?"good":(i===1?"warn":"good");
      b.textContent=opt;
      b.onclick=()=>{
        G.talkPick=i;
        show("eventActs",false);
        resolveEvent();
      };
      btnWrap.appendChild(b);
    }
    document.getElementById("eventBtn").classList.add("hidden");
  }
}

async function saveStateCloud(eventName, verifyAfter){
  const s=G.state;if(!s) return;
  const verify=verifyAfter!==false;
  s.updatedAt=Date.now();
  const stateJson=JSON.stringify(s);
  await apiPostJson_({
    action:"save_state",
    user_id:G.uid,
    floor:String(s.floor),
    reward:String(s.reward),
    event:eventName||"",
    state_json:stateJson,
    _ts:String(Date.now())
  });
  // 写入后用云端确认，避免“写入失败却不知”的情况（移动时为了不卡顿可跳过）
  if(verify){
    const after=await apiJsonp("load_state",{user_id:G.uid});
    if(!after || !after.data || !after.data.state) throw new Error("cloud_save_verify_failed");
  }
}

async function appendRecord(result){
  const s=G.state;if(!s)return;
  const t=now();
  await apiJsonp("add_record",{user_id:G.uid,date:t.date,time:t.time,reward:String(s.reward),result:result||"",floor:String(s.floor),_ts:String(Date.now())});
}

async function startNew(){
  if(G.busy) return;
  if(!G.uid) return;
  if(!gasUrl()) return setNotice("未提供 record=GAS_URL，无法开始。");
  const ok=!G.state || confirm("开始新冒险将覆盖当前云端续档，是否继续？");
  if(!ok) return;
  setBusy(true,"系统正在读取中，请静候…");
  try{
    G.state=newState(G.uid);
    await saveStateCloud("start_new");
    show("menuCard",false); show("recordCard",false); show("gameCard",true);
    sys("你踏入地下城。黑暗里，也许藏着等待被帮助的故事。",SYS_AVATARS[1]);
    renderMap(); renderHUD();
  }catch(e){
    setNotice("云端写入失败：无法开始新冒险。");
  }finally{ setBusy(false); }
}

async function resumeRun(){
  if(G.busy) return;
  if(!G.uid) return;
  if(!gasUrl()) return setNotice("未提供 record=GAS_URL，无法继续。");
  setBusy(true,"系统正在读取中，请静候…");
  try{
    const res=await apiJsonp("load_state",{user_id:G.uid});
    if(!res.data || !res.data.state){
      setNotice("云端暂无进度，已转为开始新冒险。");
      setBusy(false);
      return startNew();
    }
    G.state=normalizeState(res.data.state);
    show("menuCard",false); show("recordCard",false); show("gameCard",true);
    sys("已从云端恢复进度。愿你在黑暗里仍看见温柔。",SYS_AVATARS[0]);
    renderMap(); renderHUD();
  }catch(e){
    setNotice("云端抓取失败：继续冒险失败，请稍后重试。");
  }finally{ setBusy(false); }
}

function touchTileEvent(){
  const s=G.state,m=s.map,k=key(s.player.x,s.player.y),ev=m.events[k];
  if(ev && !ev.done){ s.pending=ev; s.lastEventKey=k; }
}

async function move(dx,dy){
  const s=G.state;
  if(!s||G.busy||G.actionBusy) return;
  if(s.pending) return sys("当前事件未处理，先完成事件再移动。",SYS_AVATARS[2]);
  if(G.moveSaving){
    sysTransient("系统正在保存云端，请稍候…",SYS_AVATARS[2],1400);
    return;
  }

  const nx=s.player.x+dx, ny=s.player.y+dy, m=s.map;
  if(nx<0||ny<0||nx>=m.w||ny>=m.h) return;

  if(m.tiles[ny][nx]===1){
    // 玩家已“试图前进”时，才标记这格为已知墙壁，避免反复撞墙。
    if(m.learnedWalls) m.learnedWalls[key(nx,ny)]=1;
    if(m.revealed) m.revealed[key(nx,ny)]=1;
    renderMap(); renderHUD();
    sysTransient("前方是墙壁，无法继续移动。",SYS_AVATARS[2],1400);
    return;
  }

  s.player.x=nx; s.player.y=ny; m.revealed[key(nx,ny)]=1; touchTileEvent();
  // 玩家移动后清掉事件描述，避免奖励/台词残留
  try{
    const el=document.getElementById("sysMsg");
    if(el) el.textContent="";
  }catch(e){}
  renderMap(); renderHUD();

  // 走到楼梯格：询问是否下楼
  if(nx===m.stairs.x && ny===m.stairs.y && !s.pending){
    const ok=confirm("你已经踩到了下楼的楼梯。是否下楼？");
    if(ok){
      if(G.moveSaveTimer){ try{ clearTimeout(G.moveSaveTimer); }catch(e){} }
      G.moveSaveTimer=null;
      goDown();
    }
    return;
  }

  // 同一楼层移动不频繁云存档：做“延迟合并”
  if(!G.offlineMode){
    if(G.moveSaveTimer){ try{ clearTimeout(G.moveSaveTimer); }catch(e){} }
    G.moveSaveTimer=setTimeout(()=>{
      if(G.offlineMode||G.busy||G.actionBusy||!G.state) return;
      const nowTs=Date.now();
      if(nowTs - G.lastMoveSaveAt < 900) return; // 额外节流
      G.lastMoveSaveAt=nowTs;
      if(G.moveSaving) return;
      G.moveSaving=true;
      saveStateCloud("move_auto", false)
        .catch(()=>sysTransient("云端保存失败：本次移动可能未被确认。",SYS_AVATARS[2],1800))
        .finally(()=>{G.moveSaving=false;});
    }, 1200);
  }
}

async function resolveEvent(){
  const s=G.state,p=s&&s.pending;
  if(!p||G.busy) return;
  if(G.actionBusy) return;
  if(G.moveSaving){
    sysTransient("系统正在保存云端，请稍后再处理事件。",SYS_AVATARS[2],1600);
    return;
  }

  G.actionBusy=true;
  try{
    // 救助可拒绝：拒绝后不消耗点数，并提高“战斗怪物”遭遇，且不再刷同类型救助链
    if(p.type==="rescue" && G.rescuePick==="refuse"){
      G.rescuePick=null;
      // 清空输入，避免玩家误把点数加进待用
      const addREl=document.getElementById("addR"); if(addREl) addREl.value="0";
      const addQEl=document.getElementById("addQ"); if(addQEl) addQEl.value="0";

      // 取消当前楼层中该 questKey 的未完成救助格（确保“下次不再遭遇同样救助”）
      if(s.map && s.map.events){
        const qk=p.questKey||"";
        for(const k in s.map.events){
          const ev=s.map.events[k];
          if(ev && !ev.done && ev.type==="rescue" && (ev.questKey||"")===qk){
            delete s.map.events[k];
          }
        }
      }

      // 如果这是长线所需救助，则断开该支线，避免后续再出现同类型救助
      if(p.questKey==="letter" && s.story && s.story.quest && s.story.quest.letter){
        const q=s.story.quest.letter;
        q.stage=0; q.done=false; q.combatBlocked=true;
        q.hasLetter=false; q.delivered=false;
      }

      // 提高战斗倾向：减少救助、增加“必须战斗”的怪物遭遇
      s.eventBias.conflict=(s.eventBias.conflict||0)+2;
      s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
      // 下一层起暂不再生成救助类事件
      if(s.story){
        s.story.rescueSkipUntilFloor=Math.max(Number(s.story.rescueSkipUntilFloor||0), Number(s.floor||1)+1);
      }

      p.done=true; s.pending=null;
      sys("你选择放弃救助。下一次更可能遭遇需要战斗的怪物。",SYS_AVATARS[2]);
      renderMap(); renderHUD();
      popStoryNote(s);

      if(!G.offlineMode){
        try{ await saveStateCloud("rescue_refused", false); }catch(e){}
      }
      return;
    }

    // 宝箱可选择不开：不消耗点数、不标记 done，关闭面板后下次再来还能继续选
    if(p.type==="chest" && G.chestPick==="skip"){
      G.chestPick=null;
      G.rescuePick=null;
      s.pending=null;
      const txt="你暂时放过了宝箱。下次经过时仍可选择开启。";
      sysTransient(txt,SYS_AVATARS[0],1600);
      renderMap(); renderHUD();
      return;
    }

    // 怪物可逃跑：成功则直接结束这格（不结算奖励）；失败则玩家生命 -1
    if(p.type==="monster" && G.monsterPick==="escape"){
      G.monsterPick=null;
      const success=Math.random()<0.45; // 仅用于逃跑结果，不向玩家显示概率
      if(success){
        p.done=true; p.resolvedKind="escape"; s.pending=null;
        sysTransient("你成功逃离了这场遭遇。",SYS_AVATARS[1],1600);
        renderMap(); renderHUD();
        if(!G.offlineMode){
          try{ await saveStateCloud("escape_success", false); }catch(e){}
        }
      }else{
        s.hp=Number(s.hp||0)-1;
        sysTransient("你没能逃开，失去 1 点生命。",SYS_AVATARS[2],1600);
        renderMap(); renderHUD();
        if(s.hp<=0){ await onDeath(); return; }
        // 逃跑失败：事件仍需继续处理（本分支已 return，不依赖 shouldSave）
      }
      popStoryNote(s);
      // 离线模式不写云端；已结束的逃跑成功仍会写入（上面已写）
      return;
    }

    const addR=Math.max(0,parseInt(document.getElementById("addR").value||"0",10));
    const addQ=Math.max(0,parseInt(document.getElementById("addQ").value||"0",10));
    s.stockReply=(s.stockReply||0)+addR;
    s.stockQuote=(s.stockQuote||0)+addQ;
    document.getElementById("addR").value="0";
    document.getElementById("addQ").value="0";

    const pts=s.stockReply+s.stockQuote*5;
    let shouldSave=true;

    if(p.type==="chest"){
      if(pts<p.need) { renderHUD(); return sys("点数不足，宝箱未开。可继续积累回复/被引用。",SYS_AVATARS[2]); }
      const before=consumePts(s,p.need);
      const usedR=before.usedR||0;
      const usedQ=before.usedQ||0;
      p.done=true; s.pending=null;
      s.reward+=(p.reward||1);
      s.story.chestOpen=(s.story.chestOpen||0)+1;
      tryAdvanceQuests(s,{type:"chest_done",eventQuest:p.questKey||""});
      const loot=grantDungeonLootInstances_(s,1);
      let questNarr="";
      if(p.questKey==="herb"){
        questNarr="你找到灰狼所需的药草，并把它带在身上。";
      }else if(p.questKey==="lamp"){
        questNarr="你真的找到了灯，并顺手把它点亮了。";
      }
      sys(
        "宝箱开启！积分 +" + (p.reward||1) +
        "，战利品：随机获得 " + lootKindLabelDungeon_(loot.primaryKind) + "。" +
        (questNarr?(" " + questNarr):"") +
        "扣除待用：回复 " + usedR + "；被引用 " + usedQ + "。",
        SYS_AVATARS[1]
      );
      renderMap(); renderHUD();
    }else if(p.type==="rescue"){
      if(pts<p.need) { renderHUD(); return sys("救助点数不足（需要 "+p.need+"）。",SYS_AVATARS[2]); }
      const before=consumePts(s,p.need);
      const usedR=before.usedR||0;
      const usedQ=before.usedQ||0;
      p.done=true; s.pending=null;
      s.reward+=p.reward; s.hp=Math.min(s.maxHp,s.hp+1);
      s.story.kindness=(s.story.kindness||0)+1;
      s.story.rescueDone=(s.story.rescueDone||0)+1;
      tryAdvanceQuests(s,{type:"rescue_done",eventQuest:p.questKey||""});
      const nLoot=Math.min(3, Math.max(1, Math.floor((p.reward||0)/25)+1));
      grantDungeonLootInstances_(s,nLoot);
      let questNarr="";
      if(p.questKey==="letter"){
        questNarr="你把信交给了收信人。那道心结终于松动。";
      }
      sys(
        "你成功救助了对方，收获了真诚感谢。积分 +"+p.reward+"，生命 +1。战利品已自动计入面板。" +
        (questNarr?(" " + questNarr):"") +
        "扣除待用：回复 " + usedR + "；被引用 " + usedQ + "。",
        SYS_AVATARS[1]
      );
      renderMap(); renderHUD();
    }else if(p.type==="monster"){
      const availablePts=pts;
      const needPts=p.hp;
      if(needPts<=0) { s.pending=null; }
      if(availablePts<=0){
        const remain=needPts;
        const needQ=Math.ceil(remain/5);
        renderHUD();
        return sys("你目前没有可消耗的回复/被引用。要打赢至少需要：回复 "+remain+" 或被引用 "+needQ+"。",SYS_AVATARS[2]);
      }
      const usePts=Math.min(availablePts, needPts);
      const before=consumePts(s,usePts);
      const usedR=before.usedR||0;
      const usedQ=before.usedQ||0;
      p.hp-=usePts;
      if(p.hp>0){
        s.pending=p;
        const remain=p.hp;
        const needQ=Math.ceil(remain/5);
        sys(
          "你消耗共造成 "+usePts+" 点伤害（扣除待用：回复 "+usedR+"；被引用 "+usedQ+"）。" +
          "怪物HP还剩 "+remain+"。要打赢至少需要：回复 "+remain+" 或被引用 "+needQ+"。",
          SYS_AVATARS[2]
        );
        renderMap(); renderHUD();
        shouldSave=false; // 战斗未结束：减少云端写入频率
      }else{
        p.done=true; s.pending=null;
        s.reward+=p.reward;
        const nLoot=Math.min(4, Math.max(1, Math.floor((p.reward||0)/60)+1));
        grantDungeonLootInstances_(s,nLoot);
        sys(
          "怪物被击退，积分 +"+p.reward+"。（本次扣除待用：回复 "+usedR+"；被引用 "+usedQ+"）战利品已自动计入面板。",
          SYS_AVATARS[1]
        );
        renderMap(); renderHUD();
      }
    }else if(p.type==="talk_monster"){
      let v;
      if(G.talkPick!==null && G.talkPick!==undefined) v=Number(G.talkPick);
      else v=parseInt(document.getElementById("talkSel").value||"-1",10);
      G.talkPick=null;
      if(v<0 || !p.outcomes || !p.outcomes[v]) return sys("请先选择一个沟通选项。",SYS_AVATARS[2]);
      const oc=p.outcomes[v]||"combat";

      if(oc==="peace"){
        p.done=true; p.resolvedKind="peace"; s.pending=null; s.reward+=p.reward;
        s.eventBias.peace=(s.eventBias.peace||0)+1;
        s.eventBias.conflict=Math.max(0,(s.eventBias.conflict||0)-1);
        s.story.kindness=(s.story.kindness||0)+1;
        s.story.peaceTalks=(s.story.peaceTalks||0)+1;
        const questBefore={
          herb:!!(s.story.quest&&s.story.quest.herb&&s.story.quest.herb.done),
          lamp:!!(s.story.quest&&s.story.quest.lamp&&s.story.quest.lamp.done),
          letter:!!(s.story.quest&&s.story.quest.letter&&s.story.quest.letter.done)
        };
        const rewardBefore=s.reward;
        tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"peace"});
        const rewardDelta=s.reward-rewardBefore;
        let questNarr="";
        if(rewardDelta>0){
          if(!questBefore.herb && s.story.quest && s.story.quest.herb && s.story.quest.herb.done){
            questNarr="支线【药草与幼崽】完成：你用药草治愈了幼崽，灰狼终于安心。";
          }else if(!questBefore.lamp && s.story.quest && s.story.quest.lamp && s.story.quest.lamp.done){
            questNarr="支线【夜灯守望】完成：你点亮的灯驱散了黑暗，石像鬼把夜里交给了光。";
          }else if(!questBefore.letter && s.story.quest && s.story.quest.letter && s.story.quest.letter.done){
            questNarr="支线【未寄出的信】完成：你让信抵达该去的地方，魔像的心结被解开。";
          }
        }
        grantDungeonLootInstances_(s,1);
        sys(
          "你理解了它的难处，和平解决。积分 +"+p.reward+"。" +
          (questNarr?(" "+questNarr+" 积分 +" + rewardDelta + "。"):"") +
          "战利品已自动计入面板。下一层更可能出现可沟通/救助事件。",
          SYS_AVATARS[1]
        );
        renderMap(); renderHUD();
      }else if(oc==="conflict"){
        p.done=true; p.resolvedKind="conflict"; s.pending=null;
        const rw=Math.max(4,Math.floor(p.reward*0.45));
        s.reward+=rw;
        s.eventBias.conflict=(s.eventBias.conflict||0)+1;
        s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
        s.story.violence=(s.story.violence||0)+1;
        tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"conflict"});
        grantDungeonLootInstances_(s,2);
        sys(
          "沟通有些生硬但仍化解冲突。积分 +"+rw+"。战利品已自动计入面板。下一层可能更容易出现战斗事件。",
          SYS_AVATARS[2]
        );
        renderMap(); renderHUD();
      }else{
        // 战斗：把这一格变成战斗状态
        p.done=true; p.resolvedKind="combat";
        s.pending={type:"monster",hp:p.hp,reward:Math.floor(p.reward*0.7),done:false};
        s.eventBias.conflict=(s.eventBias.conflict||0)+2;
        s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
        s.story.violence=(s.story.violence||0)+2;
        tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"combat"});
        sys("沟通破裂，怪物情绪失控，进入战斗。接下来几层战斗风险上升。",SYS_AVATARS[2]);
        shouldSave=false; // 战斗未结束：减少云端写入
        renderMap(); renderHUD();
      }
    }

    if(s.hp<=0){ await onDeath(); return; }
    popStoryNote(s);

    // 离线游玩：不写入同层事件存档
    if(!G.offlineMode && shouldSave){
      try{
        await saveStateCloud("resolve_event", false);
      }catch(e){
        sys("云端写入失败，本次事件未确认。",SYS_AVATARS[2]);
      }
    }

    renderMap(); renderHUD();
  }finally{
    G.actionBusy=false;
  }
}

function consumePts(s,need){
  let rem=Number(need||0);
  if(rem<=0) return {usedR:0, usedQ:0};
  s.stockQuote=Number(s.stockQuote||0);
  s.stockReply=Number(s.stockReply||0);

  let usedQ=0, usedR=0;

  // 先尽量用“被引用”凑够 5 点单位（每条被引用=5点）
  const useQ=Math.min(s.stockQuote, Math.floor(rem/5));
  if(useQ>0){
    s.stockQuote-=useQ;
    usedQ+=useQ;
    rem-=useQ*5;
  }

  // rem 现在为 0..4，剩下用“回复”逐点扣除；若回复不够，则多花 1 条被引用补足，
  // 并把多余的点数折回待用“回复”（避免扣光导致的误差）。
  if(rem>0){
    if(s.stockReply>=rem){
      s.stockReply-=rem;
      usedR+=rem;
      rem=0;
    }else{
      const missing=rem - s.stockReply; // 1..4
      // 全部消耗回复
      usedR += s.stockReply;
      s.stockReply=0;
      // 理论上：缺的点不会超过4，所以多花一条被引用（5点）即可覆盖
      if(s.stockQuote<=0) return {usedR, usedQ};
      s.stockQuote-=1;
      usedQ+=1;
      const over=5 - missing; // 1..4
      s.stockReply += over;
      rem=0;
    }
  }

  return {usedR, usedQ};
}

async function goDown(){
  const s=G.state;if(!s||G.busy)return;
  if(G.actionBusy){
    sysTransient("正在处理事件，请稍后再下楼。",SYS_AVATARS[2],1600);
    return;
  }
  try{ const el=document.getElementById("sysMsg"); if(el) el.textContent=""; }catch(e){}
  setBusy(true,"正在下楼请静候...");
  if(G.moveSaveTimer){ try{ clearTimeout(G.moveSaveTimer); }catch(e){} G.moveSaveTimer=null; }
  if(s.pending){ setBusy(false); return sys("本格事件尚未处理，无法下楼。",SYS_AVATARS[2]); }
  if(G.moveSaving){
    sysTransient("系统正在保存云端，请稍后再下楼。",SYS_AVATARS[2],1600);
    setBusy(false);
    return;
  }
  if(!(s.player.x===s.map.stairs.x && s.player.y===s.map.stairs.y)){ setBusy(false); return sys("你需要先走到楼梯位置。",SYS_AVATARS[2]); }
  G.actionBusy=true;
  try{
    s.floor+=1;
    // 永久本期勋章 / 永久往期兑换机会触发（通关到指定楼层时弹出）
    if(s.story){
      if(s.floor===20 && !s.story.permCurMedalGiven){
        s.story.permCurMedalGiven=true;
        s.story.permCurMedal=Number(s.story.permCurMedal||0)+1;
        sysTransient("通关第 20 层：获得永久本期勋章！",SYS_AVATARS[1],2600);
        pushStoryLog(s,"永久奖章已解锁：永久本期勋章（第20层）。积分不受影响。");
      }
      const floors=[40,60,80,100,120];
      if(floors.includes(s.floor)){
        const fk=String(s.floor);
        if(!s.story.permPastExchangeGivenFloors[fk]){
          s.story.permPastExchangeGivenFloors[fk]=true;
          s.story.permPastExchange=Number(s.story.permPastExchange||0)+1;
          sysTransient("通关第 "+s.floor+" 层：获得永久往期勋章兑换机会 +1！",SYS_AVATARS[1],2600);
          pushStoryLog(s,"永久奖章已解锁：永久往期勋章兑换机会（第"+s.floor+"层）+1。");
        }
      }
    }
    // 章回推进：每 10 层触发一段温馨奇幻小章节
    if(s.floor%10===0){
      const chapter=CHAPTER_PACKS[s.floor]||CHAPTER_PACKS[50];
      if(chapter && !s.chapterSeen[String(s.floor)]){
        s.chapterSeen[String(s.floor)]=1;
        setNotice("章节解锁：第 "+s.floor+" 层 · "+chapter.title);
        let flavor="";
        const k=Number(s.story.kindness||0), v=Number(s.story.violence||0);
        if(k-v>=3) flavor=" 你一路选择倾听，许多原本敌对的身影开始愿意先开口。";
        else if(v-k>=3) flavor=" 你一路强硬前行，回廊中的戒备越来越重。";
        else flavor=" 你在温柔与锋利之间摇摆，故事也因此更复杂。";
        let chapterBonus=0;
        if(!s.chapterRewardSeen[String(s.floor)]){
          s.chapterRewardSeen[String(s.floor)]=1;
          chapterBonus=12+Math.floor(s.floor/10)*2;
          s.reward+=chapterBonus;
        }
        await showChapterCard(
          "第 "+s.floor+" 层 · "+chapter.title,
          chapter.text+flavor+(chapterBonus>0?(" 章节小结算：积分 +"+chapterBonus+"。"):"")
        );
        sys("章节推进完成："+chapter.title+"。",SYS_AVATARS[1]);
      }
    }
    // 倾向逐层衰减，避免永久锁定某一类事件
    s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
    s.eventBias.conflict=Math.max(0,(s.eventBias.conflict||0)-1);
    s.story.floorsDescended=(s.story.floorsDescended||0)+1;
    tryAdvanceQuests(s,{type:"descend"});
    const hasNote=popStoryNote(s);
    const m=buildFloor(s.floor); s.map=m; s.player={x:m.start.x,y:m.start.y}; s.pending=null; s.lastEventKey="";
    s.hp=Math.min(s.maxHp,s.hp+1);
    try{ await saveStateCloud("next_floor"); }catch(e){ return sys("云端写入失败，无法下楼确认。",SYS_AVATARS[2]); }
    if(!(s.floor%10===0 && s.chapterSeen[String(s.floor)])){
      if(!hasNote) sys("你来到第 "+s.floor+" 层。墙壁之外，仍有等待被照亮的故事。",SYS_AVATARS[1]);
    }
    // 夜灯守望进入 stage=2 后：在新楼层补齐“需要开箱”的格子
    ensureQuestFollowupEvents_(s);
    renderMap(); renderHUD();
  }finally{
    G.actionBusy=false;
    setBusy(false);
  }
}

async function settle(result){
  const s=G.state;if(!s||G.busy)return;
  setBusy(true,"正在结算，请静候…");
  try{
    await appendRecord(result||"结算");
    await apiJsonp("clear_state",{user_id:G.uid,_ts:String(Date.now())});
    G.state=null;
    show("gameCard",false); show("recordCard",false); show("menuCard",true);
    setNotice("结算完成：积分 "+(s.reward||0)+"。");
  }catch(e){
    setNotice("云端结算失败，请稍后重试。");
  }finally{ setBusy(false); }
}

async function onDeath(){
  const s=G.state;if(!s)return;
  const runReward=Number(s.reward||0);
  await appendRecord("阵亡重置 | 本次积分 "+runReward);
  await apiJsonp("clear_state",{user_id:G.uid,_ts:String(Date.now())});
  G.state=null;
  show("gameCard",false); show("recordCard",false); show("menuCard",true);
  setNotice("你已经死亡：本次积分已保留为结算记录，共获得 "+runReward+" 分；将从第1层楼开始，回到主画面。");
  try{ sys("死亡结算完成：积分 "+runReward+"。",SYS_AVATARS[2]); }catch(e){}
}

async function changeIdFromMenu(){
  const oldId=(G.uid||"").trim(); if(!oldId) return;
  let newId=prompt("请输入新的论坛ID：",oldId); if(newId===null) return;
  newId=(newId||"").trim(); if(!newId||newId===oldId) return;
  setBusy(true,"正在替换云端ID，请静候…");
  try{
    await apiJsonp("rename_uid",{old_id:oldId,new_id:newId,_ts:String(Date.now())});
    G.uid=newId; document.getElementById("uid").value=newId; document.getElementById("hello").textContent="玩家："+newId;
    setNotice("ID 已替换为 "+newId+"，云端记录已同步归并。");
    await cloudConfirmAndLoad();
  }catch(e){ setNotice("ID 替换失败，请稍后重试。"); }
  finally{ setBusy(false); }
}

async function changeIdMidGame(){
  if(!G.uid) return;
  const ok=confirm("中途更改ID会立即同步替换云端记录，并继续当前进度。是否继续？");
  if(!ok) return;
  await changeIdFromMenu();
  if(G.state){ try{ await saveStateCloud("change_id_midgame"); }catch(e){} renderHUD(); }
}

function openRecords(){ show("menuCard",false); show("gameCard",false); show("recordCard",true); loadRecords(1); }
async function loadRecords(page){
  if(!G.uid) return;
  G.page=Math.max(1,page||1);
  const log=document.getElementById("recordLog");
  log.textContent="读取中…";
  try{
    const res=await apiJsonp("list_records",{page:String(G.page),page_size:String(PAGE_SIZE)});
    const list=(res.data&&res.data.list)||[];
    if(!list.length){ log.textContent="暂无记录。"; document.getElementById("pageTxt").textContent="第 "+G.page+" 页"; return; }
    log.innerHTML=list.map((x,i)=>'<div class="rank"><div>#'+((G.page-1)*PAGE_SIZE+i+1)+'</div><div>'+escapeHtml(x.id||"")+'</div><div>'+(x.time||"")+'</div><div>'+(x.reward||0)+'</div></div>').join("");
    document.getElementById("pageTxt").textContent="第 "+G.page+" 页";
  }catch(e){ log.textContent="云端读取失败。"; }
}
function prevPage(){ if(G.page>1) loadRecords(G.page-1); }
function nextPage(){ loadRecords(G.page+1); }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }

function backMenu(){ show("gameCard",false); show("recordCard",false); show("menuCard",true); }

window.addEventListener("DOMContentLoaded",()=>{
  const d=new Date();
  const stamp=d.getFullYear().toString()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0")+String(d.getSeconds()).padStart(2,"0");
  document.getElementById("versionTxt").textContent="版本："+VER+"+"+stamp;
  document.getElementById("loadingAvatar").src=SYS_AVATARS[0];
  document.getElementById("sysAvatar").src=SYS_AVATARS[0];
  sys("欢迎来到地下城。这里有战斗，也有等待被温柔回应的心。",SYS_AVATARS[0]);
  if(!gasUrl()){
    document.getElementById("loginNotice").textContent="请以 ?record=你的GAS_URL 打开，否则无法云端游玩。";
  }
});
