<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>温馨地下城</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 15%,#261842 0,#0b0b1b 45%,#04040d 100%);color:#f3ecff;font-family:Segoe UI,Arial,sans-serif;padding:14px}
    .app{max-width:1100px;margin:0 auto;background:linear-gradient(180deg,#1a1233,#0e0c1f);border:1px solid #5b4594;border-radius:14px;padding:12px;box-shadow:0 10px 34px #0008}
    .title{font-size:32px;margin-bottom:8px;color:#f6dcff;text-shadow:0 0 14px #8a6bff88}
    .card{background:linear-gradient(180deg,#1b1f45,#141733);border:1px solid #5a63a3;border-radius:10px;padding:10px;margin-bottom:10px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
    .hidden{display:none!important}
    input,button,select{border:1px solid #6a70b4;background:#131836;color:#f0f2ff;border-radius:8px;padding:8px 10px;font-size:14px}
    button{cursor:pointer;transition:.18s transform,.18s filter}.primary{background:#5c47d6}.good{background:#2b9f74}.warn{background:#a26a1a}
    button:hover{transform:translateY(-1px);filter:brightness(1.08)}
    .hud{display:block}
    /* 右侧上方按钮：集中一行显示，避免占用过多宽度 */
    .menuStack{display:flex;flex-direction:row;gap:8px;flex-wrap:nowrap;align-items:center;margin-bottom:8px;justify-content:flex-start}
    .menuStack button{width:auto;white-space:nowrap;padding:6px 8px;font-size:13px}
    .achMini{padding:6px 10px;min-width:34px;border-radius:8px}
    .achMini:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(0.6)}
    #topMenuStack{flex-direction:column;gap:8px;align-items:flex-start}
    .menuRow{display:flex;gap:8px;flex-wrap:nowrap;align-items:center}
    .menuActsRow{display:flex;gap:10px;align-items:flex-start}
    #navActs{display:flex;gap:8px;flex-wrap:nowrap}
    #navActs button{padding:8px 10px;font-size:13px}
    .mapbox{
      background:linear-gradient(180deg,#0f1024,#090a1a);
      border:1px solid #4c4f86;border-radius:8px;padding:8px;
      overflow:auto;max-height:520px;box-shadow:inset 0 0 28px #7f72ff1a;width:100%;
      display:flex;gap:12px;align-items:flex-start
    }
    .mapArea{flex:0 0 auto}
    .panelCol{flex:0 0 360px;min-width:360px}
    .panelCols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
    .s{display:grid;grid-template-columns:95px 1fr;gap:6px;margin-bottom:7px}.k{color:#b8baf0}.v{color:#fbf8ff}
    .map{border-collapse:collapse}
    .map td{width:30px;height:30px;text-align:center;vertical-align:middle;border:1px solid #23274f;font-size:12px}
    .fog{background:#070810;color:#070810}.wall{background:#1f1a2f;color:#1f1a2f}.floor{background:#1d2143}
    .wallHint{background:repeating-linear-gradient(45deg,#9a9a9a55 0,#9a9a9a55 3px,#1f1a2f 3px,#1f1a2f 7px),#1f1a2f;color:#cfcfcf}
    .water{background:#1a3f66;color:#b7e6ff}.stairs{background:#4d3c78;color:#ffe18f}.event{outline:1px dashed #9d8cff}
    .acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#101536c9;border:1px solid #4f57a5;border-radius:8px;padding:8px}
    /* 怪物战斗事件：让“攻击/逃跑”按钮同一行 */
    #eventActs.monsterBattle #talkBtns{width:auto !important;margin-top:0 !important;flex-wrap:nowrap !important}
    .sysbox{margin-top:8px;background:#121634;border:1px solid #4f5ab0;border-radius:8px;padding:8px}
    .sysline{display:flex;gap:8px;align-items:flex-start}.sysicon{width:56px;height:56px;object-fit:contain}.sysc{font-size:13px;line-height:1.6}
    .log{max-height:230px;overflow:auto;border:1px dashed #626cb3;border-radius:8px;padding:8px;background:#0d1230;font-size:13px}
    .rank{display:grid;grid-template-columns:46px 1fr 130px 80px;gap:6px;padding:7px;border-bottom:1px solid #39427a}
    .version{text-align:center;color:#b7bee8;font-size:12px;margin-top:6px}
    .overlay{position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:9999}
    .overlay .box{min-width:300px;max-width:420px;background:#122844;border:1px solid #4e7fca;border-radius:12px;padding:14px;display:flex;gap:10px;align-items:center}
    .overlay .box img{width:64px;height:64px;object-fit:contain}.overlay .t{line-height:1.6}
    .chapter-box{min-width:320px;max-width:520px;background:linear-gradient(180deg,#261743,#12142e);border:1px solid #8f7aff;border-radius:14px;padding:16px;box-shadow:0 0 30px #8f7aff40}
    .chapter-title{font-size:20px;color:#ffe9b6;margin-bottom:8px}
    .chapter-text{line-height:1.7;color:#ece7ff;margin-bottom:12px}
    /* 成就列表 / 任务清单：固定高度内纵向滚动 */
    .overlayScrollList{
      max-height:min(52vh,420px);
      overflow-y:auto;
      overflow-x:hidden;
      padding-right:8px;
      margin-top:8px;
      margin-bottom:8px;
      scrollbar-gutter:stable;
    }
    .overlayScrollList::-webkit-scrollbar{width:8px}
    .overlayScrollList::-webkit-scrollbar-track{background:#1a1530;border-radius:4px}
    .overlayScrollList::-webkit-scrollbar-thumb{background:#6a62a488;border-radius:4px}
    /* 背包：内容区限高纵向滚动 */
    #bagText.bagScrollArea{
      max-height:min(52vh,380px);
      overflow-y:auto;
      overflow-x:hidden;
      padding-right:8px;
      margin-bottom:8px;
      scrollbar-gutter:stable;
    }
    /* 成就弹窗：整体限高 + 中间区块滚动，避免详情过长顶掉关闭钮 */
    .ach-modal-box{max-height:min(90vh,680px);display:flex;flex-direction:column;width:min(96vw,520px);box-sizing:border-box}
    .ach-modal-body{flex:1;min-height:0;max-height:min(58vh,420px);overflow-y:auto;overflow-x:hidden;padding-right:8px;margin-top:6px;scrollbar-gutter:stable}
    #achList{display:flex;flex-direction:column;flex-wrap:nowrap;gap:6px;align-content:flex-start}
    #achList .achRow{flex:0 0 auto;width:100%;max-width:100%}
    .taskLineMonster{color:#9fd8ff}
    .taskLineHuman{color:#ffb8d9}
    .taskSectionLabel{font-size:12px;font-weight:600;margin:10px 0 6px;letter-spacing:.04em}
    .taskSectionMonster{color:#8ecfff}
    .taskSectionHuman{color:#ff9ec8}
    .taskIntro{margin-bottom:6px;color:#e8e4ff}
    .achItemMonster{border-left:3px solid #6ab8ff;padding-left:8px}
    .achItemHuman{border-left:3px solid #ff7eb3;padding-left:8px}
    .achRow{display:flex;flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:10px;width:100%}
    .achHint{font-size:12px;color:#ffd66e;line-height:1.5;max-width:100%;padding:0 2px 0 0}
    .hpOuter{height:12px;background:#120b1f;border-radius:8px;overflow:hidden;border:1px solid #4633a0}
    .hpInner{height:100%;background:linear-gradient(90deg,#2ed573,#ff6b6b);width:100%;border-radius:8px;transition:width .22s}
    .hpNum{font-size:12px;color:#e9e9ff;margin-top:6px;text-align:center}
    #belowInteract{grid-column:2;display:flex;flex-direction:column;gap:10px}
  </style>
</head>
<body>
<div class="app">
  <div class="title">温馨地下城</div>

  <div id="loginCard" class="card">
    <div class="row">
      <input id="uid" maxlength="30" placeholder="请输入论坛ID（必填）">
      <button class="primary" onclick="enterGame()">进入地下城</button>
    </div>
    <div id="loginNotice" style="font-size:13px;color:#c9daf6"></div>
  </div>

  <div id="menuCard" class="card hidden">
    <div class="row"><strong id="hello"></strong></div>
    <div class="row"><span id="menuNotice" style="color:#ffd66e"></span></div>
    <div class="row">
      <button id="btnStart" class="primary" onclick="startNew()">开始新冒险</button>
      <button id="btnResume" class="good" onclick="resumeRun()">继续冒险</button>
      <button onclick="setOfflineMode(true)">离线游玩</button>
      <button onclick="manualSaveToCloud()">保存进度(云端)</button>
      <button onclick="openRecords()">查看记录</button>
      <button onclick="changeIdFromMenu()">更改ID（同步替换云端）</button>
    </div>
  </div>

  <div id="gameCard" class="card hidden">
    <div class="hud">
      <div class="mapbox">
        <div class="mapArea">
          <table id="mapTable" class="map"style="min-width:400px"></table>
        </div>

        <div id="panelCol" class="panelCol">
          <div class="panelCols" >
            <div class="colA" style="min-width:300px">
              <div class="s"><div class="k">玩家</div><div id="pUid" class="v"></div></div>
              <div class="s"><div class="k">楼层</div><div id="pFloor" class="v"></div></div>
              <div class="s"><div class="k">生命</div><div class="v">
                <div class="hpOuter"><div id="pHpBar" class="hpInner"></div></div>
                <div id="pHpText" class="hpNum"></div>
              </div></div>
              <div class="s"><div class="k">积分(仅排行)</div><div id="pReward" class="v"></div></div>

            </div>
            <div class="colB" style="min-width:300px">
              <div class="s"><div class="k">待用回复</div><div id="pR" class="v"></div></div>
              <div class="s"><div class="k">待用被引用</div><div id="pQ" class="v"></div></div>
              <div class="s"><div class="k">叙事倾向</div><div id="pAlign" class="v">-</div></div>
              <div class="s"><div class="k">任务</div><div id="pQuest" class="v">-</div></div>
            </div>
          </div>
                   <div id="pLootRow" class="s" style="display:none"><div class="k">战利品</div><div id="pLoot" class="v"></div></div>

       <div id="offlineWarn" style="font-size:13px;color:#ffd66e;margin-top:6px;min-height:18px"></div>
          <!-- 事件面板（在系统提醒下方） -->
        <div id="belowInteract" style="display:flex;flex-direction:column;gap:10px;min-width:600px">
          <div id="eventActs" class="acts hidden">
            <span id="eventTxt">事件</span>
            <span>新增回复</span><input id="addR" type="number" min="0" value="0">
            <span>新增被引用</span><input id="addQ" type="number" min="0" value="0">
            <button id="eventBtn" class="good" onclick="resolveEvent()">执行</button>
            <select id="talkSel" class="hidden"></select>
            <div id="talkBtns" class="hidden" style="width:100%;gap:8px;flex-wrap:wrap;display:flex;margin-top:6px"></div>
          </div>
        </div>

    </div>

  </div>

        <!-- 右侧按钮区：menuStack + 移动按钮并排 -->
        <div class="menuActsRow">
          <div class="menuStack" id="topMenuStack">
            <div class="menuRow">
              <button class="warn" onclick="settle('撤退结算')">撤退结算</button>
              <button onclick="backMenu()">主菜单</button>
              <button onclick="changeIdMidGame()">更改ID</button>
              <button onclick="setOfflineMode(true)">离线游玩</button>
              <button onclick="manualSaveToCloud()">保存进度(云端)</button>
            </div>
            <div class="menuRow">
              <button id="bagBtn" onclick="openBag()">背包</button>
              <button id="achBtn" onclick="openAchievementsPage()">成就</button>
              <button id="taskBtn" onclick="openTasksPage()">任务</button>
            </div>
          </div>

          <div class="acts" id="navActs">
            <button onclick="move(0,-1)">上</button>
            <button onclick="move(-1,0)">左</button>
            <button onclick="move(1,0)">右</button>
            <button onclick="move(0,1)">下</button>
            <button class="primary" onclick="goDown()">下楼</button>
          </div>
        <div class="sysbox">
          <div class="sysline">
            <img id="sysAvatar" class="sysicon" alt="sys">
            <div id="sysMsg" class="sysc"></div>
          </div>
        </div>
        </div>


 


  <div id="recordCard" class="card hidden">
    <div class="row"><strong>云端记录</strong></div>
    <div class="row">
      <button onclick="backMenu()">回主菜单</button>
      <button class="primary" onclick="loadRecords(1)">刷新</button>
    </div>
    <div id="recordLog" class="log"></div>
    <div class="row">
      <button onclick="prevPage()">上一页</button>
      <span id="pageTxt">第 1 页</span>
      <button onclick="nextPage()">下一页</button>
    </div>
  </div>

  <div id="loadingOverlay" class="overlay hidden" aria-hidden="true">
    <div class="box">
      <img id="loadingAvatar" alt="loading">
      <div id="loadingText" class="t">正在读取中…</div>
    </div>
  </div>
  <div id="chapterOverlay" class="overlay hidden" aria-hidden="true">
    <div class="chapter-box">
      <div id="chapterTitle" class="chapter-title">章节</div>
      <div id="chapterText" class="chapter-text">章节说明</div>
      <div class="row" style="justify-content:flex-end;margin-bottom:0">
        <button class="primary" onclick="closeChapterCard()">继续冒险</button>
      </div>
    </div>
  </div>

  <div id="bagOverlay" class="overlay hidden" aria-hidden="true">
    <div class="chapter-box" style="min-width:360px;max-width:520px">
      <div class="chapter-title">背包</div>
      <div class="chapter-text bagScrollArea" id="bagText" style="white-space:pre-wrap;line-height:1.7"></div>
      <div class="row" id="bagToolRow" style="margin-top:10px;justify-content:flex-start;gap:8px;flex-wrap:wrap">
        <button type="button" class="good" id="useStairBtn" onclick="useStairDetector()">使用楼梯探测器</button>
        <button type="button" class="good" id="useCharmBtn" onclick="useMonsterCharmActive()">使用怪物护符（主动避战）</button>
      </div>
      <div class="row" style="justify-content:flex-end;margin-bottom:0">
        <button class="primary" onclick="closeBag()">关闭</button>
      </div>
    </div>
  </div>

  <div id="achievementOverlay" class="overlay hidden" aria-hidden="true">
    <div class="chapter-box ach-modal-box">
      <div class="chapter-title" id="achTitle">成就</div>
      <div id="achBackRow" class="row hidden" style="margin-top:4px;justify-content:flex-start">
        <button type="button" class="primary" onclick="achievementBackToList()">返回成就清单</button>
      </div>
      <div id="achModalBody" class="ach-modal-body">
        <div class="chapter-text" id="achText" style="white-space:pre-wrap;line-height:1.7;margin-bottom:8px"></div>
        <div id="achList"></div>
      </div>
      <div class="row" style="justify-content:flex-end;margin-bottom:0;margin-top:10px;flex-shrink:0">
        <button class="primary" onclick="closeAchievement()">关闭</button>
      </div>
    </div>
  </div>

  <div id="acquireOverlay" class="overlay hidden" aria-hidden="true" style="z-index:10050">
    <div class="chapter-box" style="min-width:300px;max-width:420px">
      <div class="chapter-title" id="acquireTitle">获得道具</div>
      <div class="chapter-text" id="acquireText" style="white-space:pre-wrap;line-height:1.75;margin-bottom:12px"></div>
      <div class="row" style="justify-content:flex-end;margin-bottom:0">
        <button class="primary" type="button" onclick="closeAcquireOverlay()">知道了</button>
      </div>
    </div>
  </div>

  <div id="tasksOverlay" class="overlay hidden" aria-hidden="true">
    <div class="chapter-box" style="min-width:360px;max-width:520px">
      <div class="chapter-title">任务（主线·三阶段）</div>
      <div class="chapter-text overlayScrollList" id="tasksText" style="white-space:pre-wrap;line-height:1.7"></div>
      <div class="row" style="justify-content:flex-end;margin-bottom:0">
        <button class="primary" onclick="closeTasks()">关闭</button>
      </div>
    </div>
  </div>

  <div class="version" id="versionTxt">版本：</div>
</div>

<script>
const VER="v1.4.12-dungeon-story";
const SYS_AVATARS=[
  "https://s.sstmlt.com/img/2026/03/19/1-108359ab38de728aad.png",
  "https://s.sstmlt.com/img/2026/03/19/1-11c14bafe31ee6ee1c.png",
  "https://s.sstmlt.com/img/2026/03/19/1-127cce7b27eb17c91c.png"
];
const PLAYER_AVATAR="https://s.sstmlt.com/img/2026/03/19/1-134fdb6a0ec9b50e46.png";
const PAGE_SIZE=20;
const FIXED_GAS_URL="https://script.google.com/macros/s/AKfycbxg1Z0dc4XhjTUz4ZGgbZ369TOTHcGpgLejHgL9WZsKcFsuZPiTNH5SSYe_0K_JYgYU/exec";
const CHAPTER_PACKS={
  10:{title:"余烬回廊",text:"你在灰烬与灯火之间听见低语：很多怪物并非嗜血，只是太久没被温柔对待。"},
  20:{title:"星砂港口",text:"星砂并不是海盐，而是“被安放的记忆”。每当你用温柔回应一个生命，迷失者就会被指引到这个渡口（港口），在这里把故事交还给自己。"},
  30:{title:"月井花庭",text:"会发光的藤蔓绕着断碑生长，碑文写着：救人者，也在被世界悄悄拯救。"},
  40:{title:"霜羽教堂",text:"寒气中传来祈祷，受伤的翼兽与旅人并肩取暖，谁也不再独自发抖。"},
  50:{title:"晨曦书库",text:"旧书翻开后掉下一封封未寄出的信，原来怪物也会把歉意写得很认真。"}
};
const CHAPTER_MONSTER_PACKS={
  10:[
    {id:"starsand_guardian",txt:"星砂守望者拦下你，它在确认你是否会伤害流浪者。你怎么回应？",opts:["放下武器并承诺护送弱者","要求它立刻让路","尝试突袭"],outcomes:["peace","conflict","combat"]},
    {id:"ember_deer",txt:"余烬鹿在废墟里守着熄灭的火种。你怎么回应？",opts:["帮它重燃火种","催促它快离开","夺走火种"],outcomes:["peace","conflict","combat"]}
  ],
  20:[
    {id:"harbor_siren",txt:"港湾海妖在哭泣，它害怕再次失去船员。你怎么回应？",opts:["倾听并帮它寻找失散名册","嫌它吵闹","拔剑威吓"],outcomes:["peace","conflict","combat"]},
    {id:"mist_colossus",txt:"迷雾巨像误把你认成旧敌。你怎么回应？",opts:["先说明来意并示弱","反讽它记性差","直接攻击"],outcomes:["peace","conflict","combat"]}
  ],
  30:[
    {id:"moonvine_keeper",txt:"月藤守卫担心花庭被毁。你怎么回应？",opts:["答应保护花庭并清理碎石","说这不关你事","砍断藤蔓开路"],outcomes:["peace","conflict","combat"]},
    {id:"well_spirit",txt:"井灵守着祈愿碎片，不敢交给任何人。你怎么回应？",opts:["帮它筛选真正的愿望","催它快点","强取碎片"],outcomes:["peace","conflict","combat"]}
  ],
  40:[
    {id:"frost_wing",txt:"霜翼兽怕体温再伤到同伴。你怎么回应？",opts:["带它去温泉回廊","嫌它麻烦","趁其虚弱下手"],outcomes:["peace","conflict","combat"]},
    {id:"prayer_knight",txt:"祈祷骑士只想守住最后的誓言。你怎么回应？",opts:["尊重誓言并提出合作","嘲笑它过时","强行突破"],outcomes:["peace","conflict","combat"]}
  ],
  50:[
    {id:"dawn_archivist",txt:"晨曦档案师请你帮忙归还遗失手稿。你怎么回应？",opts:["答应协助并追索线索","让它自己处理","焚毁手稿省麻烦"],outcomes:["peace","conflict","combat"]},
    {id:"echo_librarian",txt:"回声馆员担心真相再次被扭曲。你怎么回应？",opts:["共同整理证词","质疑它夸大其词","强行沉默它"],outcomes:["peace","conflict","combat"]}
  ]
};
const QUEST_DEFS={
  herb:{title:"药草与幼崽",steps:["取得灰狼信任","完成一次救助","打开一次宝箱取药","把药送到幼崽"],reward:22},
  lamp:{title:"夜灯守望",steps:["答应石像鬼点灯","继续下探 2 层","收集温暖火种（宝箱）","点亮回廊"],reward:26},
  letter:{title:"未寄出的信",steps:["帮助魔像读信","再完成 2 次和平沟通","完成一次救助转交信件","收到回信"],reward:30}
};
function fillStoryName_(tpl,name){
  return String(tpl||"").replace(/\{name\}/g,name);
}
// 怪物长线：第一次接取 / 中段（宝箱或救助）/ 终段领奖 均用剧情句，避免系统口吻

function buildLonglineRegistry(){

    ["青藤树精","月影狐","沼泥蟾","古木守铃人","溪泉鱼人"],
    ["霜晶蜥","冰墓哨兵","雪羽隼","寒风巫灵","冻土巨蛆"],
    ["熔岩蝎","火舌灵","焦炭兽","烬纹蛇","地心蜗"],
    ["星砂蟹","港潮使","泡沫海妖","铁锚幽魂","栈桥灯童"],
    ["月井花妖","银泉精灵","藤蔓窃贼","花庭园丁","月光蛾"],
    ["霜羽乌鸦","圣钟残魂","冰晶圣女像","墓园引路人","铁栅骑士"],
    ["书蠹虫灵","墨水人","纸页猎犬","回廊学者","尘埃妖精"],
    ["晨曦纸鸢","破晓信使","晨光狮","日轮守望","终章书记"]
  ];
  const monsters=[];
  for(let ti=0;ti<10;ti++){
    for(let mi=0;mi<5;mi++){
      const id="ll_t"+ti+"_m"+mi;
      const name=tierNames[ti][mi];
      const step2=(mi%2===0)?"chest":"rescue";
      const idx=ti*5+mi;
      monsters.push({
        key:id,
        monsterId:id,
        title:name+"的祈望",
        tier:ti,
        floorMin:ti*5+1,
        floorMax:ti*5+5,

        talkStage0:fillStoryName_(LL_INTRO_TEMPLATES[idx%LL_INTRO_TEMPLATES.length],name)+" 你怎么回应？",
        storyMidRescue:fillStoryName_(LL_MID_RESCUE_TEMPLATES[idx%LL_MID_RESCUE_TEMPLATES.length],name),
        storyMidChest:fillStoryName_(LL_MID_CHEST_TEMPLATES[idx%LL_MID_CHEST_TEMPLATES.length],name),

    "离港的水手","失忆的哨兵","失火的工坊主","迷途的祭司","最后的见证者"
  ];
  const humans=[];
  for(let ti=0;ti<10;ti++){
    const id="human_t"+ti;
    const hn=humanTitles[ti];
    humans.push({
      key:id,
      title:hn+"之线",

      rescueStage2:"再次相见时，"+hn+"把一份谢礼郑重递到你面前。对方说，这不是报酬，而是终于能说出口的那句谢谢。",
      achievementText:HUMAN_ACHIEVEMENT_TEXT[ti]

  }
  return {monsters,humans};
}
const LONGLINE_REG=buildLonglineRegistry();
const LONGLINE_MONSTER_DEFS=LONGLINE_REG.monsters;
const HUMAN_LONGLINE_DEFS=LONGLINE_REG.humans;
const LONGLINE_MONSTER_MAP=(function(){
  const o={};
  LONGLINE_MONSTER_DEFS.forEach(d=>{ o[d.key]=d; });
  return o;
})();
const HUMAN_LONGLINE_MAP=(function(){
  const o={};
  HUMAN_LONGLINE_DEFS.forEach(d=>{ o[d.key]=d; });
  return o;
})();
function achievementTitle_(key){
  if(key==="herb") return "药草与幼崽";
  if(key==="lamp") return "夜灯守望";
  if(key==="letter") return "未寄出的信";
  if(HUMAN_LONGLINE_MAP[key]) return HUMAN_LONGLINE_MAP[key].title;
  if(LONGLINE_MONSTER_MAP[key]) return LONGLINE_MONSTER_MAP[key].title;
  return key;
}
/** 当前层、当前进度下：处于 2/3 且需「开宝箱」的支线 questKey（不含「未寄出的信」等需救助的线） */
function listPendingChestQuestKeys_(s){
  const out=[];
  if(!s||!s.story) return out;
  const q=s.story.quest;
  const nf=Number(s.floor||1);
  if(q&&q.herb && Number(q.herb.stage||0)===1 && !q.herb.done && !q.herb.combatBlocked) out.push("herb");
  if(q&&q.lamp && Number(q.lamp.stage||0)===1 && !q.lamp.done && !q.lamp.combatBlocked) out.push("lamp");
  try{
    const lq=s.story.longQuests||{};
    LONGLINE_MONSTER_DEFS.forEach(def=>{
      const qq=lq[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      if(Number(qq.stage||0)!==1 || def.step2!=="chest") return;
      if(nf<def.floorMin||nf>def.floorMax) return;
      out.push(def.key);
    });
    HUMAN_LONGLINE_DEFS.forEach(def=>{
      const qq=lq[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      if(Number(qq.stage||0)!==1) return;
      if(nf<def.floorMin||nf>def.floorMax) return;
      out.push(def.key);
    });
  }catch(e){}
  return out;
}
/** 若宝箱上的 questKey 与当前进度不符（例如旧层残留），清空以免误显示「支线宝箱」 */
function stripStaleChestQuestKey_(s,chestEv){
  if(!s||!chestEv||chestEv.type!=="chest"||chestEv.done) return;
  const qk=String(chestEv.questKey||"");
  if(!qk) return;
  const pending=new Set(listPendingChestQuestKeys_(s));
  if(pending.has(qk)) return;
  chestEv.questKey="";
}
/** 本层是否已有「未开启且已绑定某 questKey」的宝箱 */
function hasOpenChestWithQuestKey_(s,qKey){
  if(!s||!s.map||!s.map.events) return false;
  const ks=String(qKey||"");
  for(const k in s.map.events){
    const ev=s.map.events[k];
    if(ev&&!ev.done&&ev.type==="chest"&&String(ev.questKey||"")===ks) return true;
  }
  return false;
}
/**
 * 随机刷出的宝箱常无 questKey，开启不会推进任何任务。
 * 踏进格子时：仅一项待开宝箱任务则绑定此项；多项则绑定到本层尚未出现「专属宝箱」的那条（顺序：药草→夜灯→人类线→怪物长线）。
 */
function maybeAutoBindChestQuestKey_(s,chestEv){
  if(!s||!chestEv||chestEv.type!=="chest"||chestEv.done) return;
  stripStaleChestQuestKey_(s,chestEv);
  if(String(chestEv.questKey||"")) return;
  const need=listPendingChestQuestKeys_(s);
  if(!need.length) return;
  if(need.length===1){
    chestEv.questKey=need[0];
    return;
  }
  const set=new Set(need);
  const priority=[];
  if(set.has("herb")) priority.push("herb");
  if(set.has("lamp")) priority.push("lamp");
  HUMAN_LONGLINE_DEFS.forEach(d=>{ if(set.has(d.key)) priority.push(d.key); });
  LONGLINE_MONSTER_DEFS.forEach(d=>{
    if(d.step2==="chest" && set.has(d.key)) priority.push(d.key);
  });
  for(let i=0;i<priority.length;i++){
    const k=priority[i];
    if(hasOpenChestWithQuestKey_(s,k)) continue;
    chestEv.questKey=k;
    return;
  }
}
function chestEventPanelText_(s,p,keyHint){
  stripStaleChestQuestKey_(s,p);
  maybeAutoBindChestQuestKey_(s,p);
  const qk=String(p.questKey||"");
  const tail=" "+(keyHint||"");
  const mid="需要点数 "+(p.need||0)+"（回复1点/被引用5点）。开锁后获得积分与战利品。";
  if(qk){
    return "【支线宝箱 · "+achievementTitle_(qk)+"】开启会计入该任务第二阶段。"+mid+tail;
  }
  const pend=listPendingChestQuestKeys_(s);
  let msg="【普通宝箱】"+mid+tail+" 说明：任务进度只认「支线宝箱」；本格未绑定任何支线时，开启仅有积分与战利品。";
  if(pend.length===1){
    msg+=" 提示：你仍有「"+achievementTitle_(pend[0])+"」待客箱，专属宝箱应在其它未开格（或下层探索后由系统补齐）。";
  }else if(pend.length>1){
    msg+=" 提示：你同时有 "+pend.length+" 条任务待客箱，请找已绑定支线的宝箱格；多线并行时本层会逐步补齐多个专属宝箱。";
  }
  return msg;
}
/** 支线宝箱开启后用于章节弹窗的剧情句（与系统行并存） */
function buildChestLineQuestStory_(questKey){
  const qk=String(questKey||"");
  if(!qk) return "";
  if(qk==="herb") return "你找到灰狼所需的药草，并把它带在身上。";
  if(qk==="lamp") return "你真的找到了灯，并顺手把它点亮了。";
  if(LONGLINE_MONSTER_MAP[qk]){
    const t=(LONGLINE_MONSTER_MAP[qk].storyMidChest||"").trim();
    return t;
  }
  if(HUMAN_LONGLINE_MAP[qk]){
    const t=(HUMAN_LONGLINE_MAP[qk].storyMidChest||"").trim();
    return t;
  }
  return "";
}
/** 怪物长线 stage1（等宝箱/救助）时，地图上不应再出现同 ID 的「接任务」沟通格 */

/** 累计完成救助次数 c 之后，下一次发钥匙的阈值（每满 10 次一把） */
function nextKeyThresholdAfterCount(totalCompletedRescues){
  const c=Math.max(0,Number(totalCompletedRescues)||0);
  if(c===0) return 10;
  if(c%10===0) return c+10;
  return Math.ceil(c/10)*10;
}
/** 当前累计 c 次救助时，再完成 1 次是否刚好跨里程碑拿钥匙（用于特别感谢文案） */
function rescueGratitudeNext_(completedSoFar){

/** 当前存档下，救助格上的 questKey 是否仍对应「需要完成的一次救助」 */
function rescueQuestKeyStillValid_(s,qk){

  const k=String(qk||"");

  if(k==="letter"){
    const q=s.story.quest && s.story.quest.letter;
    return !!(q && !q.done && !q.combatBlocked && Number(q.stage||0)===1);
  }
  if(HUMAN_LONGLINE_MAP[k]){
    const def=HUMAN_LONGLINE_MAP[k];
    const qq=s.story.longQuests && s.story.longQuests[k];
    if(!qq||qq.done||qq.combatBlocked) return false;
    const nf=Number(s.floor||1);
    if(nf<def.floorMin||nf>def.floorMax) return false;
    const st=Number(qq.stage||0);

  }

    if(!qq||qq.done||qq.combatBlocked) return false;

const LOOT_WEIGHTS_DUNGEON={jiecao:30,yumao:30,bqMedal30:32,zmMedal30:8};
function pickLootKindDungeon_(){
  const ks=Object.keys(LOOT_WEIGHTS_DUNGEON);
  let total=0; ks.forEach(k=>{ total += Number(LOOT_WEIGHTS_DUNGEON[k]||0); });
  let r=Math.random()*total;
  for(let i=0;i<ks.length;i++){
    const k=ks[i];
    r -= Number(LOOT_WEIGHTS_DUNGEON[k]||0);
    if(r<=0) return k;
  }
  return ks[0]||"jiecao";
}
function lootKindLabelDungeon_(kind){
  if(kind==="jiecao") return "30节操";
  if(kind==="yumao") return "30羽毛";
  if(kind==="bqMedal30") return "30天本期勋章";
  if(kind==="zmMedal30") return "30天字母勋章";
  return kind;
}
function applyLootCapsDungeon_(lb){
  // 节操：jiecao 以“30节操份数”为单位；超出 5000节操则转换为 字母勋章30天
  // 羽毛：yumao 以“10羽毛份数”为单位；超出 2000羽毛则转换为 字母勋章30天
  let jc=Number(lb.jiecao||0);
  let ym=Number(lb.yumao||0);
  let bq=Number(lb.bqMedal30||0);
  let zm=Number(lb.zmMedal30||0);
  const maxJc=Math.floor(5000/30); // 166
  if(jc>maxJc){
    zm += (jc-maxJc);
    jc = maxJc;
  }
  const maxYm=Math.floor(2000/10); // 200
  if(ym>maxYm){
    zm += (ym-maxYm);
    ym = maxYm;
  }
  lb.jiecao=jc; lb.yumao=ym; lb.bqMedal30=bq; lb.zmMedal30=zm;
  return lb;
}
function grantDungeonLootInstances_(s, n){
  if(!s) return {diff:{}, primaryKind:""};
  const lb=s.lootBag|| (s.lootBag={jiecao:0,yumao:0,bqMedal30:0,zmMedal30:0});
  const before={jiecao:lb.jiecao, yumao:lb.yumao, bqMedal30:lb.bqMedal30, zmMedal30:lb.zmMedal30};
  let primaryKind="";
  for(let i=0;i<n;i++){
    const kind=pickLootKindDungeon_();
    if(!primaryKind) primaryKind=kind;
    if(kind==="jiecao") lb.jiecao += 1;
    else if(kind==="yumao") lb.yumao += 3; // 30羽毛 = 3 * (10羽毛)
    else if(kind==="bqMedal30") lb.bqMedal30 += 1;
    else if(kind==="zmMedal30") lb.zmMedal30 += 1;
  }
  applyLootCapsDungeon_(lb);
  const after={jiecao:lb.jiecao, yumao:lb.yumao, bqMedal30:lb.bqMedal30, zmMedal30:lb.zmMedal30};
  const diff={
    jiecao:after.jiecao-before.jiecao,
    yumao:after.yumao-before.yumao,
    bqMedal30:after.bqMedal30-before.bqMedal30,
    zmMedal30:after.zmMedal30-before.zmMedal30
  };
  return {diff, primaryKind};

function renderStoryQuestItemsLines_(s){
  const out=[];
  if(!s||!s.story||!s.story.quest) return out;
  const q=s.story.quest;
  const qh=q.herb;
  if(qh && !qh.done && !qh.combatBlocked && qh.hasHerb && Number(qh.stage||0)>=2){
    out.push("【药草与幼崽】药草（已携带）");
  }
  const ql=q.lamp;
  if(ql && !ql.done && !ql.combatBlocked && Number(ql.stage||0)>=2 && (ql.lit||ql.hasLamp)){
    out.push("【夜灯守望】灯/火种（已携带）");
  }
  const qy=q.letter;
  if(qy && !qy.done && !qy.combatBlocked && qy.hasLetter && Number(qy.stage||0)>=1){
    out.push("【未寄出的信】信件（已携带）");
  }
  try{
    const lq=s.story.longQuests||{};
    LONGLINE_MONSTER_DEFS.forEach(def=>{
      const qq=lq[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      const stg=Number(qq.stage||0);
      if(def.step2==="chest" && stg>=2 && qq.hasItem){
        out.push("【"+def.title+"】关键物（已携带）");
      }else if(def.step2==="rescue" && stg>=2 && qq.delivered){
        out.push("【"+def.title+"】托付物（已落实）");
      }
    });
    HUMAN_LONGLINE_DEFS.forEach(def=>{
      const qq=lq[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      if(Number(qq.stage||0)>=2 && qq.hasItem){
        out.push("【"+def.title+"】任务相关物（已携带）");
      }
    });
  }catch(e){}
  return out;
}

function apiJsonp(action, params){
  return new Promise((resolve,reject)=>{
    const u=gasUrl(); if(!u) return reject(new Error("未提供 record=GAS_URL"));
    const cb="dg_cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    window[cb]=function(res){
      try{ delete window[cb]; s.remove(); }catch(e){}
      if(res && res.ok) resolve(res); else reject(new Error((res&&res.error)||"cloud_error"));
    };
    const p=new URLSearchParams(Object.assign({},params||{}, {action:action,callback:cb,_ts:String(Date.now())}));
    const s=document.createElement("script");
    s.src=u+(u.includes("?")?"&":"?")+p.toString();
    s.onerror=function(){ try{delete window[cb];s.remove();}catch(e){} reject(new Error("云端抓取失败")); };
    document.head.appendChild(s);
  });
}

async function apiPostJson_(payload){
  const u=gasUrl();
  if(!u) throw new Error("no_gas_url");
  // 使用 POST，避免 state_json 过长导致 GET/JSONP URL 失效
  // 先尝试 cors，再回退到 no-cors（我们后续会用 load_state 做确认）
  try{
    const res=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"cors"});
    if(res && res.ok) return true;
  }catch(e){}
  await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"no-cors"}).catch(()=>{});
  return true;
}

  }
  // 支线严格性：
  // - stage=1 时禁止出现该支线相关怪物（避免重复“还在找”的重复触发）
  // - stage=2 时只允许出现该支线相关怪物（保证第三次遇到能结算奖励）
  // - combatBlocked 时永久禁止出现该支线相关怪物（第一次打倒后不再出现该支线）
  if(G.state && G.state.story && G.state.story.quest){
    const q=G.state.story.quest||{};
    const forbid=new Set();
    const allow=new Set();

    if(q.herb){
      const hs=Number(q.herb.stage||0);
      if(!!q.herb.done) forbid.add("wolf");
      if((hs===1 && !q.herb.done) || q.herb.combatBlocked) forbid.add("wolf");
      if(hs===2 && !q.herb.done && !q.herb.combatBlocked) allow.add("wolf");
    }
    if(q.lamp){
      const ls=Number(q.lamp.stage||0);
      if(!!q.lamp.done) forbid.add("gargoyle");
      if((ls===1 && !q.lamp.done) || q.lamp.combatBlocked) forbid.add("gargoyle");
      if(ls===2 && !q.lamp.done && !q.lamp.combatBlocked) allow.add("gargoyle");
    }
    if(q.letter){
      const ys=Number(q.letter.stage||0);
      if(!!q.letter.done) forbid.add("golem");
      if((ys===1 && !q.letter.done) || q.letter.combatBlocked) forbid.add("golem");
      if(ys===2 && !q.letter.done && !q.letter.combatBlocked) allow.add("golem");
    }
    if(G.state && G.state.story && G.state.story.longQuests){
      const lq=G.state.story.longQuests;
      for(let i=0;i<LONGLINE_MONSTER_DEFS.length;i++){
        const d=LONGLINE_MONSTER_DEFS[i];
        const qq=lq[d.key];
        if(!qq) continue;
        const qs=Number(qq.stage||0);
        if(!!qq.done) forbid.add(d.monsterId);
        if((qs===1 && !qq.done) || qq.combatBlocked) forbid.add(d.monsterId);
        if(qs===2 && !qq.done && !qq.combatBlocked) allow.add(d.monsterId);
      }
    }

    if(allow.size>0){
      const ids=[...allow];
      pool=pool.filter(x=>ids.includes(x.id));
    }else if(forbid.size>0){
      const ids=[...forbid];
      pool=pool.filter(x=>!ids.includes(x.id));
    }
  }
  // “求救/帮忙”的怪物：你一旦击杀/撕破和平，后续不再以沟通事件出现
  if(G.state && G.state.story && G.state.story.helpKilledMonsters){
    const hk=G.state.story.helpKilledMonsters||{};
    const filtered=pool.filter(x=>!hk[x.id]);
    if(filtered.length>0) pool=filtered;
    else{
      const filteredBase=base.concat(chapter).filter(x=>!hk[x.id]);
      if(filteredBase.length>0) pool=filteredBase;
      else pool=base.concat(chapter);
    }
  }
  if(!pool.length){
    pool=base.concat(chapter);
    if(tierMon.length){
      const extra=tierMon.map(d=>({id:d.monsterId,txt:d.talkStage0,opts:d.opts.slice(),outcomes:d.outcomes.slice()}));
      pool=pool.concat(extra);
    }
  }
  return pool[rInt(0,pool.length-1)];
}

function makeStoryMonsterById_(monsterId){
  if(LONGLINE_MONSTER_MAP[monsterId]){
    const d=LONGLINE_MONSTER_MAP[monsterId];
    return {id:d.monsterId,txt:d.talkStage0,opts:d.opts.slice(),outcomes:d.outcomes.slice()};
  }
  // 仅用基础四类怪物：保证在“强制补齐/严谨连贯”时能稳定生成目标怪物对话
  const base=[
    {id:"wolf",txt:"灰狼守在药草旁，它在为受伤幼崽找药。你怎么回应？",opts:["先听它说明并一起找药","质疑它在说谎并恐吓","直接开战"],outcomes:["peace","conflict","combat"]},
    {id:"gargoyle",txt:"石像鬼堵住路口，它怕再失去同伴。你怎么回应？",opts:["答应帮它点亮路灯","冷嘲热讽它太懦弱","强行通过并攻击"],outcomes:["peace","conflict","combat"]},
    {id:"slime",txt:"史莱姆偷了面包，它说三天没吃东西。你怎么回应？",opts:["分它食物并约定规则","逼它当场道歉赔偿","立刻击杀"],outcomes:["peace","conflict","combat"]},
    {id:"golem",txt:"夜行魔像守着一封旧信，它不识字却不敢交给任何人。你怎么回应？",opts:["帮它读信并找收件人","说这事与你无关","将信夺走逼问"],outcomes:["peace","conflict","combat"]}
  ];
  return base.find(x=>x.id===monsterId) || base[rInt(0,base.length-1)];
}

function makeStageTalkStoryByQuest_(monsterId, questKey){
  const base=makeStoryMonsterById_(monsterId);
  if(LONGLINE_MONSTER_MAP[questKey]){
    const d=LONGLINE_MONSTER_MAP[questKey];
    return {...base,txt:(d.storyFinalTalk||d.talkStage2||base.txt)};
  }
  if(questKey==="herb"){
    return {
      ...base,
      txt:"你把身上的药草取出来，为灰狼的幼崽敷上。那孩子终于安静下来，灰狼也把戒备松开了一瞬。你怎么回应？"
    };
  }
  if(questKey==="lamp"){
    return {
      ...base,
      txt:"你点亮了灯。回廊的黑暗被驱散，石像鬼发出一声像叹息般的轻响，仿佛也终于肯相信“夜里仍有人”。你怎么回应？"
    };
  }
  if(questKey==="letter"){
    return {
      ...base,
      txt:"你把信递到收信人面前。魔像不再只抱着旧东西，它看着信被读完，胸口的颤动慢慢停下。你怎么回应？"
    };
  }
  return base;
}

function monsterRewardByFloor(floor){
  const isLegend = (Number(floor)||0) % 10 === 0;
  if(isLegend){
    return 55 + floor*12 + rInt(0,20);
  }
  return 15 + floor*6;
}

function rescueRewardByFloor(floor){
  // 救助属于“温柔额外收益”：通常低于击杀怪物，但高于纯章节叙事
  const base=monsterRewardByFloor(floor);
  return Math.max(4, Math.floor(base*0.30) + rInt(0,10));
}

function chestRewardByFloor(){
  // 类似爬塔宝箱：固定为 1 积分点（主要用于排行榜）
  return 1;
}

function talkRewardByFloor(floor){
  // 沟通怪物：和平/紧张解决会给到一定奖励
  const base=monsterRewardByFloor(floor);
  return Math.max(6, Math.floor(base*0.55) + rInt(0,12));
}

function buildFloor(floor){
  const w=12,h=12,tiles=[],revealed={},events={};
  const baseMonsterReward=monsterRewardByFloor(floor);
  const baseRescueReward=rescueRewardByFloor(floor);
  const baseChestReward=chestRewardByFloor(floor);
  const baseTalkReward=talkRewardByFloor(floor);
  // 地形背景保持“同一套”5 层：用 5 层为一组的 tier 来决定是否出现港口水道视觉
  const tier=Math.floor((Number(floor)||1)/5)*5;
  for(let y=0;y<h;y++){
    tiles[y]=[];
    for(let x=0;x<w;x++){
      const border=(x===0||y===0||x===w-1||y===h-1);
      if(border){ tiles[y][x]=1; continue; }
      // 20-24 层：港口（渡口）地形会出现“可通行水道”（视觉上像港湾）
      if(tier===20 && Math.random()<0.08) tiles[y][x]=2;
      else tiles[y][x]=(Math.random()<0.22?1:0);
    }
  }
  const start={x:1,y:1};
  // 楼梯位置：不固定，随机选择一个可放置格位（非边框且非起点）
  let stairs={x:w-2,y:h-2};
  for(let tries=0;tries<50;tries++){
    const rx=rInt(2,w-3), ry=rInt(2,h-3);
    if(rx===start.x && ry===start.y) continue;
    stairs={x:rx,y:ry};
    break;
  }
  tiles[start.y][start.x]=0; tiles[stairs.y][stairs.x]=0;
  let cx=start.x,cy=start.y;
  while(cx!==stairs.x || cy!==stairs.y){
    if(cx<stairs.x) cx++; else if(cy<stairs.y) cy++;
    tiles[cy][cx]=0;
  }
  revealed[key(start.x,start.y)]=1;
  // 为 20 层追加水道/栈桥视觉：水可通行，但事件不会生成在水面
  if(tier===20){
    const waterCols=[4,7];
    const waterRows=[4,7];
    for(let i=0;i<waterCols.length;i++){
      const wx=waterCols[i];
      for(let y=1;y<h-1;y++){
        if(!xBlockedPath(wx,y,start,stairs)) tiles[y][wx]=2;
      }
    }
    for(let i=0;i<waterRows.length;i++){
      const wy=waterRows[i];
      for(let x=1;x<w-1;x++) tiles[wy][x]=2;
    }
  }

  // 上一层“拒绝全部救助+拒绝怪物帮忙”后：下一层强制 BOSS，并更换氛围
  if(G.state && G.state.story && G.state.story.bossNextFloor){
    // 单次触发：生成后清除标记
    try{ G.state.story.bossNextFloor=false; }catch(e){}
    const eventsBoss={};
    const bossHp=Math.floor((rInt(40,80)+floor)*1.9);
    const maxTries=240;
    for(let i=0;i<maxTries;i++){
      const x=rInt(1,w-2), y=rInt(1,h-2);
      if(tiles[y][x]!==0) continue;
      if(x===start.x && y===start.y) continue;
      if(x===stairs.x && y===stairs.y) continue;
      const kk=key(x,y);
      if(eventsBoss[kk]) continue;
      eventsBoss[kk]={type:"monster",hp:bossHp,reward:baseMonsterReward,boss:true,done:false};
      break;
    }
    return {w:w,h:h,tiles:tiles,revealed:revealed,events:eventsBoss,start:start,stairs:stairs,learnedWalls:{},stairsRevealed:false};
  }
  const bias=(G.state&&G.state.eventBias)?G.state.eventBias:{peace:0,conflict:0};
  const peaceBoost=Math.min(0.08,0.02*Number(bias.peace||0));
  const conflictBoost=Math.min(0.12,0.02*Number(bias.conflict||0));

  // 支线步骤：根据当前进行中的支线，提升后续“需要的事件类型”遭遇率
  const q=(G.state&&G.state.story&&G.state.story.quest)?G.state.story.quest:null;
  const herbNeedChest=!!(q&&q.herb && Number(q.herb.stage||0)===1 && !q.herb.done && !q.herb.combatBlocked);
  const lampNeedChest=!!(q&&q.lamp && Number(q.lamp.stage||0)===1 && !q.lamp.done && !q.lamp.combatBlocked);
  const letterNeedRescue=!!(q&&q.letter && Number(q.letter.stage||0)===1 && !q.letter.done && !q.letter.combatBlocked);
  // 严谨支线：当某条支线走到“第三次和平结算(完成)”后，提高后续支线的触发率
  let preferredTalkMonsterId=null;
  if(q && q.herb && q.herb.done && (!q.lamp || !q.lamp.done) && !(q.lamp&&q.lamp.combatBlocked)){
    preferredTalkMonsterId="gargoyle";
  }else if(q && q.lamp && q.lamp.done && (!q.letter || !q.letter.done) && !(q.letter&&q.letter.combatBlocked)){
    preferredTalkMonsterId="golem";
  }

  let chestNeedCount=(herbNeedChest?1:0)+(lampNeedChest?1:0);
  let rescueNeedCount=(letterNeedRescue?1:0);
  try{
    const lq=(G.state&&G.state.story&&G.state.story.longQuests)?G.state.story.longQuests:{};
    const nf=Number(floor||1);
    LONGLINE_MONSTER_DEFS.forEach(def=>{
      const qq=lq[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      const qs=Number(qq.stage||0);
      if(qs===1 && def.step2==="chest") chestNeedCount++;
      if(qs===1 && def.step2==="rescue" && nf>=def.floorMin && nf<=def.floorMax) rescueNeedCount++;
    });
    HUMAN_LONGLINE_DEFS.forEach(def=>{
      const qq=lq[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      const qs=Number(qq.stage||0);
      if(qs===1 && nf>=def.floorMin && nf<=def.floorMax) chestNeedCount++;
      if(qs===2 && nf>=def.floorMin && nf<=def.floorMax) rescueNeedCount++;
    });
  }catch(e){}
  const rescueHelpCounts=(G.state&&G.state.story&&G.state.story.rescueHelpCounts)?G.state.story.rescueHelpCounts:{};
  const totalRescueKeyCountKey="all";

  let chestRate=0.10;
  let talkRate=Math.max(0.06, Math.min(0.20, 0.10 + peaceBoost - conflictBoost*0.4));
  let rescueRate=Math.max(0.08, Math.min(0.22, 0.12 + peaceBoost*0.8 - conflictBoost*0.5));
  let monsterRate=Math.max(0.12, Math.min(0.36, 0.18 + conflictBoost - peaceBoost*0.6));
  // 上一层曾踩过救助格（出现完成救助/不救助选项）时：本层随机战斗怪略减；对话怪 talk_monster 与 ensureQuestFollowup 不受影响
  try{
    if(G.state && G.state.story && G.state.story.prevFloorHadRescueMonsterDiscount){
      monsterRate=Math.max(0.06, monsterRate-0.08);
      G.state.story.prevFloorHadRescueMonsterDiscount=false;
    }
  }catch(e){}

  // 救助可拒绝：拒绝后下一层不再生成救助事件（让遭遇变成更偏“必须战斗”的怪物）
  try{
    const skipUntil=G.state && G.state.story ? Number(G.state.story.rescueSkipUntilFloor||0) : 0;
    if(skipUntil>=Number(floor||1)) rescueRate=0;
  }catch(e){}

  if(chestNeedCount>0) chestRate*=1+(0.18*chestNeedCount);
  if(rescueNeedCount>0) rescueRate*=1+(0.22*rescueNeedCount);

  chestRate=Math.min(0.22, chestRate);
  rescueRate=Math.min(0.34, rescueRate);

  // 由于 chest/rescue 提升，重新计算总分段
  // （整体的“monster 与 talk”仍保留之前的 bias）
  const tChest=chestRate, tMonster=tChest+monsterRate, tRescue=tMonster+rescueRate, tTalk=tRescue+talkRate;
  // 每层每种「支线救助」questKey 最多只占用一次，避免同层刷出大量重复「未寄出的信」等导致无法推进
  const rescueQuestKeyUsed={};
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    if(tiles[y][x]===1 || tiles[y][x]===2) continue;
    if((x===start.x&&y===start.y)||(x===stairs.x&&y===stairs.y)) continue;
    const r=Math.random();
    if(r<tChest){
      let questKey="";
      if(herbNeedChest && lampNeedChest){
        questKey=(Math.random()<0.5)?"herb":"lamp";
      }else if(herbNeedChest) questKey="herb";
      else if(lampNeedChest) questKey="lamp";
      else{
        try{
          const lq=(G.state&&G.state.story&&G.state.story.longQuests)?G.state.story.longQuests:{};
          const nf=Number(floor||1);
          const needyC=[];
          LONGLINE_MONSTER_DEFS.forEach(def=>{
            const qq=lq[def.key];
            if(!qq||qq.done||qq.combatBlocked) return;
            const qs=Number(qq.stage||0);
            if(qs===1 && def.step2==="chest" && nf>=def.floorMin && nf<=def.floorMax) needyC.push(def.key);
          });
          HUMAN_LONGLINE_DEFS.forEach(def=>{
            const qq=lq[def.key];
            if(!qq||qq.done||qq.combatBlocked) return;
            const qs=Number(qq.stage||0);
            if(qs===1 && nf>=def.floorMin && nf<=def.floorMax) needyC.push(def.key);
          });
          if(needyC.length) questKey=needyC[rInt(0,needyC.length-1)];
        }catch(e){}
      }
      events[key(x,y)]={type:"chest",need:rInt(10,24),reward:baseChestReward,questKey:questKey,done:false};
    }else if(r<tMonster){
      events[key(x,y)]={type:"monster",hp:rInt(8,24)+floor,reward:baseMonsterReward,done:false};
    }else if(r<tRescue){
      let questKey="";
      try{
        const lq=(G.state&&G.state.story&&G.state.story.longQuests)?G.state.story.longQuests:{};
        const nf=Number(floor||1);
        const needyR=[];
        if(letterNeedRescue) needyR.push("letter");
        LONGLINE_MONSTER_DEFS.forEach(def=>{
          const qq=lq[def.key];
          if(!qq||qq.done||qq.combatBlocked) return;
          const qs=Number(qq.stage||0);
          if(qs===1 && def.step2==="rescue" && nf>=def.floorMin && nf<=def.floorMax) needyR.push(def.key);
        });
        HUMAN_LONGLINE_DEFS.forEach(def=>{
          const qq=lq[def.key];
          if(!qq||qq.done||qq.combatBlocked) return;
          const qs=Number(qq.stage||0);
          if((qs===0 || qs===2) && nf>=def.floorMin && nf<=def.floorMax) needyR.push(def.key);
        });
        const candidates=needyR.filter(k=>!rescueQuestKeyUsed[k]);
        if(candidates.length){
          let pick;
          if(candidates.includes("letter") && letterNeedRescue) pick="letter";
          else pick=candidates[rInt(0,candidates.length-1)];
          questKey=pick;
          rescueQuestKeyUsed[pick]=true;
        }
      }catch(e){}
      // 每完成任意救助达到“下一次阈值”时，会出现特别感谢剧情与钥匙
      const cnt=Number(rescueHelpCounts[totalRescueKeyCountKey]||0);
      const gratitude=rescueGratitudeNext_(cnt);
      const story=gratitude?makeStoryRescueGratitudeByKind_("generic"):makeStoryRescueByQuest_(questKey);
      events[key(x,y)]={
        type:"rescue",
        need:rInt(10,22),
        story:story,
        reward:baseRescueReward,
        questKey:questKey,
        done:false,
        rescueKindKey:totalRescueKeyCountKey,
        gratitude:gratitude
      };
    }else if(r<tTalk){
      let s=makeStoryMonsterByFloor(floor);
      // 若前置支线已完成，则提高后续支线“接任务(和平)怪物对话”的出现率
      if(preferredTalkMonsterId && s && s.id!==preferredTalkMonsterId && Math.random()<0.45){
        for(let t=0;t<6;t++){
          const s2=makeStoryMonsterByFloor(floor);
          if(s2 && s2.id===preferredTalkMonsterId){ s=s2; break; }
        }
      }
      events[key(x,y)]={type:"talk_monster",monsterId:s.id,story:s.txt,opts:s.opts,outcomes:s.outcomes,reward:baseTalkReward,hp:rInt(10,22)+floor,done:false};
    }
  }
  // 兜底：如果本层完全没有“怪物/救助”事件，则用 BOSS 级怪物填补空档
  let monsterCnt=0, rescueCnt=0;
  for(const k in events){
    const ev=events[k];
    if(!ev || ev.done) continue;
    if(ev.type==="monster" || ev.type==="talk_monster") monsterCnt++;
    if(ev.type==="rescue") rescueCnt++;
  }
  if(monsterCnt===0 && rescueCnt===0){
    const bossHp=Math.floor(rInt(20,48)+floor);
    const maxTries=180;
    for(let i=0;i<maxTries;i++){
      const x=rInt(1,w-2), y=rInt(1,h-2);
      const kk=key(x,y);
      if(tiles[y][x]!==0) continue;
      if(kk===key(start.x,start.y) || kk===key(stairs.x,stairs.y)) continue;
      if(events[kk]) continue;
      events[kk]={type:"monster",hp:bossHp,reward:baseMonsterReward,boss:true,done:false};
      break;
    }
  }
  return {w:w,h:h,tiles:tiles,revealed:revealed,events:events,start:start,stairs:stairs,learnedWalls:{},stairsRevealed:false};
}

function xBlockedPath(x,y,start,stairs){
  // 简单防止水道把“起点/楼梯”直接覆盖（实际起点/楼梯会在后面被强制设为 0）
  if((x===start.x&&y===start.y) || (x===stairs.x&&y===stairs.y)) return true;
  return false;
}

function newState(uid){
  const floor=1,map=buildFloor(floor);
  return {
    uid:uid,floor:floor,reward:0,hp:3,maxHp:3,stockReply:0,stockQuote:0,
    player:{x:map.start.x,y:map.start.y},map:map,pending:null,lastEventKey:"",
    eventBias:{peace:0,conflict:0},chapterSeen:{},chapterRewardSeen:{},
    lootBag:{jiecao:0,yumao:0,bqMedal30:0,zmMedal30:0},
    story:{
      kindness:0,violence:0,peaceTalks:0,rescueDone:0,chestOpen:0,floorsDescended:0,
      rescueSkipUntilFloor:0,
      // 本层实际“对战胜利”次数：用于按战斗次数提升下一层遭遇 BOSS 概率
      // （逃跑成功不计入）
      floorContext:{rescueEncountered:0,rescueRefused:0,talkHelpAccepted:0,talkHelpDeclined:0,monsterBattleCount:0},
      bossNextFloor:false,
      bossNextDesc:false,
      // “帮我/求救”的怪物：若被你击杀，则后续不再以沟通事件出现（提升“强敌(BOSS)”触发）
      helpKilledMonsters:{},
      // 史莱姆特殊：你帮忙 10 次后，下次遇到会触发报恩奖励
      slimeHelpCount:0,
      slimeRepayPending:false,
      slimeRepayNextAt:10,
      permCurMedal:0,
      permCurMedalGiven:false,
      permPastExchange:0,

function notifyCoreTaskProgress_(s,before){

  const q=s.story.quest;
  const ids=["herb","lamp","letter"];
  for(let i=0;i<ids.length;i++){
    const id=ids[i];
    const prev=before[id];
    const cur=coreTaskKeyState_(q[id]);
    if(cur===prev) continue;
    const title=QUEST_DEFS[id].title;
    if(prev===0 && cur===1){
      sysTransient("新任务："+title+"（1/3）",SYS_AVATARS[1],2400);
    }else if(prev===1 && cur===2){
      sysTransient("任务进度："+title+" 已推进至 2/3",SYS_AVATARS[1],2200);
    }else if(prev===2 && cur===3){
      sysTransient("任务完成："+title,SYS_AVATARS[1],2400);
    }else if(prev>=0 && prev<=2 && cur===-1){
      sysTransient("任务中止："+title+"（你已选择战斗路线）",SYS_AVATARS[2],2400);
    }
  }

          q.lamp.hasLamp=false;
          q.lamp.lit=false;
          pushStoryLog(s,"支线【夜灯守望】开启：你答应帮助石像鬼点亮回廊。");
        }else{
          cancelQuest_(q.lamp,{talkMonsterId:"gargoyle",chestQuestKey:"lamp"});
        }
      }
    }else if(ls===1){
      if(ctx.type==="chest_done" && eq==="lamp"){
        q.lamp.stage=2;
        q.lamp.hasLamp=true;
        q.lamp.lit=true;
        if(s.map && s.map.events){
          for(const k in s.map.events){
            const ev=s.map.events[k];
            if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="gargoyle") delete s.map.events[k];
          }
        }
        pushStoryLog(s,"支线【夜灯守望】推进：你真的找到了灯，并顺手把它点亮。");
      }
    }else if(ls===2){
      if(ctx.type==="talk" && ctx.monsterId==="gargoyle" && ctx.outcome==="peace" && q.lamp.lit){
        q.lamp.done=true;
        if(unlockAchievementIfNot(s,"lamp")) pushStoryLog(s,"成就解锁：【夜灯守望】");
        s.reward+=QUEST_DEFS.lamp.reward;
        s.eventBias.peace=(s.eventBias.peace||0)+1;
        pushStoryLog(s,"支线【夜灯守望】完成：回廊被温暖的光照亮。积分 +"+QUEST_DEFS.lamp.reward);
        if(s.map && s.map.events){
          for(const k in s.map.events){
            const ev=s.map.events[k];
            if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="gargoyle") delete s.map.events[k];
          }
        }
        showChapterCard(
          "支线结局达成：【夜灯守望】",
          "你完成了长线支线的最终一段和平。回廊的黑暗终于被驱散，石像鬼也把夜里交给了光。积分 +" + QUEST_DEFS.lamp.reward
        );
      }else if(ctx.type==="talk" && ctx.monsterId==="gargoyle" && ctx.outcome!=="peace"){
        cancelQuest_(q.lamp,{talkMonsterId:"gargoyle",chestQuestKey:"lamp"});
      }
    }
  }

  // 未寄出的信：第1次和平=接到信(1/3)；第2次救助交付(2/3)；第3次和平=奖励(结束)
  if(q.letter && !q.letter.done && !q.letter.combatBlocked){
    const ys=Number(q.letter.stage||0);
    if(ys===0){
      if(ctx.type==="talk" && ctx.monsterId==="golem"){
        if(ctx.outcome==="peace"){
          q.letter.stage=1;
          q.letter.hasLetter=true;
          pushStoryLog(s,"支线【未寄出的信】开启：你从魔像手里接过那封信。");
        }else{
          cancelQuest_(q.letter,{talkMonsterId:"golem",rescueQuestKey:"letter"});
        }
      }
    }else if(ys===1){
      if(ctx.type==="rescue_done" && eq==="letter"){
        q.letter.stage=2;
        q.letter.delivered=true;
        if(s.map && s.map.events){
          for(const k in s.map.events){
            const ev=s.map.events[k];
            if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="golem") delete s.map.events[k];
          }
        }
        pushStoryLog(s,"支线【未寄出的信】推进：你把信交出去了。收信人的目光终于有了方向。");
      }
    }else if(ys===2){
      if(ctx.type==="talk" && ctx.monsterId==="golem" && ctx.outcome==="peace" && q.letter.delivered){
        q.letter.done=true;
        if(unlockAchievementIfNot(s,"letter")) pushStoryLog(s,"成就解锁：【未寄出的信】");
        s.reward+=QUEST_DEFS.letter.reward;
        pushStoryLog(s,"支线【未寄出的信】完成：魔像终于把信抱在胸前不再颤抖。积分 +"+QUEST_DEFS.letter.reward);
        if(s.map && s.map.events){
          for(const k in s.map.events){
            const ev=s.map.events[k];
            if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="golem") delete s.map.events[k];
          }
        }
        showChapterCard(
          "支线结局达成：【未寄出的信】",
          "你完成了长线支线的最终一段和平。魔像把信交给了该去的地方，也把胸口的颤动慢慢停下。积分 +" + QUEST_DEFS.letter.reward
        );
      }else if(ctx.type==="talk" && ctx.monsterId==="golem" && ctx.outcome!=="peace"){
        cancelQuest_(q.letter,{talkMonsterId:"golem",rescueQuestKey:"letter"});
      }
    }
  }
  notifyCoreTaskProgress_(s,_coreSnapBefore);
  tryAdvanceLongQuestsMonster_(s,ctx);
  tryAdvanceLongQuestsHuman_(s,ctx);
  tryUnlockEndings(s);
  // 如果当前支线已经进入“需要玩家继续应对”的阶段，则在当前楼层补齐对应格子
  if(ctx && ctx.type && ctx.type!=="descend") ensureQuestFollowupEvents_(s);
}
function storyAlignmentText(s){
  if(!s||!s.story) return "-";
  const k=Number(s.story.kindness||0), v=Number(s.story.violence||0);
  if(k-v>=3) return "抚慰之光（温和）";
  if(v-k>=3) return "裂锋之影（强硬）";
  return "暮色平衡（中立）";
}
/** 进行中三阶段任务数量（用于 HUD 提示，不在面板展开清单） */
function countActiveThreeStageTasks_(s){
  if(!s||!s.story||!s.story.quest) return 0;
  let n=0;
  const q=s.story.quest;
  ["herb","lamp","letter"].forEach(id=>{
    const st=q[id]||{};
    if(!st.done && !st.combatBlocked && Number(st.stage||0)>0) n++;
  });
  try{
    const lq=s.story.longQuests||{};
    LONGLINE_MONSTER_DEFS.forEach(def=>{
      const st=lq[def.key];
      if(st && !st.done && !st.combatBlocked && Number(st.stage||0)>0) n++;
    });
    HUMAN_LONGLINE_DEFS.forEach(def=>{
      const st=lq[def.key];
      if(st && !st.done && !st.combatBlocked && Number(st.stage||0)>0) n++;
    });
  }catch(e){}
  return n;
}
function taskLineFromState_(title,st){
  if(!st) return title+"：未开放";
  if(st.done) return title+"：已完成（成就可查看）";
  if(st.combatBlocked) return title+"：已中止（曾选择战斗路线）";
  if(!st.stage) return title+"：未接取";
  return title+"：进行中（"+st.stage+"/3）";
}

      hd.className="achHint";
      hd.textContent=h;
      container.appendChild(hd);

  }
}

function ensureQuestFollowupEvents_(s){
  if(!s||!s.map||!s.map.events||!s.story||!s.story.quest) return;
  purgeStage1LonglineMonsterTalks_(s);
  const q=s.story.quest;

  // 使用当前楼层的基础掉落，保证数值一致
  const baseRescueReward=rescueRewardByFloor(s.floor);
  const baseChestReward=chestRewardByFloor();
  const baseTalkReward=talkRewardByFloor(s.floor);

  function ensureOne(type, questKey, storyForQuest){
    const totalRescueKeyCountKey="all";
    const cnt=Number((s.story&&s.story.rescueHelpCounts&&s.story.rescueHelpCounts[totalRescueKeyCountKey])||0);
    // 特别感谢：下一次救助将满 10/20/30… 次时标记（与 rescueKeyNextAt 存盘无关，避免错位）
    const gratitude=rescueGratitudeNext_(cnt);
    // 1) 已存在且未完成的专属事件
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type===type && ev.questKey===questKey) return;
    }
    // 2) 复用“未标记的通用事件”（questKey 为空），补齐链条但不影响其它支线（它本来就没有归属）
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type===type && (!ev.questKey || ev.questKey==="")){
        ev.questKey=questKey;
        if(type==="rescue"){
          ev.story=gratitude?makeStoryRescueGratitudeByKind_("generic"):(storyForQuest||makeStoryRescueByQuest_(questKey));
          ev.rescueKindKey=totalRescueKeyCountKey;
          ev.gratitude=gratitude;
        }
        return;
      }
    }
    // 2) 如果地图里没有专属事件，则只在空格里补齐一个（不复用/覆盖其它事件，确保链条严谨）
    const maxTries=120;
    for(let i=0;i<maxTries;i++){
      const x=rInt(1,s.map.w-2);
      const y=rInt(1,s.map.h-2);
      const kk=key(x,y);
      if(s.map.tiles[y][x]!==0) continue; // 跳过墙壁/水道等
      if(kk===key(s.map.stairs.x,s.map.stairs.y)) continue;
      if(s.map.events[kk]) continue;
      if(type==="chest"){
        s.map.events[kk]={type:"chest",need:rInt(10,24),reward:baseChestReward,questKey:questKey,done:false};
      }else if(type==="rescue"){
        s.map.events[kk]={
          type:"rescue",
          need:rInt(10,22),
          story:gratitude?makeStoryRescueGratitudeByKind_("generic"):(storyForQuest||makeStoryRescueByQuest_(questKey)),
          reward:baseRescueReward,
          questKey:questKey,
          done:false,
          rescueKindKey:totalRescueKeyCountKey,
          gratitude:gratitude
        };
      }
      return;
    }
  }

  // 只对“需要下一步应对”的进行强制补齐
  if(q.letter && Number(q.letter.stage||0)===1 && !q.letter.done && !q.letter.combatBlocked){
    ensureOne("rescue","letter",makeStoryRescueByQuest_("letter"));
    // 严谨连贯：stage=1 阶段不再允许出现“旧信/魔像沟通”类怪物对话
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="golem") delete s.map.events[k];
    }
  }
  if(q.herb && Number(q.herb.stage||0)===1 && !q.herb.done && !q.herb.combatBlocked){
    ensureOne("chest","herb",null);
    // 严谨连贯：stage=1 阶段不再允许出现“继续找药草”的灰狼对话
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="wolf") delete s.map.events[k];
    }
  }
  if(q.lamp && Number(q.lamp.stage||0)===1 && !q.lamp.done && !q.lamp.combatBlocked){
    ensureOne("chest","lamp",null);
    // 严谨连贯：stage=1 阶段不再允许出现“继续点灯”的石像鬼对话
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId==="gargoyle") delete s.map.events[k];
    }
  }

  try{
    if(s.story.longQuests){
      LONGLINE_MONSTER_DEFS.forEach(def=>{
        const qq=s.story.longQuests[def.key];
        if(qq && qq.done){
          for(const k in s.map.events){
            const ev=s.map.events[k];
            if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId===def.monsterId) delete s.map.events[k];
          }
        }
      });
      HUMAN_LONGLINE_DEFS.forEach(def=>{
        const qq=s.story.longQuests[def.key];
        if(qq && qq.done){
          for(const k in s.map.events){
            const ev=s.map.events[k];
            if(!ev||ev.done) continue;
            if((ev.type==="rescue"||ev.type==="chest")&&(ev.questKey||"")===def.key) delete s.map.events[k];
          }
        }
      });
    }
  }catch(e){}

  if(s.story.longQuests){
    LONGLINE_MONSTER_DEFS.forEach(def=>{
      const qq=s.story.longQuests[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      const qs=Number(qq.stage||0);
      if(qs===1){
        if(def.step2==="chest") ensureOne("chest",def.key,null);
        else ensureOne("rescue",def.key,makeStoryRescueByQuest_(def.key));
        for(const k in s.map.events){
          const ev=s.map.events[k];
          if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId===def.monsterId) delete s.map.events[k];
        }
      }
    });
    HUMAN_LONGLINE_DEFS.forEach(def=>{
      const qq=s.story.longQuests[def.key];
      if(!qq||qq.done||qq.combatBlocked) return;
      if(s.floor<def.floorMin||s.floor>def.floorMax) return;
      const qs=Number(qq.stage||0);
      if(qs===0) ensureOne("rescue",def.key,makeStoryRescueByQuest_(def.key));
      if(qs===1) ensureOne("chest",def.key,null);
      if(qs===2) ensureOne("rescue",def.key,makeStoryRescueByQuest_(def.key));
    });
  }

  // stage=2：第三次遇到对应怪物并在“和平”结算奖励
  const desiredTalkIds=[];
  if(q.herb && Number(q.herb.stage||0)===2 && !q.herb.done && !q.herb.combatBlocked) desiredTalkIds.push("wolf");
  if(q.lamp && Number(q.lamp.stage||0)===2 && !q.lamp.done && !q.lamp.combatBlocked) desiredTalkIds.push("gargoyle");
  if(q.letter && Number(q.letter.stage||0)===2 && !q.letter.done && !q.letter.combatBlocked) desiredTalkIds.push("golem");
  try{
    if(s.story.longQuests){
      LONGLINE_MONSTER_DEFS.forEach(def=>{
        const qq=s.story.longQuests[def.key];
        if(qq && Number(qq.stage||0)===2 && !qq.done && !qq.combatBlocked) desiredTalkIds.push(def.monsterId);
      });
    }
  }catch(e){}

  if(desiredTalkIds.length>0){
    // 为了“严谨连贯”，在当前楼层只保留需要的那类怪物对话事件
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(!ev || ev.done || ev.type!=="talk_monster") continue;
      if(!desiredTalkIds.includes(ev.monsterId)) delete s.map.events[k];
    }

    function ensureTalkMonster(monsterId){
      // 已存在则不重复生成
      for(const k in s.map.events){
        const ev=s.map.events[k];
        if(ev && !ev.done && ev.type==="talk_monster" && ev.monsterId===monsterId) return;
      }
      const maxTries=140;
      for(let i=0;i<maxTries;i++){
        const x=rInt(1,s.map.w-2), y=rInt(1,s.map.h-2);
        const kk=key(x,y);
        if(s.map.tiles[y][x]!==0) continue;
        if(kk===key(s.map.stairs.x,s.map.stairs.y)) continue;
        if(s.map.events[kk]) continue;
        if(x===s.player.x && y===s.player.y) continue;

        let questKey="";
        if(monsterId==="wolf") questKey="herb";
        else if(monsterId==="gargoyle") questKey="lamp";
        else if(monsterId==="golem") questKey="letter";
        else if(LONGLINE_MONSTER_MAP[monsterId]) questKey=monsterId;
        const st=makeStageTalkStoryByQuest_(monsterId,questKey);
        s.map.events[kk]={
          type:"talk_monster",
          monsterId:monsterId,
          story:st.txt,
          opts:st.opts,
          outcomes:st.outcomes,
          reward:baseTalkReward,
          hp:rInt(10,22)+s.floor,
          done:false
        };
        return;
      }
    }

    for(const id of desiredTalkIds){
      ensureTalkMonster(id);
    }
  }

  // 长线支线完成后：不再允许出现该怪物的“求助/对话”版本
  try{
    for(const k in s.map.events){
      const ev=s.map.events[k];
      if(!ev || ev.done || ev.type!=="talk_monster") continue;
      if(q.herb && q.herb.done && ev.monsterId==="wolf") delete s.map.events[k];
      if(q.lamp && q.lamp.done && ev.monsterId==="gargoyle") delete s.map.events[k];
      if(q.letter && q.letter.done && ev.monsterId==="golem") delete s.map.events[k];
      try{
        LONGLINE_MONSTER_DEFS.forEach(def=>{
          if(s.story.longQuests && s.story.longQuests[def.key] && s.story.longQuests[def.key].done && ev.monsterId===def.monsterId) delete s.map.events[k];
        });
      }catch(e2){}
    }
  }catch(e){}
  // 人类长线完成后：清掉地图上仍残留的同 questKey 救助/宝箱（避免完成後又遇到）
  try{
    if(s.story.longQuests){
      HUMAN_LONGLINE_DEFS.forEach(def=>{
        const qq=s.story.longQuests[def.key];
        if(!qq||!qq.done) return;
        for(const k in s.map.events){
          const ev=s.map.events[k];
          if(!ev||ev.done) continue;
          if((ev.type==="rescue"||ev.type==="chest")&&(ev.questKey||"")===def.key) delete s.map.events[k];
        }
      });
    }
  }catch(e3){}
  purgeStage1LonglineMonsterTalks_(s);
}

function renderMap(){
  const s=G.state;if(!s) return;
  const m=s.map, tb=document.getElementById("mapTable");
  try{
    if(m && m.stairsRevealed && m.stairs){
      m.revealed[key(m.stairs.x,m.stairs.y)]=1;
    }
  }catch(e){}
  // 地图背景保持“每 5 层一换”，让第 6 层开始能明显看到主题变化
  try{
    const box=document.querySelector(".mapbox");
    if(box){
      const group=Math.floor((Number(s.floor||1)-1)/5);
      const themes=[
        "linear-gradient(180deg,#0f1024,#090a1a)",
        "linear-gradient(180deg,#241020,#0b0712)",
        "linear-gradient(180deg,#0b2a2a,#070d10)",
        "linear-gradient(180deg,#2a1f0b,#0a0704)"
      ];
      box.style.background=themes[group%themes.length];
    }
  }catch(e){}
  tb.innerHTML="";
  for(let y=0;y<m.h;y++){
    const tr=document.createElement("tr");
    for(let x=0;x<m.w;x++){
      const td=document.createElement("td");
      const rv=!!m.revealed[key(x,y)];
      const tile=m.tiles[y][x];
      const k=key(x,y);
      const isHintWall=rv && m.learnedWalls && m.learnedWalls[k] && tile===1;
      td.className=rv?(tile===1?(isHintWall?"wallHint":"wall"):(tile===2?"water":"floor")):"fog";
      if(rv && x===m.stairs.x && y===m.stairs.y){ td.className="stairs"; td.textContent="下"; }
      if(rv && s.player.x===x && s.player.y===y){ td.innerHTML='<img src="'+PLAYER_AVATAR+'" alt="p" style="width:22px;height:22px;object-fit:contain">'; }
      const ev=m.events[k];
      if(rv && ev && !ev.done && !(s.player.x===x&&s.player.y===y)) td.classList.add("event");
      // 事件已完成：在地图格子上展示轻量符号
      if(rv && ev && ev.done && !(s.player.x===x&&s.player.y===y)){
        // 若是战斗进行中/战后，用 resolvedKind 辅助显示
        td.textContent=eventGlyph_(ev);
        td.classList.remove("event");
      }

      // 鼠标移动：点相邻格子直接移动（点击事件格时等同于“走过去触发事件”）
      td.onclick=()=>{
        const s2=G.state;
        if(!s2) return;
        if(G.busy||G.actionBusy) return;
        if(s2.pending) return;
        if(!m.revealed[key(x,y)]) return;
        const dx=x-s2.player.x, dy=y-s2.player.y;
        if(Math.abs(dx)+Math.abs(dy)!==1) return;
        move(dx,dy);
      };

      tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
}

function renderHUD(){
  const s=G.state;if(!s)return;
  document.getElementById("pUid").textContent=G.uid;
  document.getElementById("pFloor").textContent=String(s.floor);
  const hpRatio=(Number(s.maxHp||0)>0)?(Number(s.hp||0)/Number(s.maxHp)):0;
  const bar=document.getElementById("pHpBar");
  if(bar) bar.style.width=Math.max(0,Math.min(100,Math.round(hpRatio*100)))+"%";
  const hpText=document.getElementById("pHpText");
  if(hpText) hpText.textContent=s.hp+" / "+s.maxHp;
  document.getElementById("pReward").textContent=String(s.reward);
  const lb=s.lootBag||{jiecao:0,yumao:0,bqMedal30:0,zmMedal30:0};
  const pLoot=document.getElementById("pLoot");
  const keys=Number(s.story&&s.story.rescueKeyCount||0);
  // 面板只保留“背包入口+钥匙数量”，详细内容在背包弹窗中查看
  if(pLoot) pLoot.textContent="战利品（背包）：钥匙X"+keys;
  const bagBtn=document.getElementById("bagBtn");
  if(bagBtn) bagBtn.textContent=keys>0 ? ("背包（钥匙X"+keys+"）") : "背包";

  const ach=s.story&&s.story.achievements?s.story.achievements:{};
  const achBtn=document.getElementById("achBtn");
  if(achBtn){
    achBtn.disabled=false;
    achBtn.textContent="成就";
  }
  document.getElementById("pR").textContent=String(s.stockReply||0);
  document.getElementById("pQ").textContent=String(s.stockQuote||0);
  document.getElementById("pAlign").textContent=storyAlignmentText(s);
  const nTask=countActiveThreeStageTasks_(s);
  const pQuestEl=document.getElementById("pQuest");
  if(pQuestEl){
    if(nTask>0) pQuestEl.textContent="有 "+nTask+" 项进行中任务，请点击「任务」查看详情。";
    else pQuestEl.textContent="暂无进行中任务（完整清单请点「任务」）。";
  }
  const p=s.pending;
  show("eventActs",!!p);
  const eventActs=document.getElementById("eventActs");
  if(eventActs) eventActs.classList.remove("monsterBattle");
  document.getElementById("talkSel").classList.add("hidden");
  document.getElementById("eventBtn").classList.remove("hidden");
  const btnWrap=document.getElementById("talkBtns");
  if(btnWrap) btnWrap.classList.add("hidden");
  if(!p){
    if(!document.getElementById("sysMsg").textContent) sys("地下城安静下来。你可以继续探索。",SYS_AVATARS[0]);
    return;
  }
  if(p.type==="rescue") stripStaleRescueQuestKey_(s,p);
  if(p.type==="chest"){
    const keys=Number(s.story&&s.story.rescueKeyCount||0);
    const keyHint=keys>0?" 你也可以使用钥匙直接打开（不消耗回复/被引用）。":"";
    document.getElementById("eventTxt").textContent=chestEventPanelText_(s,p,keyHint);
    document.getElementById("eventBtn").textContent="尝试开锁";
    document.getElementById("eventBtn").classList.add("hidden");
    if(btnWrap){
      btnWrap.innerHTML="";
      btnWrap.classList.remove("hidden");
      const b1=document.createElement("button");
      b1.className="good";
      b1.textContent="打开宝箱";
      b1.onclick=()=>{ G.chestPick=null; resolveEvent(); };
      btnWrap.appendChild(b1);
      if(keys>0){
        const bKey=document.createElement("button");
        bKey.className="good";
        bKey.textContent="使用钥匙打开宝箱";
        bKey.onclick=()=>{ G.chestPick="key"; resolveEvent(); };
        btnWrap.appendChild(bKey);
      }
      const b2=document.createElement("button");
      b2.className="warn";
      b2.textContent="不开宝箱(下次再开)";
      b2.onclick=()=>{ G.chestPick="skip"; resolveEvent(); };
      btnWrap.appendChild(b2);
    }
  }else if(p.type==="monster"){
    if(eventActs) eventActs.classList.add("monsterBattle");
    document.getElementById("eventTxt").textContent="遭遇怪物，HP "+p.hp+"，击败可得积分 "+p.reward+"。";
    document.getElementById("eventBtn").textContent="攻击";
    if(btnWrap){
      btnWrap.innerHTML="";
      btnWrap.classList.remove("hidden");
      const b=document.createElement("button");
      b.className="warn";
      b.textContent=(p.boss?"逃跑（BOSS不可）":"逃跑");
      b.onclick=()=>{ G.monsterPick="escape"; resolveEvent(); };
      btnWrap.appendChild(b);
    }
  }else if(p.type==="rescue"){
    let title=p.gratitude?"拯救任务（特别感谢）：":"拯救任务：";
    try{
      if(!p.gratitude && p.questKey && (LONGLINE_MONSTER_MAP[p.questKey] || HUMAN_LONGLINE_MAP[p.questKey])) title="际遇：";
    }catch(e){}
    document.getElementById("eventTxt").textContent=title+" "+p.story+"（需求点数 "+p.need+"）"+" 提示：在「新增回复/被引用」填数字后点「完成救助」会加入待用并结算；待用不足时可点「不救助」，或点数不足时系统会允许你先离开格子。";
    document.getElementById("eventBtn").textContent="完成救助";
    document.getElementById("eventBtn").classList.add("hidden");
    // 救助可选择拒绝：拒绝不消耗点数，但提升战斗遭遇，并阻断该救助链
    document.getElementById("eventBtn").onclick=()=>{ G.rescuePick="do"; resolveEvent(); };
    const btnWrap2=document.getElementById("talkBtns");
    if(btnWrap2){
      btnWrap2.innerHTML="";
      btnWrap2.classList.remove("hidden");
      const b1=document.createElement("button");
      b1.className="good";
      b1.textContent="完成救助";
      b1.onclick=()=>{ G.rescuePick="do"; resolveEvent(); };
      btnWrap2.appendChild(b1);
      const b2=document.createElement("button");
      b2.className="warn";
      b2.textContent="不救助";
      b2.onclick=()=>{ G.rescuePick="refuse"; resolveEvent(); };
      btnWrap2.appendChild(b2);
    }
  }else if(p.type==="talk_monster"){
    document.getElementById("eventTxt").textContent=p.story;
    const sel=document.getElementById("talkSel");
    sel.classList.add("hidden");
    const btnWrap=document.getElementById("talkBtns");
    btnWrap.innerHTML="";
    btnWrap.classList.remove("hidden");
    // 对话选项：直接三个行动按钮，避免误点击
    for(let i=0;i<3;i++){
      let opt=p.opts[i]||("选项"+(i+1));
      // stage=2 时的“和平”按钮需要替换为更明确的“交付/治疗/点亮/递信”文本
      if(i===0 && s && s.story && s.story.quest){
        const q=s.story.quest;
        if(p.monsterId==="wolf" && q.herb && Number(q.herb.stage||0)===2 && !q.herb.done && q.herb.hasHerb){
          opt="给灰狼药草（治疗幼崽）";
        }
        if(p.monsterId==="gargoyle" && q.lamp && Number(q.lamp.stage||0)===2 && !q.lamp.done && q.lamp.lit){
          opt="真的把灯点亮了（继续回廊）";
        }
        if(p.monsterId==="golem" && q.letter && Number(q.letter.stage||0)===2 && !q.letter.done && q.letter.delivered){
          opt="把信送到收信人面前";
        }
      }
      const b=document.createElement("button");
      b.className=i===0?"good":(i===1?"warn":"good");
      b.textContent=opt;
      b.onclick=()=>{
        G.talkPick=i;
        show("eventActs",false);
        resolveEvent();
      };
      btnWrap.appendChild(b);
    }
    document.getElementById("eventBtn").classList.add("hidden");
  }
}

async function saveStateCloud(eventName, verifyAfter){
  const s=G.state;if(!s) return;
  const verify=verifyAfter!==false;
  s.updatedAt=Date.now();
  const stateJson=JSON.stringify(s);
  await apiPostJson_({
    action:"save_state",
    user_id:G.uid,
    floor:String(s.floor),
    reward:String(s.reward),
    event:eventName||"",
    state_json:stateJson,
    _ts:String(Date.now())
  });
  // 写入后用云端确认，避免“写入失败却不知”的情况（移动时为了不卡顿可跳过）
  if(verify){
    const after=await apiJsonp("load_state",{user_id:G.uid});
    if(!after || !after.data || !after.data.state) throw new Error("cloud_save_verify_failed");
  }
}

async function appendRecord(result){
  const s=G.state;if(!s)return;
