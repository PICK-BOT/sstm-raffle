<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>温馨地下城</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 15%,#261842 0,#0b0b1b 45%,#04040d 100%);color:#f3ecff;font-family:Segoe UI,Arial,sans-serif;padding:14px}
    .app{max-width:1100px;margin:0 auto;background:linear-gradient(180deg,#1a1233,#0e0c1f);border:1px solid #5b4594;border-radius:14px;padding:12px;box-shadow:0 10px 34px #0008}
    .title{font-size:32px;margin-bottom:8px;color:#f6dcff;text-shadow:0 0 14px #8a6bff88}
    .card{background:linear-gradient(180deg,#1b1f45,#141733);border:1px solid #5a63a3;border-radius:10px;padding:10px;margin-bottom:10px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
    .hidden{display:none!important}
    input,button,select{border:1px solid #6a70b4;background:#131836;color:#f0f2ff;border-radius:8px;padding:8px 10px;font-size:14px}
    button{cursor:pointer;transition:.18s transform,.18s filter}.primary{background:#5c47d6}.good{background:#2b9f74}.warn{background:#a26a1a}
    button:hover{transform:translateY(-1px);filter:brightness(1.08)}
    .hud{display:grid;grid-template-columns:320px 1fr;gap:10px}
    .s{display:grid;grid-template-columns:95px 1fr;gap:6px;margin-bottom:7px}.k{color:#b8baf0}.v{color:#fbf8ff}
    .mapbox{background:linear-gradient(180deg,#0f1024,#090a1a);border:1px solid #4c4f86;border-radius:8px;padding:8px;overflow:auto;max-height:520px;box-shadow:inset 0 0 28px #7f72ff1a}
    .map{border-collapse:collapse}.map td{width:30px;height:30px;text-align:center;vertical-align:middle;border:1px solid #23274f;font-size:12px}
    .fog{background:#070810;color:#070810}.wall{background:#1f1a2f;color:#1f1a2f}.floor{background:#1d2143}
    .water{background:#1a3f66;color:#b7e6ff}.stairs{background:#4d3c78;color:#ffe18f}.event{outline:1px dashed #9d8cff}
    .acts{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#101536c9;border:1px solid #4f57a5;border-radius:8px;padding:8px}
    .sysbox{margin-top:8px;background:#121634;border:1px solid #4f5ab0;border-radius:8px;padding:8px}
    .sysline{display:flex;gap:8px;align-items:flex-start}.sysicon{width:56px;height:56px;object-fit:contain}.sysc{font-size:13px;line-height:1.6}
    .log{max-height:230px;overflow:auto;border:1px dashed #626cb3;border-radius:8px;padding:8px;background:#0d1230;font-size:13px}
    .rank{display:grid;grid-template-columns:46px 1fr 130px 80px;gap:6px;padding:7px;border-bottom:1px solid #39427a}
    .version{text-align:center;color:#b7bee8;font-size:12px;margin-top:6px}
    .overlay{position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:9999}
    .overlay .box{min-width:300px;max-width:420px;background:#122844;border:1px solid #4e7fca;border-radius:12px;padding:14px;display:flex;gap:10px;align-items:center}
    .overlay .box img{width:64px;height:64px;object-fit:contain}.overlay .t{line-height:1.6}
    .chapter-box{min-width:320px;max-width:520px;background:linear-gradient(180deg,#261743,#12142e);border:1px solid #8f7aff;border-radius:14px;padding:16px;box-shadow:0 0 30px #8f7aff40}
    .chapter-title{font-size:20px;color:#ffe9b6;margin-bottom:8px}
    .chapter-text{line-height:1.7;color:#ece7ff;margin-bottom:12px}
  </style>
</head>
<body>
<div class="app">
  <div class="title">温馨地下城</div>

  <div id="loginCard" class="card">
    <div class="row">
      <input id="uid" maxlength="30" placeholder="请输入论坛ID（必填）">
      <button class="primary" onclick="enterGame()">进入地下城</button>
    </div>
    <div id="loginNotice" style="font-size:13px;color:#c9daf6"></div>
  </div>

  <div id="menuCard" class="card hidden">
    <div class="row"><strong id="hello"></strong></div>
    <div class="row"><span id="menuNotice" style="color:#ffd66e"></span></div>
    <div class="row">
      <button id="btnStart" class="primary" onclick="startNew()">开始新冒险</button>
      <button id="btnResume" class="good" onclick="resumeRun()">继续冒险</button>
      <button onclick="openRecords()">查看记录</button>
      <button onclick="changeIdFromMenu()">更改ID（同步替换云端）</button>
    </div>
  </div>

  <div id="gameCard" class="card hidden">
    <div class="hud">
      <div>
        <div class="s"><div class="k">玩家</div><div id="pUid" class="v"></div></div>
        <div class="s"><div class="k">楼层</div><div id="pFloor" class="v"></div></div>
        <div class="s"><div class="k">生命</div><div id="pHp" class="v"></div></div>
        <div class="s"><div class="k">积分(仅排行)</div><div id="pReward" class="v"></div></div>
        <div class="s"><div class="k">战利品</div><div id="pLoot" class="v"></div></div>
        <div class="s"><div class="k">待用回复</div><div id="pR" class="v"></div></div>
        <div class="s"><div class="k">待用被引用</div><div id="pQ" class="v"></div></div>
        <div class="s"><div class="k">叙事倾向</div><div id="pAlign" class="v">-</div></div>
        <div class="s"><div class="k">长线支线</div><div id="pQuest" class="v">-</div></div>
        <div class="row">
          <button class="warn" onclick="settle('撤退结算')">撤退结算</button>
          <button onclick="backMenu()">主菜单</button>
          <button onclick="changeIdMidGame()">更改ID</button>
        </div>

        <div class="acts">
          <button onclick="move(0,-1)">上</button>
          <button onclick="move(-1,0)">左</button>
          <button onclick="move(1,0)">右</button>
          <button onclick="move(0,1)">下</button>
          <button class="primary" onclick="goDown()">下楼</button>
        </div>

        <div id="eventActs" class="acts hidden">
          <span id="eventTxt">事件</span>
          <span>新增回复</span><input id="addR" type="number" min="0" value="0">
          <span>新增被引用</span><input id="addQ" type="number" min="0" value="0">
          <button id="eventBtn" class="good" onclick="resolveEvent()">执行</button>
          <select id="talkSel" class="hidden"></select>
        </div>

        <div class="sysbox">
          <div class="sysline">
            <img id="sysAvatar" class="sysicon" alt="sys">
            <div id="sysMsg" class="sysc"></div>
          </div>
        </div>
      </div>

      <div class="mapbox">
        <table id="mapTable" class="map"></table>
      </div>
    </div>
  </div>

  <div id="recordCard" class="card hidden">
    <div class="row"><strong>云端记录</strong></div>
    <div class="row">
      <button onclick="backMenu()">回主菜单</button>
      <button class="primary" onclick="loadRecords(1)">刷新</button>
    </div>
    <div id="recordLog" class="log"></div>
    <div class="row">
      <button onclick="prevPage()">上一页</button>
      <span id="pageTxt">第 1 页</span>
      <button onclick="nextPage()">下一页</button>
    </div>
  </div>

  <div id="loadingOverlay" class="overlay hidden" aria-hidden="true">
    <div class="box">
      <img id="loadingAvatar" alt="loading">
      <div id="loadingText" class="t">系统正在读取中，请静候…</div>
    </div>
  </div>
  <div id="chapterOverlay" class="overlay hidden" aria-hidden="true">
    <div class="chapter-box">
      <div id="chapterTitle" class="chapter-title">章节</div>
      <div id="chapterText" class="chapter-text">章节说明</div>
      <div class="row" style="justify-content:flex-end;margin-bottom:0">
        <button class="primary" onclick="closeChapterCard()">继续冒险</button>
      </div>
    </div>
  </div>

  <div class="version" id="versionTxt">版本：</div>
</div>

<script>
const VER="v1.3.1-dungeon-story";
const SYS_AVATARS=[
  "https://s.sstmlt.com/img/2026/03/19/1-108359ab38de728aad.png",
  "https://s.sstmlt.com/img/2026/03/19/1-11c14bafe31ee6ee1c.png",
  "https://s.sstmlt.com/img/2026/03/19/1-127cce7b27eb17c91c.png"
];
const PLAYER_AVATAR="https://s.sstmlt.com/img/2026/03/19/1-134fdb6a0ec9b50e46.png";
const PAGE_SIZE=20;
const FIXED_GAS_URL="https://script.google.com/macros/s/AKfycbxg1Z0dc4XhjTUz4ZGgbZ369TOTHcGpgLejHgL9WZsKcFsuZPiTNH5SSYe_0K_JYgYU/exec";
const CHAPTER_PACKS={
  10:{title:"余烬回廊",text:"你在灰烬与灯火之间听见低语：很多怪物并非嗜血，只是太久没被温柔对待。"},
  20:{title:"星砂港口",text:"星砂并不是海盐，而是“被安放的记忆”。每当你用温柔回应一个生命，迷失者就会被指引到这个渡口（港口），在这里把故事交还给自己。"},
  30:{title:"月井花庭",text:"会发光的藤蔓绕着断碑生长，碑文写着：救人者，也在被世界悄悄拯救。"},
  40:{title:"霜羽教堂",text:"寒气中传来祈祷，受伤的翼兽与旅人并肩取暖，谁也不再独自发抖。"},
  50:{title:"晨曦书库",text:"旧书翻开后掉下一封封未寄出的信，原来怪物也会把歉意写得很认真。"}
};
const CHAPTER_MONSTER_PACKS={
  10:[
    {id:"starsand_guardian",txt:"星砂守望者拦下你，它在确认你是否会伤害流浪者。你怎么回应？",opts:["放下武器并承诺护送弱者","要求它立刻让路","尝试突袭"],outcomes:["peace","conflict","combat"]},
    {id:"ember_deer",txt:"余烬鹿在废墟里守着熄灭的火种。你怎么回应？",opts:["帮它重燃火种","催促它快离开","夺走火种"],outcomes:["peace","conflict","combat"]}
  ],
  20:[
    {id:"harbor_siren",txt:"港湾海妖在哭泣，它害怕再次失去船员。你怎么回应？",opts:["倾听并帮它寻找失散名册","嫌它吵闹","拔剑威吓"],outcomes:["peace","conflict","combat"]},
    {id:"mist_colossus",txt:"迷雾巨像误把你认成旧敌。你怎么回应？",opts:["先说明来意并示弱","反讽它记性差","直接攻击"],outcomes:["peace","conflict","combat"]}
  ],
  30:[
    {id:"moonvine_keeper",txt:"月藤守卫担心花庭被毁。你怎么回应？",opts:["答应保护花庭并清理碎石","说这不关你事","砍断藤蔓开路"],outcomes:["peace","conflict","combat"]},
    {id:"well_spirit",txt:"井灵守着祈愿碎片，不敢交给任何人。你怎么回应？",opts:["帮它筛选真正的愿望","催它快点","强取碎片"],outcomes:["peace","conflict","combat"]}
  ],
  40:[
    {id:"frost_wing",txt:"霜翼兽怕体温再伤到同伴。你怎么回应？",opts:["带它去温泉回廊","嫌它麻烦","趁其虚弱下手"],outcomes:["peace","conflict","combat"]},
    {id:"prayer_knight",txt:"祈祷骑士只想守住最后的誓言。你怎么回应？",opts:["尊重誓言并提出合作","嘲笑它过时","强行突破"],outcomes:["peace","conflict","combat"]}
  ],
  50:[
    {id:"dawn_archivist",txt:"晨曦档案师请你帮忙归还遗失手稿。你怎么回应？",opts:["答应协助并追索线索","让它自己处理","焚毁手稿省麻烦"],outcomes:["peace","conflict","combat"]},
    {id:"echo_librarian",txt:"回声馆员担心真相再次被扭曲。你怎么回应？",opts:["共同整理证词","质疑它夸大其词","强行沉默它"],outcomes:["peace","conflict","combat"]}
  ]
};
const QUEST_DEFS={
  herb:{title:"药草与幼崽",steps:["取得灰狼信任","完成一次救助","打开一次宝箱取药","把药送到幼崽"],reward:22},
  lamp:{title:"夜灯守望",steps:["答应石像鬼点灯","继续下探 2 层","收集温暖火种（宝箱）","点亮回廊"],reward:26},
  letter:{title:"未寄出的信",steps:["帮助魔像读信","再完成 2 次和平沟通","完成一次救助转交信件","收到回信"],reward:30}
};
const G={uid:"",state:null,busy:false,page:1,recordBase:[],moveSaving:false};

function gasUrl(){
  const q=new URLSearchParams(location.search).get("record");
  return q || FIXED_GAS_URL;
}
function now(){ const d=new Date(); return {date:d.toLocaleDateString("zh-TW"),time:d.toLocaleTimeString("zh-TW",{hour12:false}),ts:d.getTime()}; }
function rInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function key(x,y){ return x+","+y; }
function sys(msg,avatar){ document.getElementById("sysAvatar").src=avatar||SYS_AVATARS[0]; document.getElementById("sysMsg").textContent=msg||""; }
function show(id,v){ document.getElementById(id).classList.toggle("hidden",!v); }
function setNotice(msg){ document.getElementById("menuNotice").textContent=msg||""; }

function setBusy(v,text){
  G.busy=!!v;
  document.getElementById("btnStart").disabled=!!v;
  document.getElementById("btnResume").disabled=!!v;
  show("loadingOverlay",!!v);
  document.getElementById("loadingOverlay").setAttribute("aria-hidden",v?"false":"true");
  if(text) document.getElementById("loadingText").textContent=text;
  document.getElementById("loadingAvatar").src=SYS_AVATARS[0];
}
let _chapterResolver=null;
function showChapterCard(title,text){
  return new Promise((resolve)=>{
    _chapterResolver=resolve;
    document.getElementById("chapterTitle").textContent=title||"章节";
    document.getElementById("chapterText").textContent=text||"";
    show("chapterOverlay",true);
    document.getElementById("chapterOverlay").setAttribute("aria-hidden","false");
  });
}
function closeChapterCard(){
  show("chapterOverlay",false);
  document.getElementById("chapterOverlay").setAttribute("aria-hidden","true");
  if(_chapterResolver){ const r=_chapterResolver; _chapterResolver=null; r(); }
}

function apiJsonp(action, params){
  return new Promise((resolve,reject)=>{
    const u=gasUrl(); if(!u) return reject(new Error("未提供 record=GAS_URL"));
    const cb="dg_cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    window[cb]=function(res){
      try{ delete window[cb]; s.remove(); }catch(e){}
      if(res && res.ok) resolve(res); else reject(new Error((res&&res.error)||"cloud_error"));
    };
    const p=new URLSearchParams(Object.assign({},params||{}, {action:action,callback:cb,_ts:String(Date.now())}));
    const s=document.createElement("script");
    s.src=u+(u.includes("?")?"&":"?")+p.toString();
    s.onerror=function(){ try{delete window[cb];s.remove();}catch(e){} reject(new Error("云端抓取失败")); };
    document.head.appendChild(s);
  });
}

async function apiPostJson_(payload){
  const u=gasUrl();
  if(!u) throw new Error("no_gas_url");
  // 使用 POST，避免 state_json 过长导致 GET/JSONP URL 失效
  // 先尝试 cors，再回退到 no-cors（我们后续会用 load_state 做确认）
  try{
    const res=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"cors"});
    if(res && res.ok) return true;
  }catch(e){}
  await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),mode:"no-cors"}).catch(()=>{});
  return true;
}

async function enterGame(){
  const uid=(document.getElementById("uid").value||"").trim();
  if(!uid){ document.getElementById("loginNotice").textContent="请先输入论坛ID。"; return; }
  G.uid=uid; document.getElementById("hello").textContent="玩家："+uid;
  show("loginCard",false); show("menuCard",true); show("recordCard",false); show("gameCard",false);
  setNotice("");
  await cloudConfirmAndLoad();
}

async function cloudConfirmAndLoad(){
  setBusy(true,"系统正在读取中，请静候…");
  try{
    const res=await apiJsonp("load_state",{user_id:G.uid});
    if(res.data && res.data.state){
      G.state=normalizeState(res.data.state);
      setNotice("云端确认成功：检测到可继续的地下城进度。");
    }else{
      G.state=null;
      setNotice("云端确认成功：暂无进度，可开始新冒险。");
    }
  }catch(e){
    G.state=null;
    setNotice("云端抓取失败：无法进入游戏，请稍后重试。");
    sys("云端抓取失败，已阻止进入游戏。请检查 GAS 或网络。",SYS_AVATARS[2]);
  }finally{
    setBusy(false);
  }
}

function makeStoryRescue(){
  const pool=[
    "一位迷路的孩子在找回家的路，请给予耐心指引。",
    "一位失业青年躲在角落，需要被认真倾听与鼓励。",
    "一位独居老人摔伤后情绪低落，请温柔协助。",
    "一位被误解的学徒不敢开口，请帮他表达需求。"
  ];
  return pool[rInt(0,pool.length-1)];
}
function makeStoryMonster(){
  const pool=[
    {id:"wolf",txt:"灰狼守在药草旁，它在为受伤幼崽找药。你怎么回应？",opts:["先听它说明并一起找药","质疑它在说谎并恐吓","直接开战"],outcomes:["peace","conflict","combat"]},
    {id:"gargoyle",txt:"石像鬼堵住路口，它怕再失去同伴。你怎么回应？",opts:["答应帮它点亮路灯","冷嘲热讽它太懦弱","强行通过并攻击"],outcomes:["peace","conflict","combat"]},
    {id:"slime",txt:"史莱姆偷了面包，它说三天没吃东西。你怎么回应？",opts:["分它食物并约定规则","逼它当场道歉赔偿","立刻击杀"],outcomes:["peace","conflict","combat"]},
    {id:"golem",txt:"夜行魔像守着一封旧信，它不识字却不敢交给任何人。你怎么回应？",opts:["帮它读信并找收件人","说这事与你无关","将信夺走逼问"],outcomes:["peace","conflict","combat"]}

function chapterTierByFloor(floor){
  const t=Math.floor((Number(floor)||1)/10)*10;
  if(t<10) return 0;
  if(t>50) return 50;
  return t;
}
function makeStoryMonsterByFloor(floor){
  const base=[
    {id:"wolf",txt:"灰狼守在药草旁，它在为受伤幼崽找药。你怎么回应？",opts:["先听它说明并一起找药","质疑它在说谎并恐吓","直接开战"],outcomes:["peace","conflict","combat"]},
    {id:"gargoyle",txt:"石像鬼堵住路口，它怕再失去同伴。你怎么回应？",opts:["答应帮它点亮路灯","冷嘲热讽它太懦弱","强行通过并攻击"],outcomes:["peace","conflict","combat"]},
    {id:"slime",txt:"史莱姆偷了面包，它说三天没吃东西。你怎么回应？",opts:["分它食物并约定规则","逼它当场道歉赔偿","立刻击杀"],outcomes:["peace","conflict","combat"]},
    {id:"golem",txt:"夜行魔像守着一封旧信，它不识字却不敢交给任何人。你怎么回应？",opts:["帮它读信并找收件人","说这事与你无关","将信夺走逼问"],outcomes:["peace","conflict","combat"]}
  ];
  const tier=chapterTierByFloor(floor);
  const chapter=CHAPTER_MONSTER_PACKS[tier]||[];
  const pool=base.concat(chapter);
  return pool[rInt(0,pool.length-1)];
}

function monsterRewardByFloor(floor){
  const isLegend = (Number(floor)||0) % 10 === 0;
  if(isLegend){
    return 55 + floor*12 + rInt(0,20);
  }
  return 15 + floor*6;
}

function rescueRewardByFloor(floor){
  // 救助属于“温柔额外收益”：通常低于击杀怪物，但高于纯章节叙事
  const base=monsterRewardByFloor(floor);
  return Math.max(4, Math.floor(base*0.30) + rInt(0,10));
}

function chestRewardByFloor(){
  // 类似爬塔宝箱：固定为 1 积分点（主要用于排行榜）
  return 1;
}

function talkRewardByFloor(floor){
  // 沟通怪物：和平/紧张解决会给到一定奖励
  const base=monsterRewardByFloor(floor);
  return Math.max(6, Math.floor(base*0.55) + rInt(0,12));
}

function buildFloor(floor){
  const w=12,h=12,tiles=[],revealed={},events={};
  const baseMonsterReward=monsterRewardByFloor(floor);
  const baseRescueReward=rescueRewardByFloor(floor);
  const baseChestReward=chestRewardByFloor(floor);
  const baseTalkReward=talkRewardByFloor(floor);
  const tier=Math.floor((Number(floor)||1)/10)*10;
  for(let y=0;y<h;y++){
    tiles[y]=[];
    for(let x=0;x<w;x++){
      const border=(x===0||y===0||x===w-1||y===h-1);
      if(border){ tiles[y][x]=1; continue; }
      // 20 层：港口（渡口）地形会出现“可通行水道”（视觉上像港湾）
      if(tier===20 && Math.random()<0.08) tiles[y][x]=2;
      else tiles[y][x]=(Math.random()<0.22?1:0);
    }
  }
  const start={x:1,y:1}, stairs={x:w-2,y:h-2};
  tiles[start.y][start.x]=0; tiles[stairs.y][stairs.x]=0;
  let cx=start.x,cy=start.y;
  while(cx!==stairs.x || cy!==stairs.y){
    if(cx<stairs.x) cx++; else if(cy<stairs.y) cy++;
    tiles[cy][cx]=0;
  }
  revealed[key(start.x,start.y)]=1;
  // 为 20 层追加水道/栈桥视觉：水可通行，但事件不会生成在水面
  if(tier===20){
    const waterCols=[4,7];
    const waterRows=[4,7];
    for(let i=0;i<waterCols.length;i++){
      const wx=waterCols[i];
      for(let y=1;y<h-1;y++){
        if(!xBlockedPath(wx,y,start,stairs)) tiles[y][wx]=2;
      }
    }
    for(let i=0;i<waterRows.length;i++){
      const wy=waterRows[i];
      for(let x=1;x<w-1;x++) tiles[wy][x]=2;
    }
  }
  const bias=(G.state&&G.state.eventBias)?G.state.eventBias:{peace:0,conflict:0};
  const peaceBoost=Math.min(0.08,0.02*Number(bias.peace||0));
  const conflictBoost=Math.min(0.12,0.02*Number(bias.conflict||0));
  const chestRate=0.10;
  const talkRate=Math.max(0.06, Math.min(0.20, 0.10 + peaceBoost - conflictBoost*0.4));
  const rescueRate=Math.max(0.08, Math.min(0.22, 0.12 + peaceBoost*0.8 - conflictBoost*0.5));
  const monsterRate=Math.max(0.12, Math.min(0.36, 0.18 + conflictBoost - peaceBoost*0.6));
  const tChest=chestRate, tMonster=tChest+monsterRate, tRescue=tMonster+rescueRate, tTalk=tRescue+talkRate;
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    if(tiles[y][x]===1 || tiles[y][x]===2) continue;
    if((x===start.x&&y===start.y)||(x===stairs.x&&y===stairs.y)) continue;
    const r=Math.random();
    if(r<tChest) events[key(x,y)]={type:"chest",need:rInt(10,24),reward:baseChestReward,done:false};
    else if(r<tMonster) events[key(x,y)]={type:"monster",hp:rInt(8,24)+floor,reward:baseMonsterReward,done:false};
    else if(r<tRescue) events[key(x,y)]={type:"rescue",need:rInt(10,22),story:makeStoryRescue(),reward:baseRescueReward,done:false};
    else if(r<tTalk){ const s=makeStoryMonsterByFloor(floor); events[key(x,y)]={type:"talk_monster",monsterId:s.id,story:s.txt,opts:s.opts,outcomes:s.outcomes,reward:baseTalkReward,hp:rInt(10,22)+floor,done:false}; }
  }
  return {w:w,h:h,tiles:tiles,revealed:revealed,events:events,start:start,stairs:stairs};
}

function xBlockedPath(x,y,start,stairs){
  // 简单防止水道把“起点/楼梯”直接覆盖（实际起点/楼梯会在后面被强制设为 0）
  if((x===start.x&&y===start.y) || (x===stairs.x&&y===stairs.y)) return true;
  return false;
}

function newState(uid){
  const floor=1,map=buildFloor(floor);
  return {
    uid:uid,floor:floor,reward:0,hp:3,maxHp:3,stockReply:0,stockQuote:0,
    player:{x:map.start.x,y:map.start.y},map:map,pending:null,lastEventKey:"",
    eventBias:{peace:0,conflict:0},chapterSeen:{},chapterRewardSeen:{},
    lootBag:{jiecao:0,yumao:0,bqMedal30:0,pastMedal30:0},
    story:{
      kindness:0,violence:0,peaceTalks:0,rescueDone:0,chestOpen:0,floorsDescended:0,
      quest:{
        herb:{stage:0,done:false},
        lamp:{stage:0,done:false,startFloor:0},
        letter:{stage:0,done:false}
      },
      endings:{herb:false,lamp:false,letter:false,all:false},
      pendingNotes:[],
      log:[]
    },
    updatedAt:Date.now()
  };
}
function normalizeState(st){
  if(!st) return null;
  if(!st.eventBias) st.eventBias={peace:0,conflict:0};
  if(typeof st.eventBias.peace!=="number") st.eventBias.peace=0;
  if(typeof st.eventBias.conflict!=="number") st.eventBias.conflict=0;
  if(!st.chapterSeen) st.chapterSeen={};
  if(!st.chapterRewardSeen) st.chapterRewardSeen={};
  if(typeof st.stockReply!=="number") st.stockReply=Number(st.stockReply||0);
  if(typeof st.stockQuote!=="number") st.stockQuote=Number(st.stockQuote||0);
  if(!st.lootBag){
    st.lootBag={jiecao:0,yumao:0,bqMedal30:0,pastMedal30:0};
  }else{
    if(typeof st.lootBag.jiecao!=="number") st.lootBag.jiecao=Number(st.lootBag.jiecao||0);
    if(typeof st.lootBag.yumao!=="number") st.lootBag.yumao=Number(st.lootBag.yumao||0);
    if(typeof st.lootBag.bqMedal30!=="number") st.lootBag.bqMedal30=Number(st.lootBag.bqMedal30||0);
    if(typeof st.lootBag.pastMedal30!=="number") st.lootBag.pastMedal30=Number(st.lootBag.pastMedal30||0);
  }
  if(!st.story){
    st.story={kindness:0,violence:0,peaceTalks:0,rescueDone:0,chestOpen:0,floorsDescended:0,quest:{herb:{stage:0,done:false},lamp:{stage:0,done:false,startFloor:0},letter:{stage:0,done:false}},log:[]};
  }
  if(!st.story.quest) st.story.quest={herb:{stage:0,done:false},lamp:{stage:0,done:false,startFloor:0},letter:{stage:0,done:false}};
  if(!st.story.endings) st.story.endings={herb:false,lamp:false,letter:false,all:false};
  if(!st.story.pendingNotes) st.story.pendingNotes=[];
  if(!st.story.log) st.story.log=[];
  return st;
}
function pushStoryLog(s,msg){
  if(!s||!s.story) return;
  s.story.log.unshift(msg);
  s.story.log=s.story.log.slice(0,8);
}
function enqueueStoryNote(s,msg,avatar){
  if(!s||!s.story) return;
  s.story.pendingNotes.push({msg:msg,avatar:avatar||SYS_AVATARS[1]});
  s.story.pendingNotes=s.story.pendingNotes.slice(-6);
}
function popStoryNote(s){
  if(!s||!s.story||!s.story.pendingNotes||!s.story.pendingNotes.length) return false;
  const n=s.story.pendingNotes.shift();
  sys(n.msg,n.avatar||SYS_AVATARS[1]);
  return true;
}
function tryUnlockEndings(s){
  if(!s||!s.story||!s.story.quest) return;
  const q=s.story.quest,e=s.story.endings;
  if(q.herb.done && !e.herb){
    e.herb=true; s.reward+=18;
    pushStoryLog(s,"结局解锁【幼崽归巢】：灰狼一家在火堆旁等你回访。积分 +18");
    enqueueStoryNote(s,"【NPC 结局】幼崽归巢：你救下的小生命终于能在安全的巢穴里入睡。积分 +18。",SYS_AVATARS[1]);
  }
  if(q.lamp.done && !e.lamp){
    e.lamp=true; s.reward+=20;
    pushStoryLog(s,"结局解锁【回廊长明】：石像鬼第一次在夜里笑了。积分 +20");
    enqueueStoryNote(s,"【NPC 结局】回廊长明：你点亮的灯让迷路者不再害怕。积分 +20。",SYS_AVATARS[1]);
  }
  if(q.letter.done && !e.letter){
    e.letter=true; s.reward+=24;
    pushStoryLog(s,"结局解锁【回信抵达】：魔像把信抱在胸前久久不语。积分 +24");
    enqueueStoryNote(s,"【NPC 结局】回信抵达：迟到多年的原谅终于被读到。积分 +24。",SYS_AVATARS[1]);
  }
  if(e.herb && e.lamp && e.letter && !e.all){
    e.all=true; s.reward+=40; s.hp=Math.min(s.maxHp,s.hp+1);
    pushStoryLog(s,"终章解锁【共灯之夜】：所有被你帮助过的人都在同一盏灯下重逢。积分 +40，生命 +1");
    enqueueStoryNote(s,"【终章结局】共灯之夜：你不是征服了地下城，而是让它重新学会温柔。积分 +40，生命 +1。",SYS_AVATARS[1]);
  }
}
function tryAdvanceQuests(s,ctx){
  if(!s||!s.story) return;
  const q=s.story.quest;
  // 药草与幼崽
  if(!q.herb.done){
    if(q.herb.stage===0 && ctx.type==="talk" && ctx.monsterId==="wolf" && ctx.outcome==="peace"){ q.herb.stage=1; pushStoryLog(s,"支线【药草与幼崽】开启：你获得了灰狼的信任。"); }
    else if(q.herb.stage===1 && ctx.type==="rescue_done"){ q.herb.stage=2; pushStoryLog(s,"支线【药草与幼崽】推进：你找到可托付药草的人。"); }
    else if(q.herb.stage===2 && ctx.type==="chest_done"){ q.herb.stage=3; q.herb.done=true; s.reward+=QUEST_DEFS.herb.reward; pushStoryLog(s,"支线【药草与幼崽】完成：幼崽得救，积分 +"+QUEST_DEFS.herb.reward); }
  }
  // 夜灯守望
  if(!q.lamp.done){
    if(q.lamp.stage===0 && ctx.type==="talk" && ctx.monsterId==="gargoyle" && ctx.outcome==="peace"){ q.lamp.stage=1; q.lamp.startFloor=s.floor; pushStoryLog(s,"支线【夜灯守望】开启：你答应帮助石像鬼点灯。"); }
    else if(q.lamp.stage===1 && ctx.type==="descend" && (s.floor-(q.lamp.startFloor||s.floor))>=2){ q.lamp.stage=2; pushStoryLog(s,"支线【夜灯守望】推进：你已带着承诺走过两层。"); }
    else if(q.lamp.stage===2 && ctx.type==="chest_done"){ q.lamp.stage=3; q.lamp.done=true; s.reward+=QUEST_DEFS.lamp.reward; s.eventBias.peace=(s.eventBias.peace||0)+1; pushStoryLog(s,"支线【夜灯守望】完成：回廊重亮，积分 +"+QUEST_DEFS.lamp.reward); }
  }
  // 未寄出的信
  if(!q.letter.done){
    if(q.letter.stage===0 && ctx.type==="talk" && ctx.monsterId==="golem" && ctx.outcome==="peace"){ q.letter.stage=1; pushStoryLog(s,"支线【未寄出的信】开启：你答应帮魔像完成心愿。"); }
    else if(q.letter.stage===1 && ctx.type==="talk" && ctx.outcome==="peace" && s.story.peaceTalks>=3){ q.letter.stage=2; pushStoryLog(s,"支线【未寄出的信】推进：你积累了足够的信任。"); }
    else if(q.letter.stage===2 && ctx.type==="rescue_done"){ q.letter.stage=3; q.letter.done=true; s.reward+=QUEST_DEFS.letter.reward; pushStoryLog(s,"支线【未寄出的信】完成：回信抵达，积分 +"+QUEST_DEFS.letter.reward); }
  }
  tryUnlockEndings(s);
}
function storyAlignmentText(s){
  if(!s||!s.story) return "-";
  const k=Number(s.story.kindness||0), v=Number(s.story.violence||0);
  if(k-v>=3) return "抚慰之光（温和）";
  if(v-k>=3) return "裂锋之影（强硬）";
  return "暮色平衡（中立）";
}
function questSummaryText(s){
  if(!s||!s.story||!s.story.quest) return "-";
  const q=s.story.quest;
  const parts=[];
  for(const id of ["herb","lamp","letter"]){
    const st=q[id]||{stage:0,done:false};
    if(st.done) parts.push(QUEST_DEFS[id].title+"·已完成");
    else if(st.stage>0) parts.push(QUEST_DEFS[id].title+"·进行中("+st.stage+"/3)");
  }
  return parts.length?parts.join("；"):"暂无长线进行中";
}

function renderMap(){
  const s=G.state;if(!s) return;
  const m=s.map, tb=document.getElementById("mapTable");
  tb.innerHTML="";
  for(let y=0;y<m.h;y++){
    const tr=document.createElement("tr");
    for(let x=0;x<m.w;x++){
      const td=document.createElement("td");
      const rv=!!m.revealed[key(x,y)];
      const tile=m.tiles[y][x];
      td.className=rv?(tile===1?"wall":(tile===2?"water":"floor")):"fog";
      if(rv && x===m.stairs.x && y===m.stairs.y){ td.className="stairs"; td.textContent="下"; }
      if(rv && s.player.x===x && s.player.y===y){ td.innerHTML='<img src="'+PLAYER_AVATAR+'" alt="p" style="width:22px;height:22px;object-fit:contain">'; }
      if(rv && m.events[key(x,y)] && !m.events[key(x,y)].done && !(s.player.x===x&&s.player.y===y)) td.classList.add("event");
      tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
}

  }

async function saveStateCloud(eventName, verifyAfter){
  const s=G.state;if(!s) return;
  const verify=verifyAfter!==false;
  s.updatedAt=Date.now();
  const stateJson=JSON.stringify(s);
  await apiPostJson_({
    action:"save_state",
    user_id:G.uid,
    floor:String(s.floor),
    reward:String(s.reward),
    event:eventName||"",
    state_json:stateJson,
    _ts:String(Date.now())
  });
  // 写入后用云端确认，避免“写入失败却不知”的情况（移动时为了不卡顿可跳过）
  if(verify){
    const after=await apiJsonp("load_state",{user_id:G.uid});
    if(!after || !after.data || !after.data.state) throw new Error("cloud_save_verify_failed");
  }
}

async function appendRecord(result){
  const s=G.state;if(!s)return;
  const t=now();
  await apiJsonp("add_record",{user_id:G.uid,date:t.date,time:t.time,reward:String(s.reward),result:result||"",floor:String(s.floor),_ts:String(Date.now())});
}

async function startNew(){
  if(G.busy) return;
  if(!G.uid) return;
  if(!gasUrl()) return setNotice("未提供 record=GAS_URL，无法开始。");
  const ok=!G.state || confirm("开始新冒险将覆盖当前云端续档，是否继续？");
  if(!ok) return;
  setBusy(true,"系统正在读取中，请静候…");
  try{
    G.state=newState(G.uid);
    await saveStateCloud("start_new");
    show("menuCard",false); show("recordCard",false); show("gameCard",true);
    sys("你踏入地下城。黑暗里，也许藏着等待被帮助的故事。",SYS_AVATARS[1]);
    renderMap(); renderHUD();
  }catch(e){
    setNotice("云端写入失败：无法开始新冒险。");
  }finally{ setBusy(false); }
}

async function resumeRun(){
  if(G.busy) return;
  if(!G.uid) return;
  if(!gasUrl()) return setNotice("未提供 record=GAS_URL，无法继续。");
  setBusy(true,"系统正在读取中，请静候…");
  try{
    const res=await apiJsonp("load_state",{user_id:G.uid});
    if(!res.data || !res.data.state){
      setNotice("云端暂无进度，已转为开始新冒险。");
      setBusy(false);
      return startNew();
    }
    G.state=normalizeState(res.data.state);
    show("menuCard",false); show("recordCard",false); show("gameCard",true);
    sys("已从云端恢复进度。愿你在黑暗里仍看见温柔。",SYS_AVATARS[0]);
    renderMap(); renderHUD();
  }catch(e){
    setNotice("云端抓取失败：继续冒险失败，请稍后重试。");
  }finally{ setBusy(false); }
}

function touchTileEvent(){
  const s=G.state,m=s.map,k=key(s.player.x,s.player.y),ev=m.events[k];
  if(ev && !ev.done){ s.pending=ev; s.lastEventKey=k; }
}

async function move(dx,dy){
  const s=G.state;if(!s||G.busy) return;
  if(s.pending) return sys("当前事件未处理，先完成事件再移动。",SYS_AVATARS[2]);
  if(G.moveSaving) return sys("系统正在保存云端，请稍候…",SYS_AVATARS[2]);
  const nx=s.player.x+dx, ny=s.player.y+dy, m=s.map;
  if(nx<0||ny<0||nx>=m.w||ny>=m.h) return;
  if(m.tiles[ny][nx]===1) return sys("前方是墙壁，无法继续移动。",SYS_AVATARS[2]);
  s.player.x=nx; s.player.y=ny; m.revealed[key(nx,ny)]=1; touchTileEvent();
  // 移动时先不等待云端校验，避免每一步都造成卡顿；失败会提示，但不阻塞本次移动渲染。
  G.moveSaving=true;
  renderMap(); renderHUD();
  // 关键：延后执行 save（里面会 JSON.stringify 大状态），避免点击当下卡顿。
  setTimeout(()=>{
    saveStateCloud("move",false)
      .catch(()=>sys("云端保存失败：本次移动可能未被确认。",SYS_AVATARS[2]))
      .finally(()=>{G.moveSaving=false;});
  },0);
}

async function resolveEvent(){
  const s=G.state,p=s&&s.pending;
  if(!p||G.busy) return;
  if(G.moveSaving) return sys("系统正在保存云端，请稍后再处理事件。",SYS_AVATARS[2]);
  const addR=Math.max(0,parseInt(document.getElementById("addR").value||"0",10));
  const addQ=Math.max(0,parseInt(document.getElementById("addQ").value||"0",10));
  s.stockReply=(s.stockReply||0)+addR; s.stockQuote=(s.stockQuote||0)+addQ;
  document.getElementById("addR").value="0"; document.getElementById("addQ").value="0";
  const pts=s.stockReply+s.stockQuote*5;
  if(p.type==="chest"){
    if(pts<p.need) return sys("点数不足，宝箱未开。可继续积累回复/被引用。",SYS_AVATARS[2]);
    consumePts(s,p.need); p.done=true; s.pending=null; s.reward+=(p.reward||1); s.story.chestOpen=(s.story.chestOpen||0)+1;
    tryAdvanceQuests(s,{type:"chest_done"});
    const lootPool=[
      {key:"jiecao", label:"30节操", add:30},
      {key:"yumao", label:"30羽毛", add:30},
      {key:"bqMedal30", label:"30天本期勋章", add:30},
      {key:"pastMedal30", label:"30天往期勋章", add:30},
    ];
    const pick=lootPool[rInt(0,lootPool.length-1)];
    if(s.lootBag) s.lootBag[pick.key]=(s.lootBag[pick.key]||0)+pick.add;
    sys("宝箱开启！积分 +" + (p.reward||1) + "，战利品：随机获得 " + pick.label + "。",SYS_AVATARS[1]);
  }else if(p.type==="monster"){
    const hit=Math.max(1,addR+addQ*5);
    p.hp-=hit;
    if(p.hp>0){ s.pending=p; sys("你造成了 "+hit+" 点伤害，怪物仍在。",SYS_AVATARS[2]); }
    else{ p.done=true; s.pending=null; s.reward+=p.reward; sys("怪物被击退，积分 +"+p.reward+"。",SYS_AVATARS[1]); }
  }else if(p.type==="rescue"){
    if(pts<p.need) return sys("救助点数不足（需要 "+p.need+"）。",SYS_AVATARS[2]);
    consumePts(s,p.need); p.done=true; s.pending=null; s.reward+=p.reward; s.hp=Math.min(s.maxHp,s.hp+1);
    s.story.kindness=(s.story.kindness||0)+1;
    s.story.rescueDone=(s.story.rescueDone||0)+1;
    tryAdvanceQuests(s,{type:"rescue_done"});
    sys("你成功救助了对方，收获了真诚感谢。积分 +"+p.reward+"，生命 +1。",SYS_AVATARS[1]);
  }else if(p.type==="talk_monster"){
    const v=parseInt(document.getElementById("talkSel").value||"-1",10);
    if(v<0) return sys("请先选择一个沟通选项。",SYS_AVATARS[2]);
    const outcomes=p.outcomes||[];
    const oc=outcomes[v]||"combat";
    if(oc==="peace"){
      p.done=true; s.pending=null; s.reward+=p.reward;
      s.eventBias.peace=(s.eventBias.peace||0)+1;
      s.eventBias.conflict=Math.max(0,(s.eventBias.conflict||0)-1);
      s.story.kindness=(s.story.kindness||0)+1;
      s.story.peaceTalks=(s.story.peaceTalks||0)+1;
      tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"peace"});
      sys("你理解了它的难处，和平解决。积分 +"+p.reward+"。下一层更可能出现可沟通/救助事件。",SYS_AVATARS[1]);
    }else if(oc==="conflict"){
      p.done=true; s.pending=null;
      const rw=Math.max(4,Math.floor(p.reward*0.45));
      s.reward+=rw;
      s.eventBias.conflict=(s.eventBias.conflict||0)+1;
      s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
      s.story.violence=(s.story.violence||0)+1;
      tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"conflict"});
      sys("沟通有些生硬但仍化解冲突。积分 +"+rw+"。下一层可能更容易出现战斗事件。",SYS_AVATARS[2]);
    }else{
      s.pending={type:"monster",hp:p.hp,reward:Math.floor(p.reward*0.7),done:false};
      s.eventBias.conflict=(s.eventBias.conflict||0)+2;
      s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
      s.story.violence=(s.story.violence||0)+2;
      tryAdvanceQuests(s,{type:"talk",monsterId:p.monsterId||"",outcome:"combat"});
      sys("沟通破裂，怪物情绪失控，进入战斗。接下来几层战斗风险上升。",SYS_AVATARS[2]);
    }
  }
  if(s.hp<=0){ await onDeath(); return; }
  popStoryNote(s);
  try{ await saveStateCloud("resolve_event"); }catch(e){ return sys("云端写入失败，本次事件未确认。",SYS_AVATARS[2]); }
  renderMap(); renderHUD();
}

function consumePts(s,need){
  let rem=need;
  const useQ=Math.min(s.stockQuote, Math.floor(rem/5));
  s.stockQuote-=useQ; rem-=useQ*5;
  const useR=Math.min(s.stockReply, rem);
  s.stockReply-=useR; rem-=useR;
  if(rem>0 && s.stockQuote>0){ s.stockQuote--; rem=Math.max(0,rem-5); }
}

async function goDown(){
  const s=G.state;if(!s||G.busy)return;
  if(s.pending) return sys("本格事件尚未处理，无法下楼。",SYS_AVATARS[2]);
  if(G.moveSaving) return sys("系统正在保存云端，请稍后再下楼。",SYS_AVATARS[2]);
  if(!(s.player.x===s.map.stairs.x && s.player.y===s.map.stairs.y)) return sys("你需要先走到楼梯位置。",SYS_AVATARS[2]);
  s.floor+=1;
  // 章回推进：每 10 层触发一段温馨奇幻小章节
  if(s.floor%10===0){
    const chapter=CHAPTER_PACKS[s.floor]||CHAPTER_PACKS[50];
    if(chapter && !s.chapterSeen[String(s.floor)]){
      s.chapterSeen[String(s.floor)]=1;
      setNotice("章节解锁：第 "+s.floor+" 层 · "+chapter.title);
      let flavor="";
      const k=Number(s.story.kindness||0), v=Number(s.story.violence||0);
      if(k-v>=3) flavor=" 你一路选择倾听，许多原本敌对的身影开始愿意先开口。";
      else if(v-k>=3) flavor=" 你一路强硬前行，回廊中的戒备越来越重。";
      else flavor=" 你在温柔与锋利之间摇摆，故事也因此更复杂。";
      let chapterBonus=0;
      if(!s.chapterRewardSeen[String(s.floor)]){
        s.chapterRewardSeen[String(s.floor)]=1;
        chapterBonus=12+Math.floor(s.floor/10)*2;
        s.reward+=chapterBonus;
      }
      await showChapterCard(
        "第 "+s.floor+" 层 · "+chapter.title,
        chapter.text+flavor+(chapterBonus>0?(" 章节小结算：积分 +"+chapterBonus+"。"):"")
      );
      sys("章节推进完成："+chapter.title+"。",SYS_AVATARS[1]);
    }
  }
  // 倾向逐层衰减，避免永久锁定某一类事件
  s.eventBias.peace=Math.max(0,(s.eventBias.peace||0)-1);
  s.eventBias.conflict=Math.max(0,(s.eventBias.conflict||0)-1);
  s.story.floorsDescended=(s.story.floorsDescended||0)+1;
  tryAdvanceQuests(s,{type:"descend"});
  const hasNote=popStoryNote(s);
  const m=buildFloor(s.floor); s.map=m; s.player={x:m.start.x,y:m.start.y}; s.pending=null; s.lastEventKey="";
  s.hp=Math.min(s.maxHp,s.hp+1);
  try{ await saveStateCloud("next_floor"); }catch(e){ return sys("云端写入失败，无法下楼确认。",SYS_AVATARS[2]); }
  if(!(s.floor%10===0 && s.chapterSeen[String(s.floor)])){
    if(!hasNote) sys("你来到第 "+s.floor+" 层。墙壁之外，仍有等待被照亮的故事。",SYS_AVATARS[1]);
  }
  renderMap(); renderHUD();
}

async function settle(result){
  const s=G.state;if(!s||G.busy)return;
  setBusy(true,"正在结算，请静候…");
  try{
    await appendRecord(result||"结算");
    await apiJsonp("clear_state",{user_id:G.uid,_ts:String(Date.now())});
    G.state=null;
    show("gameCard",false); show("recordCard",false); show("menuCard",true);
    setNotice("结算完成：积分 "+(s.reward||0)+"。");
  }catch(e){
    setNotice("云端结算失败，请稍后重试。");
  }finally{ setBusy(false); }
}

async function onDeath(){
  const s=G.state;if(!s)return;
  await appendRecord("阵亡重置");
  await apiJsonp("clear_state",{user_id:G.uid,_ts:String(Date.now())});
  G.state=null;
  show("gameCard",false); show("recordCard",false); show("menuCard",true);
  setNotice("你已阵亡：本次冒险结束，已写入云端记录。");
}

async function changeIdFromMenu(){
  const oldId=(G.uid||"").trim(); if(!oldId) return;
  let newId=prompt("请输入新的论坛ID：",oldId); if(newId===null) return;
  newId=(newId||"").trim(); if(!newId||newId===oldId) return;
  setBusy(true,"正在替换云端ID，请静候…");
  try{
    await apiJsonp("rename_uid",{old_id:oldId,new_id:newId,_ts:String(Date.now())});
    G.uid=newId; document.getElementById("uid").value=newId; document.getElementById("hello").textContent="玩家："+newId;
    setNotice("ID 已替换为 "+newId+"，云端记录已同步归并。");
    await cloudConfirmAndLoad();
  }catch(e){ setNotice("ID 替换失败，请稍后重试。"); }
  finally{ setBusy(false); }
}

async function changeIdMidGame(){
  if(!G.uid) return;
  const ok=confirm("中途更改ID会立即同步替换云端记录，并继续当前进度。是否继续？");
  if(!ok) return;
  await changeIdFromMenu();
  if(G.state){ try{ await saveStateCloud("change_id_midgame"); }catch(e){} renderHUD(); }
}

function openRecords(){ show("menuCard",false); show("gameCard",false); show("recordCard",true); loadRecords(1); }
async function loadRecords(page){
  if(!G.uid) return;
  G.page=Math.max(1,page||1);
  const log=document.getElementById("recordLog");
  log.textContent="读取中…";
  try{
    const res=await apiJsonp("list_records",{page:String(G.page),page_size:String(PAGE_SIZE)});
    const list=(res.data&&res.data.list)||[];
    if(!list.length){ log.textContent="暂无记录。"; document.getElementById("pageTxt").textContent="第 "+G.page+" 页"; return; }
    log.innerHTML=list.map((x,i)=>'<div class="rank"><div>#'+((G.page-1)*PAGE_SIZE+i+1)+'</div><div>'+escapeHtml(x.id||"")+'</div><div>'+(x.time||"")+'</div><div>'+(x.reward||0)+'</div></div>').join("");
    document.getElementById("pageTxt").textContent="第 "+G.page+" 页";
  }catch(e){ log.textContent="云端读取失败。"; }
}
function prevPage(){ if(G.page>1) loadRecords(G.page-1); }
function nextPage(){ loadRecords(G.page+1); }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }

function backMenu(){ show("gameCard",false); show("recordCard",false); show("menuCard",true); }

window.addEventListener("DOMContentLoaded",()=>{
  const d=new Date();
  const stamp=d.getFullYear().toString()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"-"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0")+String(d.getSeconds()).padStart(2,"0");
  document.getElementById("versionTxt").textContent="版本："+VER+"+"+stamp;
  document.getElementById("loadingAvatar").src=SYS_AVATARS[0];
  document.getElementById("sysAvatar").src=SYS_AVATARS[0];
  sys("欢迎来到地下城。这里有战斗，也有等待被温柔回应的心。",SYS_AVATARS[0]);
  if(!gasUrl()){
    document.getElementById("loginNotice").textContent="请以 ?record=你的GAS_URL 打开，否则无法云端游玩。";
  }
});
</script>
