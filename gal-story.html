<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烘焙奇境・冬日恋歌</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#9b59b6;--gold:#f0c040;--soft:#fff8f0;
  --amy-filter:sepia(0.2) saturate(1.8) hue-rotate(10deg) brightness(1.1);
  --lily-filter:sepia(0.3) saturate(2) hue-rotate(260deg) brightness(0.95);
  --snow-filter:sepia(0.1) saturate(1.3) hue-rotate(170deg) brightness(1.15);
}
body{font-family:'Noto Serif TC','Source Han Serif TC',serif;background:#0d0221;color:#fff;overflow:hidden;width:100vw;height:100vh;user-select:none}
#app{position:relative;width:100%;height:100%;display:flex;flex-direction:column}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ── TITLE ── */
#screen-title{background:linear-gradient(160deg,#0d0221,#1a0533 40%,#2d1055 70%,#0d0221);text-align:center}
#screen-title .stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
#screen-title .stars span{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
#screen-title h1{font-size:clamp(1.8rem,5vw,3.2rem);color:#f0c040;text-shadow:0 0 30px #9b59b6,0 0 60px #6c3483;letter-spacing:0.1em;position:relative;z-index:1}
#screen-title h2{font-size:clamp(1rem,3vw,1.6rem);color:#d7bde2;margin-top:0.4em;position:relative;z-index:1}
.title-btns{display:flex;flex-direction:column;gap:14px;margin-top:48px;position:relative;z-index:1}
.btn{padding:12px 36px;border:2px solid #9b59b6;background:rgba(155,89,182,0.15);color:#e8daef;font-size:1.05rem;font-family:inherit;cursor:pointer;border-radius:6px;transition:all .25s;letter-spacing:0.05em}
.btn:hover,.btn:focus{background:rgba(155,89,182,0.5);color:#fff;outline:none;box-shadow:0 0 12px #9b59b6}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.gold{border-color:#f0c040;color:#f0c040}
.btn.gold:hover{background:rgba(240,192,64,0.2);box-shadow:0 0 12px #f0c040}

/* ── SETUP / ID SCREENS ── */
.form-screen{background:linear-gradient(160deg,#0d0221,#1a0533 40%,#0d0221);padding:32px;max-width:480px;width:90%;margin:auto}
.form-screen h2{color:#f0c040;text-align:center;margin-bottom:24px;font-size:1.4rem}
.form-group{margin-bottom:18px}
.form-group label{display:block;color:#d7bde2;margin-bottom:6px;font-size:0.95rem}
.form-group input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.08);border:1px solid #6c3483;border-radius:4px;color:#fff;font-family:inherit;font-size:1rem;outline:none}
.form-group input:focus{border-color:#9b59b6;box-shadow:0 0 8px rgba(155,89,182,0.4)}
.gender-group{display:flex;gap:10px}
.gender-btn{flex:1;padding:10px;background:rgba(255,255,255,0.05);border:1px solid #6c3483;border-radius:4px;color:#b39ddb;cursor:pointer;font-family:inherit;font-size:0.9rem;transition:all .2s;text-align:center}
.gender-btn.selected,.gender-btn:hover{background:rgba(155,89,182,0.3);border-color:#9b59b6;color:#fff}
.form-hint{font-size:0.8rem;color:#888;margin-top:6px}
.form-actions{display:flex;gap:12px;margin-top:24px}
.form-actions .btn{flex:1}

/* ── SAVELOAD SCREEN ── */
#screen-saveload{background:linear-gradient(160deg,#0d0221,#1a0533,#0d0221);padding:24px}
#screen-saveload h2{color:#f0c040;text-align:center;margin-bottom:20px}
.save-slots{display:flex;flex-direction:column;gap:12px;width:100%;max-width:500px}
.save-slot{background:rgba(255,255,255,0.05);border:1px solid #6c3483;border-radius:8px;padding:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
.save-slot:hover{border-color:#9b59b6;background:rgba(155,89,182,0.15)}
.save-slot-num{font-size:1.5rem;color:#9b59b6;min-width:32px;text-align:center}
.save-slot-info{flex:1}
.save-slot-info .slot-title{color:#f0c040;font-size:0.95rem}
.save-slot-info .slot-meta{color:#888;font-size:0.8rem;margin-top:4px}
.save-slot-actions{display:flex;gap:8px}
.save-slot-actions button{padding:6px 12px;font-size:0.8rem;border-radius:4px;cursor:pointer;border:1px solid;font-family:inherit}
.sl-load{background:rgba(155,89,182,0.2);border-color:#9b59b6;color:#d7bde2}
.sl-save{background:rgba(64,180,64,0.2);border-color:#4db64d;color:#9deba7}
.sl-delete{background:rgba(180,64,64,0.15);border-color:#c0392b;color:#e88}
.sl-load:hover{background:rgba(155,89,182,0.5)}
.sl-save:hover{background:rgba(64,180,64,0.4)}
.sl-delete:hover{background:rgba(180,64,64,0.35)}
.saveload-back{margin-top:18px}
.save-slots-wrap{width:100%;max-width:520px;max-height:60vh;overflow-y:auto;padding-right:4px}
.save-slots-wrap::-webkit-scrollbar{width:6px}
.save-slots-wrap::-webkit-scrollbar-track{background:rgba(255,255,255,0.05)}
.save-slots-wrap::-webkit-scrollbar-thumb{background:#6c3483;border-radius:3px}
.add-slot-btn{width:100%;max-width:500px;margin-top:4px;background:rgba(255,255,255,0.04);border:1px dashed #6c3483;color:#9b59b6;padding:10px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.9rem;transition:all .2s}
.add-slot-btn:hover{background:rgba(108,52,131,0.25);color:#d7bde2}
/* 结局存档提示 */
#save-prompt{display:none;position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.97),rgba(0,0,0,0.7));padding:20px 24px 28px;z-index:80;text-align:center;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#save-prompt p{color:#d7bde2;margin:0 0 14px;font-size:1rem}
#save-prompt .sp-btns{display:flex;gap:12px;justify-content:center}

/* ── STORY SCREEN ── */
#screen-story{cursor:pointer}
#story-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:background .5s}
#story-bg-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.1) 55%,transparent 100%)}
#char-sprite{position:absolute;right:6%;bottom:160px;height:65%;max-height:520px;object-fit:contain;transition:opacity .4s,transform .4s;transform-origin:bottom center;filter:drop-shadow(0 0 12px rgba(0,0,0,0.6))}
#char-sprite.hidden{opacity:0;transform:translateX(40px)}
#char-sprite.visible{opacity:1;transform:translateX(0)}
#textbox{position:absolute;bottom:0;left:0;right:0;padding:18px 24px 22px;background:linear-gradient(to top,rgba(0,0,0,0.92),rgba(0,0,0,0.7));min-height:140px;z-index:10}
#char-name{color:#f0c040;font-size:1rem;font-weight:bold;letter-spacing:0.08em;margin-bottom:8px;min-height:1.3em;text-shadow:0 0 8px rgba(240,192,64,0.6)}
#story-text{color:#f5f0ea;font-size:clamp(0.92rem,2.2vw,1.08rem);line-height:1.85;min-height:3.5em}
#text-cursor{display:inline-block;width:10px;height:1em;background:#f0c040;margin-left:2px;animation:blink .7s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#text-cursor.done{animation:none;opacity:0}
#story-skip{position:absolute;bottom:6px;right:18px;font-size:0.72rem;color:#666}
#menu-btn{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.5);border:1px solid #6c3483;color:#d7bde2;padding:8px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.85rem;z-index:20;transition:all .2s}
#menu-btn:hover{background:rgba(155,89,182,0.4);border-color:#9b59b6}
#chapter-indicator{position:absolute;top:14px;left:14px;background:rgba(0,0,0,0.5);border:1px solid #3d1a6e;color:#888;padding:6px 12px;border-radius:4px;font-size:0.78rem;z-index:20}
#skip-btn{position:absolute;top:50px;right:14px;background:rgba(0,0,0,0.45);border:1px solid #3d1a6e;color:#666;padding:5px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.75rem;z-index:20;transition:all .2s;display:none}
#skip-btn.seen{color:#9b59b6;border-color:#6c3483;}
#skip-btn.seen:hover{background:rgba(108,52,131,0.4);color:#d7bde2}
#skip-btn.active{color:#f0c040;border-color:#f0c040;background:rgba(240,192,64,0.15);animation:skipPulse 1s ease infinite}
@keyframes skipPulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* ── CHOICE SCREEN ── */
#screen-choice{background:rgba(0,0,0,0.85);z-index:50}
#choice-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.3}
#choice-content{position:relative;z-index:1;width:100%;max-width:600px;padding:24px}
#choice-title{color:#d7bde2;font-size:0.95rem;margin-bottom:18px;text-align:center;letter-spacing:0.05em}
.choice-option{background:rgba(13,2,33,0.85);border:1px solid #6c3483;border-radius:8px;padding:14px 18px;margin-bottom:12px;cursor:pointer;transition:all .25s;position:relative}
.choice-option:hover:not(.locked){border-color:#9b59b6;background:rgba(155,89,182,0.2)}
.choice-option.locked{opacity:0.55;cursor:not-allowed}
.choice-option.locked:hover{border-color:#6c3483}
.choice-main{color:#f5f0ea;font-size:0.95rem;line-height:1.5;margin-bottom:8px}
.choice-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.choice-lock-icon{font-size:1rem}
.choice-cond{font-size:0.78rem}
.cond-met{color:#4db64d}
.cond-unmet{color:#e05555}
.choice-progress{font-size:0.75rem;color:#999}
.choice-affinity{font-size:0.72rem;color:#b39ddb;font-style:italic}

/* ── ENDING SCREEN ── */
#screen-ending{background:#000;text-align:center}
#ending-cg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.5}
#ending-content{position:relative;z-index:1;max-width:560px;padding:32px 24px}
#ending-name{font-size:1.6rem;color:#f0c040;text-shadow:0 0 20px #9b59b6;margin-bottom:18px}
#ending-text{color:#e8daef;font-size:1rem;line-height:1.9;margin-bottom:24px}
#ending-comment{color:#d7bde2;font-size:0.85rem;background:rgba(155,89,182,0.15);border:1px solid #6c3483;border-radius:6px;padding:12px;margin-bottom:20px}
#ending-fd-notice{color:#f0c040;font-size:0.88rem;margin-bottom:18px}
.ending-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ── OVERLAY: MENU ── */
#overlay-menu{position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#overlay-menu.open{display:flex}
#overlay-menu h3{color:#f0c040;margin-bottom:8px}
.menu-save-row{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,0.05);border:1px solid #3d1a6e;border-radius:6px;padding:10px 16px;width:320px}
.menu-save-row span{flex:1;color:#d7bde2;font-size:0.9rem}

/* ── OVERLAY: STATS ── */
#overlay-stats{position:absolute;inset:0;background:rgba(0,0,0,0.88);z-index:101;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;overflow-y:auto}
#overlay-stats.open{display:flex}
#overlay-stats h3{color:#f0c040;margin-bottom:18px;font-size:1.2rem}
.stats-panel{background:rgba(255,255,255,0.04);border:1px solid #3d1a6e;border-radius:10px;padding:20px;width:100%;max-width:440px}
.stats-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.9rem}
.stats-row:last-child{border-bottom:none}
.stats-label{color:#888}
.stats-val{color:#f0c040}
.affinity-bars{margin-top:14px}
.aff-row{margin-bottom:10px}
.aff-label{color:#d7bde2;font-size:0.85rem;margin-bottom:4px;display:flex;justify-content:space-between}
.aff-bar-bg{background:rgba(255,255,255,0.08);border-radius:4px;height:8px;overflow:hidden}
.aff-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.aff-bar-fill.amy{background:linear-gradient(90deg,#e07020,#f0c040)}
.aff-bar-fill.lily{background:linear-gradient(90deg,#6c3483,#9b59b6)}
.aff-bar-fill.snow{background:linear-gradient(90deg,#1a7a9a,#56cfe1)}
.endings-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.ending-tag{padding:4px 10px;border-radius:12px;font-size:0.78rem;border:1px solid}
.ending-tag.unlocked{border-color:#4db64d;color:#4db64d;background:rgba(77,182,77,0.1)}
.ending-tag.locked{border-color:#444;color:#555}

/* ── FD SCREEN ── same as story, extra label ── */
#fd-label{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(155,89,182,0.35);border:1px solid #9b59b6;color:#d7bde2;padding:4px 14px;border-radius:12px;font-size:0.8rem;z-index:20}

/* ── TOAST ── */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(13,2,33,0.95);border:1px solid #9b59b6;color:#e8daef;padding:10px 24px;border-radius:20px;font-size:0.88rem;transition:transform .3s,opacity .3s;opacity:0;z-index:200;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── MOBILE ── */
@media(max-width:640px){
  #char-sprite{height:55%;right:2%;bottom:130px}
  #textbox{padding:12px 14px 16px;min-height:120px}
  #story-text{font-size:0.9rem}
  .choice-option{padding:10px 12px}
  .stats-panel{padding:14px}
}
</style>
</head>
<body>
<div id="app">

<!-- TITLE -->
<div id="screen-title" class="screen active">
  <div class="stars" id="star-field"></div>
  <h1>烘焙奇境</h1>
  <h2>冬日恋歌</h2>
  <div class="title-btns">
    <button class="btn gold" onclick="startNewGame()">开始新游戏</button>
    <button class="btn" id="btn-continue" onclick="openSaveloadFromTitle()">继续游戏</button>
    <button class="btn" id="btn-title-stats" style="display:none" onclick="openStats()">📊 玩家面板</button>
  </div>
  <div style="position:absolute;bottom:16px;color:#333;font-size:0.72rem">BGM: 无　图源: OpenGameArt (CC-BY)</div>
</div>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <div class="form-screen">
    <h2>旅人，你是谁？</h2>
    <div class="form-group">
      <label>你的名字</label>
      <input id="input-name" type="text" placeholder="旅人" maxlength="12">
      <div class="form-hint">默认称呼：旅人</div>
    </div>
    <div class="form-group">
      <label>性别</label>
      <div class="gender-group">
        <div class="gender-btn" data-g="male" onclick="selectGender(this)">男</div>
        <div class="gender-btn" data-g="female" onclick="selectGender(this)">女</div>
        <div class="gender-btn" data-g="other" onclick="selectGender(this)">其他</div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="showScreen('title')">返回</button>
      <button class="btn gold" onclick="goToIdScreen()">下一步</button>
    </div>
  </div>
</div>

<!-- ID INPUT -->
<div id="screen-id" class="screen">
  <div class="form-screen">
    <h2>论坛档案</h2>
    <div class="form-group">
      <label>论坛 ID</label>
      <input id="input-id" type="text" placeholder="请输入你的论坛ID" maxlength="32">
      <div class="form-hint">用于读取回复数与被引用数（可用于解锁选项）</div>
    </div>
    <div class="form-group">
      <label>累计回复数</label>
      <input id="input-replies" type="number" min="0" value="0">
    </div>
    <div class="form-group">
      <label>累计被引用数</label>
      <input id="input-citations" type="number" min="0" value="0">
    </div>
    <div class="form-actions">
      <button class="btn" onclick="showScreen('setup')">返回</button>
      <button class="btn gold" onclick="confirmIdAndStart()">进入游戏</button>
    </div>
  </div>
</div>

<!-- SAVELOAD -->
<div id="screen-saveload" class="screen">
  <h2 style="color:#f0c040;margin-bottom:18px;position:relative;z-index:1">存档 / 读档</h2>
  <div class="save-slots-wrap" style="position:relative;z-index:1">
    <div class="save-slots" id="save-slots-container"></div>
    <button class="add-slot-btn" onclick="addSlot()">＋ 新增存档槽</button>
  </div>
  <button class="btn saveload-back" style="margin-top:14px;position:relative;z-index:1" onclick="saveloadBack()">返回</button>
</div>

<!-- STORY -->
<div id="screen-story" class="screen" onclick="onStoryClick()">
  <div id="story-bg"></div>
  <div id="story-bg-overlay"></div>
  <img id="char-sprite" src="" alt="" class="hidden" onerror="this.style.display='none'">
  <div id="chapter-indicator">第一章</div>
  <button id="menu-btn" onclick="event.stopPropagation();openMenu()">☰ 菜单</button>
  <button id="skip-btn" onclick="event.stopPropagation();toggleSkip()">⏭ 快转</button>
  <div id="textbox">
    <div id="char-name"></div>
    <div id="story-text"><span id="text-cursor" class="done"></span></div>
    <div id="story-skip">点击继续 ▶</div>
  </div>
</div>

<!-- CHOICE -->
<div id="screen-choice" class="screen">
  <div id="choice-bg"></div>
  <div id="choice-content">
    <div id="choice-title">你会怎么做？</div>
    <div id="choice-list"></div>
  </div>
</div>

<!-- ENDING -->
<div id="screen-ending" class="screen">
  <div id="ending-cg"></div>
  <div id="ending-content">
    <div id="ending-name"></div>
    <div id="ending-text"></div>
    <div id="ending-comment"></div>
    <div id="ending-fd-notice"></div>
    <div class="ending-btns">
      <button class="btn" id="ending-fd-btn" style="display:none" onclick="startFD()">阅读番外</button>
      <button class="btn gold" onclick="showScreen('title')">返回标题</button>
      <button class="btn" onclick="openStats()">查看面板</button>
      <button class="btn" style="font-size:0.8rem;padding:8px 14px" onclick="openUpdateStatsFromEnding()">📝 更新回复数</button>
    </div>
  </div>
  <!-- 结局存档提示 -->
  <div id="save-prompt">
    <p>是否将本次游戏进度存档？</p>
    <p style="font-size:0.82rem;color:#9b8;margin:-6px 0 10px">存档可保留当前进度，待回复数达到 50 次后重新进入结局即可解锁番外。</p>
    <div class="sp-btns">
      <button class="btn" onclick="openSaveFromEnding()">存档</button>
      <button class="btn" style="background:rgba(255,255,255,0.07);border-color:#555;color:#aaa" onclick="dismissSavePrompt()">跳过</button>
    </div>
  </div>
</div>

<!-- FD (reuse story UI) -->
<div id="screen-fd" class="screen" onclick="onFDClick()">
  <div id="fd-bg" style="position:absolute;inset:0;background-size:cover;background-position:center"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0.1) 55%,transparent 100%)"></div>
  <img id="fd-sprite" src="" alt="" class="hidden" style="position:absolute;right:6%;bottom:160px;height:65%;max-height:520px;object-fit:contain;transition:opacity .4s,transform .4s;transform-origin:bottom center;filter:drop-shadow(0 0 12px rgba(0,0,0,0.6))" onerror="this.style.display='none'">
  <div id="fd-label">番外剧情</div>
  <button style="position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.5);border:1px solid #6c3483;color:#d7bde2;padding:8px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:0.85rem;z-index:20" onclick="event.stopPropagation();showScreen('ending')">返回结局</button>
  <div id="fd-textbox" style="position:absolute;bottom:0;left:0;right:0;padding:18px 24px 22px;background:linear-gradient(to top,rgba(0,0,0,0.92),rgba(0,0,0,0.7));min-height:140px;z-index:10">
    <div id="fd-char-name" style="color:#f0c040;font-size:1rem;font-weight:bold;letter-spacing:0.08em;margin-bottom:8px;min-height:1.3em"></div>

  const max = Math.max(amy, lily, snow);
  if (max < 2) return 'normal';
  if (G.endingsUnlocked.length >= 3 && G.trueUnlocked) return 'true';
  const ties = [amy===max, lily===max, snow===max].filter(Boolean).length;
  if (ties > 1) {
    // prefer based on ch4 choice
    const ch4 = G.choices['ch4'];
    if(ch4==='A') return 'amy';
    if(ch4==='B') return 'lily';
    if(ch4==='C') return 'snow';
    return 'normal';
  }
  if (amy === max) return 'amy';
  if (lily === max) return 'lily';
  return 'snow';
}

// ══════════════════════════════════════════════
//  STORY ENGINE
// ══════════════════════════════════════════════
let storyTypingDone = false;
let storyTypingTimer = null;
let storyFullText = '';
let storyQueue = [];  // flat array of scenes for current chapter flow

function getChapterScenes(chKey){
  if(!SCENES) return [];
  switch(chKey){
    case 'ch1': return SCENES.ch1;
    case 'ch2': return SCENES.ch2;
    case 'ch3': return SCENES.ch3;
    case 'ch4': return SCENES.ch4;
    case 'amy': return [...SCENES.amyRoute];
    case 'lily': return [...SCENES.lilyRoute];
    case 'snow': return [...SCENES.snowRoute];
    case 'normal': return SCENES.normalRoute;
    case 'true': return SCENES.trueRoute;
    default: return [];
  }
}

const CHAPTER_LABELS = {
  ch1:'第一章：初醒', ch2:'第二章：奇迹蛋糕',
  ch3:'第三章：味道怪物', ch4:'第四章：决战',
  amy:'艾米路线', lily:'莉莉路线', snow:'小雪路线',
  normal:'普通结局', true:'真实结局',
};

let _skipTimer = null;

function playScene(){
  const scenes = getChapterScenes(G.chapter);
  if(G.sceneIdx >= scenes.length){
    stopSkip();
    advanceChapter();
    return;
  }
  const scene = scenes[G.sceneIdx];
  if(scene.type === 'choice'){
    stopSkip(); // 遇到选择题强制停止快转
    showChoice(scene);
    return;
  }
  // 快转模式：若当前场景未看过则停止快转
  if(G._skipMode){
    const key = G.chapter + ':' + G.sceneIdx;
    if(!G.seenScenes[key]){
      stopSkip();
    }
  }
  renderScene(scene);
  // 快转模式：渲染后立即完成打字并自动推进
  if(G._skipMode){
    completeTyping();
    _skipTimer = setTimeout(()=>{
      G.sceneIdx++;
      playScene();
    }, 80); // 每幕间隔 80ms，能看到切换感
  }
}

function renderScene(scene){
  // BG
  const bgKey = scene.bg || 'kitchen';
  setBG('story-bg', bgKey);

  // Sprite
  const sprite = document.getElementById('char-sprite');
  setSprite(sprite, scene.char, scene.expr);

  // Chapter label
  document.getElementById('chapter-indicator').textContent =
    CHAPTER_LABELS[G.chapter] || G.chapter;

  // Name
  const nameEl = document.getElementById('char-name');
  if(!scene.char || scene.char==='narrator'){
    nameEl.textContent = '';
    nameEl.style.color = '#d7bde2';
  } else if(scene.char==='player'){
    nameEl.textContent = playerName();
    nameEl.style.color = '#f0c040';
  } else if(scene.char==='??'){
    nameEl.textContent = '……';
    nameEl.style.color = '#b39ddb';
  } else {
    nameEl.textContent = CHAR_NAMES[scene.char]||scene.char;
    const colors = {Amy:'#f0b040', Lily:'#b39ddb', Snow:'#7ecfe8'};
    nameEl.style.color = colors[scene.char]||'#f0c040';
  }

  // Text
  let raw = '';
  if(G.gender==='male' && scene.textM) raw = scene.textM;
  else if(G.gender==='female' && scene.textF) raw = scene.textF;
  else raw = scene.text||'';
  raw = fillText(raw);

  // 标记该场景已看
  const sceneKey = G.chapter + ':' + G.sceneIdx;
  G.seenScenes[sceneKey] = 1;

  startTyping(raw, 'story-text', 'text-cursor');
  updateSkipBtn();
}

function startTyping(text, textElId, cursorId){
  storyTypingDone = false;
  storyFullText = text;
  if(storyTypingTimer) clearInterval(storyTypingTimer);

  const textEl = document.getElementById(textElId);
  const cursor = document.getElementById(cursorId);
  textEl.innerHTML = '';
  if(cursor){cursor.style.animation='';cursor.style.opacity='1';}

  let i=0;
  const speed = 30; // ms per char
  storyTypingTimer = setInterval(()=>{
    if(i >= text.length){
      clearInterval(storyTypingTimer);
      storyTypingDone = true;
      if(cursor){cursor.style.animation='blink .7s step-end infinite';}
      return;
    }
    // handle \n
    if(text[i]==='\n'){
      textEl.appendChild(document.createElement('br'));
    } else {
      textEl.appendChild(document.createTextNode(text[i]));
    }
    if(cursor) textEl.appendChild(cursor);
    i++;
  }, speed);
}

function completeTyping(){
  if(storyTypingTimer) clearInterval(storyTypingTimer);
  storyTypingDone = true;
  const textEl = document.getElementById('story-text');
  const cursor = document.getElementById('text-cursor');
  // render full text
  textEl.innerHTML = '';
  storyFullText.split('\n').forEach((line,idx,arr)=>{
    textEl.appendChild(document.createTextNode(line));
    if(idx<arr.length-1) textEl.appendChild(document.createElement('br'));
  });
  if(cursor){textEl.appendChild(cursor);cursor.style.animation='blink .7s step-end infinite';}
}

function sceneIsSeen(chapter, idx){
  return !!G.seenScenes[chapter+':'+idx];
}
function updateSkipBtn(){
  const btn = document.getElementById('skip-btn');
  if(!btn) return;
  const canSee = sceneIsSeen(G.chapter, G.sceneIdx);
  if(canSee){
    btn.style.display='';
    btn.className = G._skipMode ? 'active' : 'seen';
    btn.textContent = G._skipMode ? '⏹ 停止' : '⏭ 快转';
  } else {
    btn.style.display='none';
    if(G._skipMode) stopSkip();
  }
}
function toggleSkip(){
  if(G._skipMode){ stopSkip(); return; }
  // 只有当前场景已看过才能开启
  if(!sceneIsSeen(G.chapter, G.sceneIdx)){ showToast('当前剧情未看过，无法快转'); return; }
  G._skipMode = true;
  updateSkipBtn();
  // 若正在打字，先完成，然后推进
  if(!storyTypingDone) completeTyping();
  _skipTimer = setTimeout(()=>{ G.sceneIdx++; playScene(); }, 80);
}
function stopSkip(){
  G._skipMode = false;
  if(_skipTimer){ clearTimeout(_skipTimer); _skipTimer=null; }
  updateSkipBtn();
}

function onStoryClick(){
  if(G._skipMode){ stopSkip(); return; } // 点击画面停止快转
  if(!storyTypingDone){
    completeTyping();
    return;
  }
  // advance
  G.sceneIdx++;
  playScene();
}

function advanceChapter(){
  const order = ['ch1','ch2','ch3','ch4'];
  const idx = order.indexOf(G.chapter);
  if(idx>=0 && idx<order.length-1){
    G.chapter = order[idx+1];
    G.sceneIdx = 0;
    playScene();
  } else if(G.chapter==='ch4'){
    // determine route
    const route = determineRoute();
    G.route = route;
    G.chapter = route;
    G.sceneIdx = 0;
    playScene();
  } else {
    // route ending
    triggerEnding(G.chapter);
  }
}

function showChoice(choiceData){
  setBG('choice-bg', choiceData.bg||'kitchen');
  document.getElementById('choice-title').textContent = choiceData.prompt||'你会怎么做？';

  const list = document.getElementById('choice-list');
  list.innerHTML='';

  choiceData.options.forEach((opt,i)=>{
    const meetsReplies = G.replies >= opt.needReplies;
    const meetsCite = opt.needCite===0 || G.citations >= opt.needCite;
    const unlocked = meetsReplies && meetsCite;

    const div = document.createElement('div');
    div.className = 'choice-option' + (unlocked?'':' locked');

    let labelText = opt.text||'';
    if(G.gender==='male' && opt.textM) labelText=opt.textM;
    else if(G.gender==='female' && opt.textF) labelText=opt.textF;
    else if(!labelText && opt.textM) labelText=opt.textM;  // 性别「其他」时回退 textM
    else if(!labelText && opt.textF) labelText=opt.textF;
    labelText = fillText(labelText||'');

    // condition text
    let condParts = [];
    if(opt.needReplies>0){
      const met = G.replies>=opt.needReplies;
      condParts.push(`<span class="choice-cond ${met?'cond-met':'cond-unmet'}">${met?'✓':'🔒'} 需累计回复 ${opt.needReplies} 次（当前 ${G.replies} 次）</span>`);
    }
    if(opt.needCite>0){
      const met = G.citations>=opt.needCite;
      condParts.push(`<span class="choice-cond ${met?'cond-met':'cond-unmet'}">${met?'✓':'🔒'} 需被引用 ${opt.needCite} 次（当前 ${G.citations} 次）</span>`);
    }
    if(opt.needReplies===0&&opt.needCite===0){
      condParts.push('<span class="choice-cond cond-met">✓ 无条件解锁</span>');
    }

    div.innerHTML = `
      <div class="choice-main">${String.fromCharCode(65+i)}. ${labelText}</div>
      <div class="choice-meta">
        ${condParts.join('')}
      </div>
    `;

    if(unlocked){
      div.onclick = ()=> makeChoice(choiceData, opt, i);
    }
    list.appendChild(div);
  });

  showScreen('choice');
}

function makeChoice(choiceData, opt, idx){
  G.choices[choiceData.key] = opt.result;
  // apply affinity
  if(opt.aff){
    Object.entries(opt.aff).forEach(([k,v])=>{
      G.affinity[k] = (G.affinity[k]||0) + v;
    });
  }
  // log to GAS
  logChoiceToGAS(choiceData.key, idx, opt.text||opt.textM||'', opt.aff||{});

  // back to story
  showScreen('story');
  G.sceneIdx++;
  playScene();
}

function triggerEnding(routeKey){
  const data = ENDING_DATA[routeKey] || ENDING_DATA.normal;
  if(!G.endingsUnlocked.includes(routeKey)){
    G.endingsUnlocked.push(routeKey);
  }
  if(routeKey!=='true' && G.endingsUnlocked.filter(e=>!['true'].includes(e)).length>=3){
    G.trueUnlocked = true;
  }
  G._currentRoute = routeKey;

  document.getElementById('ending-name').textContent = '【结局：'+data.name+'】';
  document.getElementById('ending-text').textContent = data.text;
  document.getElementById('ending-comment').textContent = data.comment;

  // FD availability
  const fdEl = document.getElementById('ending-fd-notice');
  const fdBtn = document.getElementById('ending-fd-btn');
  if(data.fd){
    const fdKey = routeKey;
    const fdStatus = G.fdProgress[fdKey];
    const FD_REQ = 50;
    const already = fdStatus==='unlocked' || fdStatus==='done';
    const meetsReq = G.replies >= FD_REQ;
    if(already || meetsReq){
      // 条件已满足，显示按钮让玩家主动点击进入
      fdEl.innerHTML = `✨ 番外已解锁！点击下方按钮开始阅读。`;
      fdBtn.style.display='';
      fdBtn.textContent = '📖 阅读番外';
      fdBtn.onclick = ()=>startFD(fdKey);
    } else {
      // 未满足，告知条件并建议存档
      const still = FD_REQ - G.replies;
      fdEl.innerHTML = `🔒 番外解锁条件：累计回复满 <b>${FD_REQ}</b> 次（当前 ${G.replies} 次，还差 ${still} 次）。<br>
        <span style="color:#aaa;font-size:0.85rem">💾 建议先存档保存进度，达到条件后重新进入此结局即可解锁番外。</span>`;
      fdBtn.style.display='none';
    }
  } else {
    fdEl.textContent='';
    fdBtn.style.display='none';
  }

  // BG
  const cgEl = document.getElementById('ending-cg');
  const bgVal = BG[data.bg]||BG.fantasy;
  if(bgVal.startsWith('url(')){
    cgEl.style.backgroundImage=bgVal;cgEl.style.backgroundColor='';
  } else if(bgVal.startsWith('#')){
    cgEl.style.backgroundImage='none';cgEl.style.backgroundColor=bgVal;
  } else {
    cgEl.style.backgroundImage=bgVal;cgEl.style.backgroundColor='';
  }

  showScreen('ending');
  saveProgress();
}

function triggerEndingRefreshFD(routeKey){
  if(!ENDING_DATA) return;
  const data = ENDING_DATA[routeKey];
  if(!data || !data.fd) return;
  const fdEl  = document.getElementById('ending-fd-notice');
  const fdBtn = document.getElementById('ending-fd-btn');
  const fdStatus = G.fdProgress[routeKey];
  const FD_REQ = 50;
  const already = fdStatus==='unlocked' || fdStatus==='done';
  const meetsReq = G.replies >= FD_REQ;
  if(already || meetsReq){
    fdEl.innerHTML = `✨ 番外已解锁！点击下方按钮开始阅读。`;
    fdBtn.style.display='';
    fdBtn.textContent = '📖 阅读番外';
    fdBtn.onclick = ()=>startFD(routeKey);
  } else {

      <span style="color:#aaa;font-size:0.85rem">💾 建议先存档保存进度，达到条件后重新进入此结局即可解锁番外。</span>`;
    fdBtn.style.display='none';
  }
}

//  FD
// ══════════════════════════════════════════════
let fdIdx = 0;
let fdRouteKey = null;
let fdTypingDone = false;
let fdTypingTimer = null;
let fdFullText = '';

function startFD(routeKey){
  fdRouteKey = routeKey;
  fdIdx = 0;
  G.fdProgress[routeKey] = 'playing';
  showScreen('fd');
  playFDScene();
}

function getFDScenes(key){
  if(!SCENES) return [];
  switch(key){
    case 'amy': return SCENES.fdA;
    case 'lily': return SCENES.fdB;
    case 'snow': return SCENES.fdC;
    default: return [];
  }
}

function playFDScene(){
  const scenes = getFDScenes(fdRouteKey);
  if(fdIdx>=scenes.length){
    G.fdProgress[fdRouteKey]='done';
    showScreen('ending');
    return;
  }
  const scene = scenes[fdIdx];
  renderFDScene(scene);
}

function renderFDScene(scene){
  const bgEl = document.getElementById('fd-bg');
  const bgKey = scene.bg||'kitchen';
  const bgVal = BG[bgKey]||BG.kitchen;
  if(bgVal.startsWith('url(')){bgEl.style.backgroundImage=bgVal;bgEl.style.backgroundColor='';}
  else if(bgVal.startsWith('#')){bgEl.style.backgroundImage='none';bgEl.style.backgroundColor=bgVal;}
  else{bgEl.style.backgroundImage=bgVal;bgEl.style.backgroundColor='';}

  const sprite = document.getElementById('fd-sprite');
  setSprite(sprite, scene.char, scene.expr);

  const nameEl = document.getElementById('fd-char-name');
  if(!scene.char||scene.char==='narrator'){nameEl.textContent='';}
  else if(scene.char==='player'){nameEl.textContent=playerName();}
  else { nameEl.textContent=CHAR_NAMES[scene.char]||scene.char; }

  let raw='';
  if(G.gender==='male'&&scene.textM) raw=scene.textM;
  else if(G.gender==='female'&&scene.textF) raw=scene.textF;
  else raw=scene.text||'';
  raw=fillText(raw);

  fdFullText=raw;
  fdTypingDone=false;
  if(fdTypingTimer) clearInterval(fdTypingTimer);
  const textEl=document.getElementById('fd-story-text');
  const cursor=document.getElementById('fd-text-cursor');
  textEl.innerHTML='';
  if(cursor){cursor.style.animation='blink .7s step-end infinite';cursor.style.opacity='1';}

  let i=0;
  fdTypingTimer=setInterval(()=>{
    if(i>=raw.length){clearInterval(fdTypingTimer);fdTypingDone=true;return;}
    if(raw[i]==='\n') textEl.appendChild(document.createElement('br'));
    else textEl.appendChild(document.createTextNode(raw[i]));
    if(cursor) textEl.appendChild(cursor);
    i++;
  },30);
}

function onFDClick(){
  if(!fdTypingDone){
    if(fdTypingTimer) clearInterval(fdTypingTimer);
    fdTypingDone=true;
    const textEl=document.getElementById('fd-story-text');
    const cursor=document.getElementById('fd-text-cursor');
    textEl.innerHTML='';
    fdFullText.split('\n').forEach((line,idx,arr)=>{
      textEl.appendChild(document.createTextNode(line));
      if(idx<arr.length-1) textEl.appendChild(document.createElement('br'));
    });
    if(cursor) textEl.appendChild(cursor);
    return;
  }
  fdIdx++;
  playFDScene();
}

function openUpdateStatsFromEnding(){

  document.getElementById('upd-replies').value = G.replies||0;
  document.getElementById('upd-citations').value = G.citations||0;
  document.getElementById('overlay-update-stats').style.display='flex';
}
function confirmUpdateStats(){
  const r = parseInt(document.getElementById('upd-replies').value)||0;
  const c = parseInt(document.getElementById('upd-citations').value)||0;
  G.replies = r;
  G.citations = c;
  closeUpdateStats();
  showToast(`已更新：回复 ${r} 次 / 被引用 ${c} 次`);
  // 若从结局触发，重新刷新番外解锁状态
  if(_updateStatsFromEnding && G._currentRoute){
    triggerEndingRefreshFD(G._currentRoute);
  }
  _updateStatsFromEnding = false;
}
function renderMenuSaveSlots(){
  const container = document.getElementById('menu-save-list');
  container.innerHTML='';
  const maxS = getMaxSlots();
  for(let s=1;s<=maxS;s++){
    const row=document.createElement('div');
    row.className='menu-save-row';
    const slotData = getLocalSlot(s);
    row.innerHTML=`
      <span>存档 ${s}${slotData ? '：'+(CHAPTER_LABELS[slotData.chapter]||slotData.chapter)+' ('+slotData.savedAt.slice(0,10)+')' : '：空'}</span>
      <button class="sl-save" onclick="quickSave(${s})">存档</button>
      ${slotData?`<button class="sl-load" onclick="quickLoad(${s})">读取</button>`:''}
    `;
    container.appendChild(row);
  }
}

//  STATS OVERLAY
// ══════════════════════════════════════════════
function openStats(){
  const panel=document.getElementById('stats-panel-content');
  const allEndings=['amy','lily','snow','normal','true'];
  const allFDs=['amy','lily','snow'];
  panel.innerHTML=`
    <div class="stats-row"><span class="stats-label">论坛ID</span><span class="stats-val">${G.id||'（未设定）'}</span></div>
    <div class="stats-row"><span class="stats-label">玩家名</span><span class="stats-val">${playerName()}</span></div>
    <div class="stats-row"><span class="stats-label">性别</span><span class="stats-val">${{male:'男',female:'女',other:'其他'}[G.gender]||G.gender}</span></div>
    <div class="stats-row"><span class="stats-label">累计回复</span><span class="stats-val">${G.replies} 次</span></div>
    <div class="stats-row"><span class="stats-label">被引用</span><span class="stats-val">${G.citations} 次</span></div>
    <div class="stats-row"><span class="stats-label">当前章节</span><span class="stats-val">${CHAPTER_LABELS[G.chapter]||G.chapter}</span></div>
    <div class="affinity-bars" style="margin-top:14px">
      <div style="color:#d7bde2;font-size:0.85rem;margin-bottom:8px">角色好感度</div>
      ${renderAffBar('Amy','amy','amy')}
      ${renderAffBar('Lily','lily','lily')}
      ${renderAffBar('小雪','snow','snow')}
    </div>
    <div style="margin-top:14px">
      <div style="color:#d7bde2;font-size:0.85rem;margin-bottom:8px">已解锁结局</div>
      <div class="endings-grid">
        ${allEndings.map(e=>{
          const names={amy:'艾米',lily:'莉莉',snow:'小雪',normal:'普通',true:'真实'};
          const unlocked=G.endingsUnlocked.includes(e);
          return `<div class="ending-tag ${unlocked?'unlocked':'locked'}">${unlocked?'☑':'☐'} ${names[e]||e}</div>`;
        }).join('')}
      </div>
    </div>
    <div style="margin-top:12px">
      <div style="color:#d7bde2;font-size:0.85rem;margin-bottom:8px">已完成番外</div>
      <div class="endings-grid">
        ${allFDs.map(e=>{
          const names={amy:'艾米番外',lily:'莉莉番外',snow:'小雪番外'};
          const done=G.fdProgress[e]==='done';
          return `<div class="ending-tag ${done?'unlocked':'locked'}">${done?'☑':'☐'} ${names[e]||e}</div>`;
        }).join('')}
      </div>
    </div>
  `;
  document.getElementById('overlay-stats').classList.add('open');
}

function renderAffBar(label, key, cls){
  const val=G.affinity[key]||0;
  const max=4;
  const pct=Math.min(100,Math.round(val/max*100));
  return `<div class="aff-row">
    <div class="aff-label"><span>${label}</span><span>${val}/${max}</span></div>
    <div class="aff-bar-bg"><div class="aff-bar-fill ${cls}" style="width:${pct}%"></div></div>
  </div>`;
}

function closeStats(){
  document.getElementById('overlay-stats').classList.remove('open');
}

// ══════════════════════════════════════════════
//  LOCAL STORAGE (3 slots)
// ══════════════════════════════════════════════
const LS_KEY = 'gal_baking_save';
const DEFAULT_SLOTS = 8;
function getMaxSlots(){ return parseInt(localStorage.getItem(LS_KEY+'_slots')||DEFAULT_SLOTS); }
function setMaxSlots(n){ localStorage.setItem(LS_KEY+'_slots', n); }
function addSlot(){ const n=getMaxSlots()+1; setMaxSlots(n); renderSaveSlots(); showToast('存档槽已增加到 '+n+' 格'); }
function getLocalSlot(n){ const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}'); return d['slot'+n]||null; }
function setLocalSlot(n, data){ const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}'); d['slot'+n]=data; localStorage.setItem(LS_KEY,JSON.stringify(d)); }
function delLocalSlot(n){ const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}'); delete d['slot'+n]; localStorage.setItem(LS_KEY,JSON.stringify(d)); }

function buildSaveData(){
  return {
    id: G.id, name: G.name, gender: G.gender,
    replies: G.replies, citations: G.citations,
    chapter: G.chapter, sceneIdx: G.sceneIdx,
    choices: G.choices,
    affinity: G.affinity,
    route: G.route,
    endingsUnlocked: G.endingsUnlocked,
    fdProgress: G.fdProgress,
    seenScenes: G.seenScenes,
    trueUnlocked: G.trueUnlocked,
    savedAt: new Date().toISOString(),
  };
}

function loadSaveData(data){
  const prevSeen = G.seenScenes || {};
  Object.assign(G, data);
  // 合并已看记录（读档不能少于本机已有的）
  G.seenScenes = Object.assign({}, prevSeen, G.seenScenes || {});
  G._skipMode = false;
}

function quickSave(slot){
  const data = buildSaveData();
  setLocalSlot(slot, data);
  saveToGAS(slot, data);
  showToast(`已存档到存档槽 ${slot}`);
  if(document.getElementById('overlay-menu').classList.contains('open')) renderMenuSaveSlots();
}

function quickLoad(slot){
  const data = getLocalSlot(slot);
  if(!data){ showToast('该存档槽为空'); return; }
  loadSaveData(data);
  SCENES = buildScenes();
  closeMenu();
  showScreen('story');
  playScene();
  showToast(`已读取存档槽 ${slot}`);
}

function saveProgress(){
  // show save prompt at ending instead of auto-saving
  setTimeout(()=>{
    document.getElementById('save-prompt').style.display='block';
  }, 900);
}
function dismissSavePrompt(){
  document.getElementById('save-prompt').style.display='none';
}
function openSaveFromEnding(){
  dismissSavePrompt();
  saveloadOrigin = 'ending';
  showScreen('saveload','save');
  renderSaveSlots();
}

// ══════════════════════════════════════════════
//  SAVELOAD SCREEN
// ══════════════════════════════════════════════
function renderSaveSlots(){
  const container = document.getElementById('save-slots-container');
  container.innerHTML='';
  const maxS = getMaxSlots();
  for(let s=1;s<=maxS;s++){
    const slotData = getLocalSlot(s);
    const div=document.createElement('div');
    div.className='save-slot';
    const chLabel = slotData ? (CHAPTER_LABELS[slotData.chapter]||slotData.chapter) : '';
    const dateStr = slotData ? slotData.savedAt.slice(0,10) : '';
    div.innerHTML=`
      <div class="save-slot-num">${s}</div>
      <div class="save-slot-info">
        ${slotData
          ? `<div class="slot-title">${slotData.name||'旅人'} — ${chLabel}</div>
             <div class="slot-meta">${dateStr} | 回复:${slotData.replies||0} 引用:${slotData.citations||0}</div>`
          : '<div class="slot-title" style="color:#555">— 空存档 —</div>'}
      </div>
      <div class="save-slot-actions">
        ${slotData&&saveloadMode==='load' ? `<button class="sl-load" onclick="loadSlot(${s})">读取</button>` : ''}
        ${saveloadMode==='save' ? `<button class="sl-save" onclick="saveSlot(${s})">存档</button>` : ''}
        ${slotData ? `<button class="sl-delete" onclick="deleteSlot(${s})">删除</button>` : ''}
      </div>
    `;
    container.appendChild(div);
  }
}

function loadSlot(s){
  const data = getLocalSlot(s);
  if(!data){showToast('该存档槽为空');return;}
  loadSaveData(data);
  SCENES=buildScenes();
  showScreen('story');
  playScene();
}
function saveSlot(s){
  quickSave(s);
  renderSaveSlots();
}
function deleteSlot(s){
  if(!confirm(`确定要删除存档槽 ${s} 吗？`)) return;
  delLocalSlot(s);
  renderSaveSlots();
  showToast('存档已删除');
}

// ══════════════════════════════════════════════
//  GAS
// ══════════════════════════════════════════════
async function saveToGAS(slot, slotData){
  try{
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        sheet:'线性故事', type:'save',
        slot, data: slotData,
      })
    });
  } catch(e){ console.warn('GAS save failed', e); }
}

function loadFromGAS(userId, cb){
  const cbName = '_gasLoad_'+Date.now();
  window[cbName] = (res)=>{
    delete window[cbName];
    if(res && res.slots){
      [1,2,3].forEach(s=>{
        if(res.slots[s]) setLocalSlot(s, res.slots[s]);
      });
    }
    cb(res);
  };
  const script = document.createElement('script');
  script.src = GAS_URL+'?sheet=线性故事&id='+encodeURIComponent(userId)+'&callback='+cbName;
  script.onerror = ()=>{ delete window[cbName]; cb(null); };
  document.head.appendChild(script);
  setTimeout(()=>{ if(window[cbName]){ delete window[cbName]; cb(null); } }, 6000);
}

async function logChoiceToGAS(chapter, optIdx, optText, affGain){
  try{
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        sheet:'线性故事', type:'log',
        id: G.id, name: G.name,
        chapter, optIdx, optText,
        affGain, timestamp: new Date().toISOString(),
      })
    });
  } catch(e){ console.warn('GAS log failed', e); }
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

// ══════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  const activeScreen = document.querySelector('.screen.active');
  if(!activeScreen) return;
  const sid = activeScreen.id;
  if(e.key===' '||e.key==='Enter'){
    e.preventDefault();
    if(sid==='screen-story') onStoryClick();
    if(sid==='screen-fd') onFDClick();
  }
  if(e.key==='Escape'){
    if(document.getElementById('overlay-menu').classList.contains('open')) closeMenu();
    else if(document.getElementById('overlay-stats').classList.contains('open')) closeStats();
    else if(sid==='screen-story') openMenu();
  }
});

initStars();
