<script>
(() => {
  "use strict";
  const EXAM = JSON.parse(document.getElementById("exam-config").textContent);
  const ANSWERS = decodeAnswerPack(document.getElementById("answer-pack").textContent.trim());
  const POINTS = Number(EXAM.pointsPerQuestion || 10);
  const TOTAL = EXAM.questions.length * POINTS;
  const PROTECT_HASH = "C9D5";
  const state = {
    forumId: "",
    mode: "offline",
    startedAt: "",
    submittedAt: "",
    answers: {},
    submitted: false,
    lastResult: null
  };

  const el = (id) => document.getElementById(id);
  const escapeHtml = (value) => String(value == null ? "" : value)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");

  function decodeAnswerPack(pack) {
    const bin = atob(pack);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i += 1) bytes[i] = bin.charCodeAt(i) ^ ((73 + i * 17) & 255);
    return JSON.parse(new TextDecoder().decode(bytes));
  }

  function cleanId(id) {
    return String(id || "").trim().replace(/\s+/g, " ");
  }

  function nowIso() {
    return new Date().toISOString();
  }

  function fmtLocal(iso) {
    if (!iso) return "";
    try { return new Date(iso).toLocaleString("zh-CN", { hour12: false }); } catch (err) { return iso; }
  }

  function storageKey() {
    return "sstm_quiz_draft_" + EXAM.examId + "_" + state.forumId;
  }

  function saveDraft() {
    if (!state.forumId || state.submitted) return;
    try {
      localStorage.setItem(storageKey(), JSON.stringify({ answers: state.answers, startedAt: state.startedAt }));
    } catch (err) {}
  }

  function loadDraft() {
    try {
      const raw = localStorage.getItem(storageKey());
      if (!raw) return;
      const draft = JSON.parse(raw);
      if (draft && draft.answers) state.answers = draft.answers;
      if (draft && draft.startedAt) state.startedAt = draft.startedAt;
    } catch (err) {}
  }

  function clearDraft() {
    try { localStorage.removeItem(storageKey()); } catch (err) {}
  }

  function setLoginMsg(text, danger = true) {
    el("loginMsg").style.color = danger ? "#b42318" : "#0f766e";
    el("loginMsg").textContent = text || "";
  }

  function setOfflineBadge(show) {
    el("offlineBadge").classList.toggle("show", !!show);
  }

  function serializeParams(params) {
    return Object.keys(params)
      .filter((key) => params[key] !== undefined && params[key] !== null)
      .map((key) => encodeURIComponent(key) + "=" + encodeURIComponent(String(params[key])))
      .join("&");
  }

  function jsonp(params, timeoutMs = 9000) {
    return new Promise((resolve, reject) => {
      const endpoint = String(EXAM.gasEndpoint || "").trim();
      if (!endpoint) {
        reject(new Error("missing_endpoint"));
        return;
      }
      const cb = "__sstmQuizCb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
      const script = document.createElement("script");
      let done = false;
      const timer = setTimeout(() => finish(null, new Error("timeout")), timeoutMs);
      function finish(data, error) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        try { delete window[cb]; } catch (err) { window[cb] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
        if (error) reject(error);
        else resolve(data);
      }
      window[cb] = (data) => finish(data, null);
      script.onerror = () => finish(null, new Error("network_error"));
      const query = serializeParams({ ...params, callback: cb, _: Date.now() });
      script.src = endpoint + (endpoint.includes("?") ? "&" : "?") + query;
      document.head.appendChild(script);
    });
  }

  async function loginOnline() {
    const id = cleanId(el("forumId").value);
    if (!id) {
      setLoginMsg("请先填写论坛 ID。");
      el("forumId").focus();
      return;
    }
    el("onlineLoginBtn").disabled = true;
    el("offlineLoginBtn").disabled = true;
    setLoginMsg("正在检测 Google 云端记录...", false);
    try {
      const ping = await jsonp({ action: "ping", exam_id: EXAM.examId, version: EXAM.version }, 8500);
      if (!ping || ping.ok !== true) throw new Error("ping_failed");
      startExam(id, "online");
      jsonp({ action: "login", forum_id: id, mode: "online", exam_id: EXAM.examId, user_agent: navigator.userAgent }, 5000).catch(() => {});
    } catch (err) {
      setLoginMsg("无法连接 Google 云端，已切换为离线答题。", false);
      startExam(id, "offline");
    } finally {
      el("onlineLoginBtn").disabled = false;
      el("offlineLoginBtn").disabled = false;
    }
  }

  function loginOffline() {
    const id = cleanId(el("forumId").value);
    if (!id) {
      setLoginMsg("请先填写论坛 ID。");
      el("forumId").focus();
      return;
    }
    startExam(id, "offline");
  }

  function startExam(id, mode) {
    state.forumId = id;
    state.mode = mode === "online" ? "online" : "offline";
    state.startedAt = state.startedAt || nowIso();
    loadDraft();
    setOfflineBadge(state.mode !== "online");
    el("loginScreen").classList.add("hidden");
    el("examScreen").classList.remove("hidden");
    el("examTitle").textContent = EXAM.title;
    el("studentLabel").textContent = "论坛 ID：" + state.forumId;
    el("modeLabel").textContent = state.mode === "online" ? "云端记录" : "离线答题";
    renderPaper();
    updateProgress();
  }

  function renderPaper() {
    let html = "";
    let currentCategory = "";
    EXAM.questions.forEach((question, index) => {
      if (question.category !== currentCategory) {
        currentCategory = question.category;
        html += '<div class="section-title">' + escapeHtml(currentCategory) + '</div>';
      }
      const selected = state.answers[question.id] || "";
      html += '<article class="question" data-qid="' + escapeHtml(question.id) + '">';
      html += '<div class="q-head"><div class="q-no">' + (index + 1) + '</div><div class="q-text">' + escapeHtml(question.prompt) + '</div></div>';
      if (question.image) {
        html += '<div class="image-frame"><img src="' + escapeHtml(question.image) + '" alt="题目图片" loading="lazy" onerror="this.parentNode.classList.add(\'broken\');this.remove();"></div>';
      }
      html += '<div class="options">';
      question.options.forEach((option) => {
        const checked = selected === option.key ? " checked" : "";
        const disabled = state.submitted ? " disabled" : "";
        html += '<label class="option"><input type="radio" name="q-' + escapeHtml(question.id) + '" value="' + escapeHtml(option.key) + '"' + checked + disabled + '>';
        html += '<span class="option-key">' + escapeHtml(option.key) + '.</span><span class="option-text">' + escapeHtml(option.text) + '</span></label>';
      });
      html += '</div></article>';
    });
    el("paper").innerHTML = html;
  }

  function updateProgress() {
    const answered = EXAM.questions.filter((question) => state.answers[question.id]).length;
    el("answeredPill").textContent = "已答 " + answered + " / " + EXAM.questions.length;
    const pct = EXAM.questions.length ? Math.round(answered / EXAM.questions.length * 100) : 0;
    el("progressBar").style.width = pct + "%";
  }

  function onOptionChange(event) {
    const input = event.target;
    if (!input || input.type !== "radio" || !input.name.startsWith("q-")) return;
    const qid = input.name.slice(2);
    state.answers[qid] = input.value;
    saveDraft();
    updateProgress();
  }

  function calculateResult() {
    const details = EXAM.questions.map((question, index) => {
      const selectedKey = state.answers[question.id] || "";
      const selectedOption = question.options.find((option) => option.key === selectedKey);
      const correct = selectedKey === ANSWERS[question.id];
      return {
        index: index + 1,
        id: question.id,
        category: question.category || "",
        prompt: question.prompt || "",
        image: question.image || "",
        selectedKey,
        selectedText: selectedOption ? selectedOption.text : "",
        isCorrect: !!correct,
        earned: correct ? POINTS : 0
      };
    });
    const correctCount = details.filter((item) => item.isCorrect).length;
    const score = details.reduce((sum, item) => sum + item.earned, 0);
    return {
      forumId: state.forumId,
      mode: state.mode,
      startedAt: state.startedAt,
      submittedAt: state.submittedAt || nowIso(),
      durationSec: Math.max(0, Math.round((Date.now() - new Date(state.startedAt).getTime()) / 1000)) || 0,
      score,
      total: TOTAL,
      correctCount,
      totalQuestions: EXAM.questions.length,
      details
    };
  }

  function missingQuestionCount() {
    return EXAM.questions.filter((question) => !state.answers[question.id]).length;
  }

  async function submitExam() {
    const missing = missingQuestionCount();
    if (missing > 0) {
      alert("还有 " + missing + " 题尚未作答，请全部答完再提交。");
      return;
    }
    if (state.submitted) return;
    state.submitted = true;
    state.submittedAt = nowIso();
    el("submitBtn").disabled = true;
    const result = calculateResult();
    state.lastResult = result;
    renderPaper();
    renderResult("正在记录答题结果...", false);
    if (state.mode === "online") {
      try {
        const payload = buildSubmitPayload(result);
        const response = await jsonp(payload, 13000);
        if (!response || response.ok !== true) throw new Error(response && response.error ? response.error : "submit_failed");
        clearDraft();
        renderResult("云端已记录。本次答题结果已经送出。", false);
      } catch (err) {
        state.mode = "offline";
        result.mode = "offline";
        setOfflineBadge(true);
        el("modeLabel").textContent = "离线答题";
        renderResult("云端记录失败，已切换为离线答题。请下载 Excel 并交给新手村版主。", true);
      }
    } else {
      clearDraft();
      renderResult("离线答题完成。请下载 Excel 并交给新手村版主。", true);
    }
  }

  function buildSubmitPayload(result) {
    return {
      action: "submit",
      exam_id: EXAM.examId,
      exam_title: EXAM.title,
      version: EXAM.version,
      forum_id: result.forumId,
      mode: result.mode,
      score: result.score,
      total_score: result.total,
      correct_count: result.correctCount,
      total_questions: result.totalQuestions,
      started_at: result.startedAt,
      submitted_at: result.submittedAt,
      duration_sec: result.durationSec,
      user_agent: navigator.userAgent,
      answers_json: JSON.stringify(result.details)
    };
  }

  function renderResult(statusText, showOfflineDownload) {
    const result = state.lastResult;
    const box = el("resultBox");
    box.classList.remove("hidden");
    box.innerHTML = '<p class="score">' + result.score + ' / ' + result.total + ' 节操</p>' +
      '<p class="result-note">答对 ' + result.correctCount + ' / ' + result.totalQuestions + ' 题。' + escapeHtml(statusText) + '</p>' +
      (showOfflineDownload ? '<div class="download-panel"><p>' + escapeHtml(EXAM.offlineUploadNote || "请把下载的 Excel 交给新手村版主。") + '</p><button class="btn warn" id="downloadXlsxBtn" type="button">下载离线答题 Excel</button><div class="lock">Excel 记录文件已做保护处理，页面不会显示解锁密码。</div></div>' : "");
    setTimeout(() => box.scrollIntoView({ behavior: "smooth", block: "start" }), 40);
    const btn = el("downloadXlsxBtn");
    if (btn) btn.addEventListener("click", downloadOfflineXlsx);
  }

  function downloadOfflineXlsx() {
    const result = state.lastResult || calculateResult();
    const workbook = buildOfflineWorkbook(result);
    const filename = "SSTM_离线答题_" + safeFilename(result.forumId) + "_" + compactDate(new Date()) + ".xlsx";
    downloadBlob(workbook, filename, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
  }

  function safeFilename(value) {
    return String(value || "unknown").replace(/[\\/:*?"<>|\s]+/g, "_").slice(0, 48);
  }

  function compactDate(date) {
    const pad = (n) => String(n).padStart(2, "0");
    return date.getFullYear() + pad(date.getMonth() + 1) + pad(date.getDate()) + "_" + pad(date.getHours()) + pad(date.getMinutes());
  }

  function buildOfflineWorkbook(result) {
    const coverRows = [
      ["SSTM 离线答题交回文件", ""],
      ["论坛 ID", result.forumId],
      ["试卷", EXAM.title],
      ["试卷版本", EXAM.version],
      ["得分", result.score + " / " + result.total + " 节操"],
      ["答对题数", result.correctCount + " / " + result.totalQuestions],
      ["开始时间", fmtLocal(result.startedAt)],
      ["提交时间", fmtLocal(result.submittedAt)],
      ["提醒", "请把这份 Excel 传给新手村版主。"]
    ];
    const detailRows = [
      ["题号", "题目ID", "分类", "题目", "选择代号", "选择内容", "答对与否", "获得节操", "图片链接", "论坛ID", "提交时间"]
    ];
    result.details.forEach((item) => {
      detailRows.push([
        item.index,
        item.id,
        item.category,
        item.prompt,
        item.selectedKey,
        item.selectedText,
        item.isCorrect ? "答对" : "未答对",
        item.earned,
        item.image,
        result.forumId,
        fmtLocal(result.submittedAt)
      ]);
    });
    return makeXlsx([
      { name: "封面", rows: coverRows, hidden: false, protect: true },
      { name: "答题记录", rows: detailRows, hidden: true, protect: true }
    ]);
  }

  function makeXlsx(sheets) {
    const files = {
      "[Content_Types].xml": '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>' + sheets.map((_, i) => '<Override PartName="/xl/worksheets/sheet' + (i + 1) + '.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>').join("") + '</Types>',
      "_rels/.rels": '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>',
      "xl/_rels/workbook.xml.rels": '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' + sheets.map((_, i) => '<Relationship Id="rId' + (i + 1) + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet' + (i + 1) + '.xml"/>').join("") + '</Relationships>',
      "xl/workbook.xml": workbookXml(sheets)
    };
    sheets.forEach((sheet, i) => {
      files["xl/worksheets/sheet" + (i + 1) + ".xml"] = sheetXml(sheet.rows, sheet.protect);
    });
    return zipStore(files);
  }

  function workbookXml(sheets) {
    return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><workbookProtection workbookPassword="' + PROTECT_HASH + '" lockStructure="1"/><sheets>' +
      sheets.map((sheet, i) => '<sheet name="' + xml(sheet.name) + '" sheetId="' + (i + 1) + '"' + (sheet.hidden ? ' state="veryHidden"' : '') + ' r:id="rId' + (i + 1) + '"/>').join("") +
      '</sheets></workbook>';
  }

  function sheetXml(rows, protect) {
    const data = rows.map((row, r) => '<row r="' + (r + 1) + '">' + row.map((value, c) => cellXml(value, colName(c + 1) + (r + 1))).join("") + '</row>').join("");
    return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetViews><sheetView workbookViewId="0"/></sheetViews><sheetFormatPr defaultRowHeight="18"/><sheetData>' + data + '</sheetData>' + (protect ? '<sheetProtection password="' + PROTECT_HASH + '" sheet="1" objects="1" scenarios="1"/>' : '') + '</worksheet>';
  }

  function cellXml(value, ref) {
    if (typeof value === "number" && Number.isFinite(value)) return '<c r="' + ref + '"><v>' + value + '</v></c>';
    return '<c r="' + ref + '" t="inlineStr"><is><t>' + xml(value) + '</t></is></c>';
  }

  function colName(n) {
    let out = "";
    while (n > 0) {
      const rem = (n - 1) % 26;
      out = String.fromCharCode(65 + rem) + out;
      n = Math.floor((n - 1) / 26);
    }
    return out;
  }

  function xml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&apos;");
  }

  function zipStore(fileMap) {
    const enc = new TextEncoder();
    const locals = [];
    const centrals = [];
    let offset = 0;
    Object.keys(fileMap).forEach((name) => {
      const nameBytes = enc.encode(name);
      const data = enc.encode(fileMap[name]);
      const crc = crc32(data);
      const local = concat([
        u32(0x04034b50), u16(20), u16(0x0800), u16(0), u16(0), u16(33),
        u32(crc), u32(data.length), u32(data.length), u16(nameBytes.length), u16(0),
        nameBytes, data
      ]);
      const central = concat([
        u32(0x02014b50), u16(20), u16(20), u16(0x0800), u16(0), u16(0), u16(33),
        u32(crc), u32(data.length), u32(data.length), u16(nameBytes.length), u16(0), u16(0),
        u16(0), u16(0), u32(0), u32(offset), nameBytes
      ]);
      locals.push(local);
      centrals.push(central);
      offset += local.length;
    });
    const centralStart = offset;
    const centralData = concat(centrals);
    const end = concat([
      u32(0x06054b50), u16(0), u16(0), u16(centrals.length), u16(centrals.length),
      u32(centralData.length), u32(centralStart), u16(0)
    ]);
    return new Blob([concat([...locals, centralData, end])], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  }

  function u16(value) {
    const a = new Uint8Array(2);
    a[0] = value & 255;
    a[1] = (value >>> 8) & 255;
    return a;
  }

  function u32(value) {
    const a = new Uint8Array(4);
    a[0] = value & 255;
    a[1] = (value >>> 8) & 255;
    a[2] = (value >>> 16) & 255;
    a[3] = (value >>> 24) & 255;
    return a;
  }

  function concat(parts) {
    const length = parts.reduce((sum, part) => sum + part.length, 0);
    const out = new Uint8Array(length);
    let offset = 0;
    parts.forEach((part) => {
      out.set(part, offset);
      offset += part.length;
    });
    return out;
  }

  function crc32(bytes) {
    let crc = -1;
    for (let i = 0; i < bytes.length; i += 1) {
      crc = (crc >>> 8) ^ CRC_TABLE[(crc ^ bytes[i]) & 255];
    }
    return (crc ^ -1) >>> 0;
  }

  const CRC_TABLE = (() => {
    const table = new Uint32Array(256);
    for (let i = 0; i < 256; i += 1) {
      let c = i;
      for (let k = 0; k < 8; k += 1) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      table[i] = c >>> 0;
    }
    return table;
  })();

  function downloadBlob(blob, filename, type) {
    const safeBlob = blob instanceof Blob ? blob : new Blob([blob], { type });
    const url = URL.createObjectURL(safeBlob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(url);
      a.remove();
    }, 800);
  }

  document.addEventListener("change", onOptionChange);
  el("onlineLoginBtn").addEventListener("click", loginOnline);
  el("offlineLoginBtn").addEventListener("click", loginOffline);
  el("submitBtn").addEventListener("click", submitExam);
  el("loginTitle").textContent = EXAM.title;
  el("loginSubtitle").textContent = EXAM.subtitle || "请先填写论坛 ID。";
  el("submitHint").textContent = "每题 " + POINTS + " 节操，共 " + TOTAL + " 节操。提交后只显示总分，不显示答案。";
})();
</script>
</body>
</html>
